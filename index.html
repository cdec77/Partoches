<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Range tes Partoches-V3</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ccff00">
    <link rel="apple-touch-icon" href="icon-512.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Outfit:wght@200;400;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --neon-lime: #ccff00; 
            --neon-blue: #00f0ff;
            --neon-pink: #ff00ff;
            --bg: #0a0a0c; 
            --surface: #16161a;
            --page-bright: 1; 
            --page-contrast: 1; 
        }
        
        body { 
            background: var(--bg); 
            color: #e0e0e0; 
            font-family: 'Space Grotesk', sans-serif; 
            overflow: hidden; 
            margin: 0; 
            touch-action: none; 
            font-size: 13px;
        }

        .jazz-title { 
            font-family: 'Outfit', sans-serif; 
            text-transform: uppercase;
            font-weight: 900;
            letter-spacing: -1px;
            background: linear-gradient(to right, var(--neon-lime), var(--neon-blue));
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            filter: drop-shadow(0 0 8px rgba(204, 255, 0, 0.2));
        }

        .glass { 
            background: rgba(10, 10, 12, 0.9); 
            backdrop-filter: blur(20px); 
            border-bottom: 1px solid rgba(204, 255, 0, 0.2); 
        }

        .file-row { 
            background: var(--surface);
            border-radius: 6px;
            margin-bottom: 4px;
            border: 1px solid rgba(255,255,255,0.03);
            transition: all 0.2s ease; 
            cursor: pointer; 
        }
        .file-row:hover { 
            border-color: var(--neon-lime);
            transform: translateX(4px);
            background: rgba(204, 255, 0, 0.05);
        }

        /* VISIONNEUSE : NEON FOCUS */
        #scroll-container {
            height: 100vh; width: 100vw; overflow-y: scroll; overflow-x: auto; 
            background: #000; scroll-behavior: auto; touch-action: pan-x pan-y;
            display: grid; place-items: start center;
        }
        
        #viewer-content { 
            display: flex; flex-direction: column; align-items: center; 
            padding: 100px 0 500px 0; min-width: 100%; height: fit-content; 
            transition: transform 0.1s ease-out; transform-origin: center top; gap: 40px;
        }
        
        .page-wrapper { 
            position: relative; flex-shrink: 0; background: white; 
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
            filter: brightness(var(--page-bright)) contrast(var(--page-contrast));
            border-radius: 2px;
        }

        canvas, img { height: 92vh !important; width: auto !important; object-fit: contain; display: block; }
        .anno-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .anno-active .anno-canvas { pointer-events: auto; cursor: crosshair; }

        .tab-btn { font-size: 10px; font-weight: 700; letter-spacing: 1px; color: #666; transition: 0.3s; text-transform: uppercase; }
        .tab-active { color: var(--neon-lime); text-shadow: 0 0 10px var(--neon-lime); }
        
        .btn-jazz { 
            background: rgba(204, 255, 0, 0.05);
            border: 1px solid var(--neon-lime); 
            color: var(--neon-lime); 
            font-size: 10px; 
            font-weight: 700; 
            padding: 6px 14px; 
            border-radius: 4px; 
            text-transform: uppercase;
            transition: all 0.2s;
        }
        .btn-jazz:hover { background: var(--neon-lime); color: black; }
        
        #anno-toolbar, #fx-toolbar {
            position: fixed; left: 50%; transform: translateX(-50%);
            display: none; gap: 12px; padding: 15px; border-radius: 8px;
            background: rgba(10, 10, 12, 0.98); border: 1px solid var(--neon-lime); 
            z-index: 500;
        }
        #anno-toolbar { bottom: 120px; }
        #fx-toolbar { bottom: 40px; width: 300px; flex-direction: column; }
        
        .color-dot { width: 32px; height: 32px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; }
        .color-dot.active { border-color: white; transform: scale(1.1); }
        
        .nav-rect {
            pointer-events: auto; background: rgba(10, 10, 12, 0.9); border: 1px solid var(--neon-blue); 
            color: var(--neon-blue); font-weight: 700; font-size: 11px; padding: 12px 24px; border-radius: 4px;
            text-transform: uppercase; transition: 0.2s;
        }

        .copyright { position: fixed; bottom: 15px; left: 25px; font-size: 9px; color: #333; z-index: 50; }
        input[type=range] { accent-color: var(--neon-lime); width: 100%; height: 4px; }
        
        .source-tag { background: #000; border: 1px solid #222; padding: 4px 10px; border-radius: 4px; font-size: 9px; color: var(--neon-blue); font-weight: bold; }
        .source-delete { color: var(--neon-pink); cursor: pointer; margin-left: 8px; font-weight: 900; }

        /* BARRE ALPHABETIQUE STANDARDISÉE */
        #alpha-bar {
            background: var(--surface);
            border-bottom: 2px solid var(--neon-lime);
            padding: 10px 0;
            gap: 2px;
        }
        #alpha-bar button { 
            padding: 8px 12px; 
            font-size: 14px; 
            font-weight: 800; 
            color: #ffffff; 
            background: transparent;
            border: 1px solid transparent;
            border-radius: 4px;
            transition: all 0.2s ease;
            text-shadow: 0 0 2px black;
        }
        #alpha-bar button:hover { 
            background: var(--neon-lime);
            color: #000000;
            text-shadow: none;
        }
        #alpha-bar button.active {
            background: var(--neon-lime);
            color: #000000;
        }

        .lang-switch { font-size: 9px; border: 1px solid #333; padding: 2px 6px; border-radius: 4px; color: #888; cursor: pointer; }
        .lang-switch.active { color: var(--neon-lime); border-color: var(--neon-lime); }
    </style>
</head>
<body>

    <div class="copyright font-black uppercase">© Cyrille de Chanteloup</div>

    <nav class="glass fixed top-0 w-full flex justify-around p-4 z-[200]">
        <button onclick="switchTab('lib')" id="tab-lib" class="tab-btn tab-active" data-i18n="nav_lib">Répertoire</button>
        <button onclick="switchTab('set')" id="tab-set" class="tab-btn" data-i18n="nav_set">Setlists</button>
        <button onclick="switchTab('view')" id="tab-view" class="tab-btn opacity-20" data-i18n="nav_view">Visionneuse</button>
        <div class="absolute right-4 top-1/2 -translate-y-1/2 flex gap-1">
            <span onclick="setLang('fr')" id="lang-fr" class="lang-switch">FR</span>
            <span onclick="setLang('en')" id="lang-en" class="lang-switch">EN</span>
        </div>
    </nav>

    <section id="sec-lib" class="pt-20 h-screen overflow-y-auto px-6">
        <div class="flex justify-between items-end mb-6">
            <div>
                <h1 class="jazz-title text-4xl mb-1">Range tes Partoches</h1>
                <div id="source-list" class="flex gap-2"></div>
            </div>
            <div class="flex gap-3">
                <button id="btn-restore" onclick="restoreAccess()" class="hidden text-[9px] border border-blue-500 text-blue-400 px-3 py-1 rounded uppercase font-bold" data-i18n="btn_restore">Réactiver Accès</button>
                <button onclick="addSource()" class="btn-jazz" data-i18n="btn_scan">Scanner Dossier</button>
            </div>
        </div>
        
        <div id="alpha-bar" class="sticky top-0 z-20 flex flex-wrap justify-center shadow-2xl"></div>
        <div id="library-list" class="pb-40 mt-4"></div>
    </section>

    <section id="sec-set" class="hidden pt-20 h-screen overflow-y-auto px-6">
        <div class="max-w-xl mx-auto text-center">
            <h2 class="jazz-title text-2xl mb-6" data-i18n="set_title">Programmation</h2>
            <div id="set-list-current" class="bg-[#111] border border-white/5 rounded-lg min-h-[180px] mb-6 p-4"></div>
            <div class="grid grid-cols-2 gap-4 mb-10">
                <button onclick="saveCurrentSet()" class="btn-jazz !py-4 text-[11px]" data-i18n="btn_save_set">Enregistrer Set</button>
                <button onclick="clearCurrentSet()" class="text-[10px] uppercase font-bold text-zinc-600 hover:text-white transition" data-i18n="btn_clear">Vider</button>
            </div>
            <div id="saved-sets-list" class="space-y-2 pb-40 text-left"></div>
        </div>
    </section>

    <section id="sec-view" class="fixed inset-0 bg-black hidden z-[310] overflow-hidden">
        <div id="viewer-header" class="glass absolute top-0 w-full p-3 flex justify-between items-center z-[400]">
            <button onclick="switchTab('lib')" class="btn-jazz !border-none !text-zinc-500 !px-2" data-i18n="btn_close">✕ Fermer</button>
            <div class="flex items-center gap-4">
                <button onclick="toggleFX()" class="btn-jazz !border-zinc-700 !text-zinc-400" data-i18n="btn_settings">Réglages</button>
                <button onclick="toggleDrawingMode()" id="draw-toggle" class="btn-jazz" data-i18n="btn_draw">Dessin</button>
                <div class="flex items-center bg-zinc-900 rounded-lg px-1 border border-white/5">
                    <button onclick="adjustZoom(-0.1)" class="px-3 py-1 text-zinc-500 hover:text-white">-</button>
                    <span id="zoom-level" class="text-[10px] w-10 text-center font-bold text-lime-400">100%</span>
                    <button onclick="adjustZoom(0.1)" class="px-3 py-1 text-zinc-500 hover:text-white">+</button>
                </div>
            </div>
            <div id="page-info" class="text-white/20 font-bold text-[10px] pr-4 italic">0 / 0</div>
        </div>

        <div id="fx-toolbar">
            <div class="flex flex-col gap-3">
                <div class="flex justify-between items-center"><label class="text-[9px] uppercase font-bold text-zinc-500" data-i18n="fx_bright">Luminosité</label><span id="val-bright" class="text-[9px] text-lime-400">100%</span></div>
                <input type="range" min="0.2" max="2.5" step="0.1" value="1" oninput="updateFX('bright', this.value)">
                <div class="flex justify-between items-center"><label class="text-[9px] uppercase font-bold text-zinc-500" data-i18n="fx_contrast">Contraste</label><span id="val-contrast" class="text-[9px] text-lime-400">100%</span></div>
                <input type="range" min="0.2" max="4" step="0.1" value="1" oninput="updateFX('contrast', this.value)">
            </div>
        </div>

        <div id="anno-toolbar">
            <div class="flex gap-3 border-r border-white/10 pr-4">
                <div onclick="setAnnoColor('#ccff00', this)" class="color-dot active" style="background: #ccff00;"></div>
                <div onclick="setAnnoColor('#00f0ff', this)" class="color-dot" style="background: #00f0ff;"></div>
                <div onclick="setAnnoColor('eraser', this)" class="color-dot bg-zinc-800 flex items-center justify-center text-[7px] text-zinc-400 font-bold uppercase" data-i18n="btn_del">Del</div>
            </div>
            <div onclick="setAnnoSize(6, this)" class="w-6 h-6 bg-white/10 border border-white/20 rounded cursor-pointer hover:bg-lime-400 transition"></div>
        </div>

        <div id="scroll-container" onwheel="handleWheel(event)" ondblclick="resetZoom()" onclick="toggleUI()">
            <div id="viewer-content"></div>
        </div>

        <div id="viewer-nav" class="absolute bottom-8 w-full flex justify-between px-10 pointer-events-none z-[400]">
            <button onclick="event.stopPropagation(); prevFile()" class="nav-rect" data-i18n="btn_prev">Précédent</button>
            <button onclick="event.stopPropagation(); nextFile()" class="nav-rect" data-i18n="btn_next">Suivant</button>
        </div>
    </section>

    <script>
        const i18n = {
            fr: {
                nav_lib: "Répertoire", nav_set: "Setlists", nav_view: "Visionneuse",
                btn_restore: "Réactiver Accès", btn_scan: "Scanner Dossier",
                set_title: "Programmation", btn_save_set: "Enregistrer Set", btn_clear: "Vider",
                btn_close: "✕ Fermer", btn_settings: "Réglages", btn_draw: "Dessin",
                fx_bright: "Luminosité", fx_contrast: "Contraste", btn_del: "Del",
                btn_prev: "Précédent", btn_next: "Suivant", btn_add: "Ajouter"
            },
            en: {
                nav_lib: "Library", nav_set: "Setlists", nav_view: "Viewer",
                btn_restore: "Restore Access", btn_scan: "Scan Folder",
                set_title: "Setlists", btn_save_set: "Save Setlist", btn_clear: "Clear",
                btn_close: "✕ Close", btn_settings: "Settings", btn_draw: "Draw",
                fx_bright: "Brightness", fx_contrast: "Contrast", btn_del: "Del",
                btn_prev: "Previous", btn_next: "Next", btn_add: "Add"
            }
        };

        let currentLang = localStorage.getItem('part_lang') || (navigator.language.startsWith('fr') ? 'fr' : 'en');

        function setLang(lang) {
            currentLang = lang;
            localStorage.setItem('part_lang', lang);
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                el.innerText = i18n[lang][key];
            });
            document.querySelectorAll('.lang-switch').forEach(el => el.classList.remove('active'));
            document.getElementById('lang-' + lang).classList.add('active');
            renderLibrary();
        }

        if ('serviceWorker' in navigator) { window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js'); }); }
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        let files = [], setFiles = [], currentIndex = 0, sources = [];
        let uiVisible = true, currentZoom = 1.0, isDrawingMode = false;
        let annoColor = '#ccff00', annoSize = 6, initialPinchDist = null;
        let annotations = JSON.parse(localStorage.getItem('partoches_annotations') || '{}');

        const DB_NAME = "Range tes Partoches";
        async function openDB() {
            return new Promise((r) => {
                const req = indexedDB.open(DB_NAME, 1);
                req.onupgradeneeded = (e) => e.target.result.createObjectStore("sources");
                req.onsuccess = (e) => r(req.result);
            });
        }

        async function loadSources() {
            if (!window.showDirectoryPicker) return;
            const db = await openDB();
            const req = db.transaction("sources", "readonly").objectStore("sources").getAll();
            req.onsuccess = () => { sources = req.result; if(sources.length > 0) document.getElementById('btn-restore').classList.remove('hidden'); refreshFiles(); };
        }

        async function addSource() {
            try {
                const h = await window.showDirectoryPicker();
                if(!sources.find(s => s.name === h.name)) {
                    sources.push(h); const db = await openDB();
                    db.transaction("sources", "readwrite").objectStore("sources").put(h, h.name); refreshFiles();
                }
            } catch(e){}
        }

        async function scanFolder(handle) {
            const results = [];
            for await (const entry of handle.values()) {
                if (entry.kind === 'file' && entry.name.match(/\.(pdf|png|jpg|jpeg|webp)$/i)) results.push({entry});
                else if (entry.kind === 'directory') results.push(...(await scanFolder(entry)));
            }
            return results;
        }

        async function refreshFiles() {
            files = [];
            for(const h of sources) { files.push(...(await scanFolder(h))); }
            renderLibrary(); renderSourcesUI();
        }

        function renderSourcesUI() {
            const container = document.getElementById('source-list');
            container.innerHTML = '';
            sources.forEach((s, i) => {
                const tag = document.createElement('div');
                tag.className = 'source-tag';
                tag.innerHTML = `${s.name} <span class="source-delete" onclick="removeSource(${i})">✕</span>`;
                container.appendChild(tag);
            });
        }

        async function removeSource(i) {
            const name = sources[i].name; sources.splice(i, 1);
            const db = await openDB(); db.transaction("sources", "readwrite").objectStore("sources").delete(name);
            refreshFiles();
        }

        async function restoreAccess() {
            try {
                for(const h of sources) { if(await h.requestPermission() !== 'granted') return; }
                document.getElementById('btn-restore').classList.add('hidden'); refreshFiles();
            } catch(e) {}
        }

        function renderLibrary(f = '') {
            const l = document.getElementById('library-list'); l.innerHTML = '';
            files.filter(x => !f || x.entry.name.toUpperCase().indexOf(f.toUpperCase()) === 0).sort((a,b) => a.entry.name.localeCompare(b.entry.name)).forEach(file => {
                const row = document.createElement('div'); row.className = "file-row flex justify-between items-center p-3 px-4";
                row.innerHTML = `<div class="flex-grow font-medium text-zinc-400 text-[12px]" onclick="viewSingle('${file.entry.name.replace(/'/g, "\\'")}')">${file.entry.name}</div><button onclick="addToSet('${file.entry.name.replace(/'/g, "\\'")}')" class="btn-jazz !py-1 !px-3">${i18n[currentLang].btn_add}</button>`;
                l.appendChild(row);
            });
        }

        function viewSingle(name) { const f = files.find(x => x.entry.name === name); if(f) { setFiles = [f]; currentIndex = 0; openFile(f); } }

        async function openFile(obj) {
            if(!obj) return; switchTab('view');
            const container = document.getElementById('viewer-content'); container.innerHTML = ''; 
            const blob = await obj.entry.getFile(); const fileData = URL.createObjectURL(blob);
            if(obj.entry.name.toLowerCase().endsWith('.pdf')) {
                const pdf = await pdfjsLib.getDocument(fileData).promise;
                for(let i=1; i<=pdf.numPages; i++) {
                    const page = await pdf.getPage(i); const viewport = page.getViewport({scale: 2.2}); 
                    const wrapper = document.createElement('div'); wrapper.className = "page-wrapper";
                    const canvas = document.createElement('canvas'); canvas.width = viewport.width; canvas.height = viewport.height;
                    const anno = document.createElement('canvas'); anno.className = "anno-canvas"; anno.width = canvas.width; anno.height = canvas.height;
                    wrapper.appendChild(canvas); wrapper.appendChild(anno); container.appendChild(wrapper);
                    await page.render({canvasContext: canvas.getContext('2d'), viewport}).promise;
                    setupDrawing(anno, obj.entry.name, i);
                }
            } else {
                const wrapper = document.createElement('div'); wrapper.className = "page-wrapper";
                const img = document.createElement('img'); img.src = fileData;
                const anno = document.createElement('canvas'); anno.className = "anno-canvas";
                wrapper.appendChild(img); container.appendChild(wrapper);
                img.onload = () => { anno.width = img.naturalWidth; anno.height = img.naturalHeight; wrapper.appendChild(anno); setupDrawing(anno, obj.entry.name, 0); };
            }
            applyVisuals(); document.getElementById('scroll-container').scrollTop = 0; 
            document.getElementById('page-info').innerText = (currentIndex + 1) + " / " + setFiles.length;
        }

        function setupDrawing(canvas, fileName, pIdx) {
            const ctx = canvas.getContext('2d'); const key = fileName + "_" + pIdx;
            if(annotations[key]) { const img = new Image(); img.src = annotations[key]; img.onload = () => ctx.drawImage(img,0,0); }
            let drawing = false;
            const getPos = (e) => {
                const r = canvas.getBoundingClientRect(); const sx = canvas.width/r.width, sy = canvas.height/r.height;
                const cx = (e.clientX || (e.touches ? e.touches[0].clientX : 0));
                const cy = (e.clientY || (e.touches ? e.touches[0].clientY : 0));
                return { x: (cx-r.left)*sx, y: (cy-r.top)*sy };
            };
            canvas.addEventListener('mousedown', (e) => { if(!isDrawingMode) return; drawing=true; ctx.beginPath(); const p=getPos(e); ctx.moveTo(p.x, p.y); });
            canvas.addEventListener('mousemove', (e) => { if(!drawing) return; const p=getPos(e); ctx.lineTo(p.x, p.y); ctx.lineCap='round'; if(annoColor==='eraser'){ctx.globalCompositeOperation='destination-out'; ctx.lineWidth=annoSize*4;} else {ctx.globalCompositeOperation='source-over'; ctx.strokeStyle=annoColor; ctx.lineWidth=annoSize;} ctx.stroke(); });
            window.addEventListener('mouseup', () => { if(drawing) { drawing=false; annotations[key]=canvas.toDataURL(); localStorage.setItem('partoches_annotations', JSON.stringify(annotations)); }});
        }

        function handleWheel(e) { if (e.ctrlKey) { e.preventDefault(); adjustZoom(e.deltaY > 0 ? -0.05 : 0.05); } }
        window.addEventListener('keydown', (e) => {
            const sc = document.getElementById('scroll-container');
            if(e.key === "ArrowRight") nextFile(); if(e.key === "ArrowLeft") prevFile();
            if(e.key === "ArrowDown") sc.scrollBy(0, 150); if(e.key === "ArrowUp") sc.scrollBy(0, -150);
        });

        function switchTab(id) { 
            ['lib','set','view'].forEach(t => { document.getElementById('sec-'+t).classList.add('hidden'); document.getElementById('tab-'+t).classList.remove('tab-active'); });
            document.getElementById('sec-'+id).classList.remove('hidden'); document.getElementById('tab-'+id).classList.add('tab-active');
            if(id==='view') document.getElementById('tab-view').classList.remove('opacity-20');
        }

        function nextFile() { if(setFiles.length > 0) { currentIndex = (currentIndex + 1) % setFiles.length; openFile(setFiles[currentIndex]); } }
        function prevFile() { if(setFiles.length > 0) { currentIndex = (currentIndex - 1 + setFiles.length) % setFiles.length; openFile(setFiles[currentIndex]); } }
        function adjustZoom(d) { currentZoom = Math.max(0.1, currentZoom + d); applyVisuals(); }
        function applyVisuals() { document.getElementById('viewer-content').style.transform = "scale("+currentZoom+")"; document.getElementById('zoom-level').innerText = Math.round(currentZoom*100)+"%"; }
        function toggleFX() { const f = document.getElementById('fx-toolbar'); f.style.display = f.style.display === 'flex' ? 'none' : 'flex'; }
        function updateFX(type, val) { const r = document.documentElement; if(type === 'bright') { r.style.setProperty('--page-bright', val); document.getElementById('val-bright').innerText = Math.round(val*100)+"%"; } if(type === 'contrast') { r.style.setProperty('--page-contrast', val); document.getElementById('val-contrast').innerText = Math.round(val*100)+"%"; } }
        function toggleDrawingMode() { isDrawingMode = !isDrawingMode; document.getElementById('scroll-container').classList.toggle('anno-active', isDrawingMode); document.getElementById('draw-toggle').style.background = isDrawingMode ? 'red' : 'transparent'; document.getElementById('anno-toolbar').style.display = isDrawingMode ? 'flex' : 'none'; }
        function toggleUI() { if(isDrawingMode) return; uiVisible = !uiVisible; document.getElementById('viewer-header').style.opacity = uiVisible ? "1" : "0"; document.getElementById('viewer-nav').style.opacity = uiVisible ? "1" : "0"; }
        function setAnnoColor(c, el) { annoColor = c; document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active')); el.classList.add('active'); }
        function setAnnoSize(s) { annoSize = s; }

        new Sortable(document.getElementById('set-list-current'), { animation: 150 });
        function addToSet(name) {
            const div = document.createElement('div'); div.className = "flex justify-between items-center bg-[#1a1a1a] p-2 mb-2 rounded border border-white/5";
            div.dataset.name = name; div.innerHTML = `<span class="font-medium text-[11px] text-zinc-300">${name}</span> <button onclick="this.parentElement.remove()" class="text-pink-500 font-bold text-sm px-2">✕</button>`;
            document.getElementById('set-list-current').appendChild(div);
        }
        function saveCurrentSet() {
            const name = prompt(currentLang === 'fr' ? "Nom de la Setlist :" : "Setlist Name :"); if (!name) return;
            localStorage.setItem('part_set_' + name, JSON.stringify(Array.from(document.getElementById('set-list-current').children).map(c => c.dataset.name))); renderSavedSets();
        }
        function renderSavedSets() {
            const list = document.getElementById('saved-sets-list'); list.innerHTML = '';
            Object.keys(localStorage).filter(k => k.startsWith('part_set_')).forEach(key => {
                const div = document.createElement('div'); div.className = "flex justify-between items-center bg-zinc-900/50 border border-white/5 p-2 px-3 rounded";
                div.innerHTML = `<div class="font-bold text-lime-400 cursor-pointer text-[11px]" onclick="loadSet('${key}')">${key.replace('part_set_', '')}</div><button onclick="localStorage.removeItem('${key}'); renderSavedSets()" class="text-zinc-600 hover:text-white transition px-2">✕</button>`;
                list.appendChild(div);
            });
        }
        function loadSet(key) {
            const names = JSON.parse(localStorage.getItem(key)); setFiles = []; document.getElementById('set-list-current').innerHTML = '';
            names.forEach(n => { const f = files.find(file => file.entry.name === n); if (f) { setFiles.push(f); addToSet(n); } });
            if (setFiles.length > 0) { currentIndex = 0; openFile(setFiles[0]); }
        }

        window.onload = () => {
            loadSources(); 
            setLang(currentLang);
            renderSavedSets();
            const alpha = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
            const bar = document.getElementById('alpha-bar');
            alpha.forEach(l => {
                const b = document.createElement('button');
                b.innerText = l;
                b.onclick = () => renderLibrary(l);
                bar.appendChild(b);
            });
        };
    </script>
</body>
</html>
