            document.getElementById('tab-' + id).classList.add('tab-active');

        function renderSidebar() {
            const container = document.getElementById('sidebar-items');
            container.innerHTML = '';

        // ================================================================
        // ZOOM ET ÉCHELLE DES PAGES
        // ================================================================
        function applyPageScales() {
            const wrappers = document.querySelectorAll('.page-wrapper');
            wrappers.forEach(w => {
                const isRotated90 = (currentRotation === 90 || currentRotation === 270);
                w.style.transform       = `scale(${currentZoom})`;
                w.style.transformOrigin = 'top center';

                const naturalH  = w.offsetHeight;
                const naturalW  = w.offsetWidth;
                const scaledH   = naturalH * currentZoom;
                const scaledW   = naturalW * currentZoom;
                const surplusH  = scaledH - naturalH;

                let marginBottom;
                if (isRotated90) {
                    const visibleH = scaledW;
                    marginBottom   = Math.max(0, visibleH - naturalH) + 40;
                } else {
                    marginBottom   = Math.max(0, surplusH) + 40;
                }
                w.style.marginBottom = marginBottom + 'px';
                w.style.marginLeft   = '0px';
                w.style.marginRight  = '0px';
            });

            if (currentZoom > 1.05) {
                document.getElementById('viewer-header').style.opacity       = "1";
                document.getElementById('viewer-header').style.pointerEvents = "auto";
                document.getElementById('viewer-nav').style.opacity          = "1";
                uiVisible = true;
            }
            document.getElementById('zoom-level').innerText = Math.round(currentZoom * 100) + "%";

            // Recalculer les offsets PDF après changement de zoom
            rebuildPdfPageOffsets();
        }

        // ================================================================
        // ROTATION
        // ================================================================
        function rotatePage(direction) {
            currentRotation = (currentRotation + direction * 90 + 360) % 360;
            applyRotation();
        }

        function applyRotation() {
            const wrappers = document.querySelectorAll('.page-wrapper');
            wrappers.forEach(w => {
                w.style.transform       = `scale(${currentZoom}) rotate(${currentRotation}deg)`;
                w.style.transformOrigin = 'center center';

                const naturalH   = w.offsetHeight;
                const naturalW   = w.offsetWidth;
                const isRotated90 = (currentRotation === 90 || currentRotation === 270);

                let marginBottom;
                if (isRotated90) {
                    const visibleH = naturalW * currentZoom;
                    marginBottom   = Math.max(0, visibleH - naturalH) + 60;
                } else {
                    const surplusH = naturalH * currentZoom - naturalH;
                    marginBottom   = Math.max(0, surplusH) + 40;
                }
                w.style.marginBottom = marginBottom + 'px';
            });
            document.getElementById('zoom-level').innerText = Math.round(currentZoom * 100) + "%";
            const rotLabel = document.getElementById('rotate-label');
            if (rotLabel) rotLabel.innerText = currentRotation === 0 ? '↺↻' : currentRotation + '°';
        }

        function adjustZoom(d) { 
            currentZoom = Math.max(0.4, Math.min(3.5, currentZoom + d)); 
            if (currentRotation !== 0) applyRotation();
            else applyPageScales();
        }

        function handleWheel(e) {
            if (e.ctrlKey) { e.preventDefault(); adjustZoom(e.deltaY > 0 ? -0.05 : 0.05); }
        }

        // ================================================================
        // MODE DESSIN
        // ================================================================
        function toggleDrawingMode() {
            isDrawingMode = !isDrawingMode;
            document.getElementById('scroll-container').classList.toggle('anno-active', isDrawingMode);
            
            const btn = document.getElementById('draw-toggle');
            btn.style.background  = isDrawingMode ? 'var(--neon-pink)' : '';
            btn.style.borderColor = isDrawingMode ? 'var(--neon-pink)' : '';
            btn.style.color       = isDrawingMode ? '#fff' : '';
            
            document.getElementById('anno-toolbar').style.display = isDrawingMode ? 'flex' : 'none';
            
            if (isDrawingMode) {
                isFxMode = false;
                document.getElementById('fx-toolbar').style.display     = 'none';
                document.getElementById('fx-toggle-btn').style.background = '';
                document.getElementById('fx-toggle-btn').style.color      = '';
            }
        }

        // ================================================================
        // MODE FILTRES
        // ================================================================
        function toggleFX() { 
            isFxMode = !isFxMode;
            const fxBar = document.getElementById('fx-toolbar');
            fxBar.style.display = isFxMode ? 'flex' : 'none';
            
            const btn = document.getElementById('fx-toggle-btn');
            btn.style.background  = isFxMode ? 'var(--neon-blue)' : '';
            btn.style.borderColor = isFxMode ? 'var(--neon-blue)' : '';
            btn.style.color       = '#000';

            if (isFxMode) {
                isDrawingMode = false;
                document.getElementById('scroll-container').classList.remove('anno-active');
                document.getElementById('anno-toolbar').style.display  = 'none';
                document.getElementById('draw-toggle').style.background = '';
                document.getElementById('draw-toggle').style.color      = '';
            }
        }

        // ================================================================
        // MODE 2 PAGES CÔTE À CÔTE
        // ================================================================
        function toggleDualPage() {
            isDualPage = !isDualPage;
            document.getElementById('dual-page-btn').classList.toggle('dual-active', isDualPage);
            applyDualPageLayout();
        }

        function applyDualPageLayout() {
            const content = document.getElementById('viewer-content');
            if (isDualPage) {
                content.classList.add('dual-page-mode');
                if (currentZoom > 0.7) {
                    currentZoom = 0.55;
                    applyPageScales();
                }
            } else {
                content.classList.remove('dual-page-mode');
                if (currentZoom < 0.75) {
                    currentZoom = computeInitialZoom();
                    applyPageScales();
                }
            }
        }

        // ================================================================
        // TOGGLE UI (masque/affiche header + nav au tap)
        // ================================================================
        function toggleUI() {
            if (isDrawingMode || isFxMode || currentZoom > 1.05) return; 
            uiVisible = !uiVisible;
            document.getElementById('viewer-header').style.opacity       = uiVisible ? "1" : "0";
            document.getElementById('viewer-header').style.pointerEvents = uiVisible ? "auto" : "none";
            document.getElementById('viewer-nav').style.opacity          = uiVisible ? "1" : "0";
        }

        // ================================================================
        // FILTRES (luminosité / contraste)
        // ================================================================
        function updateFX(t, v) {
            const r = document.documentElement;
            if (t === 'bright')   { r.style.setProperty('--page-bright',   v); document.getElementById('val-bright').innerText   = Math.round(v * 100) + '%'; }
            if (t === 'contrast') { r.style.setProperty('--page-contrast',  v); document.getElementById('val-contrast').innerText = Math.round(v * 100) + '%'; }
        }

        // ================================================================
        // COULEUR ET TAILLE DU TRACÉ
        // ================================================================
        function setAnnoColor(c, el) { 
            annoColor = c; 
            document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active')); 
            if (el) el.classList.add('active'); 
        }
        
        function setAnnoSize(s, el) { 
            annoSize = s; 
            document.querySelectorAll('.size-btn').forEach(d => d.classList.remove('active')); 
            if (el) el.classList.add('active'); 
        }

        // ================================================================
        // DÉMARRAGE
        // ================================================================
        window.onload = init;

        /*
        ═══════════════════════════════════════════════════════════════════
        SUGGESTIONS D'AMÉLIORATION ET D'ÉVOLUTION — PARTOCHES
        ═══════════════════════════════════════════════════════════════════

        1. MÉTRONOME INTÉGRÉ
           Un métronome BPM cliquable directement dans la visionneuse,
           synchronisé par setlist. Chaque partition pourrait mémoriser
           son BPM (stocké en localStorage). Affichage discret en overlay.

        2. ANNOTATIONS TEXTE
           En plus du dessin libre, permettre l'insertion de zones de texte
           (doigtés, dynamiques, accords) positionnées au tap sur la partition,
           sauvegardées dans le même système d'annotations.

        3. EXPORT PDF ANNOTÉ
           Utiliser jsPDF + html2canvas pour exporter une partition avec
           ses annotations dessinées intégrées dans le PDF final.

        4. TRANSPORT BLUETOOTH / PÉDALE DE PAGE
           Connexion à une pédale de page MIDI ou Bluetooth (Web MIDI API /
           Web Bluetooth) pour tourner les pages les mains libres — très
           utile en concert.

        5. PARTAGE DE SETLIST
           Génération d'un QR code ou lien de partage d'une setlist entre
           musiciens d'un même groupe (via un petit backend ou Firebase).

        6. MODE NUIT / SÉPIA
           Filtre CSS supplémentaire "sépia" dans le toolbar FX pour réduire
           la fatigue oculaire dans les fosses sombres.

        7. RECHERCHE PLEIN TEXTE
           Index des noms de fichiers avec recherche floue (fuse.js) pour
           retrouver rapidement une partition dans une grande bibliothèque.

        8. PAGINATION PAR ONGLETS DANS LA SETLIST
           Afficher les partitions du set sous forme d'onglets horizontaux
           swipables plutôt que boutons Précédent/Suivant pour une navigation
           plus rapide en situation de concert.

        9. SAUVEGARDE CLOUD (iCloud / Google Drive)
           Utiliser l'API File System Access avec les dossiers iCloud Drive
           sur macOS / iOS pour que les partitions soient synchronisées
           automatiquement entre appareils.

        10. LECTURE AUTOMATIQUE TEMPO-SYNCHRONISÉE
            Mode "auto-scroll" qui fait défiler la page à vitesse constante
            réglable, idéal pour les partitions de chant ou de lecture à vue.
        ═══════════════════════════════════════════════════════════════════
        */
    </script>
</body>
