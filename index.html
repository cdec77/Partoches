        async function addSource() {
            if (typeof window.showDirectoryPicker === 'undefined') {
                addSourceFallbackIOS();
                return;
            }

            try {
                const h = await window.showDirectoryPicker({ mode: 'read' });

                // Check if source already exists
                if (sources.find(s => s.name === h.name)) {
                    showError(i18n[currentLang].msg_access_denied.replace('Accès refusé', 'Dossier déjà ajouté')
                        .replace('Access denied', 'Folder already added'));
                    return;
                }

                const db = await openDB();
                await db.transaction("sources", "readwrite").objectStore("sources").put(h, h.name);
                sources.push(h);
                await refreshFiles();

            } catch (e) {
                if (e.name === 'AbortError') return;
                addSourceFallbackIOS();
            }
        }

        async function addSourceRecursive() {
            if (typeof window.showDirectoryPicker === 'undefined') {
                addSourceFallbackIOS();
                return;
            }

            try {
                const h = await window.showDirectoryPicker({ mode: 'read' });

                // Check if source already exists
                if (sources.find(s => s.name === h.name)) {
                    showError(i18n[currentLang].msg_access_denied.replace('Accès refusé', 'Dossier déjà ajouté')
                        .replace('Access denied', 'Folder already added'));
                    return;
                }

                // Mark as recursive
                h._recursive = true;

                const db = await openDB();
                await db.transaction("sources", "readwrite").objectStore("sources").put(h, h.name);
                sources.push(h);
                await refreshFiles();

            } catch (e) {
                if (e.name === 'AbortError') return;
            }
        }

        function addSourceFallbackIOS() {
            const input = document.createElement('input');
            input.type = 'file';
            input.multiple = true;
            input.accept = '.pdf,.png,.jpg,.jpeg,.webp,.gif,.txt,image/*,application/pdf,text/plain';
            input.style.display = 'none';
            document.body.appendChild(input);

            input.onchange = async () => {
                if (!input.files || !input.files.length) {
                    input.remove();
                    return;
                }

                showLoading();

                try {
                    const db = await openDB();
                    const virtualSourceName = currentLang === 'fr' ? 'Fichiers iPad/iCloud' : 'iPad/iCloud Files';

                    // Create virtual source if it doesn't exist
                    if (!sources.find(s => s.name === virtualSourceName)) {
                        sources.push({ name: virtualSourceName, _virtual: true, _files: [] });
                    }

                    const vsrc = sources.find(s => s.name === virtualSourceName);

                    // Process selected files
                    for (const file of input.files) {
                        if (isSupportedFile(file.name)) {
                            const tx = db.transaction("ios_files", "readwrite");
                            await tx.objectStore("ios_files").put({ name: file.name, blob: file });

                            // Add to virtual source if not already present
                            if (!vsrc._files.some(f => f.entry.name === file.name)) {
                                vsrc._files.push({
                                    entry: {
                                        name: file.name,
                                        _blob: file,
                                        getFile: () => Promise.resolve(file)
                                    }
                                });
                            }
                        } else {
                            console.warn("Unsupported file type:", file.name);
                        }
                    }

                    await refreshFiles();
                    showSuccess(currentLang === 'fr' ? 'Fichiers ajoutés!' : 'Files added!');

                } catch (error) {
                    showError(i18n[currentLang].msg_error_loading);
                } finally {
                    input.remove();
                    hideLoading();
                }
            };

            input.click();
        }

        async function removeSource(name) {
            if (!confirm(currentLang === 'fr'
                ? "Supprimer l'accès à ce dossier / groupe de fichiers ?"
                : "Remove access to this folder / files?")) {
                return;
            }

            showLoading();

            try {
                const src = sources.find(s => s.name === name);
                const db = await openDB();

                if (src) {
                    if (!src._virtual) {
                        await db.transaction("sources", "readwrite").objectStore("sources").delete(name);
                    } else {
                        await db.transaction("ios_files", "readwrite").objectStore("ios_files").clear();
                    }
                }

                sources = sources.filter(s => s.name !== name);
                await refreshFiles();
                showSuccess(currentLang === 'fr' ? 'Source supprimée' : 'Source removed');

            } catch (error) {
                showError(i18n[currentLang].msg_error_deleting);
            } finally {
                hideLoading();
            }
        }

        async function restoreAccess() {
            showLoading();

            try {
                for (const h of sources) {
                    if (!h._virtual) {
                        await h.requestPermission({ mode: 'read' });
                    }
                }
                document.getElementById('btn-restore').classList.add('hidden');
                await refreshFiles();
                showSuccess(currentLang === 'fr' ? 'Accès rétablis' : 'Access restored');

            } catch (error) {
                showError(i18n[currentLang].msg_error_loading);
            } finally {
                hideLoading();
            }
        }

        // ===========================================
        // FILE SCANNING - RECURSIVE FOR SUBFOLDERS AND IPHOTO ALBUMS
        // ===========================================
        async function scanFolderFresh(handle, recursive = false, depth = 0) {
            const list = [];

            try {
                for await (const entry of handle.values()) {
                    if (entry.kind === 'file' && isSupportedFile(entry.name)) {
                        list.push({ entry, parentHandle: handle });
                    } else if (entry.kind === 'directory' && recursive && depth < 8) {
                        try {
                            // Recursively scan subdirectory
                            const subResults = await scanFolderFresh(entry, true, depth + 1);
                            list.push(...subResults);
                        } catch (e) {
                            console.warn("Subfolder inaccessible:", entry.name, e);
                        }
                    }
                }
            } catch (error) {
                console.error("Error scanning folder:", handle.name, error);
            }

            return list;
        }

        // ===========================================
        // FILE REFRESH AND LIBRARY RENDERING
        // ===========================================
        async function refreshFiles() {
            showLoading();

            try {
                files = [];

                // Scan all sources
                for (const h of sources) {
                    try {
                        if (h._virtual) {
                            // Virtual source (iOS files)
                            if (h._files) {
                                // Sort files alphabetically
                                h._files.sort((a, b) => a.entry.name.localeCompare(b.entry.name));
                                files.push(...h._files);
                            }
                        } else {
                            // Physical directory
                            const results = await scanFolderFresh(h, h._recursive);
                            // Sort results alphabetically
                            results.sort((a, b) => a.entry.name.localeCompare(b.entry.name));
                            files.push(...results);
                        }
                    } catch (e) {
                        console.warn("Folder inaccessible", h.name, e);
                        showError(`${h.name}: ${i18n[currentLang].msg_access_denied}`);
                    }
                }

                // Render the library
                renderLibrary();
                renderSourcesUI();

            } catch (error) {
                console.error("Error refreshing files:", error);
                showError(i18n[currentLang].msg_error_loading);
            } finally {
                hideLoading();
            }
        }

        function renderLibrary() {
            const container = document.getElementById('library-list');
            container.innerHTML = '';

            if (files.length === 0) {
                const emptyMsg = document.createElement('div');
                emptyMsg.className = 'text-center text-zinc-600 py-20';
                emptyMsg.textContent = i18n[currentLang].msg_no_files;
                container.appendChild(emptyMsg);
                return;
            }

            // Group files by source for better organization
            const filesBySource = {};
            files.forEach(file => {
                let sourceName = file.parentHandle ? file.parentHandle.name : '';
                if (!sourceName && file.entry._virtualSource) {
                    sourceName = file.entry._virtualSource;
                }
                if (!sourceName) {
                    sourceName = currentLang === 'fr' ? 'Fichiers divers' : 'Misc Files';
                }

                if (!filesBySource[sourceName]) {
                    filesBySource[sourceName] = [];
                }
                filesBySource[sourceName].push(file);
            });

            // Render each source group
            for (const [sourceName, sourceFiles] of Object.entries(filesBySource)) {
                // Create source header
                const sourceHeader = document.createElement('div');
                sourceHeader.className = 'folder-header';
                sourceHeader.style.marginTop = '12px';

                const toggleSpan = document.createElement('span');
                toggleSpan.className = 'folder-toggle';
                toggleSpan.textContent = '▶';

                const nameSpan = document.createElement('span');
                nameSpan.textContent = sourceName;

                // Add recursive indicator if applicable
                const src = sources.find(s => s.name === sourceName);
                if (src && src._recursive) {
                    const badgeSpan = document.createElement('span');
                    badgeSpan.textContent = ' 🔁';
                    badgeSpan.style.color = 'var(--neon-purple)';
                    nameSpan.appendChild(badgeSpan);
                }

                sourceHeader.appendChild(toggleSpan);
                sourceHeader.appendChild(nameSpan);
                container.appendChild(sourceHeader);

                // Create files container
                const filesContainer = document.createElement('div');
                filesContainer.className = 'folder-children';
                filesContainer.style.display = 'none';

                // Sort files alphabetically
                sourceFiles.sort((a, b) => a.entry.name.localeCompare(b.entry.name));

                // Render each file
                sourceFiles.forEach(file => {
                    const fileDiv = document.createElement('div');
                    fileDiv.className = 'file-row fade-in';

                    const nameDiv = document.createElement('div');
                    nameDiv.textContent = file.entry.name;
                    nameDiv.style.flexGrow = '1';
                    nameDiv.style.overflow = 'hidden';
                    nameDiv.style.textOverflow = 'ellipsis';
                    nameDiv.style.whiteSpace = 'nowrap';

                    const infoDiv = document.createElement('div');
                    infoDiv.style.color = '#727282';
                    infoDiv.style.fontSize = '10px';
                    infoDiv.style.marginLeft = '8px';

                    // Add file size if available
                    if (file.entry._blob) {
                        infoDiv.textContent = formatFileSize(file.entry._blob.size);
                    } else {
                        infoDiv.textContent = '';
                    }

                    fileDiv.appendChild(nameDiv);
                    fileDiv.appendChild(infoDiv);

                    // Click handler
                    fileDiv.onclick = () => {
                        // Check if file is already in setlist
                        if (!setFiles.some(f => getFileKey(f) === getFileKey(file))) {
                            setFiles.push(file);
                        }
                        currentIndex = setFiles.findIndex(f => getFileKey(f) === getFileKey(file));
                        switchTab('view');
                        renderViewer();
                        renderSidebar();
                    };

                    filesContainer.appendChild(fileDiv);
                });

                container.appendChild(filesContainer);

                // Set up folder toggle
                sourceHeader.onclick = (e) => {
                    e.stopPropagation();
                    sourceHeader.classList.toggle('open');
                    filesContainer.style.display = filesContainer.style.display === 'none' ? 'block' : 'none';
                };
            }
        }

        function renderSourcesUI() {
            const container = document.getElementById('source-list');
            container.innerHTML = '';

            if (sources.length === 0) return;

            sources.forEach(s => {
                const tag = document.createElement('div');
                tag.className = 'source-tag fade-in';

                let badge = '';
                if (s._recursive) {
                    badge = ' 🔁';
                } else if (s._virtual) {
                    badge = ' 📱';
                }

                const deleteBtn = document.createElement('span');
                deleteBtn.className = 'source-delete';
                deleteBtn.innerHTML = '✕';
                deleteBtn.onclick = (e) => {
                    e.stopPropagation();
                    removeSource(s.name);
                };

                tag.innerHTML = `${s.name}${badge}`;
                tag.appendChild(deleteBtn);
                container.appendChild(tag);
            });
        }

        // ===========================================
        // ALPHA BAR GENERATION
        // ===========================================
        function generateAlphaBar() {
            const alphaBar = document.getElementById('alpha-bar');
            alphaBar.innerHTML = '';

            // Create buttons for each letter
            for (let i = 65; i <= 90; i++) {
                const letter = String.fromCharCode(i);
                const btn = document.createElement('button');
                btn.textContent = letter;
                btn.className = 'px-2 py-1 text-xs font-bold text-zinc-500 hover:text-lime-400 transition-colors';
                btn.onclick = () => scrollToLetter(letter);
                alphaBar.appendChild(btn);
            }

            // Add # for numbers/special chars
            const numBtn = document.createElement('button');
            numBtn.textContent = '#';
            numBtn.className = 'px-2 py-1 text-xs font-bold text-zinc-500 hover:text-lime-400 transition-colors';
            numBtn.onclick = () => scrollToLetter('#');
            alphaBar.appendChild(numBtn);
        }

        function scrollToLetter(letter) {
            const container = document.getElementById('library-list');
            const files = Array.from(container.querySelectorAll('.file-row'));

            let targetIndex = -1;
            for (let i = 0; i < files.length; i++) {
                const fileName = files[i].querySelector('div').textContent.toUpperCase();
                const firstChar = fileName.charAt(0);

                if ((letter === '#' && !/^[A-Z]/.test(firstChar)) || firstChar === letter) {
                    targetIndex = i;
                    break;
                }
            }

            if (targetIndex >= 0) {
                files[targetIndex].scrollIntoView({
                    behavior: 'smooth',
                    block: 'start'
                });
            }
        }

        async function saveCurrentSet() {
            if (setFiles.length === 0) {
                showError(currentLang === 'fr' ? 'Aucun fichier dans la setlist' : 'No files in setlist');
                return;
            }

            const name = prompt(currentLang === 'fr' ? 'Nom de la setlist:' : 'Setlist name:');
            if (!name) return;

            const setData = {
                id: Date.now().toString(),
                name: name,
                files: setFiles.map(f => ({
                    name: f.entry.name,
                    path: f.parentHandle ? f.parentHandle.name : '',
                    source: f.parentHandle ? f.parentHandle.name : (f.entry._virtualSource || '')
                }))
            };

            try {
                const db = await openDB();
                await db.transaction("setlists", "readwrite").objectStore("setlists").put(setData);
                showSuccess(i18n[currentLang].msg_setlist_saved);
                renderSavedSets();
            } catch (error) {
                showError(i18n[currentLang].msg_error_saving);
            }
        }

        async function loadSavedSet(set) {
            try {
                showLoading();

                const loadedFiles = [];
                for (const fileRef of set.files) {
                    // Find the file in current files
                    const foundFile = files.find(f => {
                        const fName = f.entry.name;
                        const fPath = f.parentHandle ? f.parentHandle.name : '';
                        const fSource = f.entry._virtualSource || '';
                        return fName === fileRef.name &&
                               fPath === fileRef.path &&
                               (fSource === fileRef.source || !fileRef.source);
                    });

                    if (foundFile) {
                        loadedFiles.push(foundFile);
                    }
                }

                if (loadedFiles.length > 0) {
                    setFiles = loadedFiles;
                    currentIndex = 0;
                    switchTab('view');
                    renderViewer();
                    renderSidebar();
                } else {
                    showError(i18n[currentLang].msg_files_not_found);
                }

            } catch (error) {
                showError(i18n[currentLang].msg_error_loading);
            } finally {
                hideLoading();
            }
        }

        async function deleteSavedSet(id) {
            if (!confirm(currentLang === 'fr' ? 'Supprimer cette setlist?' : 'Delete this setlist?')) return;

            try {
                const db = await openDB();
                await db.transaction("setlists", "readwrite").objectStore("setlists").delete(id);
                showSuccess(i18n[currentLang].msg_setlist_deleted);
                renderSavedSets();
            } catch (error) {
                showError(i18n[currentLang].msg_error_deleting);
            }
        }

        function clearCurrentSet() {
            if (confirm(currentLang === 'fr' ? 'Vider la setlist actuelle?' : 'Clear current setlist?')) {
                setFiles = [];
                currentIndex = 0;
                renderSidebar();
                document.getElementById('page-info').innerText = '0 / 0';
            }
        }

        // ===========================================
        // VIEWER FUNCTIONS
        // ===========================================
        function switchTab(tab) {
            // Hide all sections
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));

            // Remove active class from all tabs
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('tab-active'));

            // Show selected section
            document.getElementById('sec-' + tab).classList.remove('hidden');
            document.getElementById('tab-' + tab).classList.add('tab-active');

            if (tab === 'view') {
                if (setFiles.length === 0) {
                    // If no files in setlist, use all files
                    setFiles = [...files];
                    currentIndex = 0;
                }
                renderViewer();
                renderSidebar();
            }
        }

        function goToHome() {
            switchTab('lib');
        }

        function renderSidebar() {
            const container = document.getElementById('sidebar-items');
            container.innerHTML = '';

            if (setFiles.length === 0) {
                const emptyMsg = document.createElement('div');
                emptyMsg.className = 'text-center text-zinc-600 py-10';

            document.getElementById('viewer-sidebar').classList.toggle('collapsed', !isSidebarVisible);

        // ===========================================
        // FILE RENDERING IN VIEWER
        // ===========================================
        async function renderViewer() {
            if (setFiles.length === 0) return;

            const file = setFiles[currentIndex];
            const container = document.getElementById('viewer-content');
            container.innerHTML = '';

            // Show loading spinner
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'loading-spinner';
            container.appendChild(loadingDiv);

            try {
                const fileData = await file.entry.getFile();
                const fileName = file.entry.name.toLowerCase();

                let mediaElement;
                let isPdf = false;
                let isGif = false;

                // Render based on file type
                if (fileName.endsWith('.pdf')) {
                    isPdf = true;
                    mediaElement = await renderPdf(fileData);
                } else if (fileName.match(/\.(png|jpg|jpeg|webp|gif)$/i)) {
                    isGif = fileName.endsWith('.gif');
                    mediaElement = await renderImage(fileData, isGif);
                } else if (fileName.endsWith('.txt')) {
                    mediaElement = await renderText(fileData);
                }

                if (mediaElement) {
                    // Create page wrapper
                    const pageWrapper = document.createElement('div');
                    pageWrapper.className = 'page-wrapper';
                    pageWrapper.style.transform = `scale(${currentZoom}) rotate(${currentRotation}deg)`;

                    // Create rotation wrapper
                    const rotationWrapper = document.createElement('div');
                    rotationWrapper.className = 'rotation-wrapper';

                    // Create media container
                    const mediaContainer = document.createElement('div');
                    mediaContainer.style.position = 'relative';
                    mediaContainer.style.display = 'inline-block';

                    // Add media element
                    mediaContainer.appendChild(mediaElement);

                    // Create annotation canvas
                    const annoCanvas = document.createElement('canvas');
                    annoCanvas.className = 'anno-canvas';
                    annoCanvas.dataset.fileKey = getFileKey(file);

                    // FIX: Set canvas size to match media dimensions exactly
                    if (isPdf) {
                        setTimeout(() => {
                            const pdfCanvas = mediaContainer.querySelector('canvas:not(.anno-canvas)');
                            if (pdfCanvas) {
                                annoCanvas.width = pdfCanvas.width;
                                annoCanvas.height = pdfCanvas.height;
                                annoCanvas.style.width = pdfCanvas.style.width;
                                annoCanvas.style.height = pdfCanvas.style.height;
                            }
                        }, 100);
                    } else if (mediaElement.tagName === 'IMG') {
                        mediaElement.onload = () => {
                            annoCanvas.width = mediaElement.naturalWidth || mediaElement.width;
                            annoCanvas.height = mediaElement.naturalHeight || mediaElement.height;
                        };
                        if (mediaElement.complete) {
                            annoCanvas.width = mediaElement.naturalWidth || mediaElement.width;
                            annoCanvas.height = mediaElement.naturalHeight || mediaElement.height;
                        }
                    }

                    // Add annotation canvas to media container
                    mediaContainer.appendChild(annoCanvas);
                    rotationWrapper.appendChild(mediaContainer);
                    pageWrapper.appendChild(rotationWrapper);
                    container.appendChild(pageWrapper);

                    // Initialize annotation canvas
                    initAnnotationCanvas(annoCanvas, file);

                    // Apply page scales
                    applyPageScales();

                    // Update PDF navigation visibility
                    if (isPdf) {
                        document.getElementById('pdf-page-nav').classList.remove('hidden');
                        updatePdfPageLabel();
                    } else {
                        document.getElementById('pdf-page-nav').classList.add('hidden');
                    }

                    // Update text save button visibility
                    document.getElementById('txt-save-btn').classList.toggle('hidden', !fileName.endsWith('.txt'));

                    // Add fade in animation
                    pageWrapper.classList.add('fade-in');
                }

            } catch (error) {
                console.error("Error rendering file:", error);
                showError(i18n[currentLang].msg_error_display);
                container.innerHTML = '';
            } finally {
                loadingDiv.remove();
            }
        }

        async function renderPdf(fileData) {
            const arrayBuffer = await fileData.arrayBuffer();
            const pdfData = new Uint8Array(arrayBuffer);

            currentPdfDoc = await pdfjsLib.getDocument({
                data: pdfData
            }).promise;

            // Create canvas for first page
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');

            const page = await currentPdfDoc.getPage(currentPdfPageNum);
            const viewport = page.getViewport({ scale: 1.0 });

            canvas.width = viewport.width;
            canvas.height = viewport.height;
            canvas.style.width = viewport.width + 'px';
            canvas.style.height = viewport.height + 'px';

            await page.render({
                canvasContext: ctx,
                viewport: viewport
            }).promise;

            currentPdfPageNum = 1;
            return canvas;
        }

        async function renderImage(fileData, isGif) {
            return new Promise((resolve) => {
                const img = document.createElement('img');

                if (isGif) {
                    img.className = 'gif-media';
                }

                const url = URL.createObjectURL(fileData);
                img.src = url;

                img.onload = () => {
                    URL.revokeObjectURL(url);
                    resolve(img);
                };

                img.onerror = () => {
                    URL.revokeObjectURL(url);
                    showError(i18n[currentLang].msg_image_error);
                    resolve(null);
                };
            });
        }

        async function renderText(fileData) {
            const text = await fileData.text();

            const pre = document.createElement('pre');
            pre.textContent = text;
            pre.style.background = 'white';
            pre.style.color = 'black';
            pre.style.padding = '20px';
            pre.style.borderRadius = '4px';
            pre.style.fontFamily = 'monospace';
            pre.style.fontSize = '12px';
            pre.style.whiteSpace = 'pre-wrap';
            pre.style.wordWrap = 'break-word';
            pre.style.maxWidth = '100%';
            pre.style.overflow = 'auto';
            pre.style.lineHeight = '1.5';

            return pre;
        }

        function changePdfPage(delta) {
            if (!currentPdfDoc) return;

            currentPdfPageNum = Math.max(1, Math.min(currentPdfDoc.numPages, currentPdfPageNum + delta));
            renderViewer();
            updatePdfPageLabel();
        }

        function updatePdfPageLabel() {
            if (currentPdfDoc) {
                document.getElementById('pdf-page-label').textContent = currentPdfPageNum + ' / ' + currentPdfDoc.numPages;
            }
        }

        // ===========================================
        // TEXT FILE SAVING
        // ===========================================
        async function saveTxtFile() {
            if (setFiles.length === 0 || !setFiles[currentIndex].entry.name.endsWith('.txt')) return;

            const file = setFiles[currentIndex];

            try {
                const fileData = await file.entry.getFile();
                const text = await fileData.text();

                const blob = new Blob([text], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);

                const a = document.createElement('a');
                a.href = url;
                a.download = file.entry.name;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);

                showSuccess(i18n[currentLang].msg_file_saved);

            } catch (error) {
                showError(i18n[currentLang].msg_error_saving);
            }
        }

        // ===========================================
        // ZOOM AND ROTATION
        // ===========================================
        function adjustZoom(delta) {
            currentZoom = Math.max(0.1, Math.min(5.0, currentZoom + delta));
            document.getElementById('zoom-level').textContent = Math.round(currentZoom * 100) + '%';
            applyPageScales();
        }

        function rotatePage(delta) {
            currentRotation = (currentRotation + delta + 360) % 360;

            const labels = {
                0: '↺↻',
                90: '↻',
                180: '↺↺',
                270: '↺'
            };

            document.getElementById('rotate-label').textContent = labels[currentRotation] || '↺↻';
            applyPageScales();
        }

        function applyPageScales() {
            const pages = document.querySelectorAll('.page-wrapper');

            pages.forEach(page => {
                page.style.transform = `scale(${currentZoom}) rotate(${currentRotation}deg)`;
            });

            // Adjust container padding based on zoom level
            const container = document.getElementById('viewer-content');
            const basePadding = 30;
            const scaledPadding = basePadding / currentZoom;

            container.style.padding = `${120}px ${scaledPadding}px ${450}px ${scaledPadding}px`;

            // Handle dual page mode
            if (isDualPage) {
                container.classList.add('dual-page-mode');
            } else {
                container.classList.remove('dual-page-mode');
            }
        }

        // ===========================================
        // DUAL PAGE MODE
        // ===========================================
        function toggleDualPage() {
            isDualPage = !isDualPage;
            document.getElementById('dual-page-btn').classList.toggle('dual-active', isDualPage);

            if (isDualPage) {
                renderDualPages();
            } else {
                renderViewer();
            }
        }

        async function renderDualPages() {
            if (setFiles.length === 0) return;

            const container = document.getElementById('viewer-content');
            container.innerHTML = '';
            container.classList.add('dual-page-mode');

            // Show loading spinner
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'loading-spinner';
            container.appendChild(loadingDiv);

            try {
                // Get current and next file
                const file1 = setFiles[currentIndex];
                const file2 = currentIndex + 1 < setFiles.length ? setFiles[currentIndex + 1] : null;

                // Render first page
                if (file1) {
                    const page1 = await createPageElement(file1);
                    container.appendChild(page1);
                }

                // Render second page if available
                if (file2) {
                    const page2 = await createPageElement(file2);
                    container.appendChild(page2);
                }

                applyPageScales();

            } catch (error) {
                console.error("Error rendering dual pages:", error);
                showError(currentLang === 'fr' ? "Erreur en mode double page" : "Dual page mode error");
            } finally {
                loadingDiv.remove();
            }
        }

        async function createPageElement(file) {
            const fileData = await file.entry.getFile();
            const fileName = file.entry.name.toLowerCase();

            let mediaElement;
            let isPdf = false;

            if (fileName.endsWith('.pdf')) {
                isPdf = true;
                mediaElement = await renderPdf(fileData);
            } else if (fileName.match(/\.(png|jpg|jpeg|webp|gif)$/i)) {
                mediaElement = await renderImage(fileData, fileName.endsWith('.gif'));
            } else if (fileName.endsWith('.txt')) {
                mediaElement = await renderText(fileData);
            }

            if (!mediaElement) return null;

            // Create page wrapper
            const pageWrapper = document.createElement('div');
            pageWrapper.className = 'page-wrapper';
            pageWrapper.style.transform = `scale(${currentZoom}) rotate(${currentRotation}deg)`;

            // Create rotation wrapper
            const rotationWrapper = document.createElement('div');
            rotationWrapper.className = 'rotation-wrapper';

            // Create media container
            const mediaContainer = document.createElement('div');
            mediaContainer.style.position = 'relative';
            mediaContainer.style.display = 'inline-block';

            // Add media element
            mediaContainer.appendChild(mediaElement);

            // Create annotation canvas
            const annoCanvas = document.createElement('canvas');
            annoCanvas.className = 'anno-canvas';
            annoCanvas.dataset.fileKey = getFileKey(file);

            // Set canvas size to match media
            if (mediaElement.tagName === 'IMG') {
                mediaElement.onload = () => {
                    annoCanvas.width = mediaElement.naturalWidth || mediaElement.width;
                    annoCanvas.height = mediaElement.naturalHeight || mediaElement.height;
                };
                if (mediaElement.complete) {
                    annoCanvas.width = mediaElement.naturalWidth || mediaElement.width;
                    annoCanvas.height = mediaElement.naturalHeight || mediaElement.height;
                }
            } else if (isPdf) {
                setTimeout(() => {
                    const pdfCanvas = mediaContainer.querySelector('canvas:not(.anno-canvas)');
                    if (pdfCanvas) {
                        annoCanvas.width = pdfCanvas.width;
                        annoCanvas.height = pdfCanvas.height;
                    }
                }, 100);
            }

            // Add annotation canvas to media container
            mediaContainer.appendChild(annoCanvas);
            rotationWrapper.appendChild(mediaContainer);
            pageWrapper.appendChild(rotationWrapper);

            // Initialize annotation canvas
            initAnnotationCanvas(annoCanvas, file);

            return pageWrapper;
        }

        // ===========================================
        // UI TOGGLE AND WHEEL HANDLING
        // ===========================================
        function toggleUI() {
            if (isDrawingMode) return;

            uiVisible = !uiVisible;
            const header = document.getElementById('viewer-header');
            const nav = document.getElementById('viewer-nav');

            if (uiVisible) {
                header.style.opacity = '1';
                nav.style.opacity = '1';
            } else {
                header.style.opacity = '0';
                nav.style.opacity = '0';
            }
        }

        function handleWheel(event) {
            if (isDrawingMode) {
                event.preventDefault();
                return;
            }

            // Handle zoom with Ctrl/Cmd + wheel
            if (event.ctrlKey || event.metaKey) {
                event.preventDefault();
                const delta = event.deltaY > 0 ? -0.15 : 0.15;
                adjustZoom(delta);
                return;
            }

            // Handle horizontal scroll for dual page mode
            if (isDualPage && Math.abs(event.deltaX) > Math.abs(event.deltaY)) {
                event.preventDefault();
                const container = document.getElementById('scroll-container');
                container.scrollLeft += event.deltaX;
            }
        }

        // ===========================================
        // TOUCH AND PINCH ZOOM
        // ===========================================
        function setupTouchHandlers() {
            const container = document.getElementById('scroll-container');

            let touchStartX = 0;
            let touchStartY = 0;
            let isTouching = false;

            container.addEventListener('touchstart', (e) => {
                if (e.touches.length === 1) {
                    touchStartX = e.touches[0].clientX;
                    touchStartY = e.touches[0].clientY;
                    isTouching = true;
                } else if (e.touches.length === 2) {
                    // Pinch zoom start
                    startDist = getTouchDistance(e.touches[0], e.touches[1]);
                    startZoom = currentZoom;
                    e.preventDefault();
                }
            }, { passive: false });

            container.addEventListener('touchmove', (e) => {
                if (isDrawingMode) {
                    e.preventDefault();
                    return;
                }

                if (e.touches.length === 1 && isTouching) {
                    // Single touch - scroll
                    const touch = e.touches[0];
                    const deltaX = touchStartX - touch.clientX;
                    const deltaY = touchStartY - touch.clientY;

                    if (Math.abs(deltaX) > 5 || Math.abs(deltaY) > 5) {
                        container.scrollLeft += deltaX;
                        container.scrollTop += deltaY;
                        touchStartX = touch.clientX;
                        touchStartY = touch.clientY;
                        e.preventDefault();
                    }
                } else if (e.touches.length === 2) {
                    // Pinch zoom
                    const currentDist = getTouchDistance(e.touches[0], e.touches[1]);
                    const scale = currentDist / startDist;
                    currentZoom = Math.max(0.1, Math.min(5.0, startZoom * scale));
                    document.getElementById('zoom-level').textContent = Math.round(currentZoom * 100) + '%';
                    applyPageScales();
                    e.preventDefault();
                }
            }, { passive: false });

            container.addEventListener('touchend', () => {
                isTouching = false;
            });
        }

        function getTouchDistance(touch1, touch2) {
            const dx = touch1.clientX - touch2.clientX;
            const dy = touch1.clientY - touch2.clientY;
            return Math.sqrt(dx * dx + dy * dy);
        }

        function setupPinchZoom() {
            const container = document.getElementById('scroll-container');
            if (!container) return;

            container.addEventListener('wheel', handleWheel, { passive: false });
        }

        // ===========================================
        // AUTO-SCROLL WITH 0.1 STEP
        // ===========================================
        function toggleAutoScroll() {
            isScrolling = !isScrolling;
            document.getElementById('scroll-toggle-btn').classList.toggle('scroll-active', isScrolling);

            if (isScrolling) {
                startAutoScroll();
            } else {
                stopAutoScroll();
            }
        }

        function adjustScrollSpeed(delta) {
            // Fine step of 0.1 as requested
            scrollSpeed = Math.max(0.1, Math.min(5.0, scrollSpeed + delta));
            document.getElementById('scroll-speed-label').textContent = scrollSpeed.toFixed(1);
        }

        function startAutoScroll() {
            if (scrollInterval) {
                clearInterval(scrollInterval);
            }

            scrollInterval = setInterval(() => {
                const container = document.getElementById('scroll-container');
                container.scrollTop += scrollDirection * scrollSpeed;

                // Check if we reached the bottom or top
                if (container.scrollTop + container.clientHeight >= container.scrollHeight - 10) {
                    // Reached bottom - scroll to top
                    container.scrollTop = 0;
                } else if (container.scrollTop <= 0) {
                    // Reached top - scroll to bottom
                    container.scrollTop = container.scrollHeight - container.clientHeight;
                }
            }, 50);
        }

        function stopAutoScroll() {
            if (scrollInterval) {
                clearInterval(scrollInterval);
                scrollInterval = null;
            }
        }

        // ===========================================
        // FILTER EFFECTS
        // ===========================================
        function toggleFX() {
            isFxMode = !isFxMode;
            document.getElementById('fx-toolbar').style.display = isFxMode ? 'flex' : 'none';
            document.getElementById('fx-toggle-btn').classList.toggle('active', isFxMode);

            if (!isFxMode) {
                // Reset filters when closing
                document.documentElement.style.setProperty('--page-bright', '1');
                document.documentElement.style.setProperty('--page-contrast', '1');
                document.documentElement.style.setProperty('--page-sepia', '0');
                document.getElementById('val-bright').textContent = '100%';
                document.getElementById('val-contrast').textContent = '100%';
                document.getElementById('val-sepia').textContent = '0%';
            }
        }

        function updateFX(type, value) {
            const val = parseFloat(value);

            switch (type) {
                case 'bright':
                    document.documentElement.style.setProperty('--page-bright', val);
                    document.getElementById('val-bright').textContent = Math.round(val * 100) + '%';
                    break;
                case 'contrast':
                    document.documentElement.style.setProperty('--page-contrast', val);
                    document.getElementById('val-contrast').textContent = Math.round(val * 100) + '%';
                    break;
                case 'sepia':
                    document.documentElement.style.setProperty('--page-sepia', val);
                    document.getElementById('val-sepia').textContent = Math.round(val * 100) + '%';
                    break;
            }
        }

        function toggleSunMode() {
            isSepiaMode = !isSepiaMode;
            document.getElementById('sun-mode-btn').classList.toggle('sepia-active', isSepiaMode);

            if (isSepiaMode) {
                document.documentElement.style.setProperty('--page-sepia', '1');
                document.documentElement.style.setProperty('--page-bright', '1.1');
                document.getElementById('val-sepia').textContent = '100%';
            } else {
                document.documentElement.style.setProperty('--page-sepia', '0');
                document.documentElement.style.setProperty('--page-bright', '1');
                document.getElementById('val-sepia').textContent = '0%';
            }
        }

        // ===========================================
        // ANNOTATION SYSTEM - FIXED FOR PDF & IMAGES
        // ===========================================
        function toggleDrawingMode() {
            isDrawingMode = !isDrawingMode;
            document.getElementById('draw-toggle').classList.toggle('btn-add-success', isDrawingMode);
            document.getElementById('scroll-container').classList.toggle('anno-active', isDrawingMode);
            document.getElementById('anno-toolbar').style.display = isDrawingMode ? 'flex' : 'none';

            if (isDrawingMode) {
                document.body.style.cursor = 'crosshair';
            } else {
                document.body.style.cursor = '';
                saveAllAnnotations();
            }
        }

        function initAnnotationCanvas(canvas, file) {
            const fileKey = getFileKey(file);
            const ctx = canvas.getContext('2d');

            // Function to resize canvas to match parent
            const resizeCanvas = () => {
                const parent = canvas.parentElement;
                if (parent) {
                    const rect = parent.getBoundingClientRect();
                    canvas.width = rect.width;
                    canvas.height = rect.height;
                }
            };

            // Initial resize
            resizeCanvas();

            let isDrawing = false;
            let lastX = 0;
            let lastY = 0;

            // Mouse events
            canvas.onmousedown = startDrawing;
            canvas.onmousemove = draw;
            canvas.onmouseup = stopDrawing;
            canvas.onmouseout = stopDrawing;

            // Touch events
            canvas.ontouchstart = (e) => {
                e.preventDefault();
                const touch = e.touches[0];
                const rect = canvas.getBoundingClientRect();
                lastX = touch.clientX - rect.left;
                lastY = touch.clientY - rect.top;
                isDrawing = true;
                startPath(lastX, lastY);
            };

            canvas.ontouchmove = (e) => {
                e.preventDefault();
                if (!isDrawing) return;

                const touch = e.touches[0];
                const rect = canvas.getBoundingClientRect();
                const currentX = touch.clientX - rect.left;
                const currentY = touch.clientY - rect.top;

                drawLine(lastX, lastY, currentX, currentY);
                lastX = currentX;
                lastY = currentY;
            };

            canvas.ontouchend = (e) => {
                e.preventDefault();
                stopDrawing();
            };

            function startDrawing(e) {
                if (!isDrawingMode) return;

                isDrawing = true;
                const rect = canvas.getBoundingClientRect();
                lastX = e.clientX - rect.left;
                lastY = e.clientY - rect.top;
                startPath(lastX, lastY);
            }

            function draw(e) {
                if (!isDrawing || !isDrawingMode) return;

                const rect = canvas.getBoundingClientRect();
                const currentX = e.clientX - rect.left;
                const currentY = e.clientY - rect.top;

                drawLine(lastX, lastY, currentX, currentY);
                lastX = currentX;
                lastY = currentY;
            }

            function stopDrawing() {
                isDrawing = false;
                saveAnnotationState(canvas, fileKey);
            }

            function startPath(x, y) {
                ctx.beginPath();
                ctx.moveTo(x, y);
                saveToUndoStack(canvas, fileKey);
            }

            function drawLine(x1, y1, x2, y2) {
                ctx.lineJoin = 'round';
                ctx.lineCap = 'round';
                ctx.strokeStyle = currentAnnoTool === 'eraser' ? '#020204' : annoColor;
                ctx.lineWidth = annoSize;
                ctx.globalAlpha = annoOpacity;

                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.stroke();
            }

            // Tool selection functions
            function setAnnoColor(color, element) {
                if (color === 'text' || color === 'eraser' || color === 'pen') {
                    setAnnoTool(color, element);
                    return;
                }

                annoColor = color;
                document.querySelectorAll('.color-dot').forEach(el => el.classList.remove('active'));
                element.classList.add('active');
            }

            function setAnnoSize(size, element) {
                annoSize = size;
                document.querySelectorAll('.size-btn').forEach(el => el.classList.remove('active'));
                element.classList.add('active');
            }

            function updateAnnoOpacity(value) {
                annoOpacity = parseFloat(value);
            }

            function setAnnoTool(tool, element) {
                currentAnnoTool = tool;
                document.querySelectorAll('[id^="btn-tool-"]').forEach(el => el.classList.remove('active-tool'));
                if (element) {
                    element.classList.add('active-tool');
                }
            }

            // Undo/redo functionality
            function saveToUndoStack(canvas, fileKey) {
                const currentState = canvas.toDataURL();
                undoStack.push({
                    fileKey: fileKey,
                    state: currentState,
                    timestamp: Date.now()
                });

                // Limit undo stack size
                if (undoStack.length > 50) {
                    undoStack.shift();
                }
            }

            function saveAnnotationState(canvas, fileKey) {
                const currentState = canvas.toDataURL();

                if (!annotations[fileKey]) {
                    annotations[fileKey] = [];
                }

                annotations[fileKey].push({
                    data: currentState,
                    timestamp: Date.now(),
                    zoom: currentZoom,
                    rotation: currentRotation
                });

                localStorage.setItem('part_annos_v4', JSON.stringify(annotations));
            }

            function saveAllAnnotations() {
                const allCanvases = document.querySelectorAll('.anno-canvas');
                allCanvases.forEach(canvas => {
                    const fileKey = canvas.dataset.fileKey;
                    if (fileKey) {
                        saveAnnotationState(canvas, fileKey);
                    }
                });
            }

            function undoLast() {
                if (undoStack.length === 0) return;

                const lastState = undoStack.pop();
                const canvas = document.querySelector(`[data-file-key="${lastState.fileKey}"]`);

                if (canvas) {
                    const img = new Image();
                    img.onload = () => {
                        const ctx = canvas.getContext('2d');
                        ctx.clearRect(0, 0, canvas.width, canvas.height);
                        ctx.drawImage(img, 0, 0);
                    };
                    img.src = lastState.state;
                }
            }

            function clearCurrentPage() {
                const container = document.getElementById('viewer-content');
                const annoCanvas = container.querySelector('.anno-canvas');

                if (annoCanvas) {
                    const ctx = annoCanvas.getContext('2d');
                    ctx.clearRect(0, 0, annoCanvas.width, annoCanvas.height);
                    saveAnnotationState(annoCanvas, annoCanvas.dataset.fileKey);
                }
            }

            // Load saved annotations
            if (annotations[fileKey] && annotations[fileKey].length > 0) {
                const lastAnnotation = annotations[fileKey][annotations[fileKey].length - 1];
                const img = new Image();
                img.onload = () => {
                    ctx.drawImage(img, 0, 0);
                };
                img.src = lastAnnotation.data;
            }

            // Handle window resize
            window.addEventListener('resize', () => {
                resizeCanvas();
            });
        }

        // ===========================================
        // INITIALIZE ON LOAD
        // ===========================================
        window.addEventListener('load', init);
    </script>
</body>
