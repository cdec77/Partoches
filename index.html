<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#ccff00">
    <title>Partoches - Mobile Pro</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-512.png">

    <!-- External Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Outfit:wght@200;400;900&display=swap" rel="stylesheet">

    <style>
        /* ===========================================
           CSS CUSTOM PROPERTIES
        =========================================== */
        :root {
            --neon-lime: #ccff00;
            --neon-blue: #00f0ff;
            --neon-pink: #ff00ff;
            --neon-orange: #ff6600;
            --neon-purple: #b026ff;
            --bg: #020204;
            --surface: #0a0a0e;
            --surface-accent: #111118;
            --page-bright: 1;
            --page-contrast: 1;
            --page-sepia: 0;
            --touch-min: 52px;
            --touch-gap: 10px;
            --header-height: 60px;
        }

        /* ===========================================
           BASE STYLES
        =========================================== */
        body {
            background: var(--bg);
            color: #e2e2e9;
            font-family: 'Space Grotesk', sans-serif;
            overflow: hidden;
            margin: 0;
            padding: 0;
            touch-action: manipulation;
            font-size: 13px;
            -webkit-user-select: none;
            user-select: none;
            -webkit-text-size-adjust: none;
            line-height: 1.4;
        }

        /* Jazz Title with Gradient */
        .jazz-title {
            font-family: 'Outfit', sans-serif;
            text-transform: uppercase;
            font-weight: 900;
            letter-spacing: -1px;
            background: linear-gradient(to right, var(--neon-lime), var(--neon-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(204, 255, 0, 0.25));
            margin: 0;
            padding: 0;
        }

        /* Glass Effect for Navigation */
        .glass {
            background: rgba(2, 2, 4, 0.96);
            backdrop-filter: blur(25px);
            border-bottom: 1px solid rgba(204, 255, 0, 0.15);
        }

        /* ===========================================
           FILE LIST STYLES
        =========================================== */
        .file-row {
            background: var(--surface);
            border-radius: 8px;
            margin-bottom: 6px;
            border: 1px solid rgba(255, 255, 255, 0.02);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            padding: 14px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .file-row:hover {
            border-color: var(--neon-lime);
            transform: translateX(4px);
            background: rgba(204, 255, 0, 0.04);
            box-shadow: 0 2px 8px rgba(204, 255, 0, 0.1);
        }

        .file-row:active {
            transform: translateX(2px);
            background: rgba(204, 255, 0, 0.08);
        }

        .btn-add-success {
            background: var(--neon-lime) !important;
            color: #000 !important;
            box-shadow: 0 0 20px var(--neon-lime) !important;
            border-color: var(--neon-lime) !important;
        }

        /* ===========================================
           HOME PAGE LAYOUT - FIXED BUTTON OVERLAP
        =========================================== */
        .home-header {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 18px;
            margin-top: 8px;
            padding: 0 4px;
        }

        .home-header-row1 {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: nowrap;
            gap: 12px;
            width: 100%;
        }

        .home-header-row2 {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        /* Title and Source List Container */
        .home-title-container {
            flex: 1;
            min-width: 200px;
        }

        /* Scan Buttons Container - ALWAYS VISIBLE */
        .scan-buttons-container {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        /* ===========================================
           FOLDER & FILE DISPLAY
        =========================================== */
        .file-row.folder-child {
            margin-left: 18px;
            border-left: 2px solid rgba(204, 255, 0, 0.25);
            padding-left: 14px;
        }

        .folder-header {
            background: rgba(204, 255, 0, 0.04);
            border: 1px solid rgba(204, 255, 0, 0.18);
            border-radius: 8px;
            margin-bottom: 4px;
            padding: 10px 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            font-weight: 700;
            color: var(--neon-lime);
            letter-spacing: 0.5px;
            transition: background 0.2s, transform 0.1s;
            touch-action: manipulation;
            user-select: none;
        }

        .folder-header:hover {
            background: rgba(204, 255, 0, 0.09);
        }

        .folder-header:active {
            transform: scale(0.98);
            background: rgba(204, 255, 0, 0.15);
        }

        .folder-header .folder-toggle {
            transition: transform 0.2s;
            display: inline-block;
            min-width: 16px;
            text-align: center;
            font-size: 10px;
        }

        .folder-header.open .folder-toggle {
            transform: rotate(90deg);
        }

        /* ===========================================
           VIEWER LAYOUT
        =========================================== */
        #view-layout {
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            position: relative;
        }

        #viewer-sidebar {
            width: 280px;
            background: #020204;
            border-right: 1px solid rgba(204, 255, 0, 0.12);
            display: flex;
            flex-direction: column;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 450;
            position: relative;
            overflow: hidden;
        }

        #viewer-sidebar.collapsed {
            margin-left: -280px;
        }

        #scroll-container {
            flex-grow: 1;
            height: 100vh;
            overflow: auto;
            background: #000;
            scroll-behavior: auto;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            -webkit-overflow-scrolling: touch;
            touch-action: pan-x pan-y;
        }

        #scroll-container.anno-active {
            touch-action: none;
        }

        #viewer-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 120px 30px 450px 30px;
            width: max-content;
            min-width: 100%;
            height: fit-content;
            gap: 40px;
            margin: 0 auto;
        }

        /* ===========================================
           PAGE WRAPPER - EXACT FIT, NO WHITE BLEED
        =========================================== */
        .page-wrapper {
            position: relative;
            flex-shrink: 0;
            background: white;
            box-shadow: 0 0 45px rgba(0, 0, 0, 0.9);
            filter: brightness(var(--page-bright)) contrast(var(--page-contrast)) sepia(var(--page-sepia));
            border-radius: 4px;
            transition: filter 0.2s ease, transform 0.3s ease;
            transform-origin: top center;
            overflow: hidden;
            display: inline-block;
            max-width: 100%;
        }

        /* ===========================================
           ANNOTATION CANVAS - PRECISELY MATCHES CONTENT SIZE
        =========================================== */
        .anno-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100% !important;
            height: 100% !important;
            pointer-events: none;
            z-index: 10;
            image-rendering: pixelated;
        }

        .anno-active .anno-canvas {
            pointer-events: auto;
        }

        /* ===========================================
           MEDIA ELEMENTS - NATURAL SIZE, NO CONSTRAINTS
        =========================================== */
        .page-wrapper img,
        .page-wrapper canvas:not(.anno-canvas) {
            display: block;
            width: auto !important;
            height: auto !important;
            max-width: none;
            max-height: none;
        }

        /* GIF specific rendering for smooth animation */
        .page-wrapper img.gif-media {
            image-rendering: auto;
            -webkit-backface-visibility: hidden;
        }

        /* ===========================================
           DUAL PAGE MODE LAYOUT
        =========================================== */
        #viewer-content.dual-page-mode {
            flex-direction: row;
            flex-wrap: wrap;
            justify-content: center;
            align-items: flex-start;
            gap: 20px;
            padding-top: 100px;
            padding-bottom: 400px;
        }

        #viewer-content.dual-page-mode .rotation-wrapper,
        #viewer-content.dual-page-mode .page-wrapper {
            flex: 0 0 auto;
            max-width: calc(50% - 20px);
        }

        .rotation-wrapper {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            transition: width 0.25s ease, height 0.25s ease;
            flex-shrink: 0;
            max-width: 100%;
        }

        /* ===========================================
           BUTTON STYLES
        =========================================== */
        .tab-btn {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1.5px;
            color: #555562;
            transition: all 0.3s;
            text-transform: uppercase;
            min-height: var(--touch-min);
            padding: 8px 12px;
            border-radius: 4px;
            background: transparent;
            border: none;
            cursor: pointer;
        }

        .tab-btn:hover {
            color: var(--neon-lime);
        }

        .tab-active {
            color: var(--neon-lime);
            text-shadow: 0 0 12px rgba(204, 255, 0, 0.6);
            font-weight: 800;
        }

        /* Jazz buttons with enhanced touch targets */
        .btn-jazz {
            background: rgba(204, 255, 0, 0.04);
            border: 1px solid var(--neon-lime);
            color: var(--neon-lime);
            font-size: 10px;
            font-weight: 700;
            padding: 8px 14px;
            border-radius: 5px;
            text-transform: uppercase;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            min-height: var(--touch-min);
            min-width: var(--touch-min);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
        }

        .btn-jazz:hover {
            background: var(--neon-lime);
            color: #000;
            box-shadow: 0 0 15px rgba(204, 255, 0, 0.3);
            transform: translateY(-1px);
        }

        .btn-jazz:active {
            transform: scale(0.95);
            background: rgba(204, 255, 0, 0.15);
        }

        /* Scan buttons specific styling */
        .btn-scan {
            min-width: 120px;
        }

        .btn-scan-recursive {
            min-width: 100px;
        }

        .nav-rect {
            pointer-events: auto;
            background: rgba(10, 10, 14, 0.94);
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            font-weight: 700;
            font-size: 11px;
            padding: 12px 20px;
            min-width: var(--touch-min);
            min-height: var(--touch-min);
            text-align: center;
            border-radius: 6px;
            text-transform: uppercase;
            transition: all 0.2s;
            cursor: pointer;
        }

        .nav-rect:hover {
            background: rgba(0, 240, 255, 0.1);
            border-color: rgba(0, 240, 255, 0.5);
        }

        .nav-rect:active {
            transform: scale(0.95);
            background: rgba(0, 240, 255, 0.2);
        }

        /* ===========================================
           TOOLBAR STYLES
        =========================================== */
        .right-control-dock {
            position: fixed;
            z-index: 500;
            pointer-events: none;
            display: flex;
            gap: 15px;
        }

        #anno-toolbar,
        #fx-toolbar {
            pointer-events: auto;
            display: none;
            padding: 14px;
            border-radius: 10px;
            background: rgba(6, 6, 10, 0.96);
            box-shadow: 0 0 35px rgba(0, 0, 0, 0.85);
            border: 1px solid rgba(204, 255, 0, 0.1);
        }

        .toolbar-divider {
            width: 100%;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
            margin: 8px 0;
        }

        /* ===========================================
           COLOR & SIZE TOOLS
        =========================================== */
        .color-dot {
            border-radius: 6px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
            min-width: 30px;
            min-height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .color-dot:hover {
            transform: scale(1.05);
        }

        .color-dot.active {
            border-color: white;
            transform: scale(1.15);
            box-shadow: 0 0 10px currentColor;
        }

        .size-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #2d2d37;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
            min-width: 32px;
            min-height: 32px;
        }

        .size-btn:hover {
            border-color: rgba(204, 255, 0, 0.3);
            background: rgba(204, 255, 0, 0.05);
        }

        .size-btn.active {
            border-color: var(--neon-lime);
            background: rgba(204, 255, 0, 0.12);
        }

        .size-preview {
            background-color: #888;
            border-radius: 50%;
            transition: background-color 0.2s;
        }

        .size-btn.active .size-preview {
            background-color: var(--neon-lime);
        }

        /* ===========================================
           SIDEBAR STYLES
        =========================================== */
        .sidebar-item {
            padding: 15px 18px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
            font-size: 11px;
            color: #828292;
            cursor: grab;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #06060a;
            min-height: var(--touch-min);
        }

        .sidebar-item:hover {
            background: rgba(204, 255, 0, 0.03);
            color: #a2a2b2;
        }

        .sidebar-item:active {
            cursor: grabbing;
            background: rgba(204, 255, 0, 0.06);
        }

        .sidebar-item.active {
            background: rgba(204, 255, 0, 0.06);
            color: var(--neon-lime);
            font-weight: bold;
            border-left: 4px solid var(--neon-lime);
        }

        /* ===========================================
           UTILITY STYLES
        =========================================== */
        .lang-switch {
            font-size: 9px;
            border: 1px solid #2d2d37;
            padding: 4px 8px;
            border-radius: 4px;
            color: #727282;
            cursor: pointer;
            font-weight: bold;
            min-height: 24px;
            display: inline-flex;
            align-items: center;
            transition: all 0.2s;
        }

        .lang-switch:hover {
            border-color: rgba(204, 255, 0, 0.3);
            color: #a2a2b2;
        }

        .lang-switch.active {
            color: var(--neon-lime);
            border-color: var(--neon-lime);
            background: rgba(204, 255, 0, 0.08);
        }

        .source-tag {
            background: #0f0f14;
            border: 1px solid #2d2d37;
            padding: 6px 12px;
            border-radius: 5px;
            font-size: 10px;
            color: var(--neon-blue);
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            min-height: 28px;
            transition: all 0.2s;
        }

        .source-tag:hover {
            background: #1a1a1e;
            border-color: rgba(0, 240, 255, 0.3);
        }

        .source-delete {
            color: var(--neon-pink);
            cursor: pointer;
            font-size: 13px;
            padding: 0 4px;
            transition: transform 0.2s;
        }

        .source-delete:hover {
            transform: scale(1.2);
        }

        .copyright {
            position: fixed;
            bottom: 15px;
            left: 25px;
            font-size: 9px;
            color: #2d2d37;
            z-index: 50;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        #alpha-bar button {
            padding: 6px 9px;
            font-size: 12px;
            font-weight: 800;
            color: #4b4b58;
            transition: all 0.2s;
            cursor: pointer;
            min-height: var(--touch-min);
            border-radius: 4px;
            background: transparent;
            border: none;
        }

        #alpha-bar button:hover {
            color: var(--neon-lime);
            transform: scale(1.2);
            background: rgba(204, 255, 0, 0.1);
        }

        #alpha-bar button:active {
            transform: scale(1.1);
            color: white;
        }

        /* ===========================================
           ACTIVE STATES
        =========================================== */
        #dual-page-btn.dual-active {
            background: var(--neon-blue) !important;
            color: #000 !important;
            border-color: var(--neon-blue) !important;
            box-shadow: 0 0 12px rgba(0, 240, 255, 0.4) !important;
        }

        #sun-mode-btn.sepia-active {
            background: #ffaa00 !important;
            color: #000 !important;
            border-color: #ffaa00 !important;
            box-shadow: 0 0 12px rgba(255, 170, 0, 0.4) !important;
        }

        #scroll-toggle-btn.scroll-active {
            background: var(--neon-pink) !important;
            color: #000 !important;
            border-color: var(--neon-pink) !important;
            box-shadow: 0 0 12px rgba(255, 0, 255, 0.4) !important;
        }

        .fx-indicator {
            font-size: 9px;
            color: #626272;
            font-weight: bold;
            text-transform: uppercase;
            text-align: center;
            margin-bottom: 4px;
            letter-spacing: 0.5px;
        }

        #scroll-speed-label {
            min-width: 32px;
            text-align: center;
            font-variant-numeric: tabular-nums;
        }

        /* ===========================================
           VIEWER HEADER - PREVENT BUTTON OVERLAP
        =========================================== */
        #viewer-header {
            display: flex;
            flex-wrap: nowrap;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            padding: 8px 12px;
            background: rgba(2, 2, 4, 0.96);
            backdrop-filter: blur(25px);
            border-bottom: 1px solid rgba(204, 255, 0, 0.15);
        }

        #viewer-header::-webkit-scrollbar {
            display: none;
        }

        #viewer-header > div {
            flex-shrink: 0;
        }

        /* Full-score scroll - allow complete content visibility */
        #scroll-container {
            align-items: flex-start !important;
        }

        #viewer-content {
            min-width: max-content;
        }

        /* ===========================================
           LOADING & ERROR STATES
        =========================================== */
        .loading-spinner {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            border: 4px solid rgba(204, 255, 0, 0.3);
            border-top-color: var(--neon-lime);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            z-index: 1000;
        }

        @keyframes spin {
            0% {
                transform: translate(-50%, -50%) rotate(0deg);
            }
            100% {
                transform: translate(-50%, -50%) rotate(360deg);
            }
        }

        .error-message {
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid rgba(255, 0, 0, 0.3);
            color: #ff6666;
            padding: 10px 15px;
            border-radius: 8px;
            margin: 10px auto;
            font-size: 12px;
            max-width: 80%;
            text-align: center;
            animation: fadeIn 0.3s ease-out;
            box-shadow: 0 2px 8px rgba(255, 0, 0, 0.1);
        }

        .success-message {
            background: rgba(0, 255, 0, 0.1);
            border: 1px solid rgba(0, 255, 0, 0.3);
            color: #00ff00;
            padding: 10px 15px;
            border-radius: 8px;
            margin: 10px auto;
            font-size: 12px;
            max-width: 80%;
            text-align: center;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===========================================
           TABLET OPTIMIZATIONS - IPAD AIR 13" SUPPORT
        =========================================== */
        @media (min-width: 769px), (orientation: landscape) {
            :root {
                --touch-min: 56px;
                --touch-gap: 12px;
                --header-height: 70px;
            }

            /* Header adjustments for tablet */
            .home-header {
                gap: 14px;
                margin-bottom: 24px;
                margin-top: 12px;
            }

            .home-header-row1 {
                gap: 12px;
                align-items: center;
            }

            .home-title-container {
                min-width: 250px;
            }

            .scan-buttons-container {
                gap: 12px;
            }

            .right-control_dock {
                right: 24px;
                top: 120px;
                flex-direction: column;
                bottom: auto;
                left: auto;
                width: auto;
            }

            #anno-toolbar {
                flex-direction: column;
                border: 1px solid rgba(204, 255, 0, 0.3);
                width: 120px;
                align-items: center;
                gap: 16px;
                padding: 20px;
            }

            #fx-toolbar {
                flex-direction: column;
                border: 1px solid rgba(0, 240, 255, 0.3);
                width: 120px;
                align-items: center;
                gap: 18px;
                padding: 20px;
            }

            .range-container {
                display: flex;
                flex-direction: column;
                align-items: center;
                width: 100%;
                position: relative;
                margin: 50px 0;
            }

            .range-container input[type="range"] {
                transform: rotate(-90deg);
                width: 100px;
                height: 8px;
                cursor: pointer;
            }

            #fx-toolbar input[type="range"] {
                transform: rotate(-90deg);
                width: 110px;
                height: 8px;
                margin: 60px 0;
                cursor: pointer;
            }

            .toolbar-divider {
                width: 100%;
                height: 1px;
                background: rgba(255, 255, 255, 0.1);
                margin: 8px 0;
            }

            /* Larger touch targets for iPad */
            .tab-btn {
                font-size: 15px !important;
                letter-spacing: 2px;
                min-height: 48px !important;
                padding: 0 16px;
            }

            .btn-jazz {
                font-size: 13px !important;
                padding: 12px 22px !important;
                min-height: 52px !important;
                min-width: 52px !important;
            }

            .btn-scan {
                min-width: 140px !important;
            }

            .btn-scan-recursive {
                min-width: 120px !important;
            }

            .file-row {
                padding: 18px 22px !important;
                margin-bottom: 12px;
            }

            .file-row div {
                font-size: 15px !important;
            }

            #viewer-header {
                padding: 18px 24px !important;
            }

            #viewer-header .btn-jazz {
                min-height: 52px !important;
                padding: 12px 18px !important;
            }

            #zoom-level {
                font-size: 14px !important;
            }

            .sidebar-item {
                font-size: 14px !important;
                padding: 20px 24px !important;
                min-height: 60px !important;
            }

            .nav-rect {
                font-size: 14px !important;
                padding: 18px 32px !important;
                min-width: 170px !important;
                min-height: 60px !important;
            }

            .color-dot {
                width: 44px !important;
                height: 44px !important;
                border-radius: 8px !important;
            }

            .size-btn {
                width: 48px !important;
                height: 48px !important;
                border-radius: 8px !important;
            }

            #anno-toolbar .btn-jazz {
                font-size: 12px !important;
                padding: 12px 14px !important;
                width: 100%;
            }

            #pdf-page-label,
            #scroll-speed-label {
                font-size: 13px !important;
            }

            #alpha-bar button {
                font-size: 15px !important;
                padding: 8px 14px !important;
                min-height: 48px !important;
            }

            /* Larger title for tablet */
            .jazz-title {
                font-size: 2.5rem !important;
                line-height: 1.1;
            }

            /* Adjust file list for better readability */
            #library-list {
                padding-top: 8px;
            }
        }

        /* iPad Air 13" portrait specific (1024px wide) */
        @media (min-width: 1024px) {
            .btn-jazz {
                font-size: 14px !important;
                padding: 14px 24px !important;
                min-height: 56px !important;
                min-width: 56px !important;
            }

            .tab-btn {
                font-size: 16px !important;
                min-height: 52px !important;
                padding: 0 20px;
            }

            .nav-rect {
                min-width: 180px !important;
                min-height: 64px !important;
                padding: 20px 36px !important;
            }

            .file-row {
                padding: 20px 26px !important;
                border-radius: 10px;
            }

            .sidebar-item {
                padding: 22px 28px !important;
                min-height: 64px !important;
                font-size: 15px !important;
            }

            .color-dot {
                width: 48px !important;
                height: 48px !important;
            }

            .size-btn {
                width: 52px !important;
                height: 52px !important;
            }

            /* Even larger title */
            .jazz-title {
                font-size: 2.8rem !important;
            }

            /* More spacing for better touch targets */
            .home-header {
                gap: 16px;
                margin-bottom: 28px;
                margin-top: 14px;
            }

            .home-header-row1 {
                gap: 14px;
            }
        }

        /* Mobile portrait mode */
        @media (max-width: 768px) and (orientation: portrait) {
            .right-control-dock {
                left: 12px;
                right: 12px;
                bottom: 24px;
                top: auto;
                flex-direction: row;
                justify-content: center;
                width: calc(100vw - 24px);
            }

            #anno-toolbar,
            #fx-toolbar {
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
                align-items: center;
                gap: 10px;
                width: 100%;
                border: 1px solid rgba(255, 255, 255, 0.1);
                padding: 12px;
            }

            #anno-toolbar {
                border-color: var(--neon-lime);
            }

            #fx-toolbar {
                border-color: var(--neon-blue);
            }

            .range-container {
                display: flex;
                flex-direction: row;
                align-items: center;
                gap: 6px;
                margin: 4px 0;
            }

            input[type="range"] {
                transform: none !important;
                width: 90px !important;
                height: 6px;
                margin: 0 6px !important;
            }

            .toolbar-divider {
                height: 24px;
                width: 1px;
                background: rgba(255, 255, 255, 0.1);
                margin: 0 6px;
            }

            .size-btn,
            .color-dot {
                width: 34px;
                height: 34px;
            }

            #anno-toolbar .btn-jazz {
                width: auto;
                padding: 6px 10px;
                font-size: 9px;
                min-height: 32px;
            }

            /* Adjust viewer header for small screens */
            #viewer-header {
                gap: 4px;
                padding: 6px 8px;
            }

            .nav-rect {
                min-height: 48px;
                padding: 12px 16px;
                font-size: 10px;
            }

            /* Mobile-specific adjustments */
            .home-header {
                gap: 8px;
                margin-bottom: 16px;
                margin-top: 6px;
            }

            .home-header-row1 {
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
            }

            .scan-buttons-container {
                width: 100%;
                justify-content: flex-start;
                gap: 8px;
            }

            .btn-scan,
            .btn-scan-recursive {
                width: 100%;
                justify-content: center;
            }

            /* Larger alpha bar buttons for touch */
            #alpha-bar button {
                padding: 8px 12px;
                font-size: 14px;
                min-height: 44px;
            }
        }

        /* Small mobile devices */
        @media (max-width: 480px) {
            :root {
                --touch-min: 48px;
            }

            .btn-jazz {
                min-height: var(--touch-min);
                min-width: var(--touch-min);
                padding: 6px 10px;
                font-size: 9px;
            }

            .tab-btn {
                font-size: 10px;
                padding: 6px 8px;
                min-height: var(--touch-min);
            }

            .file-row {
                padding: 12px 14px;
                font-size: 10px;
            }

            .file-row div:first-child {
                font-size: 11px;
            }

            .file-row div:last-child {
                font-size: 9px;
            }

            #viewer-header {
                padding: 4px 6px;
                gap: 2px;
            }

            .nav-rect {
                min-height: 44px;
                padding: 10px 12px;
                font-size: 9px;
                min-width: var(--touch-min);
            }

            /* Ensure scan buttons are visible */
            .scan-buttons-container {
                width: 100%;
            }

            .btn-scan,
            .btn-scan-recursive {
                width: 100%;
                margin-bottom: 6px;
            }
        }

        /* ===========================================
           GLOBAL TRANSITIONS & ACCESSIBILITY
        =========================================== */
        button,
        .file-row,
        .sidebar-item,
        .folder-header,
        .source-tag {
            transition: all 0.2s ease;
        }

        button:focus-visible,
        .file-row:focus-visible {
            outline: 2px solid var(--neon-lime);
            outline-offset: 2px;
        }

        /* Custom scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #020204;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(204, 255, 0, 0.3);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(204, 255, 0, 0.5);
        }

        .active-tool {
            background: rgba(204, 255, 0, 0.15) !important;
            border-color: var(--neon-lime) !important;
            color: var(--neon-lime) !important;
        }

        /* Fade in animation for new elements */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-in {
            animation: fadeInUp 0.3s ease-out forwards;
        }

        /* Pulse animation for loading states */
        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        .pulse {
            animation: pulse 2s infinite;
        }
    </style>
</head>

<body>
    <!-- Loading Spinner -->
    <div id="loading-spinner" class="loading-spinner" style="display: none;"></div>

    <!-- Copyright Notice -->
    <div class="copyright font-black uppercase">© Cdchtp</div>

    <!-- Main Navigation -->
    <nav class="glass fixed top-0 w-full flex justify-around p-4 z-[200]">
        <button onclick="switchTab('lib')" id="tab-lib" class="tab-btn tab-active" data-i18n="nav_lib">Répertoire</button>
        <button onclick="switchTab('set')" id="tab-set" class="tab-btn" data-i18n="nav_set">Setlists</button>
        <button onclick="switchTab('view')" id="tab-view" class="tab-btn opacity-20" data-i18n="nav_view">Visionneuse</button>
        <div class="absolute right-4 top-1/2 -translate-y-1/2 flex gap-1">
            <span onclick="setLang('fr')" id="lang-fr" class="lang-switch active">FR</span>
            <span onclick="setLang('en')" id="lang-en" class="lang-switch">EN</span>
        </div>
    </nav>

    <!-- LIBRARY TAB -->
    <section id="sec-lib" class="pt-22 h-screen overflow-y-auto px-4 md:px-6">
        <div class="home-header">
            <!-- Row 1: Title + Scan Buttons (ALWAYS VISIBLE) -->
            <div class="home-header-row1">
                <div class="home-title-container">
                    <h1 class="jazz-title text-3xl md:text-4xl mb-1">Partoches</h1>
                    <div id="source-list" class="flex flex-wrap gap-2 mt-1"></div>
                </div>
                <div class="scan-buttons-container">
                    <!-- RESTORE BUTTON - Only shown when needed -->
                    <button id="btn-restore" onclick="restoreAccess()" class="hidden btn-jazz !border-blue-500 !text-blue-500 btn-scan" data-i18n="btn_restore">
                        Rétablir Accès
                    </button>
                    <!-- SCAN FOLDER BUTTON - ALWAYS VISIBLE -->
                    <button onclick="addSource()" class="btn-jazz btn-scan" data-i18n="btn_scan">
                        Scanner Dossier
                    </button>
                    <!-- RECURSIVE SCAN BUTTON - ALWAYS VISIBLE -->
                    <button onclick="addSourceRecursive()" class="btn-jazz !border-purple-500 !text-purple-400 btn-scan-recursive" data-i18n="btn_scan_deep">
                        📂 Récursif
                    </button>
                </div>
            </div>
            <!-- Row 2: Refresh Button -->
            <div class="home-header-row2">
                <button onclick="refreshFiles()" class="btn-jazz !border-zinc-700 !text-zinc-400" data-i18n="btn_refresh">
                    ↻ Rafraîchir
                </button>
            </div>
        </div>

        <!-- Alpha Bar for Quick Navigation -->
        <div id="alpha-bar" class="sticky top-0 z-20 flex flex-wrap justify-center bg-black/90 backdrop-blur-md py-2 border-b border-white/5 shadow-2xl rounded-md"></div>

        <!-- Library File List -->
        <div id="library-list" class="pb-40 mt-4"></div>
    </section>

    <!-- SETLIST TAB -->
    <section id="sec-set" class="hidden pt-22 h-screen overflow-y-auto px-4 md:px-6">
        <div class="max-w-xl mx-auto text-center mt-4">
            <h2 class="jazz-title text-2xl mb-6" data-i18n="set_title">Programmation</h2>
            <div id="set-list-current" class="bg-[#050508] border border-white/5 rounded-lg min-h-[220px] mb-6 p-4"></div>
            <div class="grid grid-cols-2 gap-4 mb-10">
                <button onclick="saveCurrentSet()" class="btn-jazz !py-4 text-[11px]" data-i18n="btn_save_set">
                    Enregistrer Set
                </button>
                <button onclick="clearCurrentSet()" class="text-[10px] uppercase font-bold text-zinc-600 hover:text-white transition" data-i18n="btn_clear">
                    Vider
                </button>
            </div>
            <div class="text-left">
                <h3 class="text-[10px] uppercase tracking-widest text-zinc-500 mb-4 font-bold" data-i18n="saved_sets">
                    Sauvegardes
                </h3>
                <div id="saved-sets-list" class="space-y-2 pb-40"></div>
            </div>
        </div>
    </section>

    <!-- VIEWER TAB -->
    <section id="sec-view" class="fixed inset-0 bg-black hidden z-[310] overflow-hidden">
        <!-- Viewer Header with Controls -->
        <div id="viewer-header" class="glass absolute top-0 w-full p-2 md:p-3 z-[500] transition-opacity duration-300">
            <!-- Left Group: Home, Close, Sidebar Toggle -->
            <div class="flex items-center gap-1 md:gap-2 flex-shrink-0">
                <button onclick="goToHome()" class="btn-jazz !border-none !text-lime-400 !px-2 font-bold" data-i18n="btn_home" title="Retour à l'accueil">
                    🏠
                </button>
                <button onclick="switchTab('lib')" class="btn-jazz !border-none !text-zinc-500 !px-1 md:px-2" data-i18n="btn_close" title="Fermer">
                    ✕
                </button>
                <button onclick="toggleSidebar()" class="btn-jazz !border-zinc-800 !px-2" title="Afficher/Masquer la barre latérale">
                    ☰
                </button>
                <button onclick="saveTxtFile()" id="txt-save-btn" class="btn-jazz !border-blue-700 !text-blue-400 !px-2 hidden" title="Enregistrer TXT">
                    💾
                </button>
            </div>

            <!-- Center: Navigation + Zoom -->
            <div class="flex items-center gap-2 md:gap-3 flex-shrink-0">
                <button onclick="prevFile()" class="btn-jazz !border-zinc-700 !text-zinc-300 !px-2" title="Précédent">
                    ◀
                </button>
                <div class="flex items-center bg-zinc-900 rounded-lg px-1 border border-white/5">
                    <button onclick="adjustZoom(-0.15)" class="px-2 md:px-3 py-1 text-zinc-400 hover:text-white font-bold text-sm">-</button>
                    <span id="zoom-level" class="text-[11px] w-12 text-center font-bold text-lime-400">100%</span>
                    <button onclick="adjustZoom(0.15)" class="px-2 md:px-3 py-1 text-zinc-400 hover:text-white font-bold text-sm">+</button>
                </div>
                <button onclick="nextFile()" class="btn-jazz !border-zinc-700 !text-zinc-300 !px-2" title="Suivant">
                    ▶
                </button>
                <div id="pdf-page-nav" class="flex items-center bg-zinc-900 rounded-lg border border-white/5 hidden">
                    <button onclick="event.stopPropagation(); changePdfPage(-1)" class="px-2 py-1 text-zinc-400 hover:text-white font-bold text-xs" title="Page précédente">
                        P-
                    </button>
                    <span id="pdf-page-label" class="text-[10px] w-14 text-center font-bold text-zinc-400">1 / 1</span>
                    <button onclick="event.stopPropagation(); changePdfPage(1)" class="px-2 py-1 text-zinc-400 hover:text-white font-bold text-xs" title="Page suivante">
                        P+
                    </button>
                </div>
            </div>

            <!-- Right Group: Auto-scroll, Filters, Drawing -->
            <div class="flex items-center gap-1 md:gap-2 flex-shrink-0">
                <!-- Auto-scroll Controls with 0.1 step -->
                <div class="flex items-center bg-zinc-900 rounded-lg border border-white/5">
                    <button onclick="event.stopPropagation(); toggleAutoScroll()" id="scroll-toggle-btn" class="btn-jazz !border-none !px-2" title="Activer/Désactiver le défilement automatique">
                        ⭥
                    </button>
                    <button onclick="event.stopPropagation(); adjustScrollSpeed(-0.1)" class="px-1 text-zinc-500 hover:text-white font-bold text-xs" title="Ralentir">
                        -
                    </button>
                    <span id="scroll-speed-label" class="text-[9px] w-8 text-center font-bold text-zinc-400">0.1</span>
                    <button onclick="event.stopPropagation(); adjustScrollSpeed(0.1)" class="px-1 text-zinc-500 hover:text-white font-bold text-xs" title="Accélérer">
                        +
                    </button>
                </div>

                <button onclick="event.stopPropagation(); toggleSunMode()" id="sun-mode-btn" class="btn-jazz !border-zinc-700 !text-amber-500 !px-2" data-i18n="btn_sun" title="Mode Soleil">
                    ☀️
                </button>
                <button onclick="toggleFX()" id="fx-toggle-btn" class="btn-jazz !border-zinc-700 !text-zinc-400 !px-2" data-i18n="btn_settings" title="Filtres">
                    Filtres
                </button>
                <button onclick="toggleDrawingMode()" id="draw-toggle" class="btn-jazz !px-2" data-i18n="btn_draw" title="Dessin">
                    Dessin
                </button>

                <div class="flex items-center bg-zinc-900 rounded-lg border border-white/5" title="Rotation">
                    <button onclick="event.stopPropagation(); rotatePage(-1)" class="px-2 py-1 text-zinc-400 hover:text-white font-bold text-sm">
                        ↺
                    </button>
                    <span id="rotate-label" class="text-[10px] w-7 text-center font-bold text-zinc-500">↺↻</span>
                    <button onclick="event.stopPropagation(); rotatePage(+1)" class="px-2 py-1 text-zinc-400 hover:text-white font-bold text-sm">
                        ↻
                    </button>
                </div>
                <button onclick="event.stopPropagation(); toggleDualPage()" id="dual-page-btn" class="btn-jazz !border-zinc-700 !text-zinc-400 !px-2" title="Afficher deux pages">
                    📖️
                </button>
                <div id="page-info" class="text-white/40 font-bold text-[10px] pr-1 italic hidden sm:block">0 / 0</div>
            </div>
        </div>

        <!-- Main View Layout -->
        <div id="view-layout">
            <!-- Sidebar -->
            <aside id="viewer-sidebar">
                <div class="p-4 border-b border-white/5 font-black text-[9px] tracking-widest text-zinc-500 uppercase" data-i18n="live_tracklist">
                    Live Tracklist
                </div>
                <div id="sidebar-items" class="flex-grow overflow-y-auto"></div>
            </aside>

            <!-- Scroll Container -->
            <div id="scroll-container" onwheel="handleWheel(event)" onclick="toggleUI()">
                <div id="viewer-content"></div>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <div id="viewer-nav" class="absolute bottom-8 w-full flex justify-between px-12 pointer-events-none z-[400] transition-opacity duration-300 sm:flex">
            <button onclick="event.stopPropagation(); prevFile()" class="nav-rect" data-i18n="btn_prev">
                Précédent
            </button>
            <button onclick="event.stopPropagation(); nextFile()" class="nav-rect" data-i18n="btn_next">
                Suivant
            </button>
        </div>

        <!-- Annotation Toolbar -->
        <div class="right-control-dock">
            <div id="anno-toolbar">
                <div class="fx-indicator" style="margin-bottom:8px;">
                    <span data-i18n="tools_title">Outils</span>
                </div>

                <!-- Color Palette -->
                <div onclick="setAnnoColor('#ccff00', this)" class="color-dot active" style="background:#ccff00;"></div>
                <div onclick="setAnnoColor('#00f0ff', this)" class="color-dot" style="background:#00f0ff;"></div>
                <div onclick="setAnnoColor('#ff00ff', this)" class="color-dot" style="background:#ff00ff;"></div>
                <div onclick="setAnnoColor('#ff6600', this)" class="color-dot" style="background:#ff6600;"></div>
                <div onclick="setAnnoColor('red', this)" class="color-dot" style="background:red;"></div>
                <div onclick="setAnnoColor('#ffff00', this)" class="color-dot" style="background:#ffff00;"></div>
                <div onclick="setAnnoColor('#00ff00', this)" class="color-dot" style="background:#00ff00;"></div>
                <div onclick="setAnnoColor('white', this)" class="color-dot" style="background:white; border-color: #ccc;"></div>

                <div class="toolbar-divider"></div>

                <!-- Size Options -->
                <div onclick="setAnnoSize(2, this)" class="size-btn" title="Très fin">
                    <div class="size-preview" style="width:2px; height:2px;"></div>
                </div>
                <div onclick="setAnnoSize(4, this)" class="size-btn" title="Fin">
                    <div class="size-preview" style="width:4px; height:4px;"></div>
                </div>
                <div onclick="setAnnoSize(8, this)" class="size-btn active" title="Moyen">
                    <div class="size-preview" style="width:8px; height:8px;"></div>
                </div>
                <div onclick="setAnnoSize(15, this)" class="size-btn" title="Épais">
                    <div class="size-preview" style="width:14px; height:14px;"></div>
                </div>
                <div onclick="setAnnoSize(30, this)" class="size-btn" title="Très épais">
                    <div class="size-preview" style="width:24px; height:24px;"></div>
                </div>

                <div class="toolbar-divider"></div>

                <!-- Opacity Slider -->
                <div class="range-container" title="Opacité du trait">
                    <div class="fx-indicator" style="margin-bottom:2px;">
                        <span data-i18n="fx_alpha">Opac</span>
                    </div>
                    <input type="range" id="anno-alpha-slider" min="0.1" max="1" step="0.05" value="1" oninput="updateAnnoOpacity(this.value)">
                </div>

                <div class="toolbar-divider"></div>

                <!-- Tool Selection -->
                <div onclick="setAnnoTool('pen', this)" id="btn-tool-pen" class="btn-jazz !px-2 !py-1 text-center !text-[9px] active-tool" data-i18n="btn_pen" title="Stylo">
                    Stylo
                </div>
                <div onclick="setAnnoTool('text', this)" id="btn-tool-text" class="btn-jazz !px-2 !py-1 text-center !text-[9px]" data-i18n="btn_text" title="Texte">
                    Texte
                </div>
                <div onclick="setAnnoTool('eraser', this)" id="btn-tool-eraser" class="btn-jazz !px-2 !py-1 text-center !text-[9px]" data-i18n="btn_del" title="Gomme">
                    Gomme
                </div>

                <div class="toolbar-divider"></div>

                <!-- Actions -->
                <button onclick="undoLast()" class="btn-jazz !px-2 !py-1 !text-[9px] !border-zinc-700 !text-zinc-400" title="Annuler">
                    Undo
                </button>
                <button onclick="clearCurrentPage()" class="btn-jazz !px-2 !py-1 !text-[9px] !border-pink-950 !text-pink-500" title="Effacer">
                    Effacer
                </button>
            </div>

            <!-- FX Toolbar -->
            <div id="fx-toolbar">
                <div class="fx-indicator">
                    <span data-i18n="fx_bright">Lum</span>
                    <span id="val-bright" class="text-lime-400">100%</span>
                </div>
                <input type="range" min="0.4" max="2" step="0.05" value="1" oninput="updateFX('bright', this.value)">

                <div class="toolbar-divider"></div>

                <div class="fx-indicator">
                    <span data-i18n="fx_contrast">Cont</span>
                    <span id="val-contrast" class="text-lime-400">100%</span>
                </div>
                <input type="range" min="0.4" max="2.5" step="0.05" value="1" oninput="updateFX('contrast', this.value)">

                <div class="toolbar-divider"></div>

                <div class="fx-indicator">
                    <span data-i18n="fx_sepia">Sépia</span>
                    <span id="val-sepia" class="text-lime-400">0%</span>
                </div>
                <input type="range" min="0" max="1" step="0.05" value="0" oninput="updateFX('sepia', this.value)">
            </div>
        </div>
    </section>

    <script>
        // ===========================================
        // i18n - INTERNATIONALIZATION
        // ===========================================
        const i18n = {
            fr: {
                nav_lib: "Répertoire",
                nav_set: "Setlists",
                nav_view: "Visionneuse",
                btn_restore: "Rétablir Accès",
                btn_scan: "Scanner Dossier",
                btn_scan_deep: "📂 Récursif",
                btn_refresh: "↻ Rafraîchir",
                set_title: "Programmation",
                btn_save_set: "Enregistrer Set",
                btn_clear: "Vider",
                btn_close: "✕",
                btn_settings: "Filtres",
                btn_draw: "Dessin",
                fx_bright: "Lum",
                fx_contrast: "Cont",
                fx_alpha: "Opac",
                fx_sepia: "Sépia",
                btn_del: "Gomme",
                btn_prev: "Précédent",
                btn_next: "Suivant",
                btn_add: "Ajouter",
                btn_home: "🏠",
                btn_sun: "☀️",

        function showLoading() {

        function showError(message) {

            document.body.appendChild(errorDiv);
            setTimeout(() => {

        function formatFileSize(bytes) {
            if (bytes === undefined || bytes === null) return '';
            if (bytes < 1024) return bytes + ' B';
            else if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
            else if (bytes < 1073741824) return (bytes / 1048576).toFixed(1) + ' MB';
            else return (bytes / 1073741824).toFixed(1) + ' GB';
        }

        function getFileExtension(filename) {
            return filename.slice((filename.lastIndexOf('.') - 1 >>> 0) + 2).toLowerCase();
        }

        function getFileKey(file) {
            if (file.parentHandle) {
                return `${file.parentHandle.name}/${file.entry.name}`;
            }
            return file.entry.name;
        }

        // ===========================================
        // INDEXEDDB MANAGEMENT
        // ===========================================
        const DB_NAME = "PartochesDB_Ultimate";
        const DB_VERSION = 5;

        async function openDB() {
            return new Promise((resolve, reject) => {
                const req = indexedDB.open(DB_NAME, DB_VERSION);

                req.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains("sources")) {
                        db.createObjectStore("sources");
                    }
                    if (!db.objectStoreNames.contains("ios_files")) {
                        db.createObjectStore("ios_files", { keyPath: "name" });
                    }
                    if (!db.objectStoreNames.contains("setlists")) {
                        db.createObjectStore("setlists", { keyPath: "id" });
                    }
                    if (!db.objectStoreNames.contains("annotations")) {
                        db.createObjectStore("annotations", { keyPath: "fileKey" });
                    }
                };

                req.onsuccess = () => resolve(req.result);
                req.onerror = () => reject(req.error);
            });
        }

        // ===========================================
        // FILE TYPE SUPPORT
        // ===========================================
        const SUPPORTED_EXT = /\.pdf|\.png|\.jpg|\.jpeg|\.webp|\.gif|\.txt$/i;

        function isSupportedFile(filename) {
            return SUPPORTED_EXT.test(filename.toLowerCase());
        }

        // ===========================================
        // INITIALIZATION
        // ===========================================
        async function init() {
            try {
                showLoading();

                // Set initial language
                setLang(currentLang);

                // Handle iOS/Android where directory picker is not available
                const btnScan = document.querySelector('[data-i18n="btn_scan"]');
                if (typeof window.showDirectoryPicker === 'undefined') {
                    btnScan.innerText = currentLang === 'fr' ? '+ Ajouter Partoches' : '+ Add Scores';
                }

                // Initialize database
                const db = await openDB();

                // Load sources from IndexedDB
                const reqSources = db.transaction("sources", "readonly").objectStore("sources").getAll();

                reqSources.onsuccess = async () => {
                    sources = reqSources.result || [];

                    // Check if any source needs reauthorization
                    if (sources.length > 0) {
                        try {
                            let needsReauth = false;
                            for (const h of sources) {
                                if (!h._virtual) {
                                    try {
                                        const perm = await h.queryPermission({ mode: 'read' });
                                        if (perm !== 'granted') {
                                            needsReauth = true;
                                        }
                                    } catch (e) {
                                        needsReauth = true;
                                    }
                                }
                            }
                            if (needsReauth) {
                                document.getElementById('btn-restore').classList.remove('hidden');
                            }
                        } catch (e) {
                            console.error("Restore check failed:", e);
                        }
                    }

                    // Load persisted iOS files
                    const reqFiles = db.transaction("ios_files", "readonly").objectStore("ios_files").getAll();

                    reqFiles.onsuccess = async () => {
                        const savedFiles = reqFiles.result || [];

                        if (savedFiles.length > 0) {
                            const virtualSourceName = currentLang === 'fr' ? 'Fichiers iPad/iCloud' : 'iPad/iCloud Files';
                            let vsrc = sources.find(s => s.name === virtualSourceName);

                            if (!vsrc) {
                                vsrc = { name: virtualSourceName, _virtual: true, _files: [] };
                                sources.push(vsrc);
                            }

                            // Add saved files to virtual source
                            savedFiles.forEach(f => {
                                if (!vsrc._files.some(existing => existing.entry.name === f.name)) {
                                    vsrc._files.push({
                                        entry: {
                                            name: f.name,
                                            _blob: f.blob,
                                            getFile: () => Promise.resolve(f.blob)
                                        }
                                    });
                                }
                            });
                        }

                        // Refresh files and render UI
                        await refreshFiles();
                        hideLoading();
                        isInitialLoad = false;
                    };

                    reqFiles.onerror = () => {
                        refreshFiles().then(hideLoading).catch(hideLoading);
                        isInitialLoad = false;
                    };
                };

                reqSources.onerror = () => {
                    refreshFiles().then(hideLoading).catch(hideLoading);
                    isInitialLoad = false;
                };

                // Initialize UI components
                renderSavedSets();
                generateAlphaBar();
                setupPinchZoom();
                setupTouchHandlers();

                // Initialize Sortable for sidebar
                new Sortable(document.getElementById('sidebar-items'), {
                    animation: 180,
                    ghostClass: 'sortable-ghost',
                    onEnd: (evt) => {
                        const movedItem = setFiles.splice(evt.oldIndex, 1)[0];
                        setFiles.splice(evt.newIndex, 0, movedItem);

                        // Update current index based on drag
                        if (currentIndex === evt.oldIndex) {
                            currentIndex = evt.newIndex;
                        } else if (currentIndex > evt.oldIndex && currentIndex <= evt.newIndex) {
                            currentIndex--;
                        } else if (currentIndex < evt.oldIndex && currentIndex >= evt.newIndex) {
                            currentIndex++;
                        }

                        document.getElementById('page-info').innerText = (currentIndex + 1) + " / " + setFiles.length;
                        renderSidebar();
                    }
                });

                // Add event listeners
                window.addEventListener("orientationchange", () => {
                    setTimeout(applyPageScales, 350);
                });

                window.addEventListener("resize", () => {
                    setTimeout(applyPageScales, 100);
                });

                // Prevent context menu on long press for better touch experience
                document.addEventListener('contextmenu', (e) => {
                    if (isDrawingMode) {
                        e.preventDefault();
                    }
                });

                // Add keyboard shortcuts
                document.addEventListener('keydown', (e) => {
                    // Only handle keyboard shortcuts when in viewer
                    if (!document.getElementById('sec-view').classList.contains('hidden')) {
                        // Space to toggle UI
                        if (e.code === 'Space' && !isDrawingMode) {
                            e.preventDefault();
                            toggleUI();
                        }
                        // Arrow keys for navigation
                        if (e.code === 'ArrowLeft') {
                            e.preventDefault();
                            prevFile();
                        }
                        if (e.code === 'ArrowRight') {
                            e.preventDefault();
                            nextFile();
                        }
                        // Zoom with +/-
                        if (e.code === 'Equal' || e.code === 'NumpadAdd') {
                            e.preventDefault();
                            adjustZoom(0.15);
                        }
                        if (e.code === 'Minus' || e.code === 'NumpadSubtract') {
                            e.preventDefault();
                            adjustZoom(-0.15);
                        }
                        // Rotation with r
                        if (e.code === 'KeyR') {
                            e.preventDefault();
                            rotatePage(90);
                        }
                        // Dual page with d
                        if (e.code === 'KeyD') {
                            e.preventDefault();
                            toggleDualPage();
                        }
                        // Drawing mode with m
                        if (e.code === 'KeyM') {
                            e.preventDefault();
                            toggleDrawingMode();
                        }
                    }
                });

            } catch (error) {
                console.error("Initialization error:", error);
                showError(i18n[currentLang].msg_initialization_error);
                hideLoading();
                isInitialLoad = false;
            }
        }

        // ===========================================
