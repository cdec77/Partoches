<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Partoches - Neon Master Hybrid Fix</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ccff00">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-512.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Outfit:wght@200;400;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --neon-lime: #ccff00; --neon-blue: #00f0ff; --neon-pink: #ff00ff;
            --gold: #efb810; --bg: #050505; --page-bright: 1; --page-contrast: 1; 
        }
        
        body { 
            background: var(--bg); color: #e0e0e0; font-family: 'Space Grotesk', sans-serif; 
            overflow: hidden; margin: 0; touch-action: none; -webkit-tap-highlight-color: transparent; 
        }

        .jazz-title { 
            font-family: 'Outfit', sans-serif; text-transform: uppercase; font-weight: 900;
            background: linear-gradient(to right, var(--neon-lime), var(--neon-blue));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
            filter: drop-shadow(0 0 8px rgba(204, 255, 0, 0.2));
        }

        .glass { background: rgba(10, 10, 12, 0.95); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255, 255, 255, 0.1); }

        /* Lignes bibliothèque d'origine */
        .file-row { border-bottom: 1px solid #1a1a1a; transition: all 0.2s; cursor: pointer; }
        .file-row:hover { background: rgba(204, 255, 0, 0.1); padding-left: 10px; }

        /* Visionneuse */
        #scroll-container {
            height: 100vh; width: 100vw; overflow-y: scroll; overflow-x: auto; 
            background: black; scroll-behavior: auto; touch-action: none;
            display: grid; place-items: start center; -webkit-overflow-scrolling: touch;
        }
        
        #viewer-content { 
            display: flex; flex-direction: column; align-items: center; 
            padding: 120px 0 500px 0; min-width: 100%; height: fit-content; 
            transition: transform 0.1s ease-out; transform-origin: center top; gap: 50px;
        }
        
        .page-wrapper { 
            position: relative; flex-shrink: 0; background: white; 
            box-shadow: 0 0 100px rgba(0,0,0,1);
            filter: brightness(var(--page-bright)) contrast(var(--page-contrast));
        }

        canvas, img { height: 95vh !important; width: auto !important; object-fit: contain; display: block; }
        .anno-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; background: transparent !important; }
        .anno-active .anno-canvas { pointer-events: auto; cursor: crosshair; }

        .tab-btn { font-size: 11px; font-weight: 800; letter-spacing: 1px; color: #444; transition: 0.3s; text-transform: uppercase; }
        .tab-active { color: var(--neon-lime); text-shadow: 0 0 10px var(--neon-lime); }
        
        .btn-jazz { 
            border: 1px solid var(--neon-lime); color: var(--neon-lime); 
            font-size: 0.75rem; font-weight: bold; background: black; 
            padding: 8px 16px; border-radius: 4px; text-transform: uppercase;
        }
        
        #anno-toolbar, #fx-toolbar {
            position: fixed; left: 50%; transform: translateX(-50%);
            display: none; gap: 15px; padding: 20px; border-radius: 12px;
            background: rgba(0,0,0,0.95); border: 1px solid var(--neon-lime); z-index: 500;
        }
        #anno-toolbar { bottom: 120px; }
        #fx-toolbar { bottom: 30px; width: 360px; flex-direction: column; }
        
        .color-dot { width: 36px; height: 36px; border-radius: 4px; border: 2px solid transparent; cursor: pointer; }
        .color-dot.active { border-color: white; transform: scale(1.15); }
        
        .nav-rect {
            pointer-events: auto; background: rgba(10,10,10,0.9); border: 1px solid var(--neon-blue); 
            color: var(--neon-blue); font-weight: 900; font-size: 1.2rem; padding: 15px 30px; border-radius: 8px;
        }

        /* Barre alphabétique originale */
        #alpha-bar {
            display: flex; flex-wrap: wrap; justify-content: center;
            gap: 4px; padding: 10px; background: #0a0a0a; border-bottom: 1px solid #222;
        }
        #alpha-bar button { 
            padding: 6px 12px; font-size: 14px; font-weight: bold; 
            color: #ffffff; background: #1a1a1a; border-radius: 4px; min-width: 38px;
        }
        #alpha-bar button:active { background: var(--neon-lime); color: #000; }

        .copyright { position: fixed; bottom: 15px; left: 25px; font-size: 11px; color: #333; letter-spacing: 4px; z-index: 50; }
        input[type=range] { accent-color: var(--neon-lime); width: 100%; height: 6px; }

        .lang-switch { font-size: 10px; border: 1px solid #333; padding: 4px 8px; border-radius: 4px; color: #666; cursor: pointer; font-weight: bold; }
        .lang-switch.active { color: var(--neon-lime); border-color: var(--neon-lime); }
    </style>
</head>
<body>

    <div class="copyright font-black uppercase">© Cyrille de Chanteloup</div>

    <nav class="glass fixed top-0 w-full flex justify-around p-5 z-[200]">
        <button onclick="switchTab('lib')" id="tab-lib" class="tab-btn tab-active" data-i18n="nav_lib">Répertoire</button>
        <button onclick="switchTab('set')" id="tab-set" class="tab-btn" data-i18n="nav_set">Setlists</button>
        <button onclick="switchTab('view')" id="tab-view" class="tab-btn opacity-20" data-i18n="nav_view">Visionneuse</button>
        <div class="absolute right-4 top-1/2 -translate-y-1/2 flex gap-2">
            <span onclick="setLang('fr')" id="lang-fr" class="lang-switch">FR</span>
            <span onclick="setLang('en')" id="lang-en" class="lang-switch">EN</span>
        </div>
    </nav>

    <section id="sec-lib" class="pt-24 h-screen overflow-y-auto px-6">
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <h1 class="jazz-title text-5xl font-black italic">Partoches</h1>
            <div class="flex flex-wrap justify-center gap-3">
                <button id="btn-restore" onclick="restoreAccess()" class="hidden border-2 border-blue-500 text-blue-400 px-4 py-2 rounded-full text-[10px] animate-pulse font-black uppercase" data-i18n="btn_restore">Réactiver Accès</button>
                <button onclick="addSource()" id="btn-scan" class="btn-jazz" data-i18n="btn_scan">Scanner Dossier</button>
                <label class="btn-jazz cursor-pointer flex items-center bg-white/5">
                    + iCloud / Photos
                    <input type="file" multiple onchange="handleVintageFiles(this.files)" class="hidden" accept="image/*,application/pdf">
                </label>
            </div>
        </div>
        <div id="source-list" class="flex flex-wrap gap-2 mb-6"></div>
        <div id="alpha-bar" class="sticky top-0 z-20"></div>
        <div id="library-list" class="pb-48 mt-4"></div>
    </section>

    <section id="sec-set" class="hidden pt-24 h-screen overflow-y-auto px-6">
        <div class="max-w-2xl mx-auto text-center">
            <h2 class="jazz-title text-3xl mb-8 italic" data-i18n="set_title">Programmation</h2>
            <div id="set-list-current" class="bg-zinc-900/30 border-2 border-dashed border-zinc-800 rounded-2xl min-h-[220px] mb-8 p-6 text-left"></div>
            <div class="grid grid-cols-2 gap-6 mb-12">
                <button onclick="saveCurrentSet()" class="btn-jazz py-5 text-lg shadow-2xl" data-i18n="btn_save_set">Sauvegarder Set</button>
                <button onclick="clearCurrentSet()" class="text-zinc-500 font-black uppercase text-[11px] hover:text-red-500 transition" data-i18n="btn_clear">Vider</button>
            </div>
            <div id="saved-sets-list" class="space-y-4 pb-48 text-left"></div>
        </div>
    </section>

    <section id="sec-view" class="fixed inset-0 bg-black hidden z-[310] overflow-hidden">
        <div id="viewer-header" class="glass absolute top-0 w-full p-4 flex justify-between items-center z-[400]">
            <button onclick="switchTab('lib')" class="btn-jazz !border-zinc-700 !text-zinc-500" data-i18n="btn_close">✕ Fermer</button>
            <div class="flex items-center gap-4">
                <button onclick="toggleFX()" class="btn-jazz !py-1" data-i18n="btn_settings">Image</button>
                <button onclick="toggleDrawingMode()" id="draw-toggle" class="btn-jazz !py-1" data-i18n="btn_draw">Annoter</button>
                <div class="flex items-center bg-black/60 border border-zinc-800 rounded-lg overflow-hidden shadow-inner">
                    <button onclick="adjustZoom(-0.1)" class="px-4 py-1 text-neon-lime text-2xl">-</button>
                    <span id="zoom-level" class="text-[11px] w-12 text-center font-black text-white">100%</span>
                    <button onclick="adjustZoom(0.1)" class="px-4 py-1 text-neon-lime text-2xl">+</button>
                </div>
            </div>
            <div id="page-info" class="text-neon-lime font-black italic text-sm pr-4">1 / 1</div>
        </div>

        <div id="fx-toolbar">
            <div class="flex flex-col gap-4">
                <div class="flex justify-between items-center"><label class="text-[10px] uppercase font-black text-zinc-400" data-i18n="fx_bright">Luminosité</label><span id="val-bright" class="text-[10px] text-neon-lime font-bold">100%</span></div>
                <input type="range" min="0.2" max="2.5" step="0.01" value="1" oninput="updateFX('bright', this.value)">
                <div class="flex justify-between items-center mt-2"><label class="text-[10px] uppercase font-black text-zinc-400" data-i18n="fx_contrast">Contraste</label><span id="val-contrast" class="text-[10px] text-neon-lime font-bold">100%</span></div>
                <input type="range" min="0.2" max="4" step="0.01" value="1" oninput="updateFX('contrast', this.value)">
            </div>
        </div>

        <div id="anno-toolbar">
            <div class="flex gap-4 border-r border-zinc-700 pr-5">
                <div onclick="setAnnoColor('#ccff00', this)" class="color-dot active" style="background: #ccff00;"></div>
                <div onclick="setAnnoColor('#00f0ff', this)" class="color-dot" style="background: #00f0ff;"></div>
                <div onclick="setAnnoColor('eraser', this)" class="color-dot bg-white flex items-center justify-center text-[7px] text-black font-black uppercase" data-i18n="btn_del">Del</div>
            </div>
            <div onclick="setAnnoSize(6, this)" class="w-6 h-6 bg-white rounded-sm border-2 border-neon-lime cursor-pointer"></div>
        </div>

        <div id="scroll-container" onwheel="handleWheel(event)" ondblclick="resetZoom()" onclick="toggleUI()">
            <div id="viewer-content"></div>
        </div>

        <div id="viewer-nav" class="absolute bottom-10 w-full flex justify-between px-10 pointer-events-none z-[400]">
            <button onclick="event.stopPropagation(); prevFile()" class="nav-rect">◄</button>
            <button onclick="event.stopPropagation(); nextFile()" class="nav-rect">►</button>
        </div>
    </section>

    <script>
        const i18n = {
            fr: { nav_lib: "Répertoire", nav_set: "Setlists", nav_view: "Visionneuse", btn_restore: "Réactiver Accès", btn_scan: "Scanner Dossier", set_title: "Programmation", btn_save_set: "Sauvegarder Set", btn_clear: "Vider", btn_close: "✕ Fermer", btn_settings: "Image", btn_draw: "Annoter", fx_bright: "Luminosité", fx_contrast: "Contraste", btn_del: "Gomme", btn_prev: "Précédent", btn_next: "Suivant", btn_add: "Ajouter" },
            en: { nav_lib: "Library", nav_set: "Setlists", nav_view: "Viewer", btn_restore: "Restore Access", btn_scan: "Scan Folder", set_title: "Setlists", btn_save_set: "Save Setlist", btn_clear: "Clear", btn_close: "✕ Close", btn_settings: "FX", btn_draw: "Annotate", fx_bright: "Brightness", fx_contrast: "Contrast", btn_del: "Eraser", btn_prev: "Previous", btn_next: "Next", btn_add: "Add" }
        };

        let currentLang = localStorage.getItem('part_lang') || (navigator.language.startsWith('fr') ? 'fr' : 'en');
        let files = [], setFiles = [], currentIndex = 0, sources = [];
        let uiVisible = true, currentZoom = 1.0, isDrawingMode = false;
        let annoColor = '#ccff00', annoSize = 6, initialPinchDist = null;
        let annotations = JSON.parse(localStorage.getItem('partoches_annotations') || '{}');

        function setLang(l) {
            currentLang = l; localStorage.setItem('part_lang', l);
            document.querySelectorAll('[data-i18n]').forEach(el => { el.innerText = i18n[l][el.getAttribute('data-i18n')]; });
            document.querySelectorAll('.lang-switch').forEach(el => el.classList.remove('active'));
            document.getElementById('lang-' + l).classList.add('active');
            renderLibrary();
        }

        // --- GESTION TACTILE ANDROID PINCH-TO-ZOOM ---
        const scEl = document.getElementById('scroll-container');
        scEl.addEventListener('touchstart', function(e) { if (e.touches.length === 2) initialPinchDist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY); }, { passive: false });
        scEl.addEventListener('touchmove', function(e) { if (e.touches.length === 2 && initialPinchDist) { e.preventDefault(); const d = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY); adjustZoom((d - initialPinchDist) / 300); initialPinchDist = d; } }, { passive: false });

        // --- LOGIQUE CORE index3.html RESTAURÉE ---
        var pdfjsLib = window['pdfjs-dist/build/pdf'];
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        async function openDB() { return new Promise((r) => { const req = indexedDB.open("PartochesDB_Hybrid_Final", 1); req.onupgradeneeded = (e) => e.target.result.createObjectStore("sources"); req.onsuccess = (e) => r(req.target.result); }); }
        
        async function loadSources() { 
            if (!window.showDirectoryPicker) return; 
            document.getElementById('btn-scan').classList.remove('hidden');
            const db = await openDB(); 
            const req = db.transaction("sources", "readonly").objectStore("sources").getAll(); 
            req.onsuccess = () => { sources = req.result; if(sources.length > 0) document.getElementById('btn-restore').classList.remove('hidden'); refreshFiles(); }; 
        }

        async function addSource() { try { const h = await window.showDirectoryPicker(); if(!sources.find(s => s.name === h.name)) { sources.push(h); const db = await openDB(); db.transaction("sources", "readwrite").objectStore("sources").put(h, h.name); refreshFiles(); } } catch(e){} }

        async function scanFolder(handle) {
            const results = [];
            async function recursive(h) {
                for await (const entry of h.values()) {
                    if (entry.kind === 'file' && entry.name.match(/\.(pdf|png|jpg|jpeg|webp)$/i)) {
                        results.push({entry: entry});
                    } else if (entry.kind === 'directory') {
                        await recursive(entry);
                    }
                }
            }
            await recursive(handle);
            return results;
        }

        async function refreshFiles() { 
            const pickerFiles = []; 
            for(const h of sources) { const found = await scanFolder(h); pickerFiles.push(...found); }
            const vintage = files.filter(f => f.isVintage);
            files = pickerFiles.concat(vintage);
            renderLibrary(); renderSourcesUI(); 
        }

        function handleVintageFiles(fileList) {
            let count = 0;
            Array.from(fileList).forEach(file => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    if (!files.find(f => f.entry.name === file.name)) {
                        files.push({ entry: { name: file.name, getFile: async () => file }, data: e.target.result, isVintage: true });
                    }
                    count++; if(count === fileList.length) { 
                        localStorage.setItem('part_vintage_v2', JSON.stringify(files.filter(f => f.isVintage).map(f => ({name: f.entry.name, data: f.data})))); 
                        renderLibrary(); 
                    }
                };
                reader.readAsDataURL(file);
            });
        }

        function renderSourcesUI() { const c = document.getElementById('source-list'); c.innerHTML = ''; sources.forEach((s, i) => { const tag = document.createElement('span'); tag.className = 'bg-zinc-900 border border-zinc-800 text-[10px] px-3 py-1 rounded-full text-zinc-400'; tag.innerHTML = `♪ ${s.name} <b class="text-red-500 cursor-pointer ml-1" onclick="removeSource(${i})">✕</b>`; c.appendChild(tag); }); }
        
        async function removeSource(i) { const n = sources[i].name; sources.splice(i, 1); const db = await openDB(); db.transaction("sources", "readwrite").objectStore("sources").delete(n); refreshFiles(); }

        function renderLibrary(f = '') {
            const l = document.getElementById('library-list'); l.innerHTML = '';
            const filtered = files.filter(x => !f || x.entry.name.toUpperCase().indexOf(f.toUpperCase()) === 0).sort((a,b) => a.entry.name.localeCompare(b.entry.name));
            filtered.forEach(file => {
                const row = document.createElement('div'); row.className = "file-row flex justify-between items-center p-5";
                row.innerHTML = `<div class="flex-grow font-bold text-zinc-300 text-lg" onclick="viewSingle('${file.entry.name.replace(/'/g, "\\'")}')">${file.entry.name}</div><button onclick="addToSet('${file.entry.name.replace(/'/g, "\\'")}')" class="btn-jazz !py-1 !px-4">${i18n[currentLang].btn_add}</button>`;
                l.appendChild(row);
            });
        }

        function viewSingle(name) { const f = files.find(x => x.entry.name === name); if(f) { setFiles = [f]; currentIndex = 0; openFile(f); } }

        async function openFile(obj) {
            if(!obj) return; switchTab('view');
            const container = document.getElementById('viewer-content'); container.innerHTML = ''; 
            let fileData = obj.isVintage ? obj.data : URL.createObjectURL(await obj.entry.getFile());
            if(obj.entry.name.toLowerCase().indexOf('.pdf') > -1) {
                const pdf = await pdfjsLib.getDocument(fileData).promise;
                for(let i=1; i<=pdf.numPages; i++) {
                    const page = await pdf.getPage(i); const vp = page.getViewport({scale: 2.2}); 
                    const wrapper = document.createElement('div'); wrapper.className = "page-wrapper";
                    const canvas = document.createElement('canvas'); canvas.width = vp.width; canvas.height = vp.height;
                    const anno = document.createElement('canvas'); anno.className = "anno-canvas"; anno.width = canvas.width; anno.height = canvas.height;
                    wrapper.appendChild(canvas); wrapper.appendChild(anno); container.appendChild(wrapper);
                    await page.render({canvasContext: canvas.getContext('2d'), viewport: vp}).promise;
                    setupDrawing(anno, obj.entry.name, i);
                }
            } else {
                const wrapper = document.createElement('div'); wrapper.className = "page-wrapper";
                const img = document.createElement('img'); img.src = fileData;
                const anno = document.createElement('canvas'); anno.className = "anno-canvas";
                wrapper.appendChild(img); container.appendChild(wrapper);
                img.onload = function() { anno.width = img.naturalWidth; anno.height = img.naturalHeight; wrapper.appendChild(anno); setupDrawing(anno, obj.entry.name, 0); };
            }
            applyVisuals(); document.getElementById('scroll-container').scrollTop = 0; 
            document.getElementById('page-info').innerText = (currentIndex + 1) + " / " + (setFiles.length || 1);
        }

        function setupDrawing(canvas, fileName, pIdx) {
            const ctx = canvas.getContext('2d'); const key = fileName + "_" + pIdx;
            if(annotations[key]) { const img = new Image(); img.src = annotations[key]; img.onload = () => ctx.drawImage(img,0,0); }
            let drawing = false;
            const getPos = (e) => { const r = canvas.getBoundingClientRect(); const sx = canvas.width/r.width, sy = canvas.height/r.height; const cx = (e.clientX || (e.touches ? e.touches[0].clientX : 0)); const cy = (e.clientY || (e.touches ? e.touches[0].clientY : 0)); return { x: (cx-r.left)*sx, y: (cy-r.top)*sy }; };
            canvas.onmousedown = canvas.ontouchstart = (e) => { if(!isDrawingMode) return; drawing=true; ctx.beginPath(); const p=getPos(e); ctx.moveTo(p.x, p.y); if(e.touches) e.preventDefault(); };
            canvas.onmousemove = canvas.ontouchmove = (e) => { if(!drawing) return; const p=getPos(e); ctx.lineTo(p.x, p.y); ctx.lineCap='round'; if(annoColor==='eraser'){ctx.globalCompositeOperation='destination-out'; ctx.lineWidth=annoSize*4;} else {ctx.globalCompositeOperation='source-over'; ctx.strokeStyle=annoColor; ctx.lineWidth=annoSize;} ctx.stroke(); if(e.touches) e.preventDefault(); };
            window.onmouseup = window.ontouchend = () => { if(drawing) { drawing=false; annotations[key]=canvas.toDataURL(); localStorage.setItem('partoches_annotations', JSON.stringify(annotations)); }};
        }

        function handleWheel(e) { if (e.ctrlKey) { e.preventDefault(); adjustZoom(e.deltaY > 0 ? -0.05 : 0.05); } }
        window.addEventListener('keydown', (e) => { const sc = document.getElementById('scroll-container'); if(e.key === "ArrowRight") nextFile(); if(e.key === "ArrowLeft") prevFile(); if(e.key === "ArrowDown") sc.scrollBy(0, 150); if(e.key === "ArrowUp") sc.scrollBy(0, -150); });
        function switchTab(id) { ['lib','set','view'].forEach(t => { document.getElementById('sec-'+t).classList.add('hidden'); document.getElementById('tab-'+t).classList.remove('tab-active'); }); document.getElementById('sec-'+id).classList.remove('hidden'); document.getElementById('tab-'+id).classList.add('tab-active'); if(id==='view') document.getElementById('tab-view').classList.remove('opacity-20'); }
        function nextFile() { if(setFiles.length > 0) { currentIndex = (currentIndex + 1) % setFiles.length; openFile(setFiles[currentIndex]); } }
        function prevFile() { if(setFiles.length > 0) { currentIndex = (currentIndex - 1 + setFiles.length) % setFiles.length; openFile(setFiles[currentIndex]); } }
        function adjustZoom(d) { currentZoom = Math.max(0.1, currentZoom + d); applyVisuals(); }
        function applyVisuals() { document.getElementById('viewer-content').style.transform = "scale("+currentZoom+")"; document.getElementById('zoom-level').innerText = Math.round(currentZoom*100)+"%"; }
        function toggleFX() { const f = document.getElementById('fx-toolbar'); f.style.display = f.style.display === 'flex' ? 'none' : 'flex'; }
        function updateFX(t, v) { const r = document.documentElement; if(t === 'bright') { r.style.setProperty('--page-bright', v); document.getElementById('val-bright').innerText = Math.round(v*100)+"%"; } if(t === 'contrast') { r.style.setProperty('--page-contrast', v); document.getElementById('val-contrast').innerText = Math.round(v*100)+"%"; } }
        function toggleDrawingMode() { isDrawingMode = !isDrawingMode; document.getElementById('scroll-container').classList.toggle('anno-active', isDrawingMode); document.getElementById('draw-toggle').style.background = isDrawingMode ? 'red' : 'black'; document.getElementById('anno-toolbar').style.display = isDrawingMode ? 'flex' : 'none'; }
        function toggleUI() { if(isDrawingMode) return; uiVisible = !uiVisible; document.getElementById('viewer-header').style.opacity = uiVisible ? "1" : "0"; document.getElementById('viewer-nav').style.opacity = uiVisible ? "1" : "0"; }
        function setAnnoColor(c, el) { annoColor = c; document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active')); el.classList.add('active'); }
        function setAnnoSize(s) { annoSize = s; }

        new Sortable(document.getElementById('set-list-current'), { animation: 150 });
        function addToSet(n) { const d = document.createElement('div'); d.className = "flex justify-between items-center bg-zinc-800 p-5 mb-3 rounded-xl border border-zinc-700"; d.dataset.name = n; d.innerHTML = `<span class="font-bold text-base text-zinc-100">${n}</span> <button onclick="this.parentElement.remove()" class="text-red-500 font-black text-xl px-2">✕</button>`; document.getElementById('set-list-current').appendChild(d); }
        function saveCurrentSet() { const n = prompt(currentLang === 'fr' ? "Nom du Set :" : "Set Name :"); if (n) { localStorage.setItem('part_set_' + n, JSON.stringify(Array.from(document.getElementById('set-list-current').children).map(c => c.dataset.name))); renderSavedSets(); } }
        function renderSavedSets() { const l = document.getElementById('saved-sets-list'); l.innerHTML = ''; Object.keys(localStorage).filter(k => k.startsWith('part_set_')).forEach(k => { const d = document.createElement('div'); d.className = "flex justify-between items-center bg-zinc-900 border border-zinc-800 p-5 rounded-2xl mb-3"; d.innerHTML = `<div class="font-black text-neon-lime cursor-pointer italic text-lg" onclick="loadSet('${k}')">${k.replace('part_set_', '')}</div><button onclick="localStorage.removeItem('${k}'); renderSavedSets()" class="text-red-900 font-black text-xl px-2">✕</button>`; l.appendChild(d); }); }
        function loadSet(k) { const ns = JSON.parse(localStorage.getItem(k)); setFiles = []; document.getElementById('set-list-current').innerHTML = ''; ns.forEach(n => { const f = files.find(x => x.entry.name === n); if (f) { setFiles.push(f); addToSet(n); } }); if (setFiles.length > 0) { currentIndex = 0; openFile(setFiles[0]); } }

        window.onload = function() {
            if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
            const savedVintage = localStorage.getItem('part_vintage_v2');
            if(savedVintage) files = JSON.parse(savedVintage).map(f => ({ entry: {name: f.name}, data: f.data, isVintage: true }));
            loadSources(); setLang(currentLang); renderSavedSets();
            const alpha = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
            const bar = document.getElementById('alpha-bar');
            alpha.forEach(l => {
                const b = document.createElement('button');
                b.innerText = l; b.onclick = function() { renderLibrary(l); }; bar.appendChild(b);
            });
        };
    </script>
</body>
</html>
