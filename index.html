<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
    <title>Partoches - Mobile Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ccff00">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link class="rounded-md" rel="apple-touch-icon" href="icon-512.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Outfit:wght@200;400;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --neon-lime: #ccff00; 
            --neon-blue: #00f0ff;
            --neon-pink: #ff00ff;
            --neon-orange: #ff6600;
            --neon-purple: #b026ff;
            --bg: #020204; 
            --surface: #0a0a0e;
            --surface-accent: #111118;
            --page-bright: 1; 
            --page-contrast: 1; 
            --page-sepia: 0;
            /* iPad Air 13" optimised touch targets */
            --touch-min: 52px;
            --touch-gap: 10px;
        }
        
        body { 
            background: var(--bg); 
            color: #e2e2e9; 
            font-family: 'Space Grotesk', sans-serif; 
            overflow: hidden; 
            margin: 0; 
            padding: 0;
            touch-action: manipulation; 
            font-size: 13px;
            -webkit-user-select: none;
            user-select: none;
            -webkit-text-size-adjust: none;
        }

        .jazz-title { 
            font-family: 'Outfit', sans-serif; 
            text-transform: uppercase;
            font-weight: 900;
            letter-spacing: -1px;
            background: linear-gradient(to right, var(--neon-lime), var(--neon-blue));
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            filter: drop-shadow(0 0 10px rgba(204, 255, 0, 0.25));
        }

        .glass { 
            background: rgba(2, 2, 4, 0.96); 
            backdrop-filter: blur(25px); 
            border-bottom: 1px solid rgba(204, 255, 0, 0.15); 
        }

        .file-row { 
            background: var(--surface);
            border-radius: 8px;
            margin-bottom: 6px;
            border: 1px solid rgba(255,255,255,0.02);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); 
            cursor: pointer; 
        }
        .file-row:hover { 
            border-color: var(--neon-lime);
            transform: translateX(4px);
            background: rgba(204, 255, 0, 0.04);
        }

        .btn-add-success {
            background: var(--neon-lime) !important;
            color: #000 !important;
            box-shadow: 0 0 20px var(--neon-lime) !important;
            border-color: var(--neon-lime) !important;
        }

        /* ── HOME PAGE: no overlapping buttons ── */
        .home-header {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 18px;
            margin-top: 8px;
        }
        .home-header-row1 {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        .home-header-row2 {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }
        /* Folder indentation in library */
        .file-row.folder-child {
            margin-left: 18px;
            border-left: 2px solid rgba(204,255,0,0.25);
        }
        .folder-header {
            background: rgba(204,255,0,0.04);
            border: 1px solid rgba(204,255,0,0.18);
            border-radius: 8px;
            margin-bottom: 4px;
            padding: 10px 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            font-weight: 700;
            color: var(--neon-lime);
            letter-spacing: 0.5px;
            transition: background 0.2s;
        }
        .folder-header:hover { background: rgba(204,255,0,0.09); }
        .folder-header .folder-toggle { transition: transform 0.2s; display: inline-block; }
        .folder-header.open .folder-toggle { transform: rotate(90deg); }

        #view-layout { display: flex; height: 100vh; width: 100vw; overflow: hidden; position: relative; }
        
        #viewer-sidebar {
            width: 280px; background: #020204; border-right: 1px solid rgba(204, 255, 0, 0.12);
            display: flex; flex-direction: column; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 450; position: relative;
        }
        #viewer-sidebar.collapsed { margin-left: -280px; }

        #scroll-container {
    	    flex-grow: 1;
    	    height: 100vh;
    	    overflow: auto;
    	    background: #000;
    	    scroll-behavior: auto;
    	    position: relative;
    	    display: flex;
    	    justify-content: center;
    	    align-items: center;
            -webkit-overflow-scrolling: touch;
            touch-action: pan-x pan-y;
        }
        
        #scroll-container.anno-active {
            touch-action: none;
        }
        
        #viewer-content { 
            display: flex; flex-direction: column; align-items: center; 
            padding: 120px 30px 450px 30px; 
            width: max-content; min-width: 100%; height: fit-content; 
            gap: 40px; margin: 0 auto;
        }
        
        /* ── Page wrapper: exact-fit, no white bleed ── */
        .page-wrapper { 
            position: relative; flex-shrink: 0; background: white; 
            box-shadow: 0 0 45px rgba(0,0,0,0.9);
            filter: brightness(var(--page-bright)) contrast(var(--page-contrast)) sepia(var(--page-sepia));
            border-radius: 4px; transition: filter 0.2s ease;
            transform-origin: top center;
            /* DO NOT set max-width here – handled per media query & JS */
            overflow: hidden; /* prevent annotation canvas overflow */
            display: inline-block; /* shrink-wrap to content */
        }

        /* Annotation canvas: absolutely sized to match its sibling element precisely */
        .anno-canvas { 
            position: absolute;
            top: 0; left: 0;
            /* width/height set via JS to match natural media size */
            pointer-events: none;
            z-index: 10;
            /* CSS sizing mirrors display size of content */
            width: 100% !important;
            height: 100% !important;
        }
        .anno-active .anno-canvas { pointer-events: auto; }

        /* Image display: natural size, contained within wrapper */
        .page-wrapper img {
            display: block;
            /* Respect the scale computed by applyPageScales via parent transform */
            width: auto !important;
            height: auto !important;
            max-width: none;
            max-height: none;
        }

        /* GIF: same treatment as images */
        .page-wrapper img.gif-media {
            image-rendering: auto;
        }

        /* PDF canvas: natural render size, scaled by parent */
        .page-wrapper canvas:not(.anno-canvas) {
            display: block;
            width: auto !important;
            height: auto !important;
        }
        
        #viewer-content.dual-page-mode {
            flex-direction: row;
            flex-wrap: wrap;
            justify-content: center;
            align-items: flex-start;
            gap: 20px;
        }
        #viewer-content.dual-page-mode .rotation-wrapper,
        #viewer-content.dual-page-mode .page-wrapper {
            flex: 0 0 auto;
        }

        .rotation-wrapper {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            transition: width 0.25s ease, height 0.25s ease;
            flex-shrink: 0;
        }

        .tab-btn { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; color: #555562; transition: 0.3s; text-transform: uppercase; }
        .tab-active { color: var(--neon-lime); text-shadow: 0 0 12px rgba(204, 255, 0, 0.6); }
        
        .btn-jazz { 
            background: rgba(204, 255, 0, 0.04);
            border: 1px solid var(--neon-lime); 
            color: var(--neon-lime); 
            font-size: 10px; 
            font-weight: 700; 
            padding: 7px 14px; 
            border-radius: 5px; 
            text-transform: uppercase;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            /* minimum touch target */
            min-height: 36px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .btn-jazz:hover { background: var(--neon-lime); color: black; box-shadow: 0 0 15px rgba(204, 255, 0, 0.3); }
        
        .nav-rect {
    	    pointer-events: auto;
    	    background: rgba(10,10,14,0.94);
   	        border: 1px solid var(--neon-blue);
    	    color: var(--neon-blue);
    	    font-weight: 700;
    	    font-size: 11px;
    	    padding: 10px 18px;
	        min-width: 110px;
	        text-align: center;
	        border-radius: 6px;
	        text-transform: uppercase;
	    }

        .right-control-dock {
            position: fixed; z-index: 500; pointer-events: none;
            display: flex; gap: 15px;
        }

        #anno-toolbar, #fx-toolbar {
            pointer-events: auto; display: none; padding: 14px; border-radius: 10px;
            background: rgba(6, 6, 10, 0.96); box-shadow: 0 0 35px rgba(0,0,0,0.85);
        }

        /* ═══════════════════════════════════════════════════════
           TABLET / IPAD AIR 13" OPTIMISATIONS (769px+)
           Cible aussi les téléphones en paysage
        ═══════════════════════════════════════════════════════ */
        @media (min-width: 769px), (orientation: landscape) {
            :root {
                --touch-min: 56px;
            }
            .right-control-dock {
                right: 20px; top: 110px; flex-direction: column; bottom: auto; left: auto; width: auto;
            }
            #anno-toolbar {
                flex-direction: column; border: 1px solid rgba(204, 255, 0, 0.3);
                width: 115px; align-items: center; gap: 14px; padding: 18px;
            }
            #fx-toolbar {
                flex-direction: column; border: 1px solid rgba(0, 240, 255, 0.3);
                width: 115px; align-items: center; gap: 16px; padding: 18px;
            }
            .range-container { display: flex; flex-direction: column; align-items: center; width: 100%; position: relative; margin: 45px 0; }
            .range-container input[type=range] { transform: rotate(-90deg); width: 90px; height: 6px; cursor: pointer; }
            #fx-toolbar input[type=range] { transform: rotate(-90deg); width: 100px; height: 6px; margin: 55px 0; cursor: pointer; }
            .toolbar-divider { width: 100%; height: 1px; background: rgba(255,255,255,0.1); margin: 6px 0; }
            
            /* Larger touch targets for iPad */
            .tab-btn { font-size: 15px !important; letter-spacing: 2px; min-height: 44px !important; padding: 0 12px; }
            .btn-jazz { font-size: 13px !important; padding: 12px 20px !important; min-height: 48px !important; }
            .file-row { padding: 18px 20px !important; margin-bottom: 10px; }
            .file-row div { font-size: 15px !important; }
            #viewer-header { padding: 16px 20px !important; }
            #viewer-header .btn-jazz { min-height: 48px !important; padding: 12px 16px !important; }
            #zoom-level { font-size: 14px !important; }
            .sidebar-item { font-size: 14px !important; padding: 20px 22px !important; min-height: 56px !important; }
            .nav-rect { font-size: 14px !important; padding: 18px 30px !important; min-width: 160px !important; min-height: 56px !important; }
            .color-dot { width: 42px !important; height: 42px !important; border-radius: 8px !important; }
            .size-btn { width: 46px !important; height: 46px !important; border-radius: 8px !important; }
            #anno-toolbar .btn-jazz { font-size: 12px !important; padding: 10px 12px !important; width: 100%; }
            #pdf-page-label, #scroll-speed-label { font-size: 13px !important; }
            #alpha-bar button { font-size: 15px !important; padding: 8px 12px !important; min-height: 44px !important; }
        }

        /* iPad Air 13" portrait spécifique (1024px wide) */
        @media (min-width: 1024px) {
            .btn-jazz { font-size: 14px !important; padding: 14px 22px !important; min-height: 52px !important; }
            .tab-btn { font-size: 16px !important; }
        }

        @media (max-width: 768px) and (orientation: portrait) {
            .right-control-dock {
                left: 10px; right: 10px; bottom: 20px; top: auto; flex-direction: row; justify-content: center; width: calc(100vw - 20px);
            }
            #anno-toolbar, #fx-toolbar {
                flex-direction: row; flex-wrap: wrap; justify-content: center; align-items: center; gap: 8px; width: 100%; border: 1px solid rgba(255,255,255,0.1);
            }
            #anno-toolbar { border-color: var(--neon-lime); }
            #fx-toolbar { border-color: var(--neon-blue); }
            .range-container { display: flex; flex-direction: row; align-items: center; gap: 5px; }
            input[type=range] { transform: none !important; width: 80px !important; height: 6px; margin: 0 5px !important; }
            .toolbar-divider { height: 20px; width: 1px; background: rgba(255,255,255,0.1); margin: 0 4px; }
            .size-btn, .color-dot { width: 30px; height: 30px; }
            #anno-toolbar .btn-jazz { width: auto; padding: 5px 8px; font-size: 9px; }
        }
        
        .color-dot { border-radius: 6px; border: 2px solid rgba(255,255,255,0.1); cursor: pointer; transition: transform 0.2s; flex-shrink: 0; }
        .color-dot.active { border-color: white; transform: scale(1.15); box-shadow: 0 0 10px currentColor; }
        
        .size-btn { display: flex; align-items: center; justify-content: center; border: 1px solid #2d2d37; border-radius: 6px; cursor: pointer; transition: 0.2s; flex-shrink: 0; }
        .size-btn.active { border-color: var(--neon-lime); background: rgba(204, 255, 0, 0.12); }
        .size-preview { background-color: #888; border-radius: 50%; }
        .size-btn.active .size-preview { background-color: var(--neon-lime); }

        .sidebar-item {
            padding: 15px 18px; border-bottom: 1px solid rgba(255,255,255,0.02);
            font-size: 11px; color: #828292; cursor: grab; transition: 0.2s;
            display: flex; align-items: center; justify-content: space-between;
            background: #06060a;
        }
        .sidebar-item:active { cursor: grabbing; }
        .sidebar-item.active { background: rgba(204, 255, 0, 0.06); color: var(--neon-lime); font-weight: bold; border-left: 4px solid var(--neon-lime); }

        .lang-switch { font-size: 9px; border: 1px solid #2d2d37; padding: 3px 7px; border-radius: 4px; color: #727282; cursor: pointer; font-weight: bold; }
        .lang-switch.active { color: var(--neon-lime); border-color: var(--neon-lime); background: rgba(204, 255, 0, 0.08); }

        .source-tag { background: #0f0f14; border: 1px solid #2d2d37; padding: 5px 12px; border-radius: 5px; font-size: 10px; color: var(--neon-blue); font-weight: bold; display: flex; align-items: center; gap: 8px; }
        .source-delete { color: var(--neon-pink); cursor: pointer; font-size: 13px; }

        .copyright { position: fixed; bottom: 15px; left: 25px; font-size: 9px; color: #2d2d37; z-index: 50; letter-spacing: 0.5px; }
        #alpha-bar button { padding: 6px 9px; font-size: 12px; font-weight: 800; color: #4b4b58; transition: 0.2s; cursor: pointer; }
        #alpha-bar button:hover { color: var(--neon-lime); transform: scale(1.2); }
        
        #dual-page-btn.dual-active {
            background: var(--neon-blue) !important;
            color: #000 !important;
            border-color: var(--neon-blue) !important;
            box-shadow: 0 0 12px rgba(0,240,255,0.4) !important;
        }

        #sun-mode-btn.sepia-active {
            background: #ffaa00 !important;
            color: #000 !important;
            border-color: #ffaa00 !important;
            box-shadow: 0 0 12px rgba(255,170,0,0.4) !important;
        }

        #scroll-toggle-btn.scroll-active {
            background: var(--neon-pink) !important;
            color: #000 !important;
            border-color: var(--neon-pink) !important;
            box-shadow: 0 0 12px rgba(255,0,255,0.4) !important;
        }

        .fx-indicator { font-size: 9px; color: #626272; font-weight: bold; text-transform: uppercase; text-align: center; }

        /* Scroll speed fine-step indicator */
        #scroll-speed-label { min-width: 32px; text-align: center; }

        /* ── Viewer header: prevent button overlap on small screens ── */
        #viewer-header {
            display: flex;
            flex-wrap: nowrap;
            align-items: center;
            justify-content: space-between;
            gap: 6px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        #viewer-header::-webkit-scrollbar { display: none; }
        #viewer-header > div { flex-shrink: 0; }

        /* Full-score scroll: allow the scroll-container to show ALL content at any zoom */
        #scroll-container {
            align-items: flex-start !important;
        }
        #viewer-content {
            /* let content overflow freely so zoomed score is fully readable */
            min-width: max-content;
        }
    </style>
</head>
<body>

    <div class="copyright font-black uppercase">© Cdchtp</div>

    <nav class="glass fixed top-0 w-full flex justify-around p-4 z-[200]">
        <button onclick="switchTab('lib')" id="tab-lib" class="tab-btn tab-active" data-i18n="nav_lib">Répertoire</button>
        <button onclick="switchTab('set')" id="tab-set" class="tab-btn" data-i18n="nav_set">Setlists</button>
        <button onclick="switchTab('view')" id="tab-view" class="tab-btn opacity-20" data-i18n="nav_view">Visionneuse</button>
        <div class="absolute right-4 top-1/2 -translate-y-1/2 flex gap-1">
            <span onclick="setLang('fr')" id="lang-fr" class="lang-switch">FR</span>
            <span onclick="setLang('en')" id="lang-en" class="lang-switch">EN</span>
        </div>
    </nav>

    <!-- ═══ LIBRARY TAB ═══ -->
    <section id="sec-lib" class="pt-22 h-screen overflow-y-auto px-4 md:px-6">
        <!-- Header: two rows to avoid button overlap -->
        <div class="home-header">
            <div class="home-header-row1">
                <div>
                    <h1 class="jazz-title text-3xl md:text-4xl mb-1">Partoches</h1>
                    <div id="source-list" class="flex flex-wrap gap-2 mt-1"></div>
                </div>
                <div class="flex gap-2 items-center flex-wrap">
                    <button id="btn-restore" onclick="restoreAccess()" class="hidden btn-jazz !border-blue-500 !text-blue-500" data-i18n="btn_restore">Rétablir Accès</button>
                    <button onclick="addSource()" class="btn-jazz" data-i18n="btn_scan">Scanner Dossier</button>
                    <button onclick="addSourceRecursive()" class="btn-jazz !border-purple-500 !text-purple-400" data-i18n="btn_scan_deep">📂 Récursif</button>
                </div>
            </div>
        </div>
        <div id="alpha-bar" class="sticky top-0 z-20 flex flex-wrap justify-center bg-black/90 backdrop-blur-md py-2 border-b border-white/5 shadow-2xl rounded-md"></div>
        <div id="library-list" class="pb-40 mt-4"></div>
    </section>

    <!-- ═══ SETLIST TAB ═══ -->
    <section id="sec-set" class="hidden pt-22 h-screen overflow-y-auto px-4 md:px-6">
        <div class="max-w-xl mx-auto text-center mt-4">
            <h2 class="jazz-title text-2xl mb-6" data-i18n="set_title">Programmation</h2>
            <div id="set-list-current" class="bg-[#050508] border border-white/5 rounded-lg min-h-[220px] mb-6 p-4"></div>
            <div class="grid grid-cols-2 gap-4 mb-10">
                <button onclick="saveCurrentSet()" class="btn-jazz !py-4 text-[11px]" data-i18n="btn_save_set">Enregistrer Set</button>
                <button onclick="clearCurrentSet()" class="text-[10px] uppercase font-bold text-zinc-600 hover:text-white transition" data-i18n="btn_clear">Vider</button>
            </div>
            <div class="text-left">
                <h3 class="text-[10px] uppercase tracking-widest text-zinc-500 mb-4 font-bold">Sauvegardes</h3>
                <div id="saved-sets-list" class="space-y-2 pb-40"></div>
            </div>
        </div>
    </section>

    <!-- ═══ VIEWER TAB ═══ -->
    <section id="sec-view" class="fixed inset-0 bg-black hidden z-[310] overflow-hidden">
        
        <div id="viewer-header" class="glass absolute top-0 w-full p-2 md:p-3 z-[500] transition-opacity duration-300">
            <!-- Left group -->
            <div class="flex items-center gap-1 md:gap-2 flex-shrink-0">
                <button onclick="goToHome()" class="btn-jazz !border-none !text-lime-400 !px-2 font-bold" data-i18n="btn_home">🏠</button>
                <button onclick="switchTab('lib')" class="btn-jazz !border-none !text-zinc-500 !px-1 md:px-2" data-i18n="btn_close">✕</button>
                <button onclick="toggleSidebar()" class="btn-jazz !border-zinc-800 !px-2">☰</button>
                <button onclick="saveTxtFile()" id="txt-save-btn" class="btn-jazz !border-blue-700 !text-blue-400 !px-2 hidden" title="Enregistrer TXT">💾</button>
            </div>
            
            <!-- Centre: navigation + zoom -->
            <div class="flex items-center gap-2 md:gap-3 flex-shrink-0">
                <button onclick="prevFile()" class="btn-jazz !border-zinc-700 !text-zinc-300 !px-2">◀</button>
                <div class="flex items-center bg-zinc-900 rounded-lg px-1 border border-white/5">
                    <button onclick="adjustZoom(-0.15)" class="px-2 md:px-3 py-1 text-zinc-400 hover:text-white font-bold text-sm">-</button>
                    <span id="zoom-level" class="text-[11px] w-12 text-center font-bold text-lime-400">100%</span>
                    <button onclick="adjustZoom(0.15)" class="px-2 md:px-3 py-1 text-zinc-400 hover:text-white font-bold text-sm">+</button>
                </div>
                <button onclick="nextFile()" class="btn-jazz !border-zinc-700 !text-zinc-300 !px-2">▶</button>
                
                <div id="pdf-page-nav" class="flex items-center bg-zinc-900 rounded-lg border border-white/5 hidden">
                    <button onclick="event.stopPropagation(); changePdfPage(-1)" class="px-2 py-1 text-zinc-400 hover:text-white font-bold text-xs">P-</button>
                    <span id="pdf-page-label" class="text-[10px] w-14 text-center font-bold text-zinc-400">1 / 1</span>
                    <button onclick="event.stopPropagation(); changePdfPage(1)" class="px-2 py-1 text-zinc-400 hover:text-white font-bold text-xs">P+</button>
                </div>
            </div>

            <!-- Right group -->
            <div class="flex items-center gap-1 md:gap-2 flex-shrink-0">
                <!-- Auto-scroll with 0.1 step -->
                <div class="flex items-center bg-zinc-900 rounded-lg border border-white/5">
                    <button onclick="event.stopPropagation(); toggleAutoScroll()" id="scroll-toggle-btn" class="btn-jazz !border-none !px-2" title="Auto-Scroll">⭥</button>
                    <button onclick="event.stopPropagation(); adjustScrollSpeed(-1)" class="px-1 text-zinc-500 hover:text-white font-bold text-xs" title="Ralentir">-</button>
                    <span id="scroll-speed-label" class="text-[9px] w-8 text-center font-bold text-zinc-400">0.1</span>
                    <button onclick="event.stopPropagation(); adjustScrollSpeed(1)" class="px-1 text-zinc-500 hover:text-white font-bold text-xs" title="Accélérer">+</button>
                </div>

                <button onclick="event.stopPropagation(); toggleSunMode()" id="sun-mode-btn" class="btn-jazz !border-zinc-700 !text-amber-500 !px-2" data-i18n="btn_sun" title="Mode Soleil">☀️</button>
                <button onclick="toggleFX()" id="fx-toggle-btn" class="btn-jazz !border-zinc-700 !text-zinc-400 !px-2" data-i18n="btn_settings">Filtres</button>
                <button onclick="toggleDrawingMode()" id="draw-toggle" class="btn-jazz !px-2" data-i18n="btn_draw">Dessin</button>
                
                <div class="flex items-center bg-zinc-900 rounded-lg border border-white/5" title="Rotation">
                    <button onclick="event.stopPropagation(); rotatePage(-1)" class="px-2 py-1 text-zinc-400 hover:text-white font-bold text-sm">↺</button>
                    <span id="rotate-label" class="text-[10px] w-7 text-center font-bold text-zinc-500">↺↻</span>
                    <button onclick="event.stopPropagation(); rotatePage(+1)" class="px-2 py-1 text-zinc-400 hover:text-white font-bold text-sm">↻</button>

                <button onclick="event.stopPropagation(); toggleDualPage()" id="dual-page-btn" class="btn-jazz !border-zinc-700 !text-zinc-400 !px-2" title="2 pages côte à côte">📖️</button>
                <div id="page-info" class="text-white/40 font-bold text-[10px] pr-1 italic hidden sm:block">0 / 0</div>

        </div>

        <div id="view-layout">
            <aside id="viewer-sidebar">
                <div class="p-4 border-b border-white/5 font-black text-[9px] tracking-widest text-zinc-500 uppercase">Live Tracklist</div>
                <div id="sidebar-items" class="flex-grow overflow-y-auto"></div>

            <div id="scroll-container" onwheel="handleWheel(event)" onclick="toggleUI()">
                <div id="viewer-content"></div>
            </div>
        </div>

        <div id="viewer-nav" class="absolute bottom-8 w-full flex justify-between px-12 pointer-events-none z-[400] transition-opacity duration-300 sm:flex">
            <button onclick="event.stopPropagation(); prevFile()" class="nav-rect" data-i18n="btn_prev">Précédent</button>
            <button onclick="event.stopPropagation(); nextFile()" class="nav-rect" data-i18n="btn_next">Suivant</button>
        </div>

        <!-- ── Annotation toolbar ── -->
        <div class="right-control-dock">
            <div id="anno-toolbar">
                <div onclick="setAnnoColor('#ccff00', this)" class="color-dot active" style="width:30px; height:30px; background:#ccff00;"></div>
                <div onclick="setAnnoColor('#00f0ff', this)" class="color-dot" style="width:30px; height:30px; background:#00f0ff;"></div>
                <div onclick="setAnnoColor('#ff00ff', this)" class="color-dot" style="width:30px; height:30px; background:#ff00ff;"></div>
                <div onclick="setAnnoColor('#ff6600', this)" class="color-dot" style="width:30px; height:30px; background:#ff6600;"></div>
                <div onclick="setAnnoColor('red', this)" class="color-dot" style="width:30px; height:30px; background:red;"></div>
                
                <div class="toolbar-divider"></div>
                
                <div onclick="setAnnoSize(4, this)" class="size-btn" style="width:32px; height:32px;"><div class="size-preview" style="width:4px; height:4px;"></div></div>
                <div onclick="setAnnoSize(8, this)" class="size-btn active" style="width:32px; height:32px;"><div class="size-preview" style="width:8px; height:8px;"></div></div>
                <div onclick="setAnnoSize(15, this)" class="size-btn" style="width:32px; height:32px;"><div class="size-preview" style="width:14px; height:14px;"></div></div>
                <div onclick="setAnnoSize(30, this)" class="size-btn" style="width:32px; height:32px;"><div class="size-preview" style="width:24px; height:24px;"></div></div>
                
                <div class="toolbar-divider"></div>

                <div class="range-container" title="Opacité du trait">
                    <div class="fx-indicator" style="margin-bottom:2px;"><span data-i18n="fx_alpha">Opac</span></div>
                    <input type="range" id="anno-alpha-slider" min="0.1" max="1" step="0.05" value="1" oninput="updateAnnoOpacity(this.value)">
                </div>

                <div class="toolbar-divider"></div>
                
                <div onclick="setAnnoColor('text', this)" id="btn-tool-text" class="btn-jazz !px-2 !py-1 text-center !text-[9px]" data-i18n="btn_text">Texte</div>
                <div onclick="setAnnoColor('eraser', this)" class="btn-jazz !px-2 !py-1 text-center !text-[9px]" data-i18n="btn_del">Gomme</div>
                <button onclick="undoLast()" class="btn-jazz !px-2 !py-1 !text-[9px] !border-zinc-700 !text-zinc-400">Undo</button>
                <button onclick="clearCurrentPage()" class="btn-jazz !px-2 !py-1 !text-[9px] !border-pink-950 !text-pink-500">Effacer</button>
            </div>

            <!-- ── FX toolbar ── -->
            <div id="fx-toolbar">
                <div class="fx-indicator"><span data-i18n="fx_bright">Lum</span> <span id="val-bright" class="text-lime-400">100%</span></div>
                <input type="range" min="0.4" max="2" step="0.05" value="1" oninput="updateFX('bright', this.value)">
                
                <div class="toolbar-divider"></div>
                
                <div class="fx-indicator"><span data-i18n="fx_contrast">Cont</span> <span id="val-contrast" class="text-lime-400">100%</span></div>
                <input type="range" min="0.4" max="2.5" step="0.05" value="1" oninput="updateFX('contrast', this.value)">
            </div>
        </div>
    </section>

    <script>
        /* ═══════════════════════════════════════════════════════
           i18n
        ═══════════════════════════════════════════════════════ */
        const i18n = {
            fr: {
                nav_lib: "Répertoire", nav_set: "Setlists", nav_view: "Visionneuse",
                btn_restore: "Rétablir Accès", btn_scan: "Scanner Dossier",
                btn_scan_deep: "📂 Récursif",
                set_title: "Programmation", btn_save_set: "Enregistrer Set", btn_clear: "Vider",
                btn_close: "✕", btn_settings: "Filtres", btn_draw: "Dessin",
                fx_bright: "Lum", fx_contrast: "Cont", fx_alpha: "Opac", btn_del: "Gomme",
                btn_prev: "Précédent", btn_next: "Suivant", btn_add: "Ajouter", btn_home: "🏠",
                btn_sun: "☀️", btn_text: "Texte"
            },
            en: {
                nav_lib: "Library", nav_set: "Setlists", nav_view: "Viewer",
                btn_restore: "Restore Access", btn_scan: "Scan Folder",
                btn_scan_deep: "📂 Recursive",
                set_title: "Setlists", btn_save_set: "Save Setlist", btn_clear: "Clear",
                btn_close: "✕", btn_settings: "Filters", btn_draw: "Draw",
                fx_bright: "Bright", fx_contrast: "Cont", fx_alpha: "Opac", btn_del: "Eraser",
                btn_prev: "Previous", btn_next: "Next", btn_add: "Add", btn_home: "🏠",
                btn_sun: "☀️", btn_text: "Text"
            }
        };

        /* ═══════════════════════════════════════════════════════
           State
        ═══════════════════════════════════════════════════════ */
        let currentLang   = localStorage.getItem('part_lang') || 'fr';
        let files         = [], setFiles = [], currentIndex = 0, sources = [];
        let uiVisible     = true, currentZoom = 1.0, isDrawingMode = false, isFxMode = false;
        let annoColor     = '#ccff00', annoSize = 8, annoOpacity = 1.0;
        let annotations   = JSON.parse(localStorage.getItem('part_annos_v3') || '{}');
        let undoStack     = [];
        let currentRotation = 0;
        let zoomMemory    = 1.0;
        let isDualPage    = false;
        let tpCache       = [], startDist = 0, startZoom = 1.0;
        let isSepiaMode   = false;
        let isScrolling   = false;
        let scrollInterval= null;
        let scrollSpeed   = 0.1; /* default fine step */
        let currentPdfDoc = null;
        let currentPdfPageNum = 1;

        /* Tree structure for recursive folder display */
        let fileTree = []; /* {name, isFolder, children, file} */

        pdfjsLib.GlobalWorkerOptions.workerSrc =
            'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        /* ═══════════════════════════════════════════════════════
           Language
        ═══════════════════════════════════════════════════════ */
        function setLang(lang) {
            currentLang = lang;
            localStorage.setItem('part_lang', lang);
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (i18n[lang][key]) el.innerText = i18n[lang][key];
            });
            document.querySelectorAll('.lang-switch').forEach(el => el.classList.remove('active'));
            document.getElementById('lang-' + lang).classList.add('active');
            renderLibrary();
            renderSourcesUI();
        }

        /* ═══════════════════════════════════════════════════════
           IndexedDB
        ═══════════════════════════════════════════════════════ */
        const DB_NAME = "PartochesDB_Ultimate";
        async function openDB() {
            return new Promise((resolve) => {
                const req = indexedDB.open(DB_NAME, 3);
                req.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains("sources"))  db.createObjectStore("sources");
                    if (!db.objectStoreNames.contains("ios_files")) db.createObjectStore("ios_files", { keyPath: "name" });
                };
                req.onsuccess = () => resolve(req.result);
            });
        }

        /* ═══════════════════════════════════════════════════════
           Init
        ═══════════════════════════════════════════════════════ */
        async function init() {
            setLang(currentLang);

            const btnScan = document.querySelector('[data-i18n="btn_scan"]');
            if (typeof window.showDirectoryPicker === 'undefined') {
                const iosLabel = { fr: '+ Ajouter Partoches', en: '+ Add Scores' };
                btnScan.innerText = iosLabel[currentLang];
            }

            const db = await openDB();

            const reqSources = db.transaction("sources", "readonly").objectStore("sources").getAll();
            reqSources.onsuccess = async () => {
                sources = reqSources.result || [];
                if (sources.length > 0) {
                    try {
                        let needsReauth = false;
                        for (const h of sources) {
                            if (!h._virtual) {
                                const perm = await h.queryPermission({ mode: 'read' });
                                if (perm !== 'granted') needsReauth = true;
                            }
                        }
                        if (needsReauth) document.getElementById('btn-restore').classList.remove('hidden');
                    } catch(e) { console.error("Restauration échouée:", e); }
                }

                /* Load persisted iOS files */
                const reqFiles = db.transaction("ios_files", "readonly").objectStore("ios_files").getAll();
                reqFiles.onsuccess = async () => {
                    const savedFiles = reqFiles.result || [];
                    if (savedFiles.length > 0) {
                        const virtualSourceName = currentLang === 'fr' ? 'Fichiers iPad/iCloud' : 'iPad/iCloud Files';
                        let vsrc = sources.find(s => s._virtual);
                        if (!vsrc) {
                            vsrc = { name: virtualSourceName, _virtual: true, _files: [] };
                            sources.push(vsrc);
                        }
                        savedFiles.forEach(f => {
                            if (!vsrc._files.some(existing => existing.entry.name === f.name)) {
                                vsrc._files.push({
                                    entry: {
                                        name: f.name,
                                        _blob: f.blob,
                                        getFile: () => Promise.resolve(f.blob)
                                    }
                                });
                            }
                        });
                    }
                    await refreshFiles();
                };
            };

            renderSavedSets();
            generateAlphaBar();
            setupPinchZoom();

            new Sortable(document.getElementById('sidebar-items'), {
                animation: 180,
                onEnd: (evt) => {
                    const movedItem = setFiles.splice(evt.oldIndex, 1)[0];
                    setFiles.splice(evt.newIndex, 0, movedItem);
                    if (currentIndex === evt.oldIndex)          currentIndex = evt.newIndex;
                    else if (currentIndex > evt.oldIndex && currentIndex <= evt.newIndex) currentIndex--;
                    else if (currentIndex < evt.oldIndex && currentIndex >= evt.newIndex) currentIndex++;
                    document.getElementById('page-info').innerText = (currentIndex + 1) + " / " + setFiles.length;
                    renderSidebar();
                }
            });

            window.addEventListener("orientationchange", () => { setTimeout(applyPageScales, 350); });
            window.addEventListener("resize",            () => { setTimeout(applyPageScales, 100); });
        }

        /* ═══════════════════════════════════════════════════════
           Add source: flat (original)
        ═══════════════════════════════════════════════════════ */
        async function addSource() {
            if (typeof window.showDirectoryPicker === 'undefined') {
                addSourceFallbackIOS();
                return;
            }
            try {
                const h = await window.showDirectoryPicker({ mode: 'read' });
                if (sources.find(s => s.name === h.name)) {
                    alert(currentLang === 'fr' ? "Ce dossier est déjà ajouté." : "This folder is already added.");
                    return;
                }
                const db = await openDB();
                db.transaction("sources", "readwrite").objectStore("sources").put(h, h.name);
                sources.push(h);
                await refreshFiles();
            } catch(e) {
                if (e.name === 'AbortError') return;
                addSourceFallbackIOS();
            }
        }

        /* ═══════════════════════════════════════════════════════
           Add source: RECURSIVE (new – scans sub-folders & iPhoto albums)
        ═══════════════════════════════════════════════════════ */
        async function addSourceRecursive() {
            if (typeof window.showDirectoryPicker === 'undefined') {
                addSourceFallbackIOS();
                return;
            }
            try {
                const h = await window.showDirectoryPicker({ mode: 'read' });
                if (sources.find(s => s.name === h.name)) {
                    alert(currentLang === 'fr' ? "Ce dossier est déjà ajouté." : "This folder is already added.");
                    return;
                }
                /* Tag as recursive so scanFolderFresh goes deep */
                h._recursive = true;
                const db = await openDB();
                db.transaction("sources", "readwrite").objectStore("sources").put(h, h.name);
                sources.push(h);
                await refreshFiles();
            } catch(e) {
                if (e.name === 'AbortError') return;
            }
        }

        /* ═══════════════════════════════════════════════════════
           iOS fallback picker (supports gif now)
        ═══════════════════════════════════════════════════════ */
        function addSourceFallbackIOS() {
            const input = document.createElement('input');
            input.type     = 'file';
            input.multiple = true;
            /* Added gif to accepted types */
            input.accept   = '.pdf,.png,.jpg,.jpeg,.webp,.gif,.txt,image/*,application/pdf,text/plain';
            input.style.display = 'none';
            document.body.appendChild(input);

            input.onchange = async () => {
                if (!input.files || !input.files.length) { input.remove(); return; }
                const db = await openDB();
                const virtualSourceName = currentLang === 'fr' ? 'Fichiers iPad/iCloud' : 'iPad/iCloud Files';

                if (!sources.find(s => s.name === virtualSourceName)) {
                    sources.push({ name: virtualSourceName, _virtual: true, _files: [] });
                }
                const vsrc = sources.find(s => s.name === virtualSourceName);

                for (const file of input.files) {
                    if (file.name.match(/\.(pdf|png|jpg|jpeg|webp|gif|txt)$/i)) {
                        const tx = db.transaction("ios_files", "readwrite");
                        tx.objectStore("ios_files").put({ name: file.name, blob: file });
                        if (!vsrc._files.some(f => f.entry.name === file.name)) {
                            vsrc._files.push({
                                entry: {
                                    name: file.name,
                                    _blob: file,
                                    getFile: () => Promise.resolve(file)
                                }
                            });
                        }
                    }
                }
                await refreshFiles();
                input.remove();
            };
            input.click();
        }

        /* ═══════════════════════════════════════════════════════
           Remove source
        ═══════════════════════════════════════════════════════ */
        async function removeSource(name) {
            if (!confirm(currentLang === 'fr'
                ? "Supprimer l'accès à ce dossier / groupe de fichiers ?"
                : "Remove access to this folder / files?")) return;
            const src = sources.find(s => s.name === name);
            const db  = await openDB();
            if (src) {
                if (!src._virtual) {
                    db.transaction("sources", "readwrite").objectStore("sources").delete(name);
                } else {
                    db.transaction("ios_files", "readwrite").objectStore("ios_files").clear();
                }
            }
            sources = sources.filter(s => s.name !== name);
            await refreshFiles();
        }

        /* ═══════════════════════════════════════════════════════
           Refresh files
        ═══════════════════════════════════════════════════════ */
        async function refreshFiles() {
            files    = [];
            fileTree = [];

            for (const h of sources) {
                try {
                    if (h._virtual) {
                        if (h._files) files.push(...h._files);
                    } else {
                        const results = await scanFolderFresh(h, h._recursive);
                        files.push(...results);
                    }
                } catch(e) { console.warn("Dossier inaccessible", h.name, e); }
            }
            renderLibrary();
            renderSourcesUI();
        }

        /* ═══════════════════════════════════════════════════════
           Scan folder – flat or RECURSIVE (new)
           Handles sub-folders and iPhoto Album structures
        ═══════════════════════════════════════════════════════ */
        const SUPPORTED_EXT = /\.(pdf|png|jpg|jpeg|webp|gif|txt)$/i;

        async function scanFolderFresh(handle, recursive = false, depth = 0) {
            const list = [];
            for await (const entry of handle.values()) {
                if (entry.kind === 'file' && SUPPORTED_EXT.test(entry.name)) {
                    list.push({ entry, parentHandle: handle });
                } else if (entry.kind === 'directory' && recursive && depth < 8) {
                    /* Recurse into sub-directory (incl. iPhoto album folders) */
                    try {
                        const subResults = await scanFolderFresh(entry, true, depth + 1);
                        list.push(...subResults);
                    } catch(e) { console.warn("Sous-dossier inaccessible:", entry.name); }
                }
            }
            return list;
        }

        /* ═══════════════════════════════════════════════════════
           UI: sources
        ═══════════════════════════════════════════════════════ */
        function renderSourcesUI() {
            const container = document.getElementById('source-list');
            container.innerHTML = '';
            sources.forEach(s => {
                const tag = document.createElement('div');
                tag.className = 'source-tag';
                const badge = s._recursive ? ' 🔁' : '';
                tag.innerHTML = `${s.name}${badge} <span class="source-delete" onclick="removeSource('${s.name.replace(/'/g,"\\'")}')">✕</span>`;
                container.appendChild(tag);
            });
        }

        /* ═══════════════════════════════════════════════════════
           Restore access
        ═══════════════════════════════════════════════════════ */
        async function restoreAccess() {
            try {
                for (const h of sources) {
                    if (!h._virtual) await h.requestPermission({ mode: 'read' });
                }
                document.getElementById('btn-restore').classList.add('hidden');
                refreshFiles();
            } catch(e) {
                alert(currentLang === 'fr' ? "Permission refusée." : "Permission denied.");
            }
        }

        /* ═══════════════════════════════════════════════════════
           Library render
        ═══════════════════════════════════════════════════════ */
        function renderLibrary(filter = '') {
            const l = document.getElementById('library-list');
            l.innerHTML = '';
            files
                .filter(x => !filter || x.entry.name.toUpperCase().startsWith(filter))
                .sort((a, b) => a.entry.name.localeCompare(b.entry.name))
                .forEach(file => {
                    const row = document.createElement('div');
                    row.className = "file-row flex justify-between items-center p-3 px-4";
                    const safeName = file.entry.name.replace(/'/g, "\\'");
                    row.innerHTML =
                        `<div class="flex-grow font-medium text-zinc-300 text-[12px] md:text-[14px] truncate pr-4"
                              onclick="viewSingle('${safeName}')">${file.entry.name}</div>
                         <button onclick="handleSelectLibraryItem(this, '${safeName}')"
                                 class="btn-jazz !py-1 transition-all duration-200">${i18n[currentLang].btn_add}</button>`;
                    l.appendChild(row);
                });
        }

        function handleSelectLibraryItem(buttonEl, filename) {
            addToSet(filename);
            buttonEl.classList.add('btn-add-success');
            const original = buttonEl.innerText;
            buttonEl.innerText = currentLang === 'fr' ? "Ajouté ✔" : "Added ✔";
            setTimeout(() => {
                buttonEl.classList.remove('btn-add-success');
                buttonEl.innerText = original;
            }, 800);
        }

        /* ═══════════════════════════════════════════════════════
           Alpha bar
        ═══════════════════════════════════════════════════════ */
        function generateAlphaBar() {
            const bar = document.getElementById('alpha-bar');
            bar.innerHTML = '';
            /* All letters + reset */
            const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split('');
            const allBtn  = document.createElement('button');
            allBtn.innerText = '✱';
            allBtn.title = 'Tout';
            allBtn.onclick = () => renderLibrary();
            bar.appendChild(allBtn);
            letters.forEach(letter => {
                const b   = document.createElement('button');
                b.innerText = letter;
                b.onclick   = () => renderLibrary(letter);
                bar.appendChild(b);
            });
        }

        /* ═══════════════════════════════════════════════════════
           Setlist
        ═══════════════════════════════════════════════════════ */
        function addToSet(name) {
            const div = document.createElement('div');
            div.className = "flex justify-between items-center bg-[#141419] p-3 mb-2 rounded border border-white/5 cursor-move";
            div.dataset.name = name;
            div.innerHTML = `<span class="text-[11px] md:text-[13px] text-zinc-300 font-bold truncate pr-3">${name}</span>
                             <button onclick="this.parentElement.remove()" class="text-pink-500 font-bold px-2">✕</button>`;
            document.getElementById('set-list-current').appendChild(div);
            new Sortable(document.getElementById('set-list-current'), { animation: 150 });
        }

        function saveCurrentSet() {
            const name = prompt(currentLang === 'fr' ? "Nom de la Setlist :" : "Setlist Name :");
            if (!name) return;
            const items = Array.from(document.getElementById('set-list-current').children).map(c => c.dataset.name);
            localStorage.setItem('part_set_' + name, JSON.stringify(items));
            renderSavedSets();
        }

        function clearCurrentSet() {
            if (confirm("Vider la liste actuelle ?")) document.getElementById('set-list-current').innerHTML = '';
        }

        function renderSavedSets() {
            const list = document.getElementById('saved-sets-list');
            list.innerHTML = '';
            Object.keys(localStorage).filter(k => k.startsWith('part_set_')).forEach(key => {
                const name = key.replace('part_set_', '');
                const div  = document.createElement('div');
                div.className = "flex justify-between items-center bg-zinc-900/30 border border-white/5 p-3 rounded";
                div.innerHTML =
                    `<div class="font-bold text-lime-400 cursor-pointer text-[11px] md:text-[13px] truncate pr-4"
                          onclick="loadSet('${key}')">${name}</div>
                     <button onclick="deleteSet('${key}')"
                             class="text-zinc-600 hover:text-white transition uppercase text-[9px] font-bold">Supprimer</button>`;
                list.appendChild(div);
            });
        }

        function deleteSet(key) {
            if (confirm("Supprimer ce set ?")) { localStorage.removeItem(key); renderSavedSets(); }
        }

        function loadSet(key) {
            const names = JSON.parse(localStorage.getItem(key));
            setFiles    = [];
            document.getElementById('set-list-current').innerHTML = '';
            names.forEach(n => {
                const f = files.find(file => file.entry.name === n);
                if (f) { setFiles.push(f); addToSet(n); }
            });
            if (setFiles.length > 0) { currentIndex = 0; openFile(setFiles[0]); }
        }

        /* ═══════════════════════════════════════════════════════
           Open single file
        ═══════════════════════════════════════════════════════ */
        function viewSingle(name) {
            const f = files.find(x => x.entry.name === name);
            if (f) { setFiles = [f]; currentIndex = 0; openFile(f); }
        }

        /* ═══════════════════════════════════════════════════════
           Get blob
        ═══════════════════════════════════════════════════════ */
        async function getFreshFileBlob(fileObj) {
            if (fileObj.entry._blob) return fileObj.entry._blob;
            try {
                return await fileObj.entry.getFile();
            } catch(err) {
                if (err.name === 'NotFoundError' && fileObj.parentHandle) {
                    const freshList = await scanFolderFresh(fileObj.parentHandle, fileObj.parentHandle._recursive);
                    const match     = freshList.find(x => x.entry.name === fileObj.entry.name);
                    if (match) { fileObj.entry = match.entry; return await match.entry.getFile(); }
                }
                throw err;
            }
        }

        /* ═══════════════════════════════════════════════════════
           Open file (PDF, image, gif, txt)
        ═══════════════════════════════════════════════════════ */
        async function openFile(fileObj) {
            stopAutoScroll();
            document.getElementById('sec-view').classList.remove('hidden');
            switchTab('view');

            currentRotation = 0;
            document.getElementById('rotate-label').innerText = "↺↻";
            document.getElementById('page-info').innerText = (currentIndex + 1) + " / " + setFiles.length;

            currentZoom = zoomMemory;
            document.getElementById('zoom-level').innerText = Math.round(currentZoom * 100) + '%';

            document.getElementById('pdf-page-nav').classList.add('hidden');
            document.getElementById('txt-save-btn').classList.add('hidden');
            currentPdfDoc    = null;
            currentPdfPageNum = 1;

            const container = document.getElementById('viewer-content');
            container.innerHTML = `<div class="text-zinc-500 font-bold text-xs animate-pulse p-10">
                Chargement de ${fileObj.entry.name}…</div>`;
            renderSidebar();

            try {
                const blob = await getFreshFileBlob(fileObj);
                const name = fileObj.entry.name.toLowerCase();
                container.innerHTML = '';
                container.classList.remove('dual-page-mode');

                if (name.endsWith('.pdf')) {
                    /* ── PDF ── */
                    document.getElementById('pdf-page-nav').classList.remove('hidden');
                    const arrayBuffer = await blob.arrayBuffer();
                    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                    currentPdfDoc = pdf;
                    await renderPdfPage(currentPdfPageNum);

                } else if (name.match(/\.(png|jpg|jpeg|webp|gif)$/i)) {
                    /* ── Image & GIF ── */
                    const url = URL.createObjectURL(blob);
                    createPageStructure(container, 1, (wrapper) => {
                        const img = document.createElement('img');
                        img.src = url;
                        if (name.endsWith('.gif')) img.classList.add('gif-media');
                        img.onload = () => {
                            initAnnotationCanvas(wrapper, 1);
                            applyPageScales();
                        };
                        img.onerror = () => {
                            wrapper.innerHTML = `<div style="color:#f55;padding:20px;">Erreur de lecture GIF/image</div>`;
                        };
                        wrapper.appendChild(img);
                    });

                } else if (name.endsWith('.txt')) {
                    /* ── Plain text ── */
                    document.getElementById('txt-save-btn').classList.remove('hidden');
                    const text = await blob.text();
                    createPageStructure(container, 1, (wrapper) => {
                        wrapper.style.background     = "#111";
                        wrapper.style.color          = "#fff";
                        wrapper.style.padding        = "40px";
                        wrapper.style.width          = "85vw";
                        wrapper.style.whiteSpace     = "pre-wrap";
                        wrapper.style.fontFamily     = "monospace";
                        wrapper.style.fontSize       = "15px";
                        wrapper.style.userSelect     = "text";
                        wrapper.style.webkitUserSelect = "text";
                        wrapper.innerText = text;
                        setTimeout(() => { initAnnotationCanvas(wrapper, 1); applyPageScales(); }, 60);
                    });
                }
            } catch(e) {
                console.error(e);
                container.innerHTML = `<div class="text-red-500 p-6 font-bold">Erreur de lecture : ${fileObj.entry.name}</div>`;
            }
        }

        /* ═══════════════════════════════════════════════════════
           Render PDF page
        ═══════════════════════════════════════════════════════ */
        async function renderPdfPage(pageNum) {
            if (!currentPdfDoc) return;
            const container = document.getElementById('viewer-content');
            container.innerHTML = '';

            document.getElementById('pdf-page-label').innerText = `${pageNum} / ${currentPdfDoc.numPages}`;

            const pagesToRender = (isDualPage && pageNum < currentPdfDoc.numPages)
                ? [pageNum, pageNum + 1]
                : [pageNum];

            if (isDualPage && pageNum < currentPdfDoc.numPages) {
                container.classList.add('dual-page-mode');
            } else {
                container.classList.remove('dual-page-mode');
            }

            for (const p of pagesToRender) {
                const page     = await currentPdfDoc.getPage(p);
                createPageStructure(container, p, (wrapper, canvas) => {
                    const ctx      = canvas.getContext('2d');
                    /* Render at 2× for crisp high-DPI display */
                    const viewport = page.getViewport({ scale: 2.0 });
                    canvas.width   = viewport.width;
                    canvas.height  = viewport.height;
                    page.render({ canvasContext: ctx, viewport }).promise.then(() => {
                        initAnnotationCanvas(wrapper, p);
                        applyPageScales();
                    });
                });
            }
        }

        /* ═══════════════════════════════════════════════════════
           Change PDF page
        ═══════════════════════════════════════════════════════ */
        function changePdfPage(dir) {
            if (!currentPdfDoc) return;
            let next = currentPdfPageNum + dir;
            if (isDualPage && dir > 0) next = currentPdfPageNum + 2;
            if (isDualPage && dir < 0) next = currentPdfPageNum - 2;
            if (next < 1) next = 1;
            if (next > currentPdfDoc.numPages) return;
            currentPdfPageNum = next;
            renderPdfPage(currentPdfPageNum);
        }

        /* ═══════════════════════════════════════════════════════
           Create page structure
           NOTE: wrapper is inline-block so it shrink-wraps its child.
           The annotation canvas is overlaid at 100%/100% CSS size
           but its internal resolution (cv.width/height) matches the
           natural pixel size of the media element.
        ═══════════════════════════════════════════════════════ */
        function createPageStructure(container, pageIdx, buildContentFn) {
            const rotWrapper = document.createElement('div');
            rotWrapper.className = "rotation-wrapper";
            rotWrapper.id = `rot-wrapper-${pageIdx}`;

            const wrapper = document.createElement('div');
            wrapper.className = "page-wrapper";
            wrapper.id = `page-wrapper-${pageIdx}`;
            wrapper.dataset.pageIdx = pageIdx;

            const canvas = document.createElement('canvas');
            canvas.id = `pdf-canvas-${pageIdx}`;
            wrapper.appendChild(canvas);

            buildContentFn(wrapper, canvas);
            rotWrapper.appendChild(wrapper);
            container.appendChild(rotWrapper);
        }

        /* ═══════════════════════════════════════════════════════
           Sun / sepia mode
        ═══════════════════════════════════════════════════════ */
        function toggleSunMode() {
            isSepiaMode = !isSepiaMode;
            const btn  = document.getElementById('sun-mode-btn');
            const root = document.documentElement;
            if (isSepiaMode) {
                root.style.setProperty('--page-sepia', '0.85');
                btn.classList.add('sepia-active');
            } else {
                root.style.setProperty('--page-sepia', '0');
                btn.classList.remove('sepia-active');
            }
        }

        /* ═══════════════════════════════════════════════════════
           Auto-scroll — 0.1 step granularity
        ═══════════════════════════════════════════════════════ */
        function toggleAutoScroll() {
            if (isScrolling) { stopAutoScroll(); return; }
            isScrolling = true;
            document.getElementById('scroll-toggle-btn').classList.add('scroll-active');
            const scrollBox = document.getElementById('scroll-container');
            scrollInterval = setInterval(() => {
                scrollBox.scrollTop += scrollSpeed;
                if (scrollBox.scrollTop + scrollBox.clientHeight >= scrollBox.scrollHeight - 5) {
                    stopAutoScroll();
                }
            }, 40);
        }

        function stopAutoScroll() {
            isScrolling = false;
            if (scrollInterval) clearInterval(scrollInterval);
            const btn = document.getElementById('scroll-toggle-btn');
            if (btn) btn.classList.remove('scroll-active');
        }

        /* Fine-grain 0.1 step adjustScrollSpeed */
        function adjustScrollSpeed(dir) {
            scrollSpeed = parseFloat((scrollSpeed + dir * 0.1).toFixed(1));
            if (scrollSpeed < 0.1) scrollSpeed = 0.1;
            if (scrollSpeed > 10)  scrollSpeed = 10;
            document.getElementById('scroll-speed-label').innerText = scrollSpeed.toFixed(1);
        }

        /* ═══════════════════════════════════════════════════════
           Save TXT
        ═══════════════════════════════════════════════════════ */
        async function saveTxtFile() {
            if (currentIndex >= setFiles.length) return;
            const fileObj = setFiles[currentIndex];
            try {
                const blob    = await getFreshFileBlob(fileObj);
                const text    = await blob.text();
                const blobUrl = URL.createObjectURL(new Blob([text], { type: "text/plain" }));
                const a = document.createElement('a');
                a.href = blobUrl; a.download = fileObj.entry.name;
                document.body.appendChild(a); a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(blobUrl);
            } catch(err) { alert("Erreur : " + err.message); }
        }

        /* ═══════════════════════════════════════════════════════
           Dual page
        ═══════════════════════════════════════════════════════ */
        function toggleDualPage() {
            isDualPage = !isDualPage;
            const btn  = document.getElementById('dual-page-btn');
            if (isDualPage) btn.classList.add('dual-active');
            else            btn.classList.remove('dual-active');
            if (currentPdfDoc) renderPdfPage(currentPdfPageNum);
            else applyPageScales();
        }

        /* ═══════════════════════════════════════════════════════
           Rotation
        ═══════════════════════════════════════════════════════ */
        function rotatePage(dir) {
            currentRotation = (currentRotation + dir * 90 + 360) % 360;
            document.getElementById('rotate-label').innerText =
                currentRotation === 0 ? "↺↻" : `${currentRotation}°`;
            applyPageScales();
        }

        /* ═══════════════════════════════════════════════════════
           Apply page scales
           – Ensures the full score is visible at ANY zoom level
             (no clipping; scroll-container handles overflow).
           – Annotation canvas has no extra white layer.
        ═══════════════════════════════════════════════════════ */
        function applyPageScales() {
            const wrappers   = document.querySelectorAll('.page-wrapper');
            const isPortrait = window.innerHeight > window.innerWidth;

            wrappers.forEach(wrapper => {
                const pageIdx   = wrapper.dataset.pageIdx;
                const rotWrapper= document.getElementById(`rot-wrapper-${pageIdx}`);

                /* Determine natural content size */
                const pdfCanvas = wrapper.querySelector('canvas:not(.anno-canvas)');
                const imgEl     = wrapper.querySelector('img');
                const isTxt     = wrapper.style.whiteSpace === 'pre-wrap';

                let origW, origH;
                if (pdfCanvas && pdfCanvas.width) {
                    /* PDF: rendered at 2× — divide by 2 for CSS pixels */
                    origW = pdfCanvas.width  / 2;
                    origH = pdfCanvas.height / 2;
                } else if (imgEl) {
                    origW = imgEl.naturalWidth  || 600;
                    origH = imgEl.naturalHeight || 800;
                } else if (isTxt) {
                    origW = window.innerWidth * 0.85;
                    origH = wrapper.offsetHeight || 800;
                } else {
                    origW = wrapper.offsetWidth  || 600;
                    origH = wrapper.offsetHeight || 800;
                }

                /* Account for rotation */
                const swapDim = (currentRotation === 90 || currentRotation === 270);
                const w = swapDim ? origH : origW;
                const h = swapDim ? origW : origH;

                /* Available viewport */
                let maxW = window.innerWidth - 60;
                if (!document.getElementById('viewer-sidebar').classList.contains('collapsed') && window.innerWidth > 768) {
                    maxW -= 280;
                }
                if (isDualPage) maxW = (maxW / 2) - 20;

                const headerH  = isMobilePlatform() && isPortrait ? 80 : 100;
                const footerH  = isMobilePlatform() && isPortrait ? 120 : 60;
                const maxH     = window.innerHeight - headerH - footerH;

                /* Base scale to fit within viewport */
                let scale = Math.min(maxW / w, maxH / h);
                if (scale > 1.2)  scale = 1.2;
                if (isMobilePlatform()) scale *= 1.15;

                /* Final scale includes user zoom */
                const finalScale = scale * currentZoom;
                const scaledW    = w * finalScale;
                const scaledH    = h * finalScale;

                /* Size the rotation wrapper so the layout flow is correct */
                if (rotWrapper) {
                    rotWrapper.style.width  = `${scaledW}px`;
                    rotWrapper.style.height = `${scaledH}px`;
                }

                /* Apply scale transform to the page-wrapper */
                wrapper.style.transformOrigin = "top left";
                wrapper.style.transform       = `rotate(${currentRotation}deg) scale(${finalScale})`;

                /* Set the wrapper's own size to natural size so the transform
                   scales from the correct anchor and overflow is allowed */
                if (pdfCanvas && pdfCanvas.width) {
                    wrapper.style.width  = `${origW}px`;
                    wrapper.style.height = `${origH}px`;
                } else if (imgEl) {
                    wrapper.style.width  = `${origW}px`;
                    wrapper.style.height = `${origH}px`;
                }

                /* Re-sync annotation canvas size to natural media dimensions */
                const annoCanvas = wrapper.querySelector('.anno-canvas');
                if (annoCanvas) {
                    if (pdfCanvas && pdfCanvas.width) {
                        annoCanvas.width  = pdfCanvas.width;
                        annoCanvas.height = pdfCanvas.height;
                    } else if (imgEl && imgEl.naturalWidth) {
                        annoCanvas.width  = imgEl.naturalWidth;
                        annoCanvas.height = imgEl.naturalHeight;
                    }
                    redrawAnnotations(annoCanvas, pageIdx);
                }
            });
        }

        function isMobilePlatform() {
            return /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
        }

        /* ═══════════════════════════════════════════════════════
           Zoom
        ═══════════════════════════════════════════════════════ */
        function adjustZoom(amount) {
            currentZoom = Math.min(Math.max(currentZoom + amount, 0.3), 5.0);
            zoomMemory  = currentZoom;
            document.getElementById('zoom-level').innerText = Math.round(currentZoom * 100) + '%';
            applyPageScales();
        }

        function handleWheel(e) {
            e.preventDefault();
            adjustZoom(e.deltaY < 0 ? 0.08 : -0.08);
        }

        /* ═══════════════════════════════════════════════════════
           Pinch zoom (touch)
        ═══════════════════════════════════════════════════════ */
        function setupPinchZoom() {
            const el = document.getElementById('scroll-container');
            el.addEventListener('touchstart', (e) => {
                if (e.touches.length === 2) {
                    startDist = Math.hypot(
                        e.touches[0].clientX - e.touches[1].clientX,
                        e.touches[0].clientY - e.touches[1].clientY
                    );
                    startZoom = currentZoom;
                }
            }, { passive: true });

            el.addEventListener('touchmove', (e) => {
                if (e.touches.length === 2 && startDist > 0) {
                    e.preventDefault();
                    const dist = Math.hypot(
                        e.touches[0].clientX - e.touches[1].clientX,
                        e.touches[0].clientY - e.touches[1].clientY
                    );
                    currentZoom = Math.min(Math.max(startZoom * (dist / startDist), 0.4), 5.0);
                    zoomMemory  = currentZoom;
                    document.getElementById('zoom-level').innerText = Math.round(currentZoom * 100) + '%';
                    applyPageScales();
                }
            }, { passive: false });

            el.addEventListener('touchend', (e) => {
                if (e.touches.length < 2) {
                    startDist = 0;
                    if (currentZoom < 1.05) { currentZoom = 1.0; applyPageScales(); }
                }
            }, { passive: true });
        }

        /* ═══════════════════════════════════════════════════════
           Toggle UI visibility
        ═══════════════════════════════════════════════════════ */
        function toggleUI() {
            if (isDrawingMode || isFxMode || currentZoom > 1.05) return;
            uiVisible = !uiVisible;
            const header = document.getElementById('viewer-header');
            const nav    = document.getElementById('viewer-nav');
            header.style.opacity       = uiVisible ? "1" : "0";
            header.style.pointerEvents = uiVisible ? "auto" : "none";
            nav.style.opacity          = uiVisible ? "1" : "0";
        }

        /* ═══════════════════════════════════════════════════════
           FX
        ═══════════════════════════════════════════════════════ */
        function updateFX(t, v) {
            const r = document.documentElement;
            if (t === 'bright')   { r.style.setProperty('--page-bright',   v); document.getElementById('val-bright').innerText   = Math.round(v * 100) + '%'; }
            if (t === 'contrast') { r.style.setProperty('--page-contrast',  v); document.getElementById('val-contrast').innerText = Math.round(v * 100) + '%'; }
        }

        /* ═══════════════════════════════════════════════════════
           Annotation tools
        ═══════════════════════════════════════════════════════ */
        function setAnnoColor(c, el) {
            annoColor = c;
            document.querySelectorAll('.color-dot, #btn-tool-text').forEach(d => d.classList.remove('active', '!border-white', 'bg-lime-500/30'));
            if (el) {
                if (el.id === 'btn-tool-text') el.classList.add('bg-lime-500/30');
                else el.classList.add('active');

        function setAnnoSize(s, el) {

            document.querySelectorAll('.size-btn').forEach(d => d.classList.remove('active'));
            if (el) el.classList.add('active');

        function updateAnnoOpacity(v) { annoOpacity = parseFloat(v); }

        /* ═══════════════════════════════════════════════════════
           Tab switching
        ═══════════════════════════════════════════════════════ */
        function switchTab(tab) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-active'));
            document.getElementById('tab-view').classList.add('opacity-20');

            if (tab === 'lib') {
                document.getElementById('sec-lib').classList.remove('hidden');
                document.getElementById('tab-lib').classList.add('tab-active');

            } else if (tab === 'set') {
                document.getElementById('sec-set').classList.remove('hidden');
                document.getElementById('tab-set').classList.add('tab-active');
                stopAutoScroll();
            } else if (tab === 'view') {
                document.getElementById('sec-view').classList.remove('hidden');
                document.getElementById('tab-view').classList.remove('opacity-20');
                document.getElementById('tab-view').classList.add('tab-active');
            }
        }

        function toggleSidebar() {
            document.getElementById('viewer-sidebar').classList.toggle('collapsed');
            setTimeout(applyPageScales, 250);
        }

        /* ═══════════════════════════════════════════════════════
           Sidebar
        ═══════════════════════════════════════════════════════ */
        function renderSidebar() {
            const box = document.getElementById('sidebar-items');
            box.innerHTML = '';
            setFiles.forEach((f, idx) => {
                const d = document.createElement('div');
                d.className = `sidebar-item ${idx === currentIndex ? 'active' : ''}`;
                d.innerHTML = `<span class="truncate pr-2 font-bold">${f.entry.name}</span>`;
                d.onclick   = () => { currentIndex = idx; openFile(f); };
                box.appendChild(d);
            });
        }

        /* ═══════════════════════════════════════════════════════
           File navigation
        ═══════════════════════════════════════════════════════ */
        function nextFile() {
            if (currentIndex < setFiles.length - 1) { currentIndex++; openFile(setFiles[currentIndex]); }
        }
        function prevFile() {
            if (currentIndex > 0) { currentIndex--; openFile(setFiles[currentIndex]); }
        }
        function goToHome() {
            stopAutoScroll();
            document.getElementById('sec-view').classList.add('hidden');
            switchTab('lib');
        }

        /* ═══════════════════════════════════════════════════════
           Drawing mode toggle
        ═══════════════════════════════════════════════════════ */
        function toggleDrawingMode() {
            isDrawingMode = !isDrawingMode;
            const btn       = document.getElementById('draw-toggle');
            const container = document.getElementById('scroll-container');
            if (isDrawingMode) {
                btn.style.background = "var(--neon-lime)"; btn.style.color = "#000";
                document.getElementById('anno-toolbar').style.display = "flex";
                container.classList.add('anno-active');
            } else {
                btn.style.background = ""; btn.style.color = "";
                document.getElementById('anno-toolbar').style.display = "none";
                container.classList.remove('anno-active');
