<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Partoches - Mobile</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ccff00">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link class="rounded-md" rel="apple-touch-icon" href="icon-512.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Outfit:wght@200;400;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --neon-lime: #ccff00; 
            --neon-blue: #00f0ff;
            --neon-pink: #ff00ff;
            --neon-orange: #ff6600;
            --neon-purple: #b026ff;
            --bg: #020204; 
            --surface: #0a0a0e;
            --surface-accent: #111118;
            --page-bright: 1; 
            --page-contrast: 1; 
            --page-sepia: 0;
        }
        
        body { 
            background: var(--bg); 
            color: #e2e2e9; 
            font-family: 'Space Grotesk', sans-serif; 
            overflow: hidden; 
            margin: 0; 
            padding: 0;
            touch-action: manipulation; 
            font-size: 13px;
            -webkit-user-select: none;
            user-select: none;
            -webkit-text-size-adjust: none;
        }

        .jazz-title { 
            font-family: 'Outfit', sans-serif; 
            text-transform: uppercase;
            font-weight: 900;
            letter-spacing: -1px;
            background: linear-gradient(to right, var(--neon-lime), var(--neon-blue));
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            filter: drop-shadow(0 0 10px rgba(204, 255, 0, 0.25));
        }

        .glass { 
            background: rgba(2, 2, 4, 0.96); 
            backdrop-filter: blur(25px); 
            border-bottom: 1px solid rgba(204, 255, 0, 0.15); 
        }

        .file-row { 
            background: var(--surface);
            border-radius: 8px;
            margin-bottom: 6px;
            border: 1px solid rgba(255,255,255,0.02);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); 
            cursor: pointer; 
        }
        .file-row:hover { 
            border-color: var(--neon-lime);
            transform: translateX(4px);
            background: rgba(204, 255, 0, 0.04);
        }

        .btn-add-success {
            background: var(--neon-lime) !important;
            color: #000 !important;
            box-shadow: 0 0 20px var(--neon-lime) !important;
            border-color: var(--neon-lime) !important;
        }

        #view-layout { display: flex; height: 100vh; width: 100vw; overflow: hidden; position: relative; }
        
        #viewer-sidebar {
            width: 280px; background: #020204; border-right: 1px solid rgba(204, 255, 0, 0.12);
            display: flex; flex-direction: column; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 450; position: relative;
        }
        #viewer-sidebar.collapsed { margin-left: -280px; }

        /* SCROLL CONTAINER HYBRIDE OPTIMISÉ MOBILES ET TACTILE */
        #scroll-container {
            flex-grow: 1; height: 100vh; overflow: auto; 
            background: #000; scroll-behavior: auto; 
            position: relative; display: block;
            -webkit-overflow-scrolling: touch;
            touch-action: pan-x pan-y;
        }
        
        /* En mode dessin, bloquer le scroll tactile */
        #scroll-container.anno-active {
            touch-action: none;
        }
        
        #viewer-content { 
            display: flex; flex-direction: column; align-items: center; 
            padding: 120px 30px 450px 30px; 
            width: max-content; min-width: 100%; height: fit-content; 
            gap: 40px; margin: 0 auto;
        }
        
        .page-wrapper { 
            position: relative; flex-shrink: 0; background: white; 
            box-shadow: 0 0 45px rgba(0,0,0,0.9);
            filter: brightness(var(--page-bright)) contrast(var(--page-contrast)) sepia(var(--page-sepia));
            border-radius: 4px; transition: filter 0.2s ease;
            transform-origin: top center;
            max-width: 96vw;
        }
        /* En mode 2 pages, chaque page prend ~48% */
        #viewer-content.dual-page-mode .page-wrapper {
            max-width: 48vw;
        }

        /* Conteneur de rotation */
        .rotation-wrapper {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            transition: width 0.25s ease, height 0.25s ease;
            flex-shrink: 0;
        }

        /* AUTO-ADAPTATION DES INFRASTRUCTURES DE PAGES SUR ECRANS MOBILES */
        canvas { display: block; max-width: 100%; height: auto !important; width: auto !important; }
        img { height: 80vh !important; width: auto !important; object-fit: contain; display: block; max-width: 100%; }
        
        .anno-canvas { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            pointer-events: none; z-index: 10; 
        }
        
        .anno-active .anno-canvas { 
            pointer-events: auto; 
        }

        .tab-btn { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; color: #555562; transition: 0.3s; text-transform: uppercase; }
        .tab-active { color: var(--neon-lime); text-shadow: 0 0 12px rgba(204, 255, 0, 0.6); }
        
        .btn-jazz { 
            background: rgba(204, 255, 0, 0.04);
            border: 1px solid var(--neon-lime); 
            color: var(--neon-lime); 
            font-size: 10px; 
            font-weight: 700; 
            padding: 7px 14px; 
            border-radius: 5px; 
            text-transform: uppercase;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-jazz:hover { background: var(--neon-lime); color: black; box-shadow: 0 0 15px rgba(204, 255, 0, 0.3); }
        
        .nav-rect {
            pointer-events: auto; background: rgba(10, 10, 14, 0.94); border: 1px solid var(--neon-blue); 
            color: var(--neon-blue); font-weight: 700; font-size: 11px; padding: 12px 24px; border-radius: 6px;
            text-transform: uppercase; transition: 0.2s; box-shadow: 0 4px 20px rgba(0,240,255,0.15);
        }

        /* DOCK GENERAL CONTENANT LES OUTILS */
        .right-control-dock {
            position: fixed; z-index: 500; pointer-events: none;
            display: flex; gap: 15px;
        }

        #anno-toolbar, #fx-toolbar {
            pointer-events: auto; display: none; padding: 14px; border-radius: 10px;
            background: rgba(6, 6, 10, 0.96); box-shadow: 0 0 35px rgba(0,0,0,0.85);
        }
        
        /* STYLE PAR DEFAUT POUR LES ECRANS LARGES ET MODE PAYSAGE */
        @media (min-width: 769px) or (orientation: landscape) {
            .right-control-dock {
                right: 20px; top: 90px; flex-direction: column; bottom: auto; left: auto; width: auto;
            }
            #anno-toolbar { flex-direction: column; border: 1px solid rgba(204, 255, 0, 0.3); width: 74px; align-items: center; gap: 12px;}
            #fx-toolbar { flex-direction: column; border: 1px solid rgba(0, 240, 255, 0.3); width: 84px; align-items: center; gap: 12px;}
            input[type=range] { transform: rotate(-90deg); width: 90px; height: 4px; margin: 45px 0; cursor: pointer; }
            .toolbar-divider { width: 100%; height: 1px; background: rgba(255,255,255,0.1); margin: 4px 0; }
        }

        /* CONFIGURATION RESPONSIVE MODE PORTRAIT SUR SMARTPHONE */
        @media (max-width: 768px) and (orientation: portrait) {
            .right-control-dock {
                left: 10px; right: 10px; bottom: 20px; top: auto; flex-direction: row; justify-content: center; width: calc(100vw - 20px);
            }
            #anno-toolbar, #fx-toolbar {
                flex-direction: row; flex-wrap: wrap; justify-content: center; align-items: center; gap: 10px; width: 100%; border: 1px solid rgba(255,255,255,0.1);
            }
            #anno-toolbar { border-color: var(--neon-lime); }
            #fx-toolbar { border-color: var(--neon-blue); }
            input[type=range] { transform: none; width: 100px; height: 6px; margin: 0 5px; }
            .toolbar-divider { height: 20px; width: 1px; background: rgba(255,255,255,0.1); margin: 0 4px; }
            .size-btn, .color-dot { width: 28px; height: 28px; }
            #anno-toolbar .btn-jazz { width: auto; padding: 4px 8px; font-size: 8px; }
            canvas, img { height: 62vh !important; }
        }
        
        .color-dot { border-radius: 6px; border: 2px solid rgba(255,255,255,0.1); cursor: pointer; transition: transform 0.2s; flex-shrink: 0; }
        .color-dot.active { border-color: white; transform: scale(1.15); box-shadow: 0 0 10px currentColor; }
        
        .size-btn { display: flex; align-items: center; justify-content: center; border: 1px solid #2d2d37; border-radius: 6px; cursor: pointer; transition: 0.2s; flex-shrink: 0; }
        .size-btn.active { border-color: var(--neon-lime); background: rgba(204, 255, 0, 0.12); }
        .size-preview { background-color: #888; border-radius: 50%; }
        .size-btn.active .size-preview { background-color: var(--neon-lime); }

        .sidebar-item {
            padding: 15px 18px; border-bottom: 1px solid rgba(255,255,255,0.02);
            font-size: 11px; color: #828292; cursor: grab; transition: 0.2s;
            display: flex; align-items: center; justify-content: space-between;
            background: #06060a;
        }
        .sidebar-item:active { cursor: grabbing; }
        .sidebar-item.active { background: rgba(204, 255, 0, 0.06); color: var(--neon-lime); font-weight: bold; border-left: 4px solid var(--neon-lime); }

        .lang-switch { font-size: 9px; border: 1px solid #2d2d37; padding: 3px 7px; border-radius: 4px; color: #727282; cursor: pointer; font-weight: bold; }
        .lang-switch.active { color: var(--neon-lime); border-color: var(--neon-lime); background: rgba(204, 255, 0, 0.08); }

        .source-tag { background: #0f0f14; border: 1px solid #2d2d37; padding: 5px 12px; border-radius: 5px; font-size: 10px; color: var(--neon-blue); font-weight: bold; display: flex; align-items: center; gap: 8px; }
        .source-delete { color: var(--neon-pink); cursor: pointer; font-size: 13px; }

        .copyright { position: fixed; bottom: 15px; left: 25px; font-size: 9px; color: #2d2d37; z-index: 50; letter-spacing: 0.5px; }
        #alpha-bar button { padding: 6px 9px; font-size: 12px; font-weight: 800; color: #4b4b58; transition: 0.2s; }
        #alpha-bar button:hover { color: var(--neon-lime); transform: scale(1.2); }
        
        #viewer-content.dual-page-mode {
            flex-direction: row;
            flex-wrap: wrap;
            justify-content: center;
            align-items: flex-start;
            gap: 20px;
        }
        #viewer-content.dual-page-mode .rotation-wrapper,
        #viewer-content.dual-page-mode .page-wrapper {
            flex: 0 0 auto;
        }

        #dual-page-btn.dual-active {
            background: var(--neon-blue) !important;
            color: #000 !important;
            border-color: var(--neon-blue) !important;
            box-shadow: 0 0 12px rgba(0,240,255,0.4) !important;
        }

        #sun-mode-btn.sepia-active {
            background: #ffaa00 !important;
            color: #000 !important;
            border-color: #ffaa00 !important;
            box-shadow: 0 0 12px rgba(255,170,0,0.4) !important;
        }

        #scroll-toggle-btn.scroll-active {
            background: var(--neon-pink) !important;
            color: #000 !important;
            border-color: var(--neon-pink) !important;
            box-shadow: 0 0 12px rgba(255,0,255,0.4) !important;
        }

        .fx-indicator { font-size: 9px; color: #626272; font-weight: bold; text-transform: uppercase; text-align: center; }
    </style>
</head>
<body>

    <div class="copyright font-black uppercase">© Cdchtp</div>

    <nav class="glass fixed top-0 w-full flex justify-around p-4 z-[200]">
        <button onclick="switchTab('lib')" id="tab-lib" class="tab-btn tab-active" data-i18n="nav_lib">Répertoire</button>
        <button onclick="switchTab('set')" id="tab-set" class="tab-btn" data-i18n="nav_set">Setlists</button>
        <button onclick="switchTab('view')" id="tab-view" class="tab-btn opacity-20" data-i18n="nav_view">Visionneuse</button>
        <div class="absolute right-4 top-1/2 -translate-y-1/2 flex gap-1">
            <span onclick="setLang('fr')" id="lang-fr" class="lang-switch">FR</span>
            <span onclick="setLang('en')" id="lang-en" class="lang-switch">EN</span>
        </div>
    </nav>

    <section id="sec-lib" class="pt-22 h-screen overflow-y-auto px-4 md:px-6">
        <div class="flex justify-between items-end mb-6 mt-4">
            <div>
                <h1 class="jazz-title text-3xl md:text-4xl mb-1">Partoches</h1>
                <div id="source-list" class="flex flex-wrap gap-2"></div>
            </div>
            <div class="flex gap-2">
                <button id="btn-restore" onclick="restoreAccess()" class="hidden btn-jazz !border-blue-500 !text-blue-500" data-i18n="btn_restore">Rétablir Accès</button>
                <button onclick="addSource()" class="btn-jazz" data-i18n="btn_scan">Scanner Dossier</button>
            </div>
        </div>
        <div id="alpha-bar" class="sticky top-0 z-20 flex flex-wrap justify-center bg-black/90 backdrop-blur-md py-2 border-b border-white/5 shadow-2xl rounded-md"></div>
        <div id="library-list" class="pb-40 mt-4"></div>
    </section>

    <section id="sec-set" class="hidden pt-22 h-screen overflow-y-auto px-4 md:px-6">
        <div class="max-w-xl mx-auto text-center mt-4">
            <h2 class="jazz-title text-2xl mb-6" data-i18n="set_title">Programmation</h2>
            <div id="set-list-current" class="bg-[#050508] border border-white/5 rounded-lg min-h-[220px] mb-6 p-4"></div>
            <div class="grid grid-cols-2 gap-4 mb-10">
                <button onclick="saveCurrentSet()" class="btn-jazz !py-4 text-[11px]" data-i18n="btn_save_set">Enregistrer Set</button>
                <button onclick="clearCurrentSet()" class="text-[10px] uppercase font-bold text-zinc-600 hover:text-white transition" data-i18n="btn_clear">Vider</button>
            </div>
            <div class="text-left">
                <h3 class="text-[10px] uppercase tracking-widest text-zinc-500 mb-4 font-bold">Sauvegardes</h3>
                <div id="saved-sets-list" class="space-y-2 pb-40"></div>
            </div>
        </div>
    </section>

    <section id="sec-view" class="fixed inset-0 bg-black hidden z-[310] overflow-hidden">
        
        <div id="viewer-header" class="glass absolute top-0 w-full p-2 md:p-3 flex justify-between items-center z-[500] transition-opacity duration-300">
            <div class="flex items-center gap-1 md:gap-2">
                <button onclick="goToHome()" class="btn-jazz !border-none !text-lime-400 !px-2 font-bold" data-i18n="btn_home">🏠 Accueil</button>
                <button onclick="switchTab('lib')" class="btn-jazz !border-none !text-zinc-500 !px-1 md:px-2" data-i18n="btn_close">✕</button>
                <button onclick="toggleSidebar()" class="btn-jazz !border-zinc-800 !px-2">☰ Menu</button>
                <button onclick="saveTxtFile()" id="txt-save-btn" class="btn-jazz !border-blue-700 !text-blue-400 !px-2 hidden" title="Enregistrer TXT">💾 TXT</button>
            </div>
            
            <div class="flex items-center gap-2 md:gap-3">
                <button onclick="prevFile()" class="btn-jazz !border-zinc-700 !text-zinc-300 !px-2">◀</button>
                <div class="flex items-center bg-zinc-900 rounded-lg px-1 border border-white/5">
                    <button onclick="adjustZoom(-0.15)" class="px-2 md:px-3 py-1 text-zinc-400 hover:text-white font-bold text-sm">-</button>
                    <span id="zoom-level" class="text-[11px] w-12 text-center font-bold text-lime-400">100%</span>
                    <button onclick="adjustZoom(0.15)" class="px-2 md:px-3 py-1 text-zinc-400 hover:text-white font-bold text-sm">+</button>
                </div>
                <button onclick="nextFile()" class="btn-jazz !border-zinc-700 !text-zinc-300 !px-2">▶</button>
                
                <div id="pdf-page-nav" class="flex items-center bg-zinc-900 rounded-lg border border-white/5 hidden">
                    <button onclick="event.stopPropagation(); changePdfPage(-1)" class="px-2 py-1 text-zinc-400 hover:text-white font-bold text-xs">P-</button>
                    <span id="pdf-page-label" class="text-[10px] w-12 text-center font-bold text-zinc-400">1 / 1</span>
                    <button onclick="event.stopPropagation(); changePdfPage(1)" class="px-2 py-1 text-zinc-400 hover:text-white font-bold text-xs">P+</button>
                </div>
            </div>

            <div class="flex items-center gap-1 md:gap-3">
                <div class="flex items-center bg-zinc-900 rounded-lg border border-white/5">
                    <button onclick="event.stopPropagation(); toggleAutoScroll()" id="scroll-toggle-btn" class="btn-jazz !border-none !px-2" title="Auto-Scroll">⭥</button>
                    <button onclick="event.stopPropagation(); adjustScrollSpeed(-1)" class="px-1 text-zinc-500 hover:text-white font-bold text-xs">-</button>
                    <span id="scroll-speed-label" class="text-[9px] w-6 text-center font-bold text-zinc-400">2s</span>
                    <button onclick="event.stopPropagation(); adjustScrollSpeed(1)" class="px-1 text-zinc-500 hover:text-white font-bold text-xs">+</button>
                </div>

                <button onclick="event.stopPropagation(); toggleSunMode()" id="sun-mode-btn" class="btn-jazz !border-zinc-700 !text-amber-500 !px-2" data-i18n="btn_sun" title="Mode Soleil (Sepia)">☀️ Soleil</button>

                <button onclick="toggleFX()" id="fx-toggle-btn" class="btn-jazz !border-zinc-700 !text-zinc-400 !px-2" data-i18n="btn_settings">Filtres</button>
                <button onclick="toggleDrawingMode()" id="draw-toggle" class="btn-jazz !px-2" data-i18n="btn_draw">Dessin</button>
                <div class="flex items-center bg-zinc-900 rounded-lg border border-white/5" title="Rotation (non conservée)">
                    <button onclick="event.stopPropagation(); rotatePage(-1)" class="px-2 py-1 text-zinc-400 hover:text-white font-bold text-sm" title="Rotation antihoraire">↺</button>
                    <span id="rotate-label" class="text-[10px] w-7 text-center font-bold text-zinc-500">↺↻</span>
                    <button onclick="event.stopPropagation(); rotatePage(+1)" class="px-2 py-1 text-zinc-400 hover:text-white font-bold text-sm" title="Rotation horaire">↻</button>
                </div>
                <button onclick="event.stopPropagation(); toggleDualPage()" id="dual-page-btn" class="btn-jazz !border-zinc-700 !text-zinc-400 !px-2" title="2 pages côte à côte">⧉</button>
                <div id="page-info" class="text-white/40 font-bold text-[10px] pr-1 italic hidden sm:block">0 / 0</div>
            </div>
        </div>

        <div id="view-layout">
            <aside id="viewer-sidebar">
                <div class="p-4 border-b border-white/5 font-black text-[9px] tracking-widest text-zinc-500 uppercase">Live Tracklist</div>
                <div id="sidebar-items" class="flex-grow overflow-y-auto"></div>
            </aside>

            <div id="scroll-container" onwheel="handleWheel(event)" onclick="toggleUI()">
                <div id="viewer-content"></div>
            </div>
        </div>

        <div id="viewer-nav" class="absolute bottom-8 w-full flex justify-between px-12 pointer-events-none z-[400] transition-opacity duration-300 sm:flex">
            <button onclick="event.stopPropagation(); prevFile()" class="nav-rect" data-i18n="btn_prev">Précédent</button>
            <button onclick="event.stopPropagation(); nextFile()" class="nav-rect" data-i18n="btn_next">Suivant</button>
        </div>

        <div class="right-control-dock">
            <div id="anno-toolbar">
                <div onclick="setAnnoColor('#ccff00', this)" class="color-dot active style-lime" style="width:30px; height:30px; background:#ccff00; color:#ccff00;"></div>
                <div onclick="setAnnoColor('#00f0ff', this)" class="color-dot style-blue" style="width:30px; height:30px; background:#00f0ff; color:#00f0ff;"></div>
                <div onclick="setAnnoColor('#ff00ff', this)" class="color-dot style-pink" style="width:30px; height:30px; background:#ff00ff; color:#ff00ff;"></div>
                <div onclick="setAnnoColor('#ff6600', this)" class="color-dot style-orange" style="width:30px; height:30px; background:#ff6600; color:#ff6600;"></div>
                <div onclick="setAnnoColor('red', this)" class="color-dot style-red" style="width:30px; height:30px; background:red; color:red;"></div>
                
                <div class="toolbar-divider"></div>
                
                <div onclick="setAnnoSize(3, this)" class="size-btn" style="width:32px; height:32px;"><div class="size-preview" style="width:4px; height:4px;"></div></div>
                <div onclick="setAnnoSize(7, this)" class="size-btn active" style="width:32px; height:32px;"><div class="size-preview" style="width:8px; height:8px;"></div></div>
                <div onclick="setAnnoSize(15, this)" class="size-btn" style="width:32px; height:32px;"><div class="size-preview" style="width:14px; height:14px;"></div></div>
                
                <div class="toolbar-divider"></div>
                
                <div onclick="setAnnoColor('eraser', this)" class="btn-jazz !px-2 !py-1 text-center !text-[9px]" data-i18n="btn_del">Gomme</div>
                <button onclick="undoLast()" class="btn-jazz !px-2 !py-1 !text-[9px] !border-zinc-700 !text-zinc-400">Undo</button>
                <button onclick="clearCurrentPage()" class="btn-jazz !px-2 !py-1 !text-[9px] !border-pink-950 !text-pink-500">Effacer</button>
            </div>

            <div id="fx-toolbar">
                <div class="fx-indicator"><span data-i18n="fx_bright">Lum</span> <span id="val-bright" class="text-lime-400">100%</span></div>
                <input type="range" min="0.4" max="2" step="0.05" value="1" oninput="updateFX('bright', this.value)">
                
                <div class="toolbar-divider"></div>
                
                <div class="fx-indicator"><span data-i18n="fx_contrast">Cont</span> <span id="val-contrast" class="text-lime-400">100%</span></div>
                <input type="range" min="0.4" max="2.5" step="0.05" value="1" oninput="updateFX('contrast', this.value)">
            </div>
        </div>
    </section>

    <script>
        const i18n = {
            fr: {
                nav_lib: "Répertoire", nav_set: "Setlists", nav_view: "Visionneuse",
                btn_restore: "Rétablir Accès", btn_scan: "Scanner Dossier",
                set_title: "Programmation", btn_save_set: "Enregistrer Set", btn_clear: "Vider",
                btn_close: "✕ Fermer", btn_settings: "Filtres", btn_draw: "Dessin",
                fx_bright: "Lum", fx_contrast: "Cont", btn_del: "Gomme",
                btn_prev: "Précédent", btn_next: "Suivant", btn_add: "Ajouter", btn_home: "🏠 Accueil",
                btn_sun: "☀️ Soleil"
            },
            en: {

                set_title: "Setlists", btn_save_set: "Save Setlist", btn_clear: "Clear",
                btn_close: "✕ Close", btn_settings: "Filters", btn_draw: "Draw",
                fx_bright: "Bright", fx_contrast: "Cont", btn_del: "Eraser",
                btn_prev: "Previous", btn_next: "Next", btn_add: "Add", btn_home: "🏠 Home",
                btn_sun: "☀️ Sun"
            }
        };

        let currentLang = localStorage.getItem('part_lang') || 'fr';
        let files = [], setFiles = [], currentIndex = 0, sources = [];
        let uiVisible = true, currentZoom = 1.0, isDrawingMode = false, isFxMode = false;
        let annoColor = '#ccff00', annoSize = 7;
        let annotations = JSON.parse(localStorage.getItem('part_annos_v3') || '{}');
        let undoStack = [];
        let currentRotation = 0;  
        let zoomMemory = 1.0;     
        let isDualPage = false;   
        
        let tpCache = [];

        // Nouvelles variables d'état
        let isSepiaMode = false;

        function setLang(lang) {
            currentLang = lang; localStorage.setItem('part_lang', lang);
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                el.innerText = i18n[lang][key] || key;
            });
            document.querySelectorAll('.lang-switch').forEach(el => el.classList.remove('active'));
            document.getElementById('lang-' + lang).classList.add('active');
            renderLibrary();

        const DB_NAME = "PartochesDB_Ultimate";
        async function openDB() { 
            return new Promise((r) => { 
                const req = indexedDB.open(DB_NAME, 1); 
                req.onupgradeneeded = (e) => e.target.result.createObjectStore("sources"); 
                req.onsuccess = (e) => r(req.result); 
            }); 
        }

        async function init() {
            setLang(currentLang);

            const btnScan = document.querySelector('[data-i18n="btn_scan"]');
            if (typeof window.showDirectoryPicker === 'undefined') {
                btnScan.setAttribute('data-i18n-ios', '1');
                const iosLabel = { fr: '+ Ajouter Fichiers', en: '+ Add Files' };
                btnScan.innerText = iosLabel[currentLang];
                btnScan.title = currentLang === 'fr'
                    ? 'Sur iOS, sélectionnez des fichiers individuels (PDF, images)'
                    : 'On iOS, select individual files (PDF, images)';
            }

            const db = await openDB();
            const req = db.transaction("sources", "readonly").objectStore("sources").getAll();
            req.onsuccess = async () => { 
                sources = req.result; 
                if(sources.length > 0) {
                    try {
                        let needsReauth = false;
                        for(const h of sources) { 
                            if (!h._virtual) {
                                const perm = await h.queryPermission({ mode: 'read' });
                                if(perm !== 'granted') needsReauth = true;
                            }
                        }
                        if (needsReauth) document.getElementById('btn-restore').classList.remove('hidden');
                        await refreshFiles();
                    } catch(e) { console.error("Restauration échouée:", e); }
                }
            };
            renderSavedSets();
            generateAlphaBar();
            setupPinchZoom();
            
            new Sortable(document.getElementById('sidebar-items'), {
                animation: 180,
                onEnd: function (evt) {
                    const movedItem = setFiles.splice(evt.oldIndex, 1)[0];
                    setFiles.splice(evt.newIndex, 0, movedItem);
                    if (currentIndex === evt.oldIndex) {
                        currentIndex = evt.newIndex;
                    } else if (currentIndex > evt.oldIndex && currentIndex <= evt.newIndex) {
                        currentIndex--;
                    } else if (currentIndex < evt.oldIndex && currentIndex >= evt.newIndex) {
                        currentIndex++;
                    }
                    document.getElementById('page-info').innerText = (currentIndex + 1) + " / " + setFiles.length;
                    renderSidebar();
                }
            });
            
            window.addEventListener("orientationchange", () => {
                setTimeout(applyPageScales, 350);
            });
            window.addEventListener("resize", () => {
                setTimeout(applyPageScales, 100);
            });
        }

        async function addSource() {
            if (typeof window.showDirectoryPicker === 'undefined') {
                addSourceFallbackIOS();
                return;
            }
            try {
                const h = await window.showDirectoryPicker({ mode: 'read' });
                if(sources.find(s => s.name === h.name)) {
                    alert(currentLang === 'fr' ? "Ce dossier est déjà ajouté." : "This folder is already added.");
                    return;
                }
                const db = await openDB();
                db.transaction("sources", "readwrite").objectStore("sources").put(h, h.name);
                sources.push(h);
                await refreshFiles();
            } catch(e) {
                if (e.name === 'AbortError') return;
                if (confirm(
                    currentLang === 'fr'
                        ? "Impossible d'accéder aux dossiers dans ce navigateur.\nVoulez-vous sélectionner vos fichiers manuellement ?"
                        : "Cannot access folders in this browser.\nDo you want to select your files manually?"
                )) {
                    addSourceFallbackIOS();
                }
            }
        }

        function addSourceFallbackIOS() {
            const input = document.createElement('input');
            input.type = 'file';
            input.multiple = true;
            input.accept = '.pdf,.png,.jpg,.jpeg,.webp,.txt,image/*,application/pdf,text/plain';
            input.style.display = 'none';
            document.body.appendChild(input);
            input.onchange = async () => {
                if (!input.files || input.files.length === 0) { input.remove(); return; }
                const newFiles = [];
                for (const file of input.files) {
                    if (file.name.match(/\.(pdf|png|jpg|jpeg|webp|txt)$/i)) {
                        newFiles.push({ entry: { name: file.name, _blob: file, getFile: () => Promise.resolve(file) } });
                    }
                }
                const virtualSourceName = currentLang === 'fr' ? 'Fichiers sélectionnés' : 'Selected Files';
                if (!sources.find(s => s.name === virtualSourceName)) {
                    sources.push({ name: virtualSourceName, _virtual: true, _files: [] });
                }
                const vsrc = sources.find(s => s.name === virtualSourceName);
                vsrc._files = (vsrc._files || []).concat(newFiles);
                files.push(...newFiles);
                renderLibrary();
                renderSourcesUI();
                input.remove();
                if (newFiles.length > 0) {
                    const msg = currentLang === 'fr'
                        ? `${newFiles.length} fichier(s) ajouté(s) avec succès.`
                        : `${newFiles.length} file(s) added successfully.`;
                    const banner = document.createElement('div');
                    banner.style.cssText = 'position:fixed;top:70px;left:50%;transform:translateX(-50%);background:var(--neon-lime);color:#000;font-weight:bold;font-size:11px;padding:8px 20px;border-radius:6px;z-index:9999;letter-spacing:1px;';
                    banner.innerText = msg;
                    document.body.appendChild(banner);
                    setTimeout(() => banner.remove(), 2500);
                }
            };
            input.click();
        }

        async function removeSource(name) {
            if(!confirm(currentLang === 'fr' ? "Supprimer l'accès à ce dossier ?" : "Remove access to this folder?")) return;
            const src = sources.find(s => s.name === name);
            if (src && !src._virtual) {
                const db = await openDB();
                db.transaction("sources", "readwrite").objectStore("sources").delete(name);
            }
            sources = sources.filter(s => s.name !== name);
            await refreshFiles();
        }

        async function refreshFiles() {
            files = [];
            for(const h of sources) {
                try {
                    if (h._virtual) {
                        if (h._files) files.push(...h._files);
                    } else {
                        const results = await scanFolderFresh(h);
                        files.push(...results);
                    }
                } catch(e) { console.warn("Dossier inaccessible", h.name, e); }
            }
            renderLibrary();
            renderSourcesUI();
        }

        async function scanFolderFresh(handle) {
            const list = [];
            for await (const entry of handle.values()) {
                if(entry.kind === 'file' && entry.name.match(/\.(pdf|png|jpg|jpeg|webp|txt)$/i)) {
                    list.push({ entry, parentHandle: handle });
                }
            }
            return list;
        }

        function renderSourcesUI() {
            const container = document.getElementById('source-list'); container.innerHTML = '';
            sources.forEach(s => {
                const tag = document.createElement('div'); tag.className = 'source-tag';
                tag.innerHTML = `${s.name} <span class="source-delete" onclick="removeSource('${s.name}')">✕</span>`;
                container.appendChild(tag);
            });
        }

        async function restoreAccess() {
            try {
                for(const h of sources) { 
                    if (!h._virtual) await h.requestPermission({ mode: 'read' }); 
                }
                document.getElementById('btn-restore').classList.add('hidden');
                refreshFiles();
            } catch(e) { 
                alert(currentLang === 'fr' ? "Permission refusée." : "Permission denied."); 
            }
        }

        function renderLibrary(filter = '') {
            const l = document.getElementById('library-list'); l.innerHTML = '';
            files.filter(x => !filter || x.entry.name.toUpperCase().startsWith(filter))
                 .sort((a,b) => a.entry.name.localeCompare(b.entry.name))
                 .forEach(file => {
                    const row = document.createElement('div');
                    row.className = "file-row flex justify-between items-center p-3 px-4";
                    row.innerHTML = `<div class="flex-grow font-medium text-zinc-300 text-[12px] truncate pr-4" onclick="viewSingle('${file.entry.name.replace(/'/g, "\\'")}')">${file.entry.name}</div>
                                     <button onclick="handleSelectLibraryItem(this, '${file.entry.name.replace(/'/g, "\\'")}')" class="btn-jazz !py-1 transition-all duration-200">${i18n[currentLang].btn_add}</button>`;
                    l.appendChild(row);
                 });
        }

        function handleSelectLibraryItem(buttonEl, filename) {
            addToSet(filename);
            buttonEl.classList.add('btn-add-success');
            const originalText = buttonEl.innerText;
            buttonEl.innerText = currentLang === 'fr' ? "Ajouté ✔" : "Added ✔";
            setTimeout(() => {
                buttonEl.classList.remove('btn-add-success');
                buttonEl.innerText = originalText;
            }, 800);
        }

        function generateAlphaBar() {
            const bar = document.getElementById('alpha-bar');
            "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split('').forEach(l => {

            div.dataset.name = name;

            if (!name) return;
            const items = Array.from(document.getElementById('set-list-current').children).map(c => c.dataset.name);

        }

        function renderSavedSets() {
            const list = document.getElementById('saved-sets-list');
            list.innerHTML = '';

        function loadSet(key) {
            const names = JSON.parse(localStorage.getItem(key));
            setFiles = [];
            document.getElementById('set-list-current').innerHTML = '';
            names.forEach(n => {
                const f = files.find(file => file.entry.name === n);
                if (f) {
                    setFiles.push(f);
                    addToSet(n);
                }
            });
            if (setFiles.length > 0) {
                currentIndex = 0;
                openFile(setFiles[0]);
            }

        function viewSingle(name) {
            const f = files.find(x => x.entry.name === name);
            if(f) { setFiles = [f]; currentIndex = 0; openFile(f); }
        }

        // --- FONCTION DE RÉCUPÉRATION DU BLOB ---
        async function getFreshFileBlob(fileObj) {
            if (fileObj.entry._blob) return fileObj.entry._blob;
            try {
                return await fileObj.entry.getFile();
            } catch (err) {
                if (err.name === 'NotFoundError' && fileObj.parentHandle) {
                    console.warn("[Partoches] Fichier introuvable/stale. Tentative de re-scan...");
                    const freshList = await scanFolderFresh(fileObj.parentHandle);
                    const freshMatch = freshList.find(x => x.entry.name === fileObj.entry.name);
                    if (freshMatch) {
                        fileObj.entry = freshMatch.entry;
                        return await freshMatch.entry.getFile();
                    }
                }
                throw err;
            }
        }

        async function openFile(fileObj) {
            stopAutoScroll();
            document.getElementById('sec-view').classList.remove('hidden');
            switchTab('view');
            
            currentRotation = 0;
            document.getElementById('rotate-label').innerText = "↺↻";
            document.getElementById('page-info').innerText = (currentIndex + 1) + " / " + setFiles.length;
            
            currentZoom = zoomMemory;
            document.getElementById('zoom-level').innerText = Math.round(currentZoom * 100) + '%';

            // Masquer les options contextuelles spécifiques par défaut
            document.getElementById('pdf-page-nav').classList.add('hidden');
            document.getElementById('txt-save-btn').classList.add('hidden');
            currentPdfDoc = null;
            currentPdfPageNum = 1;

            const container = document.getElementById('viewer-content');
            container.innerHTML = `<div class="text-zinc-500 font-bold text-xs animate-pulse p-10">Chargement de ${fileObj.entry.name}...</div>`;
            renderSidebar();

            try {
                const blob = await getFreshFileBlob(fileObj);
                const name = fileObj.entry.name.toLowerCase();
                container.innerHTML = '';

                if (name.endsWith('.pdf')) {
                    document.getElementById('pdf-page-nav').classList.remove('hidden');
                    const arrayBuffer = await blob.arrayBuffer();
                    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                    currentPdfDoc = pdf;
                    await renderPdfPage(currentPdfPageNum);
                } else if (name.match(/\.(png|jpg|jpeg|webp)$/)) {
                    const url = URL.createObjectURL(blob);
                    createPageStructure(container, 1, (wrapper) => {
                        const img = document.createElement('img');
                        img.src = url;
                        img.onload = () => { 
                            initAnnotationCanvas(wrapper, 1);
                            applyPageScales(); 
                        };
                        wrapper.appendChild(img);
                    });
                } else if (name.endsWith('.txt')) {
                    document.getElementById('txt-save-btn').classList.remove('hidden');
                    const text = await blob.text();
                    createPageStructure(container, 1, (wrapper) => {
                        wrapper.style.background = "#111";
                        wrapper.style.color = "#fff";
                        wrapper.style.padding = "40px";
                        wrapper.style.width = "85vw";
                        wrapper.style.whiteSpace = "pre-wrap";
                        wrapper.style.fontFamily = "monospace";
                        wrapper.style.fontSize = "15px";
                        wrapper.style.userSelect = "text";
                        wrapper.style.webkitUserSelect = "text";
                        wrapper.innerText = text;
                        setTimeout(applyPageScales, 50);
                    });
                }
            } catch(e) {
                console.error(e);
                container.innerHTML = `<div class="text-red-500 p-6 font-bold">Erreur de lecture : ${fileObj.entry.name}<br><span class="text-xs text-zinc-600">${e.message}</span></div>`;
            }
        }

        async function renderPdfPage(pageNum) {
            if (!currentPdfDoc) return;
            const container = document.getElementById('viewer-content');
            container.innerHTML = '';
            
            document.getElementById('pdf-page-label').innerText = `${pageNum} / ${currentPdfDoc.numPages}`;

            // Mode 2 pages côte à côte actif et disponible
            const pagesToRender = (isDualPage && pageNum < currentPdfDoc.numPages) ? [pageNum, pageNum + 1] : [pageNum];
            
            if(isDualPage && pageNum < currentPdfDoc.numPages) {
                container.classList.add('dual-page-mode');
            } else {
                container.classList.remove('dual-page-mode');
            }

            for (const p of pagesToRender) {
                const page = await currentPdfDoc.getPage(p);
                createPageStructure(container, p, (wrapper, canvas) => {
                    const ctx = canvas.getContext('2d');
                    const viewport = page.getViewport({ scale: 2.0 }); // Rendu HD stable
                    canvas.width = viewport.width;
                    canvas.height = viewport.height;
                    
                    const renderCtx = { canvasContext: ctx, viewport: viewport };
                    page.render(renderCtx).promise.then(() => {
                        initAnnotationCanvas(wrapper, p);
                        applyPageScales();
                    });
                });
            }
        }

        function changePdfPage(dir) {
            if (!currentPdfDoc) return;
            let nextSpec = currentPdfPageNum + dir;
            if (isDualPage && dir > 0) nextSpec = currentPdfPageNum + 2;
            if (isDualPage && dir < 0) nextSpec = currentPdfPageNum - 2;

            if (nextSpec < 1) nextSpec = 1;
            if (nextSpec > currentPdfDoc.numPages) return;
            
            currentPdfPageNum = nextSpec;
            renderPdfPage(currentPdfPageNum);
        }

        function createPageStructure(container, pageIdx, buildContentFn) {
            const rotWrapper = document.createElement('div');
            rotWrapper.className = "rotation-wrapper";
            rotWrapper.id = `rot-wrapper-${pageIdx}`;

            const wrapper = document.createElement('div');
            wrapper.className = "page-wrapper";
            wrapper.id = `page-wrapper-${pageIdx}`;
            wrapper.dataset.pageIdx = pageIdx;

            const canvas = document.createElement('canvas');
            canvas.id = `pdf-canvas-${pageIdx}`;
            wrapper.appendChild(canvas);

            buildContentFn(wrapper, canvas);
            rotWrapper.appendChild(wrapper);
            container.appendChild(rotWrapper);
        }

        function toggleSunMode() {

        function toggleAutoScroll() {
            const btn = document.getElementById('scroll-toggle-btn');
            if (isScrolling) {
                stopAutoScroll();
            } else {
                isScrolling = true;
                btn.classList.add('scroll-active');

        function stopAutoScroll() {
            isScrolling = false;
            if (scrollInterval) clearInterval(scrollInterval);

        function adjustScrollSpeed(val) {

        async function saveTxtFile() {
            if (currentIndex >= setFiles.length) return;
            const fileObj = setFiles[currentIndex];
            try {
                const blob = await getFreshFileBlob(fileObj);
                const text = await blob.text();
                const blobUrl = URL.createObjectURL(new Blob([text], {type: "text/plain"}));

        function toggleDualPage() {
            isDualPage = !isDualPage;
            const btn = document.getElementById('dual-page-btn');
            if (isDualPage) btn.classList.add('dual-active');
            else btn.classList.remove('dual-active');
            
            if (currentPdfDoc) {
                renderPdfPage(currentPdfPageNum);
            } else {
                applyPageScales();
            }
        }

        function rotatePage(dir) {
            currentRotation = (currentRotation + dir * 90) % 360;
            if (currentRotation < 0) currentRotation += 360;
            applyPageScales();
        }

        function applyPageScales() {
            const wrappers = document.querySelectorAll('.page-wrapper');
            const isPortrait = window.innerHeight > window.innerWidth;
            
            wrappers.forEach(wrapper => {
                const pageIdx = wrapper.dataset.pageIdx;
                const rotWrapper = document.getElementById(`rot-wrapper-${pageIdx}`);
                const elementToMeasure = wrapper.querySelector('canvas:not(.anno-canvas)') || wrapper.querySelector('img') || wrapper;
                
                let origW = elementToMeasure.getBoundingClientRect().width / currentZoom;
                let origH = elementToMeasure.getBoundingClientRect().height / currentZoom;
                if (elementToMeasure.tagName === 'CANVAS') { origW = elementToMeasure.width/2; origH = elementToMeasure.height/2; }
                if (elementToMeasure.tagName === 'IMG') { origW = elementToMeasure.naturalWidth || 600; origH = elementToMeasure.naturalHeight || 800; }
                if (wrapper.style.whiteSpace === 'pre-wrap') { origW = window.innerWidth * 0.85; origH = elementToMeasure.offsetHeight; }

                const swapDim = (currentRotation === 90 || currentRotation === 270);
                const w = swapDim ? origH : origW;
                const h = swapDim ? origW : origH;

                let maxContainerW = window.innerWidth - 60;
                if (!document.getElementById('viewer-sidebar').classList.contains('collapsed') && window.innerWidth > 768) {
                    maxContainerW -= 280;
                }
                if (isDualPage) {
                    maxContainerW = (maxContainerW / 2) - 20;
                }

                let headerSpace = 100;
                if(isPortrait && isMobilePlatform()) headerSpace = 80;
                const maxContainerH = window.innerHeight - headerSpace - (isPortrait && isMobilePlatform() ? 120 : 60);

                let scale = Math.min(maxContainerW / w, maxContainerH / h);
                if (scale > 1.2) scale = 1.2; 
                if (isMobilePlatform()) scale *= 1.15; 

                const finalScale = scale * currentZoom;
                wrapper.style.transform = `scale(${finalScale})`;

                const scaledW = w * finalScale;
                const scaledH = h * finalScale;

                if (rotWrapper) {
                    rotWrapper.style.width = `${scaledW}px`;
                    rotWrapper.style.height = `${scaledH}px`;
                }

                wrapper.style.transformOrigin = "center center";
                wrapper.style.transform = `rotate(${currentRotation}deg) scale(${finalScale})`;

                wrapper.style.marginBottom = "0px";
                wrapper.style.marginTop = "0px";
            });
        }

        function isMobilePlatform() {
            return /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
        }

        function adjustZoom(amount) {
            currentZoom += amount;
            if (currentZoom < 0.3) currentZoom = 0.3;
            if (currentZoom > 4.0) currentZoom = 4.0;
            zoomMemory = currentZoom;
            document.getElementById('zoom-level').innerText = Math.round(currentZoom * 100) + '%';
            applyPageScales();
        }

        function handleWheel(e) {
            // Zoom à la molette (avec ou sans Ctrl pour s'adapter à tous les périphériques)
            e.preventDefault();
            const amount = e.deltaY < 0 ? 0.08 : -0.08;
            adjustZoom(amount);
        }

        function setupPinchZoom() {
            const el = document.getElementById('scroll-container');
            el.addEventListener('touchstart', (e) => {
                if (e.touches.length === 2) {
                    startDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                    startZoom = currentZoom;
                }
            }, { passive: true });

            el.addEventListener('touchmove', (e) => {
                if (e.touches.length === 2 && startDist > 0) {
                    e.preventDefault();
                    const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                    let ratio = dist / startDist;
                    currentZoom = Math.min(Math.max(startZoom * ratio, 0.4), 3.5);
                    zoomMemory = currentZoom;
                    document.getElementById('zoom-level').innerText = Math.round(currentZoom * 100) + '%';
                    applyPageScales();
                }
            }, { passive: false });

            el.addEventListener('touchend', (e) => {
                if (e.touches.length < 2) {
                    startDist = 0;
                    if (currentZoom < 1.05) {
                        currentZoom = 1.0;
                        applyPageScales();
                    }
                }
            }, { passive: true });
        }

        function toggleUI() {
            if (isDrawingMode || isFxMode || currentZoom > 1.05) {
                return; 
            }
            uiVisible = !uiVisible;
            document.getElementById('viewer-header').style.opacity = uiVisible ? "1" : "0";
            document.getElementById('viewer-header').style.pointerEvents = uiVisible ? "auto" : "none";
            document.getElementById('viewer-nav').style.opacity = uiVisible ? "1" : "0";
        }

        function updateFX(t, v) {
            const r = document.documentElement;
            if(t===('bright')) { r.style.setProperty('--page-bright', v); document.getElementById('val-bright').innerText = Math.round(v*100)+'%'; }
            if(t===('contrast')) { r.style.setProperty('--page-contrast', v); document.getElementById('val-contrast').innerText = Math.round(v*100)+'%'; }
        }

        function setAnnoColor(c, el) { 
            annoColor = c; 
            document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active')); 
            if(el) el.classList.add('active'); 
        }
        
        function setAnnoSize(s, el) { 
            annoSize = s; 
            document.querySelectorAll('.size-btn').forEach(d => d.classList.remove('active')); 
            if(el) el.classList.add('active');
        }

        function switchTab(tab) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-active'));
            document.getElementById('tab-view').classList.add('opacity-20');

            if(tab === 'lib') {
                document.getElementById('sec-lib').classList.remove('hidden');
                document.getElementById('tab-lib').classList.add('tab-active');
                stopAutoScroll();
            } else if (tab === 'set') {
                document.getElementById('sec-set').classList.remove('hidden');
                document.getElementById('tab-set').classList.add('tab-active');
                stopAutoScroll();
            } else if (tab === 'view') {
                document.getElementById('sec-view').classList.remove('hidden');
                document.getElementById('tab-view').classList.remove('opacity-20');
                document.getElementById('tab-view').classList.add('tab-active');
            }
        }

        function toggleSidebar() {
            document.getElementById('viewer-sidebar').classList.toggle('collapsed');
            setTimeout(applyPageScales, 250);
        }

        function renderSidebar() {
            const box = document.getElementById('sidebar-items'); box.innerHTML = '';
            setFiles.forEach((f, idx) => {
                const d = document.createElement('div');
                d.className = `sidebar-item ${idx === currentIndex ? 'active' : ''}`;
                d.innerHTML = `<span class="truncate pr-2 font-bold">${f.entry.name}</span>`;
                d.onclick = () => { currentIndex = idx; openFile(f); };
                box.appendChild(d);
            });
        }

        function nextFile() {
            if (currentIndex < setFiles.length - 1) { currentIndex++; openFile(setFiles[currentIndex]); }
        }
        function prevFile() {
            if (currentIndex > 0) { currentIndex--; openFile(setFiles[currentIndex]); }
        }
        function goToHome() {
            stopAutoScroll();
            document.getElementById('sec-view').classList.add('hidden');
            switchTab('lib');
        }

        function toggleDrawingMode() {
            isDrawingMode = !isDrawingMode;
            const btn = document.getElementById('draw-toggle');
            const container = document.getElementById('scroll-container');
            if(isDrawingMode) {
                btn.style.background = "var(--neon-lime)"; btn.style.color = "#000";
                document.getElementById('anno-toolbar').style.display = "flex";
                container.classList.add('anno-active');
            } else {
                btn.style.background = ""; btn.style.color = "";
                document.getElementById('anno-toolbar').style.display = "none";
                container.classList.remove('anno-active');
            }
        }

        function toggleFX() {
            isFxMode = !isFxMode;
            const btn = document.getElementById('fx-toggle-btn');
            if(isFxMode) {
                btn.style.background = "var(--neon-blue)"; btn.style.color = "#000";
                document.getElementById('fx-toolbar').style.display = "flex";
            } else {
                btn.style.background = ""; btn.style.color = "";
                document.getElementById('fx-toolbar').style.display = "none";
            }
        }

        // =====================================================================
        // MOTEUR D'ANNOTATIONS LOCALSTORAGE COMPATIBLE MULTI-PAGES & ROTATIONS
        // =====================================================================
        function getFileKey() {
            if (currentIndex >= setFiles.length) return 'default';
            return setFiles[currentIndex].entry.name;
        }

        function initAnnotationCanvas(wrapper, pageIdx) {
            const key = getFileKey();
            if(!annotations[key]) annotations[key] = {};
            if(!annotations[key][pageIdx]) annotations[key][pageIdx] = [];

            const old = wrapper.querySelector('.anno-canvas');
            if(old) old.remove();

            const cv = document.createElement('canvas');
            cv.className = "anno-canvas";
            wrapper.appendChild(cv);

            const ref = wrapper.querySelector('canvas:not(.anno-canvas)') || wrapper.querySelector('img');
            if(!ref) return;

            function syncSize() {
                if (ref.tagName === 'IMG') {
                    cv.width = ref.naturalWidth || ref.clientWidth;
                    cv.height = ref.naturalHeight || ref.clientHeight;
                } else {
                    cv.width = ref.width;
                    cv.height = ref.height;
                }
                redrawAnnotations(cv, pageIdx);
            }
            
            if(ref.tagName === 'IMG') {
                if(ref.complete) syncSize(); else ref.onload = syncSize;
            } else {
                syncSize();
            }

            let drawing = false;
            let lastX = 0, lastY = 0;

            function getPos(e) {
                const rect = cv.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                
                let x = (clientX - rect.left) / (rect.width / cv.width);
                let y = (clientY - rect.top) / (rect.height / cv.height);
                return { x, y };
            }

            function startDraw(e) {
                if(!isDrawingMode) return;
                drawing = true;
                const p = getPos(e);
                lastX = p.x; lastY = p.y;
                undoStack.push(JSON.parse(JSON.stringify(annotations[key])));
            }

            function draw(e) {
                if(!drawing || !isDrawingMode) return;
                const p = getPos(e);
                const ctx = cv.getContext('2d');

                ctx.beginPath();
                ctx.moveTo(lastX, lastY);
                ctx.lineTo(p.x, p.y);
                
                if (annoColor === 'eraser') {
                    ctx.globalCompositeOperation = 'destination-out';
                    ctx.lineWidth = annoSize * 2;
                    ctx.stroke();
                } else {
                    ctx.globalCompositeOperation = 'source-over';
                    ctx.strokeStyle = annoColor;
                    ctx.lineWidth = annoSize;
                    ctx.lineCap = 'round';
                    ctx.lineJoin = 'round';
                    ctx.stroke();
                }

                annotations[key][pageIdx].push({
                    x1: lastX, y1: lastY, x2: p.x, y2: p.y,
                    c: annoColor, s: annoSize
                });

                lastX = p.x; lastY = p.y;
            }

            function stopDraw() {
                if(drawing) {
                    drawing = false;
                    localStorage.setItem('part_annos_v3', JSON.stringify(annotations));
                }
            }

            cv.addEventListener('mousedown', startDraw);
            cv.addEventListener('mousemove', draw);
            cv.addEventListener('mouseup', stopDraw);
            cv.addEventListener('mouseleave', stopDraw);

            cv.addEventListener('touchstart', (e) => { startDraw(e); }, { passive: true });
            cv.addEventListener('touchmove', (e) => { if(isDrawingMode) { e.preventDefault(); draw(e); } }, { passive: false });
            cv.addEventListener('touchend', stopDraw);
        }

        function redrawAnnotations(cv, pageIdx) {
            const ctx = cv.getContext('2d');
            ctx.clearRect(0,0, cv.width, cv.height);
            const key = getFileKey();
            if(!annotations[key] || !annotations[key][pageIdx]) return;

            annotations[key][pageIdx].forEach(line => {
                ctx.beginPath();
                ctx.moveTo(line.x1, line.y1);
                ctx.lineTo(line.x2, line.y2);
                if(line.c === 'eraser') {
                    ctx.globalCompositeOperation = 'destination-out';
                    ctx.lineWidth = line.s * 2;
                } else {
                    ctx.globalCompositeOperation = 'source-over';
                    ctx.strokeStyle = line.c;
                    ctx.lineWidth = line.s;
                }
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.stroke();
            });
            ctx.globalCompositeOperation = 'source-over';
        }

        function undoLast() {
            if(undoStack.length > 0) {
                const key = getFileKey();
                annotations[key] = undoStack.pop();
                localStorage.setItem('part_annos_v3', JSON.stringify(annotations));
                document.querySelectorAll('.page-wrapper').forEach(w => {
                    const cv = w.querySelector('.anno-canvas');
                    if(cv) redrawAnnotations(cv, w.dataset.pageIdx);
                });
            }
        }

        function clearCurrentPage() {
            if(confirm("Effacer les dessins de cette partition ?")) {
                const key = getFileKey();
                annotations[key] = {};
                localStorage.setItem('part_annos_v3', JSON.stringify(annotations));
                document.querySelectorAll('.page-wrapper').forEach(w => {
                    const cv = w.querySelector('.anno-canvas');
                    if(cv) redrawAnnotations(cv, w.dataset.pageIdx);
                });
            }
        }

        window.onload = init;
    </script>
</body>
</html>
