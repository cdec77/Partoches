        function toggleFX() {
            isFxMode = !isFxMode;
            const btn = document.getElementById('fx-toggle-btn');
            if (isFxMode) {
                btn.style.background = "var(--neon-blue)"; btn.style.color = "#000";
                document.getElementById('fx-toolbar').style.display = "flex";
            } else {
                btn.style.background = ""; btn.style.color = "";
                document.getElementById('fx-toolbar').style.display = "none";
            }
        }

        /* ═══════════════════════════════════════════════════════
           Annotation canvas
           – Exact fit: canvas internal resolution = natural media size
           – CSS overlay: width/height 100% to fill the wrapper
           – No extra white layer between media and canvas
        ═══════════════════════════════════════════════════════ */
        function getFileKey() {
            return currentIndex < setFiles.length ? setFiles[currentIndex].entry.name : 'default';
        }

        function initAnnotationCanvas(wrapper, pageIdx) {
            const key = getFileKey();
            if (!annotations[key]) annotations[key] = {};
            if (!annotations[key][pageIdx]) annotations[key][pageIdx] = [];

            /* Remove any stale canvas */
            const old = wrapper.querySelector('.anno-canvas');
            if (old) old.remove();

            const cv = document.createElement('canvas');
            cv.className = "anno-canvas";
            /* Position: absolute, fills wrapper via CSS (width/height 100%) */
            wrapper.appendChild(cv);

            /* Reference media element */
            const ref = wrapper.querySelector('canvas:not(.anno-canvas)') || wrapper.querySelector('img');

            function syncSize() {
                if (!ref) {
                    cv.width  = wrapper.offsetWidth  || 800;
                    cv.height = wrapper.offsetHeight || 1100;
                } else if (ref.tagName === 'CANVAS') {
                    /* PDF: internal canvas already at 2× res */
                    cv.width  = ref.width;
                    cv.height = ref.height;
                } else if (ref.tagName === 'IMG') {
                    /* Image / GIF: use natural pixel dimensions */
                    cv.width  = ref.naturalWidth  || ref.clientWidth  || 800;
                    cv.height = ref.naturalHeight || ref.clientHeight || 1000;
                } else {
                    cv.width  = ref.offsetWidth  || 800;
                    cv.height = ref.offsetHeight || 1100;
                }
                redrawAnnotations(cv, pageIdx);
            }

            if (ref) {
                if (ref.tagName === 'IMG') {
                    if (ref.complete && ref.naturalWidth) syncSize();
                    else ref.onload = syncSize;
                } else {
                    syncSize();
                }
            } else {
                syncSize();
            }

            let drawing = false, lastX = 0, lastY = 0;

            function getPos(e) {
                const rect    = cv.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                return {
                    x: (clientX - rect.left)  * (cv.width  / rect.width),
                    y: (clientY - rect.top)   * (cv.height / rect.height)
                };
            }

            function startDraw(e) {
                if (!isDrawingMode) return;
                const p = getPos(e);
                if (annoColor === 'text') {
                    const txt = prompt(currentLang === 'fr' ? "Texte à ajouter :" : "Text to add:");
                    if (txt && txt.trim()) {
                        undoStack.push(JSON.parse(JSON.stringify(annotations[key])));
                        annotations[key][pageIdx].push({
                            type: 'text', x: p.x, y: p.y, text: txt,
                            c: '#ff00ff', s: Math.max(annoSize * 2.5, 18)
                        });
                        localStorage.setItem('part_annos_v3', JSON.stringify(annotations));
                        redrawAnnotations(cv, pageIdx);
                    }
                    return;
                }
                drawing = true; lastX = p.x; lastY = p.y;
                undoStack.push(JSON.parse(JSON.stringify(annotations[key])));
            }

            function draw(e) {
                if (!drawing || !isDrawingMode || annoColor === 'text') return;
                const p   = getPos(e);
                const ctx = cv.getContext('2d');
                ctx.beginPath(); ctx.moveTo(lastX, lastY); ctx.lineTo(p.x, p.y);
                if (annoColor === 'eraser') {
                    ctx.globalCompositeOperation = 'destination-out';
                    ctx.lineWidth = annoSize * 2;
                } else {
                    ctx.globalCompositeOperation = 'source-over';
                    ctx.strokeStyle  = annoColor;
                    ctx.globalAlpha  = annoOpacity;
                    ctx.lineWidth    = annoSize;
                    ctx.lineCap      = 'round';
                    ctx.lineJoin     = 'round';
                }
                ctx.stroke();
                annotations[key][pageIdx].push({
                    type: 'line', x1: lastX, y1: lastY, x2: p.x, y2: p.y,
                    c: annoColor, s: annoSize, o: annoOpacity
                });
                lastX = p.x; lastY = p.y;
            }

            function stopDraw() {
                if (drawing) {
                    drawing = false;
                    localStorage.setItem('part_annos_v3', JSON.stringify(annotations));
                }
            }

            cv.addEventListener('mousedown',  startDraw);
            cv.addEventListener('mousemove',  draw);
            cv.addEventListener('mouseup',    stopDraw);
            cv.addEventListener('mouseleave', stopDraw);
            cv.addEventListener('touchstart', (e) => startDraw(e), { passive: true });
            cv.addEventListener('touchmove',  (e) => {
                if (isDrawingMode && annoColor !== 'text') { e.preventDefault(); draw(e); }
            }, { passive: false });
            cv.addEventListener('touchend', stopDraw);
        }

        /* ═══════════════════════════════════════════════════════
           Redraw annotations
        ═══════════════════════════════════════════════════════ */
        function redrawAnnotations(cv, pageIdx) {
            const ctx = cv.getContext('2d');
            ctx.clearRect(0, 0, cv.width, cv.height);
            const key = getFileKey();
            if (!annotations[key] || !annotations[key][pageIdx]) return;
            annotations[key][pageIdx].forEach(item => {
                ctx.save();
                if (!item.type || item.type === 'line') {
                    ctx.beginPath();
                    ctx.moveTo(item.x1, item.y1);
                    ctx.lineTo(item.x2, item.y2);
                    if (item.c === 'eraser') {
                        ctx.globalCompositeOperation = 'destination-out';
                        ctx.lineWidth = item.s * 2;
                    } else {
                        ctx.globalCompositeOperation = 'source-over';
                        ctx.strokeStyle = item.c;
                        ctx.globalAlpha = item.o !== undefined ? item.o : 1.0;
                        ctx.lineWidth   = item.s;
                    }
                    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
                    ctx.stroke();
                } else if (item.type === 'text') {
                    ctx.globalCompositeOperation = 'source-over';
                    ctx.fillStyle = item.c || '#ff00ff';
                    ctx.font = `bold ${item.s}px 'Space Grotesk', sans-serif`;
                    ctx.textBaseline = 'middle';
                    ctx.fillText(item.text, item.x, item.y);
                }
                ctx.restore();
            });
        }

        /* ═══════════════════════════════════════════════════════
           Undo / clear
        ═══════════════════════════════════════════════════════ */
        function undoLast() {
            if (!undoStack.length) return;
            const key = getFileKey();
            annotations[key] = undoStack.pop();
            localStorage.setItem('part_annos_v3', JSON.stringify(annotations));
            document.querySelectorAll('.page-wrapper').forEach(w => {
                const cv = w.querySelector('.anno-canvas');
                if (cv) redrawAnnotations(cv, w.dataset.pageIdx);
            });
        }

        function clearCurrentPage() {
            if (!confirm(currentLang === 'fr' ? "Effacer les dessins ?" : "Clear drawings?")) return;
            const key = getFileKey();
            annotations[key] = {};
            localStorage.setItem('part_annos_v3', JSON.stringify(annotations));
            document.querySelectorAll('.page-wrapper').forEach(w => {
                const cv = w.querySelector('.anno-canvas');
                if (cv) redrawAnnotations(cv, w.dataset.pageIdx);
            });
        }

        /* ═══════════════════════════════════════════════════════
           Bootstrap
        ═══════════════════════════════════════════════════════ */
        window.onload = init;
    </script>
</body>
</html>
