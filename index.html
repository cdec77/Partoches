<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Partoches - Mobile</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ccff00">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link class="rounded-md" rel="apple-touch-icon" href="icon-512.png">

    <script src="[cdn.tailwindcss.com](https://cdn.tailwindcss.com)"></script>
    <script src="[cdnjs.cloudflare.com](https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js)"></script>
    <script src="[cdnjs.cloudflare.com](https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js)"></script>
    <link href="[fonts.googleapis.com](https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Outfit:wght@200;400;900&display=swap)" rel="stylesheet">
    
    <style>
        :root { 
            --neon-lime: #ccff00; 
            --neon-blue: #00f0ff;
            --neon-pink: #ff00ff;
            --neon-orange: #ff6600;
            --neon-purple: #b026ff;
            --bg: #020204; 
            --surface: #0a0a0e;
            --surface-accent: #111118;
            --page-bright: 1; 
            --page-contrast: 1; 
        }
        
        body { 
            background: var(--bg); 
            color: #e2e2e9; 
            font-family: 'Space Grotesk', sans-serif; 
            overflow: hidden; 
            margin: 0; 
            padding: 0;
            touch-action: manipulation; 
            font-size: 13px;
            -webkit-user-select: none;
            user-select: none;
            -webkit-text-size-adjust: none;
        }

        .jazz-title { 
            font-family: 'Outfit', sans-serif; 
            text-transform: uppercase;
            font-weight: 900;
            letter-spacing: -1px;
            background: linear-gradient(to right, var(--neon-lime), var(--neon-blue));
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            filter: drop-shadow(0 0 10px rgba(204, 255, 0, 0.25));
        }

        .glass { 
            background: rgba(2, 2, 4, 0.96); 
            backdrop-filter: blur(25px); 
            border-bottom: 1px solid rgba(204, 255, 0, 0.15); 
        }

        .file-row { 
            background: var(--surface);
            border-radius: 8px;
            margin-bottom: 6px;
            border: 1px solid rgba(255,255,255,0.02);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); 
            cursor: pointer; 
        }
        .file-row:hover { 
            border-color: var(--neon-lime);
            transform: translateX(4px);
            background: rgba(204, 255, 0, 0.04);
        }

        .btn-add-success {
            background: var(--neon-lime) !important;
            color: #000 !important;
            box-shadow: 0 0 20px var(--neon-lime) !important;
            border-color: var(--neon-lime) !important;
        }

        #view-layout { display: flex; height: 100vh; width: 100vw; overflow: hidden; position: relative; }
        
        #viewer-sidebar {
            width: 280px; background: #020204; border-right: 1px solid rgba(204, 255, 0, 0.12);
            display: flex; flex-direction: column; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 450; position: relative;
        }
        #viewer-sidebar.collapsed { margin-left: -280px; }

        /* SCROLL CONTAINER HYBRIDE OPTIMISÉ MOBILES ET TACTILE */
        #scroll-container {
            flex-grow: 1; height: 100vh; overflow: auto; 
            background: #000; scroll-behavior: auto; 
            position: relative; display: block;
            -webkit-overflow-scrolling: touch;
            touch-action: pan-x pan-y;
        }
        
        /* En mode dessin, bloquer le scroll tactile */
        #scroll-container.anno-active {
            touch-action: none;
        }
        
        #viewer-content { 
            display: flex; flex-direction: column; align-items: center; 
            padding: 120px 30px 450px 30px; 
            width: max-content; min-width: 100%; height: fit-content; 
            gap: 40px; margin: 0 auto;
        }
        
        .page-wrapper { 
            position: relative; flex-shrink: 0; background: white; 
            box-shadow: 0 0 45px rgba(0,0,0,0.9);
            filter: brightness(var(--page-bright)) contrast(var(--page-contrast));
            border-radius: 4px; transition: filter 0.2s ease;
            transform-origin: top center;
            max-width: 96vw;
        }

        /* En mode 2 pages, chaque page prend ~48% */
        #viewer-content.dual-page-mode .page-wrapper {
            max-width: 48vw;
        }

        /* Conteneur de rotation */
        .rotation-wrapper {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            transition: width 0.25s ease, height 0.25s ease;
            flex-shrink: 0;
        }

        /* AUTO-ADAPTATION DES INFRASTRUCTURES DE PAGES SUR ECRANS MOBILES */
        canvas { display: block; max-width: 100%; height: auto !important; width: auto !important; }
        img { height: 80vh !important; width: auto !important; object-fit: contain; display: block; max-width: 100%; }
        
        .anno-canvas { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            pointer-events: none; z-index: 10; 
        }
        
        .anno-active .anno-canvas { 
            pointer-events: auto; 
        }

        .tab-btn { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; color: #555562; transition: 0.3s; text-transform: uppercase; }
        .tab-active { color: var(--neon-lime); text-shadow: 0 0 12px rgba(204, 255, 0, 0.6); }
        
        .btn-jazz { 
            background: rgba(204, 255, 0, 0.04);
            border: 1px solid var(--neon-lime); 
            color: var(--neon-lime); 
            font-size: 10px; 
            font-weight: 700; 
            padding: 7px 14px; 
            border-radius: 5px; 
            text-transform: uppercase;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-jazz:hover { background: var(--neon-lime); color: black; box-shadow: 0 0 15px rgba(204, 255, 0, 0.3); }
        
        .nav-rect {
            pointer-events: auto; background: rgba(10, 10, 14, 0.94); border: 1px solid var(--neon-blue); 
            color: var(--neon-blue); font-weight: 700; font-size: 11px; padding: 12px 24px; border-radius: 6px;
            text-transform: uppercase; transition: 0.2s; box-shadow: 0 4px 20px rgba(0,240,255,0.15);
        }

        /* DOCK GÉNÉRAL CONTENANT LES OUTILS */
        .right-control-dock {
            position: fixed; z-index: 500; pointer-events: none;
            display: flex; gap: 15px;
        }

        #anno-toolbar, #fx-toolbar {
            pointer-events: auto; display: none; padding: 14px; border-radius: 10px;
            background: rgba(6, 6, 10, 0.96); box-shadow: 0 0 35px rgba(0,0,0,0.85);
        }
        
        /* STYLE PAR DÉFAUT POUR LES ÉCRANS LARGES ET MODE PAYSAGE */
        @media (min-width: 769px) or (orientation: landscape) {
            .right-control-dock {
                right: 20px; top: 90px; flex-direction: column; bottom: auto; left: auto; width: auto;
            }
            #anno-toolbar { flex-direction: column; border: 1px solid rgba(204, 255, 0, 0.3); width: 74px; align-items: center; gap: 12px;}
            #fx-toolbar { flex-direction: column; border: 1px solid rgba(0, 240, 255, 0.3); width: 84px; align-items: center; gap: 12px;}
            input[type=range] { transform: rotate(-90deg); width: 90px; height: 4px; margin: 45px 0; cursor: pointer; }
            .toolbar-divider { width: 100%; height: 1px; background: rgba(255,255,255,0.1); margin: 4px 0; }
        }

        /* CONFIGURATION RESPONSIVE POUR LE MODE PORTRAIT SUR SMARTPHONE */
        @media (max-width: 768px) and (orientation: portrait) {
            .right-control-dock {
                left: 10px; right: 10px; bottom: 20px; top: auto; flex-direction: row; justify-content: center; width: calc(100vw - 20px);
            }
            #anno-toolbar, #fx-toolbar {
                flex-direction: row; flex-wrap: wrap; justify-content: center; align-items: center; gap: 10px; width: 100%; border: 1px solid rgba(255,255,255,0.1);
            }
            #anno-toolbar { border-color: var(--neon-lime); }
            #fx-toolbar { border-color: var(--neon-blue); }
            input[type=range] { transform: none; width: 100px; height: 6px; margin: 0 5px; }
            .toolbar-divider { height: 20px; width: 1px; background: rgba(255,255,255,0.1); margin: 0 4px; }
            .size-btn, .color-dot { width: 28px; height: 28px; }
            #anno-toolbar .btn-jazz { width: auto; padding: 4px 8px; font-size: 8px; }
            canvas, img { height: 62vh !important; }
        }
        
        .color-dot { border-radius: 6px; border: 2px solid rgba(255,255,255,0.1); cursor: pointer; transition: transform 0.2s; flex-shrink: 0; }
        .color-dot.active { border-color: white; transform: scale(1.15); box-shadow: 0 0 10px currentColor; }
        
        .size-btn { display: flex; align-items: center; justify-content: center; border: 1px solid #2d2d37; border-radius: 6px; cursor: pointer; transition: 0.2s; flex-shrink: 0; }
        .size-btn.active { border-color: var(--neon-lime); background: rgba(204, 255, 0, 0.12); }
        .size-preview { background-color: #888; border-radius: 50%; }
        .size-btn.active .size-preview { background-color: var(--neon-lime); }

        .sidebar-item {
            padding: 15px 18px; border-bottom: 1px solid rgba(255,255,255,0.02);
            font-size: 11px; color: #828292; cursor: grab; transition: 0.2s;
            display: flex; align-items: center; justify-content: space-between;
            background: #06060a;
        }
        .sidebar-item:active { cursor: grabbing; }
        .sidebar-item.active { background: rgba(204, 255, 0, 0.06); color: var(--neon-lime); font-weight: bold; border-left: 4px solid var(--neon-lime); }

        /* FIX: Boutons de langue positionnés sans débordement sur les boutons d'action */
        .lang-switch { font-size: 9px; border: 1px solid #2d2d37; padding: 3px 7px; border-radius: 4px; color: #727282; cursor: pointer; font-weight: bold; }
        .lang-switch.active { color: var(--neon-lime); border-color: var(--neon-lime); background: rgba(204, 255, 0, 0.08); }

        .source-tag { background: #0f0f14; border: 1px solid #2d2d37; padding: 5px 12px; border-radius: 5px; font-size: 10px; color: var(--neon-blue); font-weight: bold; display: flex; align-items: center; gap: 8px; }
        .source-delete { color: var(--neon-pink); cursor: pointer; font-size: 13px; }

        .copyright { position: fixed; bottom: 15px; left: 25px; font-size: 9px; color: #2d2d37; z-index: 50; letter-spacing: 0.5px; }
        #alpha-bar button { padding: 6px 9px; font-size: 12px; font-weight: 800; color: #4b4b58; transition: 0.2s; }
        #alpha-bar button:hover { color: var(--neon-lime); transform: scale(1.2); }
        
        /* MODE 2 PAGES CÔTE À CÔTE */
        #viewer-content.dual-page-mode {
            flex-direction: row;
            flex-wrap: wrap;
            justify-content: center;
            align-items: flex-start;
            gap: 20px;
        }
        #viewer-content.dual-page-mode .rotation-wrapper,
        #viewer-content.dual-page-mode .page-wrapper {
            flex: 0 0 auto;
        }

        /* Bouton mode 2 pages actif */
        #dual-page-btn.dual-active {
            background: var(--neon-blue) !important;
            color: #000 !important;
            border-color: var(--neon-blue) !important;
            box-shadow: 0 0 12px rgba(0,240,255,0.4) !important;
        }

        .fx-indicator { font-size: 9px; color: #626272; font-weight: bold; text-transform: uppercase; text-align: center; }

        /* ================================================================
           NAVIGATION INTERNE PDF MULTI-PAGES
           Barre dédiée distincte de la navigation entre fichiers/images.
           Visible uniquement quand le PDF ouvert contient > 1 page.
        ================================================================ */
        #pdf-page-nav {
            position: fixed;
            /* Sur desktop : ancré en bas à droite, au-dessus de la nav principale */
            right: 20px;
            bottom: 90px;
            z-index: 480;
            display: none; /* affiché via JS uniquement pour les PDF multi-pages */
            flex-direction: column;
            align-items: center;
            gap: 6px;
            pointer-events: auto;
        }

        #pdf-page-nav.visible { display: flex; }

        .pdf-nav-btn {
            background: rgba(10, 10, 16, 0.95);
            border: 1px solid var(--neon-purple);
            color: var(--neon-purple);
            font-weight: 700;
            font-size: 16px;
            width: 42px;
            height: 42px;
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            transition: 0.2s;
            box-shadow: 0 4px 18px rgba(176,38,255,0.18);
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .pdf-nav-btn:hover, .pdf-nav-btn:active {
            background: var(--neon-purple);
            color: #fff;
            box-shadow: 0 0 18px rgba(176,38,255,0.55);
        }
        .pdf-nav-btn:disabled {
            opacity: 0.25;
            pointer-events: none;
        }

        #pdf-page-counter {
            font-size: 9px;
            font-weight: 800;
            color: var(--neon-purple);
            letter-spacing: 1px;
            background: rgba(10,10,16,0.92);
            border: 1px solid rgba(176,38,255,0.3);
            border-radius: 6px;
            padding: 3px 8px;
            text-align: center;
            min-width: 42px;
        }

        /* Sur portrait mobile : barre horizontale en haut (juste sous le header) */
        @media (max-width: 768px) and (orientation: portrait) {
            #pdf-page-nav {
                right: auto;
                bottom: auto;
                top: 72px;
                left: 50%;
                transform: translateX(-50%);
                flex-direction: row;
                gap: 8px;
            }
            .pdf-nav-btn { width: 38px; height: 38px; font-size: 15px; }
        }

        /* ================================================================
           FIX : BOUTON PRÉCÉDENT masqué sous la sidebar sur desktop
           On décale la nav du bas pour tenir compte de la sidebar ouverte
        ================================================================ */
        #viewer-nav {
            transition: padding-left 0.4s cubic-bezier(0.4,0,0.2,1);
        }
        /* Quand la sidebar est visible (non collapsed), le bouton Précédent
           reçoit un padding-left supplémentaire pour sortir de derrière elle */
        #view-layout:not(.sidebar-collapsed) #viewer-nav {
            padding-left: calc(280px + 20px);
        }

        /* ================================================================
           AFFICHAGE PLEIN ÉCRAN PAR DÉFAUT — PC / GRANDS ÉCRANS
           Le zoom initial est calculé dynamiquement dans computeInitialZoom()
           pour que la partition remplisse la hauteur ou largeur disponible.
           Sur iPad (déjà fonctionnel), on garde le comportement existant.
        ================================================================ */

        /* ================================================================
           BIBLIOTHÈQUE — HEADER RESPONSIVE
           Fix: boutons d'action + langue sur la même ligne sans chevauchement
        ================================================================ */
        .lib-header-actions {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px;
            /* S'assure que les boutons d'action restent visibles */
            max-width: calc(100% - 10px);
        }

        /* Séparateur visuel dans la lib-header */
        .lib-header-sep {
            width: 1px; height: 20px;
            background: rgba(255,255,255,0.08);
            flex-shrink: 0;
        }

        /* Bannière feedback */
        .feedback-banner {
            position: fixed;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--neon-lime);
            color: #000;
            font-weight: bold;
            font-size: 11px;
            padding: 8px 20px;
            border-radius: 6px;
            z-index: 9999;
            letter-spacing: 1px;
            white-space: nowrap;
            pointer-events: none;
            opacity: 1;
            transition: opacity 0.4s;
        }
        .feedback-banner.fade { opacity: 0; }
    </style>
</head>
<body>

    <div class="copyright font-black uppercase">© Cdchtp</div>

    <!-- NAV PRINCIPALE : langue déplacée dans un conteneur dédié qui ne chevauche plus les onglets -->
    <nav class="glass fixed top-0 w-full z-[200]">
        <div class="flex justify-between items-center px-4 py-3">
            <!-- Onglets centraux -->
            <div class="flex gap-4 flex-1 justify-around">
                <button onclick="switchTab('lib')" id="tab-lib" class="tab-btn tab-active" data-i18n="nav_lib">Répertoire</button>
                <button onclick="switchTab('set')" id="tab-set" class="tab-btn" data-i18n="nav_set">Setlists</button>
                <button onclick="switchTab('view')" id="tab-view" class="tab-btn opacity-20" data-i18n="nav_view">Visionneuse</button>
            </div>
            <!-- Sélecteur de langue : toujours à droite, ne chevauche plus rien -->
            <div class="flex gap-1 flex-shrink-0 ml-3">
                <span onclick="setLang('fr')" id="lang-fr" class="lang-switch">FR</span>
                <span onclick="setLang('en')" id="lang-en" class="lang-switch">EN</span>
            </div>
        </div>
    </nav>

    <!-- ================================================================
         RÉPERTOIRE
         Header réorganisé : titre + sources à gauche, boutons d'action
         à droite dans un conteneur flex-wrap qui ne déborde pas.
    ================================================================ -->
    <section id="sec-lib" class="pt-16 h-screen overflow-y-auto px-4 md:px-6">
        <div class="flex flex-wrap justify-between items-start gap-3 mb-5 mt-4">
            <!-- Gauche : titre + tags sources -->
            <div class="flex-1 min-w-0">
                <h1 class="jazz-title text-3xl md:text-4xl mb-2">Partoches</h1>
                <div id="source-list" class="flex flex-wrap gap-2"></div>
            </div>
            <!-- Droite : boutons d'action — ne chevauche plus les boutons de langue -->
            <div class="lib-header-actions">
                <button id="btn-restore" onclick="restoreAccess()" class="hidden btn-jazz !border-blue-500 !text-blue-500" data-i18n="btn_restore">Rétablir Accès</button>
                <button onclick="addSource()" id="btn-scan" class="btn-jazz" data-i18n="btn_scan">Scanner Dossier</button>
                <!-- Bouton Album iOS : visible uniquement sur iPad/iPhone -->
                <button onclick="addAlbumIOS()" id="btn-album" class="hidden btn-jazz !border-purple-500 !text-purple-400" data-i18n="btn_album">📷 Album</button>
            </div>
        </div>
        <div id="alpha-bar" class="sticky top-0 z-20 flex flex-wrap justify-center bg-black/90 backdrop-blur-md py-2 border-b border-white/5 shadow-2xl rounded-md"></div>
        <div id="library-list" class="pb-40 mt-4"></div>
    </section>

    <section id="sec-set" class="hidden pt-16 h-screen overflow-y-auto px-4 md:px-6">
        <div class="max-w-xl mx-auto text-center mt-4">
            <h2 class="jazz-title text-2xl mb-6" data-i18n="set_title">Programmation</h2>
            <div id="set-list-current" class="bg-[#050508] border border-white/5 rounded-lg min-h-[220px] mb-6 p-4"></div>
            <div class="grid grid-cols-2 gap-4 mb-10">
                <button onclick="saveCurrentSet()" class="btn-jazz !py-4 text-[11px]" data-i18n="btn_save_set">Enregistrer Set</button>
                <button onclick="clearCurrentSet()" class="text-[10px] uppercase font-bold text-zinc-600 hover:text-white transition" data-i18n="btn_clear">Vider</button>
            </div>
            <div class="text-left">
                <h3 class="text-[10px] uppercase tracking-widest text-zinc-500 mb-4 font-bold">Sauvegardes</h3>
                <div id="saved-sets-list" class="space-y-2 pb-40"></div>
            </div>
        </div>
    </section>

    <!-- ================================================================
         VISIONNEUSE
    ================================================================ -->
    <section id="sec-view" class="fixed inset-0 bg-black hidden z-[310] overflow-hidden">
        
        <!-- HEADER VISIONNEUSE -->
        <div id="viewer-header" class="glass absolute top-0 w-full p-2 md:p-3 flex justify-between items-center z-[500] transition-opacity duration-300">

            <!-- Groupe gauche : navigation app -->
            <div class="flex items-center gap-1 md:gap-2">
                <button onclick="goToHome()" class="btn-jazz !border-none !text-lime-400 !px-2 font-bold" data-i18n="btn_home">🏠 Accueil</button>
                <button onclick="switchTab('lib')" class="btn-jazz !border-none !text-zinc-500 !px-1 md:px-2" data-i18n="btn_close">✕</button>
                <button onclick="toggleSidebar()" class="btn-jazz !border-zinc-800 !px-2">☰</button>
            </div>
            
            <!-- Groupe centre : navigation entre fichiers + zoom -->
            <div class="flex items-center gap-1 md:gap-2">
                <button onclick="prevFile()" class="btn-jazz !border-zinc-700 !text-zinc-300 !px-2" data-i18n="btn_prev">◀ Préc.</button>
                <div class="flex items-center bg-zinc-900 rounded-lg px-1 border border-white/5">
                    <button onclick="adjustZoom(-0.15)" class="px-2 md:px-3 py-1 text-zinc-400 hover:text-white font-bold text-sm">-</button>
                    <span id="zoom-level" class="text-[11px] w-12 text-center font-bold text-lime-400">100%</span>
                    <button onclick="adjustZoom(0.15)" class="px-2 md:px-3 py-1 text-zinc-400 hover:text-white font-bold text-sm">+</button>
                </div>
                <button onclick="nextFile()" class="btn-jazz !border-zinc-700 !text-zinc-300 !px-2" data-i18n="btn_next">Suiv. ▶</button>
            </div>

            <!-- Groupe droite : outils -->
            <div class="flex items-center gap-1 md:gap-2">
                <button onclick="toggleFX()" id="fx-toggle-btn" class="btn-jazz !border-zinc-700 !text-zinc-400 !px-2" data-i18n="btn_settings">Filtres</button>
                <button onclick="toggleDrawingMode()" id="draw-toggle" class="btn-jazz !px-2" data-i18n="btn_draw">Dessin</button>
                <!-- Rotation antihoraire / horaire -->
                <div class="flex items-center bg-zinc-900 rounded-lg border border-white/5" title="Rotation (non conservée)">
                    <button onclick="event.stopPropagation(); rotatePage(-1)" class="px-2 py-1 text-zinc-400 hover:text-white font-bold text-sm" title="Rotation antihoraire">↺</button>
                    <span id="rotate-label" class="text-[10px] w-7 text-center font-bold text-zinc-500">↺↻</span>
                    <button onclick="event.stopPropagation(); rotatePage(+1)" class="px-2 py-1 text-zinc-400 hover:text-white font-bold text-sm" title="Rotation horaire">↻</button>
                </div>
                <!-- Bouton 2 pages côte à côte -->
                <button onclick="event.stopPropagation(); toggleDualPage()" id="dual-page-btn" class="btn-jazz !border-zinc-700 !text-zinc-400 !px-2" title="2 pages côte à côte">⧉</button>
                <div id="page-info" class="text-white/40 font-bold text-[10px] pr-1 italic hidden sm:block">0 / 0</div>
            </div>
        </div>

        <div id="view-layout">
            <aside id="viewer-sidebar">
                <div class="p-4 border-b border-white/5 font-black text-[9px] tracking-widest text-zinc-500 uppercase">Live Tracklist</div>
                <div id="sidebar-items" class="flex-grow overflow-y-auto"></div>
            </aside>

            <div id="scroll-container" onwheel="handleWheel(event)" onclick="toggleUI()">
                <div id="viewer-content"></div>
            </div>
        </div>

        <!-- ============================================================
             NAVIGATION BAS : Précédent / Suivant entre fichiers
             FIX : padding-left dynamique via CSS pour éviter le masquage
             par la sidebar (géré via la classe sur #view-layout)
        ============================================================ -->
        <div id="viewer-nav" class="absolute bottom-8 w-full flex justify-between px-8 pointer-events-none z-[400] transition-all duration-300 sm:flex">
            <button onclick="event.stopPropagation(); prevFile()" class="nav-rect" data-i18n="btn_prev">◀ Précédent</button>
            <button onclick="event.stopPropagation(); nextFile()" class="nav-rect" data-i18n="btn_next">Suivant ▶</button>
        </div>

        <!-- ============================================================
             NAVIGATION INTERNE PDF MULTI-PAGES
             Boutons distincts (violet) pour ne pas interférer avec la
             navigation entre fichiers (bleu). Affichés uniquement quand
             le PDF courant a plus d'une page.
        ============================================================ -->
        <div id="pdf-page-nav">
            <button id="pdf-prev-btn" class="pdf-nav-btn" onclick="event.stopPropagation(); scrollToPdfPage(-1)" title="Page PDF précédente">▲</button>
            <div id="pdf-page-counter">1 / 1</div>
            <button id="pdf-next-btn" class="pdf-nav-btn" onclick="event.stopPropagation(); scrollToPdfPage(+1)" title="Page PDF suivante">▼</button>
        </div>

        <!-- Outils dessin et filtres -->
        <div class="right-control-dock">
            <div id="anno-toolbar">
                <div onclick="setAnnoColor('#ccff00', this)" class="color-dot active style-lime" style="width:30px; height:30px; background:#ccff00; color:#ccff00;"></div>
                <div onclick="setAnnoColor('#00f0ff', this)" class="color-dot style-blue" style="width:30px; height:30px; background:#00f0ff; color:#00f0ff;"></div>
                <div onclick="setAnnoColor('#ff00ff', this)" class="color-dot style-pink" style="width:30px; height:30px; background:#ff00ff; color:#ff00ff;"></div>
                <div onclick="setAnnoColor('#ff6600', this)" class="color-dot style-orange" style="width:30px; height:30px; background:#ff6600; color:#ff6600;"></div>
                <div onclick="setAnnoColor('red', this)" class="color-dot style-red" style="width:30px; height:30px; background:red; color:red;"></div>
                
                <div class="toolbar-divider"></div>
                
                <div onclick="setAnnoSize(3, this)" class="size-btn" style="width:32px; height:32px;"><div class="size-preview" style="width:4px; height:4px;"></div></div>
                <div onclick="setAnnoSize(7, this)" class="size-btn active" style="width:32px; height:32px;"><div class="size-preview" style="width:8px; height:8px;"></div></div>
                <div onclick="setAnnoSize(15, this)" class="size-btn" style="width:32px; height:32px;"><div class="size-preview" style="width:14px; height:14px;"></div></div>
                
                <div class="toolbar-divider"></div>
                
                <div onclick="setAnnoColor('eraser', this)" class="btn-jazz !px-2 !py-1 text-center !text-[9px]" data-i18n="btn_del">Gomme</div>
                <button onclick="undoLast()" class="btn-jazz !px-2 !py-1 !text-[9px] !border-zinc-700 !text-zinc-400">Undo</button>
                <button onclick="clearCurrentPage()" class="btn-jazz !px-2 !py-1 !text-[9px] !border-pink-950 !text-pink-500">Effacer</button>
            </div>

            <div id="fx-toolbar">
                <div class="fx-indicator"><span data-i18n="fx_bright">Lum</span> <span id="val-bright" class="text-lime-400">100%</span></div>
                <input type="range" min="0.4" max="2" step="0.05" value="1" oninput="updateFX('bright', this.value)">
                
                <div class="toolbar-divider"></div>
                
                <div class="fx-indicator"><span data-i18n="fx_contrast">Cont</span> <span id="val-contrast" class="text-lime-400">100%</span></div>
                <input type="range" min="0.4" max="2.5" step="0.05" value="1" oninput="updateFX('contrast', this.value)">
            </div>
        </div>
    </section>

    <script>
        // ================================================================
        // INTERNATIONALISATION
        // ================================================================
        const i18n = {
            fr: {
                nav_lib: "Répertoire", nav_set: "Setlists", nav_view: "Visionneuse",
                btn_restore: "Rétablir Accès", btn_scan: "Scanner Dossier",
                btn_album: "📷 Album",
                set_title: "Programmation", btn_save_set: "Enregistrer Set", btn_clear: "Vider",
                btn_close: "✕ Fermer", btn_settings: "Filtres", btn_draw: "Dessin",
                fx_bright: "Lum", fx_contrast: "Cont", btn_del: "Gomme",
                btn_prev: "◀ Préc.", btn_next: "Suiv. ▶", btn_add: "Ajouter", btn_home: "🏠 Accueil",
                loading_pdf: "Lecture PDF...", decoding_pdf: "Décodage PDF...",
                loading_img: "Lecture image...",
                pdf_page: "Page PDF",
            },
            en: {
                nav_lib: "Library", nav_set: "Setlists", nav_view: "Viewer",
                btn_restore: "Restore Access", btn_scan: "Scan Folder",
                btn_album: "📷 Album",
                set_title: "Setlists", btn_save_set: "Save Setlist", btn_clear: "Clear",
                btn_close: "✕ Close", btn_settings: "Filters", btn_draw: "Draw",
                fx_bright: "Bright", fx_contrast: "Cont", btn_del: "Eraser",
                btn_prev: "◀ Prev.", btn_next: "Next ▶", btn_add: "Add", btn_home: "🏠 Home",
                loading_pdf: "Reading PDF...", decoding_pdf: "Decoding PDF...",
                loading_img: "Reading image...",
                pdf_page: "PDF Page",
            }
        };

        // ================================================================
        // ÉTAT GLOBAL
        // ================================================================
        let currentLang    = localStorage.getItem('part_lang') || 'fr';
        let files          = [], setFiles = [], currentIndex = 0, sources = [];
        let uiVisible      = true;
        let currentZoom    = 1.0;
        let isDrawingMode  = false, isFxMode = false;
        let annoColor      = '#ccff00', annoSize = 7;
        let annotations    = JSON.parse(localStorage.getItem('part_annos_v3') || '{}');
        let undoStack      = [];
        let currentRotation = 0;   // 0, 90, 180, 270 — reset à chaque partition
        let zoomMemory      = 1.0; // zoom conservé entre partitions d'un même set
        let isDualPage      = false;

        // ----------------------------------------------------------------
        // Navigation PDF multi-pages
        // currentPdfPageIndex : index 0-based de la page PDF visible
        // currentPdfTotalPages : nombre total de pages du PDF ouvert
        // pdfPageOffsets[] : tableau des offsetTop de chaque page-wrapper PDF
        //   → mis à jour après le rendu complet, utilisé par scrollToPdfPage()
        // ----------------------------------------------------------------
        let currentPdfPageIndex  = 0;
        let currentPdfTotalPages = 0;
        let pdfPageOffsets       = []; // offsetTop de chaque page-wrapper dans scroll-container

        let tpCache = [], startDist = 0, startZoom = 1.0;

        pdfjsLib.GlobalWorkerOptions.workerSrc =
            '[cdnjs.cloudflare.com](https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js)';

        // ================================================================
        // LANGUE
        // ================================================================
        function setLang(lang) {
            currentLang = lang;
            localStorage.setItem('part_lang', lang);
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (i18n[lang][key]) el.innerText = i18n[lang][key];
            });
            document.querySelectorAll('.lang-switch').forEach(el => el.classList.remove('active'));
            document.getElementById('lang-' + lang).classList.add('active');
            renderLibrary();
            renderSavedSets();
        }

        // ================================================================
        // INDEXEDDB
        // ================================================================
        const DB_NAME = "PartochesDB_Ultimate";
        async function openDB() { 
            return new Promise((r) => { 
                const req = indexedDB.open(DB_NAME, 1); 
                req.onupgradeneeded = (e) => e.target.result.createObjectStore("sources"); 
                req.onsuccess = () => r(req.result); 
            }); 
        }

        // ================================================================
        // INITIALISATION
        // ================================================================
        async function init() {
            setLang(currentLang);

            // Adapter le bouton selon le support de l'API
            const btnScan = document.getElementById('btn-scan');
            if (typeof window.showDirectoryPicker === 'undefined') {
                btnScan.setAttribute('data-i18n-ios', '1');
                const iosLabel = { fr: '+ Ajouter Fichiers', en: '+ Add Files' };
                btnScan.innerText = iosLabel[currentLang];
                btnScan.title = currentLang === 'fr'
                    ? 'Sur iOS, sélectionnez des fichiers individuels (PDF, images)'
                    : 'On iOS, select individual files (PDF, images)';
            }

            // Afficher le bouton Album uniquement sur iOS/iPadOS
            if (isIOSPlatform()) {
                document.getElementById('btn-album').classList.remove('hidden');
            }

            const db  = await openDB();
            const req = db.transaction("sources", "readonly").objectStore("sources").getAll();
            req.onsuccess = async () => { 
                sources = req.result; 
                if (sources.length > 0) {
                    try {
                        let needsReauth = false;
                        for (const h of sources) { 
                            if (!h._virtual) {
                                const perm = await h.queryPermission({ mode: 'read' });
                                if (perm !== 'granted') needsReauth = true;
                            }
                        }
                        if (needsReauth) document.getElementById('btn-restore').classList.remove('hidden');
                        await refreshFiles();
                    } catch(e) { console.error("Restauration échouée:", e); }
                }
            };

            renderSavedSets();
            generateAlphaBar();
            setupPinchZoom();
            setupPdfPageScrollSpy();
            
            new Sortable(document.getElementById('sidebar-items'), {
                animation: 180,
                onEnd: function (evt) {
                    const movedItem = setFiles.splice(evt.oldIndex, 1)[0];
                    setFiles.splice(evt.newIndex, 0, movedItem);
                    if      (currentIndex === evt.oldIndex)                                        currentIndex = evt.newIndex;
                    else if (currentIndex > evt.oldIndex && currentIndex <= evt.newIndex)          currentIndex--;
                    else if (currentIndex < evt.oldIndex && currentIndex >= evt.newIndex)          currentIndex++;
                    document.getElementById('page-info').innerText = (currentIndex + 1) + " / " + setFiles.length;
                    renderSidebar();
                }
            });
            
            window.addEventListener("orientationchange", () => setTimeout(() => {
                applyPageScales();
                rebuildPdfPageOffsets();
            }, 350));
            window.addEventListener("resize", () => setTimeout(() => {
                applyPageScales();
                rebuildPdfPageOffsets();
            }, 100));
        }

        // ================================================================
        // DÉTECTION PLATEFORME
        // ================================================================
        function isMobilePlatform() {
            return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)
                || (navigator.maxTouchPoints > 1 && /MacIntel/.test(navigator.platform));
        }

        function isIOSPlatform() {
            return /iPhone|iPad|iPod/i.test(navigator.userAgent)
                || (navigator.maxTouchPoints > 1 && /MacIntel/.test(navigator.platform));
        }

        // ================================================================
        // AJOUT DE SOURCE — File System Access API (desktop/Android)
        // ================================================================
        async function addSource() {
            if (typeof window.showDirectoryPicker === 'undefined') {
                addSourceFallbackIOS();
                return;
            }
            try {
                const h = await window.showDirectoryPicker({ mode: 'read' });
                if (sources.find(s => s.name === h.name)) {
                    alert(currentLang === 'fr' ? "Ce dossier est déjà ajouté." : "This folder is already added.");
                    return;
                }
                const db = await openDB();
                db.transaction("sources", "readwrite").objectStore("sources").put(h, h.name);
                sources.push(h);
                await refreshFiles();
            } catch(e) {
                if (e.name === 'AbortError') return;
                if (confirm(
                    currentLang === 'fr'
                        ? "Impossible d'accéder aux dossiers dans ce navigateur.\nVoulez-vous sélectionner vos fichiers manuellement ?"
                        : "Cannot access folders in this browser.\nDo you want to select your files manually?"
                )) addSourceFallbackIOS();
            }
        }

        // ================================================================
        // FALLBACK iOS — sélection de fichiers individuels
        // ================================================================
        function addSourceFallbackIOS() {
            const input = document.createElement('input');
            input.type     = 'file';
            input.multiple = true;
            input.accept   = '.pdf,.png,.jpg,.jpeg,.webp,image/*,application/pdf';
            input.style.display = 'none';
            document.body.appendChild(input);
            input.onchange = () => _processInputFiles(input.files, input);
            input.click();
        }

        // ================================================================
        // AJOUT D'UN ALBUM ENTIER — iOS uniquement
        // Utilise l'attribut accept="image/*" sans `multiple` pour déclencher
        // le sélecteur d'album natif iOS qui permet de choisir tous les
        // éléments d'un album d'un coup (comportement natif iOS 14+).
        // ================================================================
        function addAlbumIOS() {
            const input = document.createElement('input');
            input.type     = 'file';
            input.multiple = true;   // Permet la sélection multiple dans l'album
            input.accept   = 'image/*';
            // Sur iOS, ne PAS ajouter capture="environment" pour ouvrir la
            // photothèque plutôt que l'appareil photo
            input.style.display = 'none';
            document.body.appendChild(input);

            // Note : iOS 14+ propose "Sélectionner les photos" → on peut choisir
            // un album entier. La sélection multiple native est activée par `multiple`.
            input.onchange = () => _processInputFiles(input.files, input);
            input.click();
        }

        // Traitement commun des fichiers sélectionnés (fallback iOS + album)
        async function _processInputFiles(fileList, inputEl) {
            if (!fileList || fileList.length === 0) { if (inputEl) inputEl.remove(); return; }

            const newFiles = [];
            for (const file of fileList) {
                if (file.name.match(/\.(pdf|png|jpg|jpeg|webp)$/i)
                    || file.type.startsWith('image/')
                    || file.type === 'application/pdf') {
                    newFiles.push({
                        entry: {
                            name:    file.name,
                            _blob:   file,
                            getFile: () => Promise.resolve(file)
                        }
                    });
                }
            }

            const virtualSourceName = currentLang === 'fr' ? 'Fichiers sélectionnés' : 'Selected Files';
            if (!sources.find(s => s.name === virtualSourceName)) {
                sources.push({ name: virtualSourceName, _virtual: true, _files: [] });
            }
            const vsrc = sources.find(s => s.name === virtualSourceName);
            vsrc._files = (vsrc._files || []).concat(newFiles);
            files.push(...newFiles);

            renderLibrary();
            renderSourcesUI();
            if (inputEl) inputEl.remove();

            if (newFiles.length > 0) {
                showFeedbackBanner(
                    currentLang === 'fr'
                        ? `${newFiles.length} fichier(s) ajouté(s) ✔`
                        : `${newFiles.length} file(s) added ✔`
                );
            }
        }

        // ================================================================
        // SUPPRESSION DE SOURCE
        // ================================================================
        async function removeSource(name) {
            if (!confirm(currentLang === 'fr' ? "Supprimer l'accès à ce dossier ?" : "Remove access to this folder?")) return;
            const src = sources.find(s => s.name === name);
            if (src && !src._virtual) {
                const db = await openDB();
                db.transaction("sources", "readwrite").objectStore("sources").delete(name);
            }
            sources = sources.filter(s => s.name !== name);
            await refreshFiles();
        }

        async function refreshFiles() {
            files = [];
            mobilePrecacheEnabled = shouldPrecacheOnMobile();
            if (mobilePrecacheEnabled) console.log('[Partoches] Mode pré-cache mobile activé');
            for (const h of sources) {
                try {
                    if (h._virtual) {
                        if (h._files) files.push(...h._files);
                    } else {
                        files.push(...(await scanFolder(h)));
                    }
                } catch(e) { console.warn("Dossier inaccessible", h.name, e); }
            }
            renderLibrary();
            renderSourcesUI();
        }

        async function scanFolder(handle) { return scanFolderWithCache(handle, null); }

        function renderSourcesUI() {
            const container = document.getElementById('source-list');
            container.innerHTML = '';
            sources.forEach(s => {
                const tag = document.createElement('div');
                tag.className = 'source-tag';
                tag.innerHTML = `${s.name} <span class="source-delete" onclick="removeSource('${s.name}')">✕</span>`;
                container.appendChild(tag);
            });
        }

        async function restoreAccess() {
            try {
                for (const h of sources) { 
                    if (!h._virtual) await h.requestPermission({ mode: 'read' }); 
                }
                document.getElementById('btn-restore').classList.add('hidden');
                refreshFiles();
            } catch(e) { 
                alert(currentLang === 'fr' ? "Permission refusée." : "Permission denied."); 
            }
        }

        // ================================================================
        // BIBLIOTHÈQUE — RENDU
        // ================================================================
        function renderLibrary(filter = '') {
            const l = document.getElementById('library-list');
            l.innerHTML = '';
            files
                .filter(x => !filter || x.entry.name.toUpperCase().startsWith(filter))
                .sort((a, b) => a.entry.name.localeCompare(b.entry.name))
                .forEach(file => {
                    const row = document.createElement('div');
                    row.className = "file-row flex justify-between items-center p-3 px-4";
                    row.innerHTML = `
                        <div class="flex-grow font-medium text-zinc-300 text-[12px] truncate pr-4"
                             onclick="viewSingle('${file.entry.name.replace(/'/g, "\\'")}')">
                            ${file.entry.name}
                        </div>
                        <button onclick="handleSelectLibraryItem(this, '${file.entry.name.replace(/'/g, "\\'")}');"
                                class="btn-jazz !py-1 transition-all duration-200">
                            ${i18n[currentLang].btn_add}
                        </button>`;
                    l.appendChild(row);
                });
        }

        function handleSelectLibraryItem(buttonEl, filename) {
            addToSet(filename);
            buttonEl.classList.add('btn-add-success');
            const originalText = buttonEl.innerText;
            buttonEl.innerText = currentLang === 'fr' ? "Ajouté ✔" : "Added ✔";
            setTimeout(() => {
                buttonEl.classList.remove('btn-add-success');
                buttonEl.innerText = originalText;
            }, 800);
        }

        function generateAlphaBar() {
            const bar = document.getElementById('alpha-bar');
            "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split('').forEach(l => {
                const b = document.createElement('button');
                b.innerText = l;
                b.onclick = () => renderLibrary(l);
                bar.appendChild(b);
            });
        }

        // ================================================================
        // SETLIST
        // ================================================================
        function addToSet(name) {
            const div = document.createElement('div');
            div.className = "flex justify-between items-center bg-[#141419] p-3 mb-2 rounded border border-white/5 cursor-move";
            div.dataset.name = name;
            div.innerHTML = `<span class="text-[11px] text-zinc-300 font-bold truncate pr-3">${name}</span>
                             <button onclick="this.parentElement.remove()" class="text-pink-500 font-bold px-2">✕</button>`;
            document.getElementById('set-list-current').appendChild(div);
            new Sortable(document.getElementById('set-list-current'), { animation: 150 });
        }

        function saveCurrentSet() {
            const name = prompt(currentLang === 'fr' ? "Nom de la Setlist :" : "Setlist Name :");
            if (!name) return;
            const items = Array.from(document.getElementById('set-list-current').children).map(c => c.dataset.name);
            localStorage.setItem('part_set_' + name, JSON.stringify(items));
            renderSavedSets();
        }

        function clearCurrentSet() {
            if (confirm("Vider la liste actuelle ?"))
                document.getElementById('set-list-current').innerHTML = '';
        }

        function renderSavedSets() {
            const list = document.getElementById('saved-sets-list');
            list.innerHTML = '';
            Object.keys(localStorage)
                .filter(k => k.startsWith('part_set_'))
                .forEach(key => {
                    const name = key.replace('part_set_', '');
                    const div  = document.createElement('div');
                    div.className = "flex justify-between items-center bg-zinc-900/30 border border-white/5 p-3 rounded";
                    div.innerHTML = `
                        <div class="font-bold text-lime-400 cursor-pointer text-[11px] truncate pr-4"
                             onclick="loadSet('${key}')">${name}</div>
                        <button onclick="deleteSet('${key}')"
                                class="text-zinc-600 hover:text-white transition uppercase text-[9px] font-bold">Supprimer</button>`;
                    list.appendChild(div);
                });
        }

        function deleteSet(key) {
            if (confirm("Supprimer ce set ?")) { localStorage.removeItem(key); renderSavedSets(); }
        }

        function loadSet(key) {
            const names = JSON.parse(localStorage.getItem(key));
            setFiles = [];
            document.getElementById('set-list-current').innerHTML = '';
            names.forEach(n => {
                const f = files.find(file => file.entry.name === n);
                if (f) { setFiles.push(f); addToSet(n); }
            });
            if (setFiles.length > 0) { currentIndex = 0; openFile(setFiles[0]); }
        }

        // ================================================================
        // CACHE CONTENU FICHIER (mobile robustesse)
        // ================================================================
        const fileContentCache      = new Map();
        const fileHandleParentCache = new Map();
        let mobilePrecacheEnabled   = false;

        function shouldPrecacheOnMobile() {
            return isMobilePlatform() && typeof window.showDirectoryPicker !== 'undefined';
        }

        async function precacheFileContent(entry) {
            if (!mobilePrecacheEnabled) return;
            if (fileContentCache.has(entry.name)) return;
            try {
                const file  = await entry.getFile();
                const isPdf = entry.name.toLowerCase().endsWith('.pdf');
                if (isPdf) {
                    const buf = await file.arrayBuffer();
                    fileContentCache.set(entry.name, { arrayBuffer: buf, type: 'pdf' });
                } else {
                    const dataUrl = await new Promise((res, rej) => {
                        const fr = new FileReader();
                        fr.onload  = e => res(e.target.result);
                        fr.onerror = e => rej(e.target.error);
                        fr.readAsDataURL(file);
                    });
                    fileContentCache.set(entry.name, { dataUrl, type: 'image' });
                }
            } catch (e) {
                console.warn('[Partoches] Pré-cache échoué pour', entry.name, e.name);
            }
        }

        async function scanFolderWithCache(handle, parentHandle) {
            const results = [];
            for await (const entry of handle.values()) {
                if (entry.kind === 'file' && entry.name.match(/\.(pdf|png|jpg|jpeg|webp)$/i)) {
                    results.push({ entry });
                    fileHandleParentCache.set(entry.name, { dirHandle: handle, sourceHandle: parentHandle || handle });
                    if (mobilePrecacheEnabled) await precacheFileContent(entry);
                } else if (entry.kind === 'directory') {
                    results.push(...(await scanFolderWithCache(entry, parentHandle || handle)));
                }
            }
            return results;
        }

        async function refreshFileHandle(fileName) {
            const cached = fileHandleParentCache.get(fileName);
            if (!cached) return null;
            try {
                for await (const entry of cached.dirHandle.values()) {
                    if (entry.kind === 'file' && entry.name === fileName) return entry;
                }
            } catch (e) { console.warn('[Partoches] Re-scan échoué:', e); }
            return null;
        }

        async function getFileRobust(fileEntry) {
            if (fileEntry._blob) return fileEntry._blob;

            if (mobilePrecacheEnabled && fileContentCache.has(fileEntry.name)) {
                const cached = fileContentCache.get(fileEntry.name);
                if (cached.type === 'pdf' && cached.arrayBuffer) {
                    const blob = new Blob([cached.arrayBuffer], { type: 'application/pdf' });
                    return new File([blob], fileEntry.name, { type: 'application/pdf' });
                }
                if (cached.type === 'image' && cached.dataUrl) {
                    const res  = await fetch(cached.dataUrl);
                    const blob = await res.blob();
                    return new File([blob], fileEntry.name, { type: blob.type });
                }
            }

            try {
                const file = await fileEntry.getFile();
                if (file && file.size >= 0) return file;
            } catch (err1) {
                console.warn('[Partoches] getFile() tentative 1 échouée:', err1.name);

                if (['NotFoundError','SecurityError','NotAllowedError'].includes(err1.name)) {
                    for (const src of sources) {
                        if (src._virtual) continue;
                        try {
                            const perm = await src.queryPermission({ mode: 'read' });
                            if (perm !== 'granted') await src.requestPermission({ mode: 'read' });
                        } catch (permErr) { console.warn('[Partoches] requestPermission échoué:', permErr); }
                    }
                    await new Promise(r => setTimeout(r, 150));
                    try {
                        const file = await fileEntry.getFile();
                        if (file && file.size >= 0) {
                            if (mobilePrecacheEnabled) precacheFileContent(fileEntry);
                            return file;
                        }
                    } catch (err2) {
                        const freshHandle = await refreshFileHandle(fileEntry.name);
                        if (freshHandle) {
                            try {
                                const file = await freshHandle.getFile();
                                if (file && file.size >= 0) {
                                    const idx = setFiles.findIndex(f => f.entry.name === fileEntry.name);
                                    if (idx >= 0) setFiles[idx].entry = freshHandle;
                                    if (mobilePrecacheEnabled) await precacheFileContent(freshHandle);
                                    return file;
                                }
                            } catch (err3) {
                                throw new Error(`NotFoundError: impossible d'accéder à "${fileEntry.name}" — ${err3.message}`);
                            }
                        }
                        throw new Error(`NotFoundError: "${fileEntry.name}" inaccessible — ${err2.message}`);
                    }
                } else {
                    throw err1;
                }
            }
        }

        async function readFileAsArrayBuffer(fileEntry) {
            if (mobilePrecacheEnabled && fileContentCache.has(fileEntry.name)) {
                const cached = fileContentCache.get(fileEntry.name);
                if (cached.type === 'pdf' && cached.arrayBuffer) return cached.arrayBuffer.slice(0);
            }
            const file = await getFileRobust(fileEntry);
            if (typeof file.arrayBuffer === 'function') {
                try { return await file.arrayBuffer(); } catch (e) {}
            }
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload  = (e) => resolve(e.target.result);
                reader.onerror = (e) => reject(new Error(`FileReader [${e.target.error?.name}]: ${e.target.error?.message}`));
                reader.onabort = ()  => reject(new Error('FileReader: lecture annulée'));
                reader.readAsArrayBuffer(file);
            });
        }

        async function readFileAsDataURL(fileEntry) {
            if (mobilePrecacheEnabled && fileContentCache.has(fileEntry.name)) {
                const cached = fileContentCache.get(fileEntry.name);
                if (cached.type === 'image' && cached.dataUrl) return cached.dataUrl;
            }
            const file = await getFileRobust(fileEntry);
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload  = (e) => resolve(e.target.result);
                reader.onerror = (e) => reject(new Error(`FileReader [${e.target.error?.name}]: ${e.target.error?.message}`));
                reader.onabort = ()  => reject(new Error('FileReader: lecture annulée'));
                reader.readAsDataURL(file);
            });
        }

        function showFileError(container, err, fileName) {
            console.error('[Partoches] Erreur lecture fichier:', fileName, err);
            const isNotFound   = err.message && err.message.includes('NotFound');
            const isPermission = err.message && /NotAllowedError|SecurityError|permission/.test(err.message);
            const isMem        = err.message && /out of memory|QuotaExceeded/.test(err.message);

            let title, detail, action = '';
            if (isNotFound) {
                title  = currentLang === 'fr' ? 'Fichier introuvable' : 'File not found';
                detail = currentLang === 'fr'
                    ? `Le handle de "<b>${fileName}</b>" est devenu invalide (veille mobile). Retournez au Répertoire.`
                    : `The handle for "<b>${fileName}</b>" became invalid (mobile sleep). Go back to Library.`;
                action = `<button onclick="switchTab('lib')" class="btn-jazz" style="margin-top:10px;">
                            ${currentLang === 'fr' ? '→ Répertoire' : '→ Library'}</button>`;
            } else if (isPermission) {
                title  = currentLang === 'fr' ? 'Permission expirée' : 'Permission expired';
                detail = currentLang === 'fr'
                    ? 'L\'accès au dossier a expiré. Appuyez sur "Rétablir Accès".'
                    : 'Folder access expired. Press "Restore Access".';
                action = `<button onclick="switchTab('lib'); document.getElementById('btn-restore').classList.remove('hidden')"
                                  class="btn-jazz" style="margin-top:10px;">
                            ${currentLang === 'fr' ? '→ Rétablir Accès' : '→ Restore Access'}</button>`;
            } else if (isMem) {
                title  = currentLang === 'fr' ? 'Mémoire insuffisante' : 'Out of memory';
                detail = currentLang === 'fr'
                    ? 'Fichier trop volumineux. Fermez d\'autres onglets et réessayez.'
                    : 'File too large. Close other tabs and try again.';
            } else {
                title  = currentLang === 'fr' ? 'Erreur lecture' : 'Read error';
                detail = `<small style="color:#888;font-family:monospace;font-size:10px;">${err.message || err}</small>`;
            }
            container.innerHTML = `
                <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;
                            min-height:50vh;gap:16px;padding:30px;text-align:center;">
                    <div style="font-size:38px;">⚠️</div>
                    <div style="color:var(--neon-orange);font-weight:900;font-size:14px;letter-spacing:1px;text-transform:uppercase;">${title}</div>
                    <div style="color:#c0c0cc;font-size:12px;max-width:320px;line-height:1.7;">${detail}</div>

        }

        // ================================================================
        // ZOOM INITIAL — PLEIN ÉCRAN PAR DÉFAUT (PC + tablette)
        // Calcule le zoom pour que la partition occupe la fenêtre en hauteur
        // ou en largeur selon l'orientation, avec une marge de 5%.
        // Sur mobile portrait : on utilise la même logique (1.0 reste le
        // minimum pour ne pas réduire une partition déjà petite).
        // ================================================================
        function computeInitialZoom() {
            // Dimensions disponibles dans le viewer (sans le header ~60px)
            const availH = window.innerHeight - 70;
            const availW = window.innerWidth;

            // Largeur naturelle d'une page PDF standard : 612pt × pdfScale
            // On récupère la première page-wrapper si elle existe déjà
            const firstWrapper = document.querySelector('.page-wrapper');
            if (!firstWrapper) return 1.0;

            const naturalW = firstWrapper.offsetWidth;
            const naturalH = firstWrapper.offsetHeight;

            if (naturalW <= 0 || naturalH <= 0) return 1.0;

            // Zoom qui ferait tenir la page en hauteur
            const zoomForHeight = (availH * 0.95) / naturalH;
            // Zoom qui ferait tenir la page en largeur
            const zoomForWidth  = (availW * 0.95) / naturalW;

            // On prend le plus petit des deux pour que tout soit visible
            const computed = Math.min(zoomForHeight, zoomForWidth);

            // Bornes : entre 0.4 et 3.5, arrondi à 2 décimales
            return Math.max(0.4, Math.min(3.5, Math.round(computed * 100) / 100));
        }

        // ================================================================
        // OUVERTURE ET RENDU D'UN FICHIER
        // ================================================================
        async function openFile(obj) {
            if (!obj) return;
            switchTab('view');

            const container = document.getElementById('viewer-content');
            const zoomToApply = (setFiles.length > 1) ? zoomMemory : null; // null = auto

            // Réinitialiser rotation
            currentRotation = 0;
            const rotLabel = document.getElementById('rotate-label');
            if (rotLabel) rotLabel.innerText = '↺↻';

            // Réinitialiser navigation PDF
            currentPdfPageIndex  = 0;
            currentPdfTotalPages = 0;
            pdfPageOffsets       = [];
            hidePdfPageNav();

            showLoadingSpinner(container);

            const isMobile = isMobilePlatform();
            const fileName = obj.entry.name;
            const fileExt  = fileName.toLowerCase();

            try {
                if (fileExt.endsWith('.pdf')) {
                    // -------------------------------------------------------
                    // RENDU PDF
                    // -------------------------------------------------------
                    showLoadingSpinner(container, i18n[currentLang].loading_pdf);
                    const pdfRaw = await readFileAsArrayBuffer(obj.entry);

                    showLoadingSpinner(container, i18n[currentLang].decoding_pdf);
                    const pdfBuffer = pdfRaw.slice(0);
                    const pdf = await pdfjsLib.getDocument({ data: pdfBuffer }).promise;
                    container.innerHTML = '';

                    currentPdfTotalPages = pdf.numPages;

                    const dpr      = Math.min(window.devicePixelRatio || 1, isMobile ? 1.5 : 3);
                    const pdfScale = isMobile
                        ? Math.min(1.5, (window.innerWidth / 612) * 0.95)
                        : (window.innerWidth < 1024 ? 1.9 : 2.2);

                    for (let i = 1; i <= pdf.numPages; i++) {
                        const page     = await pdf.getPage(i);
                        const viewport = page.getViewport({ scale: pdfScale });

                        const wrapper  = document.createElement('div');
                        wrapper.className = "page-wrapper";
                        wrapper.dataset.pdfPage = i; // index 1-based pour scrollToPdfPage

                        const canvas = document.createElement('canvas');
                        canvas.width  = viewport.width;
                        canvas.height = viewport.height;

                        const anno = document.createElement('canvas');
                        anno.className = "anno-canvas";
                        anno.width  = canvas.width;
                        anno.height = canvas.height;

                        wrapper.appendChild(canvas);
                        wrapper.appendChild(anno);
                        container.appendChild(wrapper);

                        await page.render({
                            canvasContext: canvas.getContext('2d'),
                            viewport
                        }).promise;

                        setupDrawing(anno, fileName, i);
                    }

                    // Afficher la nav PDF si plusieurs pages
                    if (pdf.numPages > 1) showPdfPageNav(1, pdf.numPages);

                } else {
                    // -------------------------------------------------------
                    // RENDU IMAGE
                    // -------------------------------------------------------
                    showLoadingSpinner(container, i18n[currentLang].loading_img);
                    const dataUrl = await readFileAsDataURL(obj.entry);
                    container.innerHTML = '';

                    const wrapper = document.createElement('div');
                    wrapper.className = "page-wrapper";

                    const img  = document.createElement('img');
                    img.alt          = fileName;
                    img.draggable    = false;
                    img.oncontextmenu = (e) => e.preventDefault();

                    const anno = document.createElement('canvas');
                    anno.className = "anno-canvas";

                    wrapper.appendChild(img);
                    wrapper.appendChild(anno);
                    container.appendChild(wrapper);

                    img.onload = () => {
                        anno.width  = img.naturalWidth  || img.offsetWidth  || 800;
                        anno.height = img.naturalHeight || img.offsetHeight || 600;
                        setupDrawing(anno, fileName, 0);
                        // Zoom initial plein écran après chargement image
                        currentZoom = (zoomToApply !== null) ? zoomToApply : computeInitialZoom();
                        applyPageScales();
                        document.getElementById('zoom-level').innerText = Math.round(currentZoom * 100) + "%";
                    };

                    img.onerror = () => showFileError(container, new Error('Image decode failed'), fileName);
                    img.src = dataUrl;
                }

            } catch (err) {
                showFileError(container, err, fileName);
                return;
            }

            // Appliquer le zoom : mémorisé si navigation dans un set, sinon auto plein écran
            // On attend un tick pour que les wrappers soient mesurables dans le DOM
            await new Promise(r => requestAnimationFrame(r));
            if (zoomToApply !== null) {
                currentZoom = zoomToApply;
            } else {
                currentZoom = computeInitialZoom();
            }
            applyPageScales();
            applyDualPageLayout();
            rebuildPdfPageOffsets();

            document.getElementById('scroll-container').scrollTop  = 0;
            document.getElementById('scroll-container').scrollLeft = 0;
            document.getElementById('page-info').innerText = (currentIndex + 1) + " / " + setFiles.length;
            renderSidebar();
            updateSidebarCollapseState();
        }

        // ================================================================
        // NAVIGATION PDF MULTI-PAGES
        // ================================================================

        // Met à jour les offsets de chaque page-wrapper après rendu ou zoom
        function rebuildPdfPageOffsets() {
            pdfPageOffsets = [];
            const sc = document.getElementById('scroll-container');
            const scRect = sc.getBoundingClientRect();
            document.querySelectorAll('.page-wrapper[data-pdf-page]').forEach(w => {
                const rect = w.getBoundingClientRect();
                // Offset par rapport au haut du scroll-container
                pdfPageOffsets.push(rect.top - scRect.top + sc.scrollTop);
            });
        }

        // Faire défiler jusqu'à la page PDF suivante (+1) ou précédente (-1)
        function scrollToPdfPage(delta) {
            if (currentPdfTotalPages === 0) return;
            const newIndex = Math.max(0, Math.min(currentPdfTotalPages - 1, currentPdfPageIndex + delta));
            if (newIndex === currentPdfPageIndex) return;

            currentPdfPageIndex = newIndex;

            // Recalculer les offsets si nécessaire (zoom récent)
            rebuildPdfPageOffsets();

            const sc = document.getElementById('scroll-container');
            const targetOffset = pdfPageOffsets[currentPdfPageIndex];
            if (targetOffset !== undefined) {
                // Décaler de 10px pour que la page soit bien visible sous le header
                sc.scrollTo({ top: Math.max(0, targetOffset - 80), behavior: 'smooth' });
            }
            updatePdfPageCounter(currentPdfPageIndex + 1, currentPdfTotalPages);
        }

        // Espion de défilement : met à jour currentPdfPageIndex et le compteur
        // en temps réel pendant que l'utilisateur scrolle manuellement
        function setupPdfPageScrollSpy() {
            const sc = document.getElementById('scroll-container');
            let ticking = false;

            sc.addEventListener('scroll', () => {
                if (!ticking && currentPdfTotalPages > 1) {
                    requestAnimationFrame(() => {
                        ticking = false;
                        const scrollTop = sc.scrollTop + 100; // offset header
                        // Trouver la page la plus proche du haut visible
                        let bestIdx = 0;
                        for (let i = 0; i < pdfPageOffsets.length; i++) {
                            if (pdfPageOffsets[i] <= scrollTop) bestIdx = i;
                        }
                        if (bestIdx !== currentPdfPageIndex) {
                            currentPdfPageIndex = bestIdx;
                            updatePdfPageCounter(currentPdfPageIndex + 1, currentPdfTotalPages);
                        }
                    });
                    ticking = true;
                }
            }, { passive: true });
        }

        function showPdfPageNav(currentPage, totalPages) {
            const nav = document.getElementById('pdf-page-nav');
            nav.classList.add('visible');
            updatePdfPageCounter(currentPage, totalPages);

        function hidePdfPageNav() {
            const nav = document.getElementById('pdf-page-nav');
            nav.classList.remove('visible');
        }

        function updatePdfPageCounter(current, total) {
            document.getElementById('pdf-page-counter').innerText = current + " / " + total;
            document.getElementById('pdf-prev-btn').disabled = (current <= 1);
            document.getElementById('pdf-next-btn').disabled = (current >= total);

        // ================================================================
        // CLAVIER
        // ================================================================
        window.addEventListener('keydown', (e) => {
            if (document.activeElement.tagName === 'INPUT') return;
            const sc = document.getElementById('scroll-container');
            if (e.code  === "Space")      { e.preventDefault(); nextFile(); }
            if (e.key   === "ArrowRight") nextFile();
            if (e.key   === "ArrowLeft")  prevFile();
            if (e.key   === "ArrowDown")  {
                e.preventDefault();
                // Si PDF multi-pages : page suivante, sinon scroll
                if (currentPdfTotalPages > 1) scrollToPdfPage(+1);
                else sc.scrollBy(0, 180);
            }
            if (e.key   === "ArrowUp")    {
                e.preventDefault();
                if (currentPdfTotalPages > 1) scrollToPdfPage(-1);
                else sc.scrollBy(0, -180);
            }
        });

        // ================================================================
        // DESSIN (annotations)
        // ================================================================
        function setupDrawing(canvas, fileName, pIdx) {
            const ctx = canvas.getContext('2d');
            const key = fileName + "_" + pIdx;
            
            if (annotations[key]) {
                const img = new Image();
                img.src = annotations[key];
                img.onload = () => ctx.drawImage(img, 0, 0);
            }

            let isPainting = false;
            
            const getCanvasCoordinate = (e) => {
                const rect = canvas.getBoundingClientRect();
                let clientX, clientY;
                if (e.touches && e.touches.length > 0) {
                    clientX = e.touches[0].clientX;
                    clientY = e.touches[0].clientY;
                } else {
                    clientX = e.clientX;
                    clientY = e.clientY;
                }
                return {
                    x: (clientX - rect.left) * (canvas.width  / rect.width),
                    y: (clientY - rect.top)  * (canvas.height / rect.height)
                };
            };
            
            const start = (e) => {
                if (!isDrawingMode) return; 
                isPainting = true;
                if (e.cancelable) e.preventDefault(); 
                undoStack.push({ key, data: canvas.toDataURL() });
                if (undoStack.length > 40) undoStack.shift();
                const pos = getCanvasCoordinate(e); 
                ctx.beginPath(); 
                ctx.moveTo(pos.x, pos.y);
            };
            
            const draw = (e) => {
                if (!isPainting || !isDrawingMode) return;
                if (e.cancelable) e.preventDefault();
                const pos = getCanvasCoordinate(e); 
                ctx.lineCap = 'round'; 
                ctx.lineJoin = 'round';
                if (annoColor === 'eraser') { 
                    ctx.globalCompositeOperation = 'destination-out'; 
                    ctx.lineWidth = annoSize * 4; 
                } else { 
                    ctx.globalCompositeOperation = 'source-over'; 
                    ctx.strokeStyle = annoColor; 
                    ctx.lineWidth   = annoSize; 
                }
                ctx.lineTo(pos.x, pos.y); 
                ctx.stroke(); 
            };
            
            const stop = () => { 
                if (!isPainting) return; 
                isPainting = false; 
                annotations[key] = canvas.toDataURL();
                localStorage.setItem('part_annos_v3', JSON.stringify(annotations));
            };
            
            canvas.addEventListener('mousedown', start); 
            canvas.addEventListener('mousemove', draw);
            window.addEventListener('mouseup',   stop);
            canvas.addEventListener('touchstart', start, { passive: false }); 
            canvas.addEventListener('touchmove',  draw,  { passive: false });
            canvas.addEventListener('touchend',   stop);
        }

        function undoLast() {
            if (undoStack.length === 0) return;
            const last = undoStack.pop();
            document.querySelectorAll('.anno-canvas').forEach(c => {
                const ctx = c.getContext('2d');
                const img = new Image();
                img.src    = last.data;
                img.onload = () => { ctx.clearRect(0, 0, c.width, c.height); ctx.drawImage(img, 0, 0); };
            });
        }

        function clearCurrentPage() { 
            if (confirm("Effacer définitivement vos annotations sur ce document ?")) { 
                document.querySelectorAll('.anno-canvas').forEach(c => 
                    c.getContext('2d').clearRect(0, 0, c.width, c.height)
                ); 
                if (setFiles[currentIndex]) {
                    for (let key in annotations) {
                        if (key.startsWith(setFiles[currentIndex].entry.name)) delete annotations[key];
                    }
                    localStorage.setItem('part_annos_v3', JSON.stringify(annotations));
                }
            } 
        }

        // ================================================================
        // PINCH ZOOM
        // ================================================================
        function setupPinchZoom() {
            const el = document.getElementById('scroll-container');
            let isPinching = false;
            
            el.addEventListener('touchstart', (e) => {
                if (e.touches.length === 2) {
                    isPinching = true;
                    tpCache    = [e.touches[0], e.touches[1]];
                    startDist  = Math.hypot(
                        tpCache[0].clientX - tpCache[1].clientX,
                        tpCache[0].clientY - tpCache[1].clientY
                    );
                    startZoom = currentZoom;
                    e.preventDefault();
                }
            }, { passive: false });

            el.addEventListener('touchmove', (e) => {
                if (e.touches.length === 2 && startDist > 0 && isPinching) {
                    e.preventDefault();
                    const curDist = Math.hypot(
                        e.touches[0].clientX - e.touches[1].clientX,
                        e.touches[0].clientY - e.touches[1].clientY
                    );
                    currentZoom = Math.max(0.3, Math.min(3.5, startZoom * (curDist / startDist)));
                    if (currentRotation !== 0) applyRotation();
                    else applyPageScales();
                }
            }, { passive: false });

            el.addEventListener('touchend', (e) => { 
                if (e.touches.length < 2) { startDist = 0; isPinching = false; }
            }, { passive: true });
        }

        // ================================================================
        // ONGLETS
        // ================================================================
        function switchTab(id) { 
            ['lib','set','view'].forEach(t => { 
                document.getElementById('sec-'  + t).classList.add('hidden');

            });
