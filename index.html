<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#ccff00">
    <title>Partoches - Mobile Pro</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-512.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Outfit:wght@200;400;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --neon-lime: #ccff00;
            --neon-blue: #00f0ff;
            --neon-pink: #ff00ff;
            --neon-orange: #ff6600;
            --neon-purple: #b026ff;
            --bg: #020204;
            --surface: #0a0a0e;
            --surface-accent: #111118;
            --page-bright: 1;
            --page-contrast: 1;
            --page-sepia: 0;
            --touch-min: 52px;
            --touch-gap: 10px;
        }

        body {
            background: var(--bg);
            color: #e2e2e9;
            font-family: 'Space Grotesk', sans-serif;
            overflow: hidden;
            margin: 0;
            padding: 0;
            touch-action: manipulation;
            font-size: 13px;
            -webkit-user-select: none;
            user-select: none;
            -webkit-text-size-adjust: none;
        }

        .jazz-title {
            font-family: 'Outfit', sans-serif;
            text-transform: uppercase;
            font-weight: 900;
            letter-spacing: -1px;
            background: linear-gradient(to right, var(--neon-lime), var(--neon-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(204, 255, 0, 0.25));
        }

        .glass {
            background: rgba(2, 2, 4, 0.96);
            backdrop-filter: blur(25px);
            border-bottom: 1px solid rgba(204, 255, 0, 0.15);
        }

        /* FILE ROW WITH SETLIST SELECTION STATE */
        .file-row {
            background: var(--surface);
            border-radius: 8px;
            margin-bottom: 6px;
            border: 1px solid rgba(255,255,255,0.02);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            padding: 14px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .file-row:hover {
            border-color: var(--neon-lime);
            transform: translateX(4px);
            background: rgba(204, 255, 0, 0.04);
        }

        /* SETLIST SELECTION HIGHLIGHT */
        .file-row.in-setlist {
            background: rgba(204, 255, 0, 0.08) !important;
            border-color: var(--neon-lime) !important;
            box-shadow: 0 0 8px rgba(204, 255, 0, 0.15) !important;
        }

        .file-row.in-setlist:hover {
            background: rgba(204, 255, 0, 0.12) !important;
            transform: translateX(4px) !important;
        }

        .btn-add-success {
            background: var(--neon-lime) !important;
            color: #000 !important;
            box-shadow: 0 0 20px var(--neon-lime) !important;
            border-color: var(--neon-lime) !important;
        }

        .home-header {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 16px;
            margin-top: 8px;
        }

        .home-header-row1 {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: nowrap;
            gap: 10px;
        }

        /* SCAN BUTTONS CONTAINER - UNDER ALPHA BAR */
        .scan-buttons-container {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            padding: 12px 4px;
            margin-bottom: 12px;
            width: 100%;
        }

        .file-row.folder-child {
            margin-left: 18px;
            border-left: 2px solid rgba(204,255,0,0.25);
        }

        .folder-header {
            background: rgba(204,255,0,0.04);
            border: 1px solid rgba(204,255,0,0.18);
            border-radius: 8px;
            margin-bottom: 4px;
            padding: 10px 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            font-weight: 700;
            color: var(--neon-lime);
            letter-spacing: 0.5px;
            transition: background 0.2s;
        }
        .folder-header:hover { background: rgba(204,255,0,0.09); }
        .folder-header .folder-toggle {
            transition: transform 0.2s;
            display: inline-block;
            min-width: 16px;
            text-align: center;
        }
        .folder-header.open .folder-toggle { transform: rotate(90deg); }

        #view-layout {
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            position: relative;
        }

        #viewer-sidebar {
            width: 280px;
            background: #020204;
            border-right: 1px solid rgba(204, 255, 0, 0.12);
            display: flex;
            flex-direction: column;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 450;
            position: relative;
        }
        #viewer-sidebar.collapsed { margin-left: -280px; }

        #scroll-container {
            flex-grow: 1;
            height: 100vh;
            overflow: auto;
            background: #000;
            scroll-behavior: auto;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            -webkit-overflow-scrolling: touch;
            touch-action: pan-x pan-y;
        }
        #scroll-container.anno-active { touch-action: none; }

        #viewer-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 120px 30px 450px 30px;
            width: max-content;
            min-width: 100%;
            height: fit-content;
            gap: 40px;
            margin: 0 auto;
        }

        .page-wrapper {
            position: relative;
            flex-shrink: 0;
            background: white;
            box-shadow: 0 0 45px rgba(0,0,0,0.9);
            filter: brightness(var(--page-bright)) contrast(var(--page-contrast)) sepia(var(--page-sepia));
            border-radius: 4px;
            transition: filter 0.2s ease, transform 0.3s ease;
            transform-origin: top center;
            overflow: hidden;
            display: inline-block;
        }

        .anno-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100% !important;
            height: 100% !important;
            pointer-events: none;
            z-index: 10;
        }
        .anno-active .anno-canvas { pointer-events: auto; }

        .page-wrapper img,
        .page-wrapper canvas:not(.anno-canvas) {
            display: block;
            width: auto !important;
            height: auto !important;
            max-width: none;
            max-height: none;
        }

        .page-wrapper img.gif-media {
            image-rendering: auto;
        }

        #viewer-content.dual-page-mode {
            flex-direction: row;
            flex-wrap: wrap;
            justify-content: center;
            align-items: flex-start;
            gap: 20px;
        }
        #viewer-content.dual-page-mode .rotation-wrapper,
        #viewer-content.dual-page-mode .page-wrapper {
            flex: 0 0 auto;
        }

        .rotation-wrapper {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            transition: width 0.25s ease, height 0.25s ease;
            flex-shrink: 0;
        }

        .tab-btn {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1.5px;
            color: #555562;
            transition: 0.3s;
            text-transform: uppercase;
            min-height: var(--touch-min);
            padding: 8px 12px;
        }
        .tab-active {
            color: var(--neon-lime);
            text-shadow: 0 0 12px rgba(204, 255, 0, 0.6);
        }

        .btn-jazz {
            background: rgba(204, 255, 0, 0.04);
            border: 1px solid var(--neon-lime);
            color: var(--neon-lime);
            font-size: 10px;
            font-weight: 700;
            padding: 8px 14px;
            border-radius: 5px;
            text-transform: uppercase;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            min-height: var(--touch-min);
            min-width: var(--touch-min);
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .btn-jazz:hover {
            background: var(--neon-lime);
            color: black;
            box-shadow: 0 0 15px rgba(204, 255, 0, 0.3);
        }

        .nav-rect {
            pointer-events: auto;
            background: rgba(10,10,14,0.94);
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            font-weight: 700;
            font-size: 11px;
            padding: 12px 20px;
            min-width: var(--touch-min);
            min-height: var(--touch-min);
            text-align: center;
            border-radius: 6px;
            text-transform: uppercase;
            transition: all 0.2s;
        }
        .nav-rect:active { transform: scale(0.95); background: rgba(0, 240, 255, 0.1); }

        .right-control-dock {
            position: fixed;
            z-index: 500;
            pointer-events: none;
            display: flex;
            gap: 15px;
        }

        #anno-toolbar, #fx-toolbar {
            pointer-events: auto;
            display: none;
            padding: 14px;
            border-radius: 10px;
            background: rgba(6, 6, 10, 0.96);
            box-shadow: 0 0 35px rgba(0,0,0,0.85);
        }

        .toolbar-divider {
            width: 100%;
            height: 1px;
            background: rgba(255,255,255,0.1);
            margin: 8px 0;
        }

        .color-dot {
            border-radius: 6px;
            border: 2px solid rgba(255,255,255,0.1);
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            flex-shrink: 0;
            min-width: 30px;
            min-height: 30px;
        }
        .color-dot.active {
            border-color: white;
            transform: scale(1.15);
            box-shadow: 0 0 10px currentColor;
        }

        .size-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #2d2d37;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
            flex-shrink: 0;
            min-width: 32px;
            min-height: 32px;
        }
        .size-btn.active {
            border-color: var(--neon-lime);
            background: rgba(204, 255, 0, 0.12);
        }
        .size-preview {
            background-color: #888;
            border-radius: 50%;
        }
        .size-btn.active .size-preview {
            background-color: var(--neon-lime);
        }

        .sidebar-item {
            padding: 15px 18px;
            border-bottom: 1px solid rgba(255,255,255,0.02);
            font-size: 11px;
            color: #828292;
            cursor: grab;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #06060a;
            min-height: var(--touch-min);
        }
        .sidebar-item:active { cursor: grabbing; background: rgba(204, 255, 0, 0.03); }
        .sidebar-item.active {
            background: rgba(204, 255, 0, 0.06);
            color: var(--neon-lime);
            font-weight: bold;
            border-left: 4px solid var(--neon-lime);
        }

        .lang-switch {
            font-size: 9px;
            border: 1px solid #2d2d37;
            padding: 4px 8px;
            border-radius: 4px;
            color: #727282;
            cursor: pointer;
            font-weight: bold;
            min-height: 24px;
            display: inline-flex;
            align-items: center;
        }
        .lang-switch.active {
            color: var(--neon-lime);
            border-color: var(--neon-lime);
            background: rgba(204, 255, 0, 0.08);
        }

        .source-tag {
            background: #0f0f14;
            border: 1px solid #2d2d37;
            padding: 6px 12px;
            border-radius: 5px;
            font-size: 10px;
            color: var(--neon-blue);
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            min-height: 28px;
        }
        .source-delete {
            color: var(--neon-pink);
            cursor: pointer;
            font-size: 13px;
            padding: 0 4px;
        }
        .source-delete:hover { transform: scale(1.2); }

        .copyright {
            position: fixed;
            bottom: 15px;
            left: 25px;
            font-size: 9px;
            color: #2d2d37;
            z-index: 50;
            letter-spacing: 0.5px;
        }

        #alpha-bar button {
            padding: 6px 9px;
            font-size: 12px;
            font-weight: 800;
            color: #4b4b58;
            transition: 0.2s;
            cursor: pointer;
            min-height: var(--touch-min);
        }
        #alpha-bar button:hover {
            color: var(--neon-lime);
            transform: scale(1.2);
        }

        #dual-page-btn.dual-active {
            background: var(--neon-blue) !important;
            color: #000 !important;
            border-color: var(--neon-blue) !important;
            box-shadow: 0 0 12px rgba(0,240,255,0.4) !important;
        }
        #sun-mode-btn.sepia-active {
            background: #ffaa00 !important;
            color: #000 !important;
            border-color: #ffaa00 !important;
            box-shadow: 0 0 12px rgba(255,170,0,0.4) !important;
        }
        #scroll-toggle-btn.scroll-active {
            background: var(--neon-pink) !important;
            color: #000 !important;
            border-color: var(--neon-pink) !important;
            box-shadow: 0 0 12px rgba(255,0,255,0.4) !important;
        }

        .fx-indicator {
            font-size: 9px;
            color: #626272;
            font-weight: bold;
            text-transform: uppercase;
            text-align: center;
            margin-bottom: 4px;
        }

        #scroll-speed-label { min-width: 32px; text-align: center; }

        #viewer-header {
            display: flex;
            flex-wrap: nowrap;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            padding: 8px 12px;
        }
        #viewer-header::-webkit-scrollbar { display: none; }
        #viewer-header > div { flex-shrink: 0; }

        #scroll-container { align-items: flex-start !important; }
        #viewer-content { min-width: max-content; }

        .loading-spinner {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            border: 4px solid rgba(204, 255, 0, 0.3);
            border-top-color: var(--neon-lime);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            z-index: 1000;
        }
        @keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }

        .error-message {
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid rgba(255, 0, 0, 0.3);
            color: #ff6666;
            padding: 10px 15px;
            border-radius: 8px;
            margin: 10px auto;
            font-size: 12px;
            max-width: 80%;
            text-align: center;
            animation: fadeIn 0.3s ease-out;
        }

        .success-message {
            background: rgba(0, 255, 0, 0.1);
            border: 1px solid rgba(0, 255, 0, 0.3);
            color: #00ff00;
            padding: 10px 15px;
            border-radius: 8px;
            margin: 10px auto;
            font-size: 12px;
            max-width: 80%;
            text-align: center;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* SETLIST INDICATOR IN LIBRARY */
        .setlist-indicator {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(204, 255, 0, 0.9);
            color: #000;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            z-index: 100;
            box-shadow: 0 4px 12px rgba(204, 255, 0, 0.3);
            transition: all 0.3s;
        }

        .setlist-indicator.hidden {
            opacity: 0;
            transform: translateX(-50%) translateY(20px);
            pointer-events: none;
        }

        /* TABLET OPTIMIZATIONS */
        @media (min-width: 769px), (orientation: landscape) {
            :root { --touch-min: 56px; --touch-gap: 12px; }
            .right-control-dock { right: 24px; top: 120px; flex-direction: column; bottom: auto; left: auto; width: auto; }
            #anno-toolbar { flex-direction: column; border: 1px solid rgba(204, 255, 0, 0.3); width: 120px; align-items: center; gap: 16px; padding: 20px; }
            #fx-toolbar { flex-direction: column; border: 1px solid rgba(0, 240, 255, 0.3); width: 120px; align-items: center; gap: 18px; padding: 20px; }
            .range-container { display: flex; flex-direction: column; align-items: center; width: 100%; position: relative; margin: 50px 0; }
            .range-container input[type=range] { transform: rotate(-90deg); width: 100px; height: 8px; cursor: pointer; }
            #fx-toolbar input[type=range] { transform: rotate(-90deg); width: 110px; height: 8px; margin: 60px 0; cursor: pointer; }
            .toolbar-divider { width: 100%; height: 1px; margin: 8px 0; }
            .tab-btn { font-size: 15px !important; letter-spacing: 2px; min-height: 48px !important; padding: 0 16px; }
            .btn-jazz { font-size: 13px !important; padding: 12px 22px !important; min-height: 52px !important; min-width: 52px !important; }
            .file-row { padding: 18px 22px !important; margin-bottom: 12px; }
            .file-row div { font-size: 15px !important; }
            #viewer-header { padding: 18px 24px !important; }
            #viewer-header .btn-jazz { min-height: 52px !important; padding: 12px 18px !important; }
            #zoom-level { font-size: 14px !important; }
            .sidebar-item { font-size: 14px !important; padding: 20px 24px !important; min-height: 60px !important; }
            .nav-rect { font-size: 14px !important; padding: 18px 32px !important; min-width: 170px !important; min-height: 60px !important; }
            .color-dot { width: 44px !important; height: 44px !important; border-radius: 8px !important; }
            .size-btn { width: 48px !important; height: 48px !important; border-radius: 8px !important; }
            #anno-toolbar .btn-jazz { font-size: 12px !important; padding: 12px 14px !important; width: 100%; }
            #pdf-page-label, #scroll-speed-label { font-size: 13px !important; }
            #alpha-bar button { font-size: 15px !important; padding: 8px 14px !important; min-height: 48px !important; }
            .jazz-title { font-size: 2.5rem !important; }
            .scan-buttons-container { padding: 14px 8px; margin-bottom: 16px; }
            .setlist-indicator { bottom: 90px; font-size: 12px; padding: 10px 20px; }
        }

        @media (min-width: 1024px) {
            .btn-jazz { font-size: 14px !important; padding: 14px 24px !important; min-height: 56px !important; min-width: 56px !important; }
            .tab-btn { font-size: 16px !important; min-height: 52px !important; }
            .nav-rect { min-width: 180px !important; min-height: 64px !important; }
            .file-row { padding: 20px 26px !important; }
            .sidebar-item { padding: 22px 28px !important; min-height: 64px !important; }
            .color-dot { width: 48px !important; height: 48px !important; }
            .size-btn { width: 52px !important; height: 52px !important; }
            .jazz-title { font-size: 2.8rem !important; }
            .setlist-indicator { bottom: 95px; font-size: 13px; padding: 12px 24px; }
        }

        @media (max-width: 768px) and (orientation: portrait) {
            .right-control-dock { left: 12px; right: 12px; bottom: 24px; top: auto; flex-direction: row; justify-content: center; width: calc(100vw - 24px); }
            #anno-toolbar, #fx-toolbar { flex-direction: row; flex-wrap: wrap; justify-content: center; align-items: center; gap: 10px; width: 100%; border: 1px solid rgba(255,255,255,0.1); }
            #anno-toolbar { border-color: var(--neon-lime); }
            #fx-toolbar { border-color: var(--neon-blue); }
            .range-container { display: flex; flex-direction: row; align-items: center; gap: 6px; }
            input[type=range] { transform: none !important; width: 90px !important; height: 6px; margin: 0 6px !important; }
            .toolbar-divider { height: 24px; width: 1px; margin: 0 6px; }
            .size-btn, .color-dot { width: 34px; height: 34px; }
            #anno-toolbar .btn-jazz { width: auto; padding: 6px 10px; font-size: 9px; min-height: 32px; }
            #viewer-header { gap: 4px; padding: 6px 8px; }
            .nav-rect { min-height: 48px; padding: 12px 16px; }
            .scan-buttons-container { padding: 10px 4px; margin-bottom: 10px; }
            .btn-jazz { min-height: 48px; padding: 10px 14px; }
            .setlist-indicator { bottom: 75px; font-size: 10px; padding: 8px 12px; }
        }

        @media (max-width: 480px) {
            .scan-buttons-container { flex-direction: column; align-items: stretch; }
            .btn-jazz { width: 100%; justify-content: center; }
            .setlist-indicator { bottom: 70px; font-size: 9px; padding: 6px 10px; }
        }

        /* Global transitions */
        button, .file-row, .sidebar-item, .folder-header { transition: all 0.2s ease; }
        button:focus-visible { outline: 2px solid var(--neon-lime); outline-offset: 2px; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #020204; }
        ::-webkit-scrollbar-thumb { background: rgba(204, 255, 0, 0.3); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(204, 255, 0, 0.5); }
        .active-tool { background: rgba(204, 255, 0, 0.15) !important; border-color: var(--neon-lime) !important; color: var(--neon-lime) !important; }
    </style>
</head>
<body>
    <div class="copyright font-black uppercase">© Cdchtp</div>
    <div id="loading-spinner" class="loading-spinner" style="display: none;"></div>

    <!-- SETLIST INDICATOR -->
    <div id="setlist-indicator" class="setlist-indicator hidden">
        <span id="setlist-count">0</span> <span id="setlist-label">fichiers dans la setlist</span>
    </div>

    <nav class="glass fixed top-0 w-full flex justify-around p-4 z-[200]">
        <button onclick="switchTab('lib')" id="tab-lib" class="tab-btn tab-active" data-i18n="nav_lib">Répertoire</button>
        <button onclick="switchTab('set')" id="tab-set" class="tab-btn" data-i18n="nav_set">Setlists</button>
        <button onclick="switchTab('view')" id="tab-view" class="tab-btn opacity-20" data-i18n="nav_view">Visionneuse</button>
        <div class="absolute right-4 top-1/2 -translate-y-1/2 flex gap-1">
            <span onclick="setLang('fr')" id="lang-fr" class="lang-switch active">FR</span>

    <script>
        const i18n = {

                msg_error_loading: "Erreur de chargement",
                msg_error_saving: "Erreur de sauvegarde",
                msg_error_deleting: "Erreur de suppression",
                msg_error_display: "Erreur d'affichage",
                msg_file_saved: "Fichier enregistré",
                msg_image_error: "Erreur de chargement de l'image",
                msg_initialization_error: "Erreur d'initialisation",
                msg_added_to_setlist: "Ajouté à la setlist",
                msg_removed_from_setlist: "Retiré de la setlist",
                msg_setlist_empty: "La setlist est vide",
                files_in_setlist: "fichiers dans la setlist"
            },
            en: {
                nav_lib: "Library", nav_set: "Setlists", nav_view: "Viewer",
                btn_restore: "Restore Access", btn_scan: "Scan Folder",
                btn_scan_deep: "📂 Recursive", btn_refresh: "↻ Refresh",
                set_title: "Setlists", btn_save_set: "Save Setlist", btn_clear: "Clear",
                btn_close: "✕", btn_settings: "Filters", btn_draw: "Draw",
                fx_bright: "Bright", fx_contrast: "Cont", fx_alpha: "Opac", fx_sepia: "Sepia",
                btn_del: "Eraser", btn_prev: "Previous", btn_next: "Next",
                btn_add: "Add", btn_home: "🏠", btn_sun: "☀️",
                btn_text: "Text", btn_pen: "Pen", btn_open_setlist: "🎵 Open Setlist",
                live_tracklist: "Live Tracklist", saved_sets: "Saved Sets",
                tools_title: "Tools", btn_save_txt: "Save TXT",
                msg_no_files: "No files found. Add a folder.",
                msg_no_saved_sets: "No saved setlists",
                msg_setlist_saved: "Setlist saved!",
                msg_setlist_deleted: "Setlist deleted",
                msg_files_not_found: "Files not found",
                msg_access_denied: "Access denied",
                msg_error_loading: "Loading error",
                msg_error_saving: "Save error",
                msg_error_deleting: "Deletion error",
                msg_error_display: "Display error",
                msg_file_saved: "File saved",
                msg_image_error: "Image loading error",
                msg_initialization_error: "Initialization error",
                msg_added_to_setlist: "Added to setlist",
                msg_removed_from_setlist: "Removed from setlist",
                msg_setlist_empty: "Setlist is empty",
                files_in_setlist: "files in setlist"
            }
        };

        let currentLang = localStorage.getItem('part_lang') || 'fr';
        let files = [], setFiles = [], currentIndex = 0, sources = [];
        let uiVisible = true, currentZoom = 1.0, isDrawingMode = false, isFxMode = false;
        let annoColor = '#ccff00', annoSize = 8, annoOpacity = 1.0, currentAnnoTool = 'pen';
        let annotations = JSON.parse(localStorage.getItem('part_annos_v4') || '{}');
        let undoStack = [];
        let currentRotation = 0, zoomMemory = 1.0, isDualPage = false;
        let tpCache = [], startDist = 0, startZoom = 1.0;
        let isSepiaMode = false, isScrolling = false, scrollInterval = null;
        let scrollSpeed = 0.1, scrollDirection = 1;
        let currentPdfDoc = null, currentPdfPageNum = 1;
        let isSidebarVisible = true;

        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        function showLoading() { document.getElementById('loading-spinner').style.display = 'block'; }
        function hideLoading() { document.getElementById('loading-spinner').style.display = 'none'; }

        function showError(message) {
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error-message';
            errorDiv.textContent = message;
            document.body.appendChild(errorDiv);
            setTimeout(() => { if (errorDiv.parentNode) errorDiv.parentNode.removeChild(errorDiv); }, 5000);
        }

        function showSuccess(message) {
            const successDiv = document.createElement('div');
            successDiv.className = 'success-message';
            successDiv.textContent = message;
            document.body.appendChild(successDiv);
            setTimeout(() => { if (successDiv.parentNode) successDiv.parentNode.removeChild(successDiv); }, 3000);
        }

        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            else if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
            else return (bytes / 1048576).toFixed(1) + ' MB';
        }

        function setLang(lang) {
            currentLang = lang;
            localStorage.setItem('part_lang', lang);
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (i18n[lang] && i18n[lang][key]) el.innerText = i18n[lang][key];
            });
            document.querySelectorAll('.lang-switch').forEach(el => el.classList.remove('active'));
            document.getElementById('lang-' + lang).classList.add('active');
            renderLibrary();
            renderSourcesUI();
            updateSetlistIndicator();
        }

        function updateSetlistIndicator() {
            const indicator = document.getElementById('setlist-indicator');
            const count = document.getElementById('setlist-count');
            const label = document.getElementById('setlist-label');

            count.textContent = setFiles.length;
            label.textContent = setFiles.length <= 1 ?
                (currentLang === 'fr' ? 'fichier dans la setlist' : 'file in setlist') :
                (currentLang === 'fr' ? 'fichiers dans la setlist' : 'files in setlist');

            if (setFiles.length > 0) {
                indicator.classList.remove('hidden');
            } else {
                indicator.classList.add('hidden');
            }
        }

        const DB_NAME = "PartochesDB_Ultimate";
        const DB_VERSION = 5;

        async function openDB() {
            return new Promise((resolve, reject) => {
                const req = indexedDB.open(DB_NAME, DB_VERSION);
                req.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains("sources")) db.createObjectStore("sources");
                    if (!db.objectStoreNames.contains("ios_files")) db.createObjectStore("ios_files", { keyPath: "name" });
                    if (!db.objectStoreNames.contains("setlists")) db.createObjectStore("setlists", { keyPath: "id" });
                };
                req.onsuccess = () => resolve(req.result);
                req.onerror = () => reject(req.error);
            });
        }

        const SUPPORTED_EXT = /\.pdf|\.png|\.jpg|\.jpeg|\.webp|\.gif|\.txt$/i;

        async function init() {
            try {
                showLoading();
                setLang(currentLang);
                const btnScan = document.querySelector('[data-i18n="btn_scan"]');
                if (typeof window.showDirectoryPicker === 'undefined') {
                    btnScan.innerText = currentLang === 'fr' ? '+ Ajouter Partoches' : '+ Add Scores';
                }

                const db = await openDB();
                const reqSources = db.transaction("sources", "readonly").objectStore("sources").getAll();

                reqSources.onsuccess = async () => {
                    sources = reqSources.result || [];
                    if (sources.length > 0) {
                        try {
                            let needsReauth = false;
                            for (const h of sources) {
                                if (!h._virtual) {
                                    try { if ((await h.queryPermission({ mode: 'read' })) !== 'granted') needsReauth = true; }
                                    catch (e) { needsReauth = true; }
                                }
                            }
                            if (needsReauth) document.getElementById('btn-restore').classList.remove('hidden');
                        } catch(e) { console.error("Restore check failed:", e); }
                    }

                    const reqFiles = db.transaction("ios_files", "readonly").objectStore("ios_files").getAll();
                    reqFiles.onsuccess = async () => {
                        const savedFiles = reqFiles.result || [];
                        if (savedFiles.length > 0) {
                            const virtualSourceName = currentLang === 'fr' ? 'Fichiers iPad/iCloud' : 'iPad/iCloud Files';
                            let vsrc = sources.find(s => s.name === virtualSourceName);
                            if (!vsrc) { vsrc = { name: virtualSourceName, _virtual: true, _files: [] }; sources.push(vsrc); }
                            savedFiles.forEach(f => {
                                if (!vsrc._files.some(existing => existing.entry.name === f.name)) {
                                    vsrc._files.push({ entry: { name: f.name, _blob: f.blob, getFile: () => Promise.resolve(f.blob) } });
                                }
                            });
                        }
                        await refreshFiles();
                        hideLoading();
                    };
                    reqFiles.onerror = () => { refreshFiles().then(hideLoading).catch(hideLoading); };
                };
                reqSources.onerror = () => { refreshFiles().then(hideLoading).catch(hideLoading); };

                renderSavedSets();
                generateAlphaBar();
                setupPinchZoom();
                setupTouchHandlers();

                new Sortable(document.getElementById('sidebar-items'), {
                    animation: 180,
                    onEnd: (evt) => {
                        const movedItem = setFiles.splice(evt.oldIndex, 1)[0];
                        setFiles.splice(evt.newIndex, 0, movedItem);
                        if (currentIndex === evt.oldIndex) currentIndex = evt.newIndex;
                        else if (currentIndex > evt.oldIndex && currentIndex <= evt.newIndex) currentIndex--;
                        else if (currentIndex < evt.oldIndex && currentIndex >= evt.newIndex) currentIndex++;
                        document.getElementById('page-info').innerText = (currentIndex + 1) + " / " + setFiles.length;
                        renderSidebar();
                        updateSetlistIndicator();
                    }
                });

                window.addEventListener("orientationchange", () => setTimeout(applyPageScales, 350));
                window.addEventListener("resize", () => setTimeout(applyPageScales, 100));
                document.addEventListener('contextmenu', (e) => { if (isDrawingMode) e.preventDefault(); });
            } catch (error) {
                console.error("Initialization error:", error);
                showError(i18n[currentLang].msg_initialization_error);
                hideLoading();
            }
        }

        async function addSource() {
            if (typeof window.showDirectoryPicker === 'undefined') { addSourceFallbackIOS(); return; }
            try {
                const h = await window.showDirectoryPicker({ mode: 'read' });
                if (sources.find(s => s.name === h.name)) {
                    showError(currentLang === 'fr' ? "Ce dossier est déjà ajouté." : "This folder is already added.");
                    return;
                }
                const db = await openDB();
                await db.transaction("sources", "readwrite").objectStore("sources").put(h, h.name);
                sources.push(h);
                await refreshFiles();
            } catch(e) { if (e.name !== 'AbortError') addSourceFallbackIOS(); }
        }

        async function addSourceRecursive() {
            if (typeof window.showDirectoryPicker === 'undefined') { addSourceFallbackIOS(); return; }
            try {
                const h = await window.showDirectoryPicker({ mode: 'read' });
                if (sources.find(s => s.name === h.name)) {
                    showError(currentLang === 'fr' ? "Ce dossier est déjà ajouté." : "This folder is already added.");
                    return;
                }
                h._recursive = true;
                const db = await openDB();
                await db.transaction("sources", "readwrite").objectStore("sources").put(h, h.name);
                sources.push(h);
                await refreshFiles();
            } catch(e) { if (e.name !== 'AbortError') return; }
        }

        function addSourceFallbackIOS() {
            const input = document.createElement('input');
            input.type = 'file'; input.multiple = true;
            input.accept = '.pdf,.png,.jpg,.jpeg,.webp,.gif,.txt,image/*,application/pdf,text/plain';
            input.style.display = 'none';
            document.body.appendChild(input);
            input.onchange = async () => {
                if (!input.files || !input.files.length) { input.remove(); return; }
                showLoading();
                try {
                    const db = await openDB();
                    const virtualSourceName = currentLang === 'fr' ? 'Fichiers iPad/iCloud' : 'iPad/iCloud Files';
                    if (!sources.find(s => s.name === virtualSourceName)) {
                        sources.push({ name: virtualSourceName, _virtual: true, _files: [] });
                    }
                    const vsrc = sources.find(s => s.name === virtualSourceName);
                    for (const file of input.files) {
                        if (SUPPORTED_EXT.test(file.name)) {
                            const tx = db.transaction("ios_files", "readwrite");
                            await tx.objectStore("ios_files").put({ name: file.name, blob: file });
                            if (!vsrc._files.some(f => f.entry.name === file.name)) {
                                vsrc._files.push({ entry: { name: file.name, _blob: file, getFile: () => Promise.resolve(file) } });
                            }
                        }
                    }
                    await refreshFiles();
                } catch (error) { showError(i18n[currentLang].msg_error_loading); }
                finally { input.remove(); hideLoading(); }
            };
            input.click();
        }

        async function removeSource(name) {
            if (!confirm(currentLang === 'fr' ? "Supprimer l'accès à ce dossier?" : "Remove access to this folder?")) return;
            showLoading();
            try {
                const src = sources.find(s => s.name === name);
                const db = await openDB();
                if (src) {
                    if (!src._virtual) await db.transaction("sources", "readwrite").objectStore("sources").delete(name);
                    else await db.transaction("ios_files", "readwrite").objectStore("ios_files").clear();
                }
                sources = sources.filter(s => s.name !== name);
                await refreshFiles();
            } catch (error) { showError(i18n[currentLang].msg_error_deleting); }
            finally { hideLoading(); }
        }

        async function restoreAccess() {
            showLoading();
            try {
                for (const h of sources) if (!h._virtual) await h.requestPermission({ mode: 'read' });
                document.getElementById('btn-restore').classList.add('hidden');
                await refreshFiles();
            } catch (error) { showError(i18n[currentLang].msg_error_loading); }
            finally { hideLoading(); }
        }

        async function scanFolderFresh(handle, recursive = false, depth = 0) {
            const list = [];
            try {
                for await (const entry of handle.values()) {
                    if (entry.kind === 'file' && SUPPORTED_EXT.test(entry.name)) {
                        list.push({ entry, parentHandle: handle });
                    } else if (entry.kind === 'directory' && recursive && depth < 8) {
                        try { list.push(...(await scanFolderFresh(entry, true, depth + 1))); }
                        catch(e) { console.warn("Subfolder inaccessible:", entry.name, e); }
                    }
                }
            } catch (error) { console.error("Error scanning folder:", handle.name, error); }
            return list;
        }

        async function refreshFiles() {
            showLoading();
            try {
                files = [];
                for (const h of sources) {
                    try {
                        if (h._virtual) {
                            if (h._files) { h._files.sort((a, b) => a.entry.name.localeCompare(b.entry.name)); files.push(...h._files); }
                        } else {
                            const results = await scanFolderFresh(h, h._recursive);
                            results.sort((a, b) => a.entry.name.localeCompare(b.entry.name));
                            files.push(...results);
                        }
                    } catch(e) {
                        console.warn("Folder inaccessible", h.name, e);
                        showError(`${h.name}: ${i18n[currentLang].msg_access_denied}`);
                    }
                }
                renderLibrary();
                renderSourcesUI();
            } catch (error) { showError(i18n[currentLang].msg_error_loading); }
            finally { hideLoading(); }
        }

        function renderLibrary() {
            const container = document.getElementById('library-list');
            container.innerHTML = '';
            if (files.length === 0) {
                container.innerHTML = '<div class="text-center text-zinc-600 py-20">' +
                    i18n[currentLang].msg_no_files + '</div>';
                return;
            }

            files.forEach(file => {
                const fileDiv = document.createElement('div');
                fileDiv.className = 'file-row';
                const fileKey = getFileKey(file);

                // Check if file is in current setlist
                if (setFiles.some(f => getFileKey(f) === fileKey)) {
                    fileDiv.classList.add('in-setlist');
                }

                const nameDiv = document.createElement('div');
                nameDiv.textContent = file.entry.name;
                nameDiv.style.cssText = 'font-size:11px;color:#e2e2e9';

                const infoDiv = document.createElement('div');
                infoDiv.style.cssText = 'font-size:10px;color:#727282';
                if (file.entry._blob) infoDiv.textContent = formatFileSize(file.entry._blob.size);

                fileDiv.appendChild(nameDiv);
                fileDiv.appendChild(infoDiv);

                // Toggle file in setlist on click
                fileDiv.onclick = () => {
                    const existingIndex = setFiles.findIndex(f => getFileKey(f) === fileKey);

                    if (existingIndex >= 0) {
                        // Remove from setlist
                        setFiles.splice(existingIndex, 1);
                        fileDiv.classList.remove('in-setlist');
                        showSuccess(i18n[currentLang].msg_removed_from_setlist);
                    } else {
                        // Add to setlist
                        setFiles.push(file);
                        fileDiv.classList.add('in-setlist');
                        showSuccess(i18n[currentLang].msg_added_to_setlist);
                    }

                    updateSetlistIndicator();

                    // If in view mode, update sidebar
                    if (!document.getElementById('sec-view').classList.contains('hidden')) {
                        renderSidebar();
                    }
                };

                container.appendChild(fileDiv);
            });
        }

        function renderSourcesUI() {
            const container = document.getElementById('source-list');
            container.innerHTML = '';
            sources.forEach(s => {
                const tag = document.createElement('div');
                tag.className = 'source-tag';
                const badge = s._recursive ? ' 🔁' : (s._virtual ? ' 📱' : '');
                tag.innerHTML = `${s.name}${badge} <span class="source-delete" onclick="event.stopPropagation(); removeSource('${s.name.replace(/'/g,"\\'")}')">✕</span>`;
                container.appendChild(tag);
            });
        }

        function generateAlphaBar() {
            const alphaBar = document.getElementById('alpha-bar');
            alphaBar.innerHTML = '';
            for (let i = 65; i <= 90; i++) {
                const letter = String.fromCharCode(i);
                const btn = document.createElement('button');
                btn.textContent = letter;
                btn.className = 'px-2 py-1 text-xs font-bold text-zinc-500 hover:text-lime-400 transition-colors';
                btn.onclick = () => scrollToLetter(letter);
                alphaBar.appendChild(btn);
            }
            const numBtn = document.createElement('button');
            numBtn.textContent = '#';
            numBtn.className = 'px-2 py-1 text-xs font-bold text-zinc-500 hover:text-lime-400 transition-colors';
            numBtn.onclick = () => scrollToLetter('#');
            alphaBar.appendChild(numBtn);
        }

        function scrollToLetter(letter) {
            const container = document.getElementById('library-list');
            const files = Array.from(container.querySelectorAll('.file-row'));
            for (let i = 0; i < files.length; i++) {
                const fileName = files[i].querySelector('div').textContent.toUpperCase();
                const firstChar = fileName.charAt(0);
                if ((letter === '#' && !/^[A-Z]/.test(firstChar)) || firstChar === letter) {
                    files[i].scrollIntoView({ behavior: 'smooth', block: 'start' });
                    break;
                }
            }
        }

        function getFileKey(file) {
            return file.parentHandle ? `${file.parentHandle.name}/${file.entry.name}` : file.entry.name;
        }

        // NEW FUNCTION: Open current setlist in viewer
        function openCurrentSetlist() {
            if (setFiles.length === 0) {
                showError(i18n[currentLang].msg_setlist_empty);
                return;

            switchTab('view');
            renderViewer();
            renderSidebar();

        async function saveCurrentSet() {
            if (setFiles.length === 0) {
                showError(i18n[currentLang].msg_setlist_empty);
                return;
            }

            const name = prompt(currentLang === 'fr' ? 'Nom de la setlist:' : 'Setlist name:');
            if (!name) return;

            const setData = {
                id: Date.now().toString(),
                name: name,
                files: setFiles.map(f => ({
                    name: f.entry.name,
                    path: f.parentHandle ? f.parentHandle.name : '',
                    source: f.parentHandle ? f.parentHandle.name : (f.entry._virtualSource || '')
                }))
            };

            try {
                const db = await openDB();
                await db.transaction("setlists", "readwrite").objectStore("setlists").put(setData);
                showSuccess(i18n[currentLang].msg_setlist_saved);
                renderSavedSets();
            } catch (error) {
                showError(i18n[currentLang].msg_error_saving);
            }
        }

        async function loadSavedSet(set) {
            try {
                showLoading();
                const loadedFiles = [];
                for (const fileRef of set.files) {
                    const foundFile = files.find(f =>
                        f.entry.name === fileRef.name &&
                        (f.parentHandle ? f.parentHandle.name : '') === fileRef.path
                    );
                    if (foundFile) loadedFiles.push(foundFile);
                }

                if (loadedFiles.length > 0) {
                    setFiles = loadedFiles;
                    currentIndex = 0;
                    updateSetlistIndicator();
                    renderSidebar();

                    // If we're in library tab, show success
                    if (!document.getElementById('sec-view').classList.contains('hidden')) {
                        renderViewer();
                    } else {
                        showSuccess(i18n[currentLang].msg_setlist_saved);
                    }
                } else {
                    showError(i18n[currentLang].msg_files_not_found);
                }
            } catch (error) {
                showError(i18n[currentLang].msg_error_loading);
            } finally {
                hideLoading();
            }
        }

        async function deleteSavedSet(id) {
            if (!confirm(currentLang === 'fr' ? 'Supprimer cette setlist?' : 'Delete this setlist?')) return;
            try {
                const db = await openDB();
                await db.transaction("setlists", "readwrite").objectStore("setlists").delete(id);
                showSuccess(i18n[currentLang].msg_setlist_deleted);
                renderSavedSets();
            } catch (error) {
                showError(i18n[currentLang].msg_error_deleting);
            }
        }

        function clearCurrentSet() {
            if (confirm(currentLang === 'fr' ? 'Vider la setlist actuelle?' : 'Clear current setlist?')) {
                setFiles = [];
                currentIndex = 0;
                renderLibrary(); // Update library to remove highlights
                renderSidebar();
                updateSetlistIndicator();
                document.getElementById('page-info').innerText = '0 / 0';
            }
        }

        function switchTab(tab) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('tab-active'));
            document.getElementById('sec-' + tab).classList.remove('hidden');
            document.getElementById('tab-' + tab).classList.add('tab-active');

            if (tab === 'view') {
                if (setFiles.length === 0) {
                    showError(i18n[currentLang].msg_setlist_empty);
                    return;
                }
                renderViewer();
                renderSidebar();
            } else if (tab === 'set') {
                // Update current setlist display
                const container = document.getElementById('set-list-current');
                container.innerHTML = '';

                if (setFiles.length === 0) {
                    container.innerHTML = '<div class="text-zinc-600 text-center py-10">' +
                        i18n[currentLang].msg_setlist_empty + '</div>';
                } else {
                    setFiles.forEach((file, index) => {
                        const fileDiv = document.createElement('div');
                        fileDiv.className = 'file-row';
                        fileDiv.style.marginBottom = '8px';

                        const nameDiv = document.createElement('div');
                        nameDiv.textContent = file.entry.name;
                        nameDiv.style.flexGrow = '1';
                        nameDiv.style.overflow = 'hidden';
                        nameDiv.style.textOverflow = 'ellipsis';
                        nameDiv.style.whiteSpace = 'nowrap';

                        const removeBtn = document.createElement('button');
                        removeBtn.className = 'text-neon-pink font-bold';
                        removeBtn.textContent = '✕';
                        removeBtn.style.padding = '0 4px';
                        removeBtn.onclick = (e) => {
                            e.stopPropagation();
                            setFiles.splice(index, 1);
                            if (currentIndex >= index) currentIndex = Math.max(0, currentIndex - 1);
                            renderSidebar();
                            updateSetlistIndicator();
                            renderLibrary();
                            container.innerHTML = '';
                            renderSavedSets(); // Re-render to update
                        };

                        fileDiv.appendChild(nameDiv);
                        fileDiv.appendChild(removeBtn);
                        container.appendChild(fileDiv);
                    });
                }
            }
        }

        function goToHome() { switchTab('lib'); }

        function renderSidebar() {
            const container = document.getElementById('sidebar-items');
            container.innerHTML = '';
            if (setFiles.length === 0) {
                container.innerHTML = '<div class="text-center text-zinc-600 py-10">' +
                    (currentLang === 'fr' ? 'Aucun fichier' : 'No files') + '</div>';
                return;
            }
            setFiles.forEach((file, index) => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'sidebar-item' + (index === currentIndex ? ' active' : '');
                itemDiv.innerHTML = `
                    <span style="flex-grow:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${file.entry.name}</span>
                    <span style="color:#727282;font-size:10px">${index + 1} / ${setFiles.length}</span>`;
                itemDiv.onclick = () => {
                    currentIndex = index; renderViewer();
                    document.querySelectorAll('#sidebar-items .sidebar-item').forEach(el => el.classList.remove('active'));
                    itemDiv.classList.add('active');
                    document.getElementById('page-info').innerText = (currentIndex + 1) + " / " + setFiles.length;
                };
                container.appendChild(itemDiv);
            });
            document.getElementById('page-info').innerText = (currentIndex + 1) + " / " + setFiles.length;
        }

        function toggleSidebar() {
            isSidebarVisible = !isSidebarVisible;
            document.getElementById('viewer-sidebar').classList.toggle('collapsed', !isSidebarVisible);
        }

        async function renderViewer() {
            if (setFiles.length === 0) return;
            const file = setFiles[currentIndex];
            const container = document.getElementById('viewer-content');
            container.innerHTML = '';
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'loading-spinner';
            container.appendChild(loadingDiv);
            try {
                const fileData = await file.entry.getFile();
                const fileName = file.entry.name.toLowerCase();
                let mediaElement, isPdf = false, isGif = false;
                if (fileName.endsWith('.pdf')) { isPdf = true; mediaElement = await renderPdf(fileData); }
                else if (fileName.match(/\.(png|jpg|jpeg|webp|gif)$/i)) { isGif = fileName.endsWith('.gif'); mediaElement = await renderImage(fileData, isGif); }
                else if (fileName.endsWith('.txt')) { mediaElement = await renderText(fileData); }
                if (mediaElement) {
                    const pageWrapper = document.createElement('div');
                    pageWrapper.className = 'page-wrapper';
                    pageWrapper.style.transform = `scale(${currentZoom}) rotate(${currentRotation}deg)`;
                    const rotationWrapper = document.createElement('div');
                    rotationWrapper.className = 'rotation-wrapper';
                    const mediaContainer = document.createElement('div');
                    mediaContainer.style.cssText = 'position:relative;display:inline-block';
                    mediaContainer.appendChild(mediaElement);
                    const annoCanvas = document.createElement('canvas');
                    annoCanvas.className = 'anno-canvas';
                    annoCanvas.dataset.fileKey = getFileKey(file);
                    if (isPdf) {
                        setTimeout(() => {
                            const pdfCanvas = mediaContainer.querySelector('canvas:not(.anno-canvas)');
                            if (pdfCanvas) {
                                annoCanvas.width = pdfCanvas.width; annoCanvas.height = pdfCanvas.height;
                                annoCanvas.style.width = pdfCanvas.style.width; annoCanvas.style.height = pdfCanvas.style.height;
                            }
                        }, 100);
                    } else if (mediaElement.tagName === 'IMG') {
                        mediaElement.onload = () => {
                            annoCanvas.width = mediaElement.naturalWidth || mediaElement.width;
                            annoCanvas.height = mediaElement.naturalHeight || mediaElement.height;
                        };
                        if (mediaElement.complete) {
                            annoCanvas.width = mediaElement.naturalWidth || mediaElement.width;
                            annoCanvas.height = mediaElement.naturalHeight || mediaElement.height;
                        }
                    }
                    mediaContainer.appendChild(annoCanvas);
                    rotationWrapper.appendChild(mediaContainer);
                    pageWrapper.appendChild(rotationWrapper);
                    container.appendChild(pageWrapper);
                    initAnnotationCanvas(annoCanvas, file);
                    applyPageScales();
                    document.getElementById('pdf-page-nav').classList.toggle('hidden', !isPdf);
                    if (isPdf) updatePdfPageLabel();
                    document.getElementById('txt-save-btn').classList.toggle('hidden', !fileName.endsWith('.txt'));
                    pageWrapper.classList.add('fade-in');
                }
            } catch (error) { showError(i18n[currentLang].msg_error_display); container.innerHTML = ''; }
            finally { loadingDiv.remove(); }
        }

        async function renderPdf(fileData) {
            const arrayBuffer = await fileData.arrayBuffer();
            const pdfData = new Uint8Array(arrayBuffer);
            currentPdfDoc = await pdfjsLib.getDocument({ data: pdfData }).promise;
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const page = await currentPdfDoc.getPage(currentPdfPageNum);
            const viewport = page.getViewport({ scale: 1.0 });
            canvas.width = viewport.width; canvas.height = viewport.height;
            canvas.style.width = viewport.width + 'px'; canvas.style.height = viewport.height + 'px';
            await page.render({ canvasContext: ctx, viewport: viewport }).promise;
            currentPdfPageNum = 1; return canvas;
        }

        async function renderImage(fileData, isGif) {
            return new Promise((resolve) => {
                const img = document.createElement('img');
                if (isGif) img.className = 'gif-media';
                const url = URL.createObjectURL(fileData);
                img.src = url;
                img.onload = () => { URL.revokeObjectURL(url); resolve(img); };
                img.onerror = () => { URL.revokeObjectURL(url); showError(i18n[currentLang].msg_image_error); resolve(null); };
            });
        }

        async function renderText(fileData) {
            const text = await fileData.text();
            const pre = document.createElement('pre');
            pre.textContent = text;
            pre.style.cssText = 'background:white;color:black;padding:20px;border-radius:4px;font-family:monospace;font-size:12px;white-space:pre-wrap;word-wrap:break-word;max-width:100%;overflow:auto';
            return pre;
        }

        function changePdfPage(delta) {
            if (!currentPdfDoc) return;
            currentPdfPageNum = Math.max(1, Math.min(currentPdfDoc.numPages, currentPdfPageNum + delta));
            renderViewer(); updatePdfPageLabel();
        }

        function updatePdfPageLabel() {
            if (currentPdfDoc) document.getElementById('pdf-page-label').textContent = currentPdfPageNum + ' / ' + currentPdfDoc.numPages;
        }

        async function saveTxtFile() {
            if (setFiles.length === 0 || !setFiles[currentIndex].entry.name.endsWith('.txt')) return;
            const file = setFiles[currentIndex];
            try {
                const fileData = await file.entry.getFile();
                const text = await fileData.text();
                const blob = new Blob([text], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href = url; a.download = file.entry.name;
                document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
                showSuccess(i18n[currentLang].msg_file_saved);
            } catch (error) { showError(i18n[currentLang].msg_error_saving); }
        }

        function adjustZoom(delta) {
            currentZoom = Math.max(0.1, Math.min(5.0, currentZoom + delta));
            document.getElementById('zoom-level').textContent = Math.round(currentZoom * 100) + '%';
            applyPageScales();
        }

        function rotatePage(delta) {
            currentRotation = (currentRotation + delta + 360) % 360;
            const labels = { 0: '↺↻', 90: '↻', 180: '↺↺', 270: '↺' };
            document.getElementById('rotate-label').textContent = labels[currentRotation] || '↺↻';
            applyPageScales();
        }

        function applyPageScales() {
            document.querySelectorAll('.page-wrapper').forEach(page => {
                page.style.transform = `scale(${currentZoom}) rotate(${currentRotation}deg)`;
            });
            const container = document.getElementById('viewer-content');
            const basePadding = 30; const scaledPadding = basePadding / currentZoom;
            container.style.padding = `${120}px ${scaledPadding}px ${450}px ${scaledPadding}px`;
            if (isDualPage) container.classList.add('dual-page-mode');
            else container.classList.remove('dual-page-mode');
        }

        function toggleDualPage() {
            isDualPage = !isDualPage;
            document.getElementById('dual-page-btn').classList.toggle('dual-active', isDualPage);
            isDualPage ? renderDualPages() : renderViewer();
        }

        async function renderDualPages() {
            if (setFiles.length === 0) return;
            const container = document.getElementById('viewer-content');
            container.innerHTML = ''; container.classList.add('dual-page-mode');
            const loadingDiv = document.createElement('div'); loadingDiv.className = 'loading-spinner';
            container.appendChild(loadingDiv);
            try {
                const file1 = setFiles[currentIndex];
                const file2 = currentIndex + 1 < setFiles.length ? setFiles[currentIndex + 1] : null;
                if (file1) container.appendChild(await createPageElement(file1));
                if (file2) container.appendChild(await createPageElement(file2));
                applyPageScales();
            } catch (error) { showError(currentLang === 'fr' ? "Erreur dual page" : "Dual page error"); }
            finally { loadingDiv.remove(); }
        }

        async function createPageElement(file) {
            const fileData = await file.entry.getFile();
            const fileName = file.entry.name.toLowerCase();
            let mediaElement, isPdf = false;
            if (fileName.endsWith('.pdf')) { isPdf = true; mediaElement = await renderPdf(fileData); }
            else if (fileName.match(/\.(png|jpg|jpeg|webp|gif)$/i)) { mediaElement = await renderImage(fileData, fileName.endsWith('.gif')); }
            else if (fileName.endsWith('.txt')) { mediaElement = await renderText(fileData); }
            if (!mediaElement) return null;
            const pageWrapper = document.createElement('div');
            pageWrapper.className = 'page-wrapper';
            pageWrapper.style.transform = `scale(${currentZoom}) rotate(${currentRotation}deg)`;
            const rotationWrapper = document.createElement('div'); rotationWrapper.className = 'rotation-wrapper';
            const mediaContainer = document.createElement('div'); mediaContainer.style.cssText = 'position:relative;display:inline-block';
            mediaContainer.appendChild(mediaElement);
            const annoCanvas = document.createElement('canvas');
            annoCanvas.className = 'anno-canvas'; annoCanvas.dataset.fileKey = getFileKey(file);
            if (mediaElement.tagName === 'IMG') {
                mediaElement.onload = () => { annoCanvas.width = mediaElement.naturalWidth || mediaElement.width; annoCanvas.height = mediaElement.naturalHeight || mediaElement.height; };
                if (mediaElement.complete) { annoCanvas.width = mediaElement.naturalWidth || mediaElement.width; annoCanvas.height = mediaElement.naturalHeight || mediaElement.height; }
            } else if (isPdf) {
                setTimeout(() => { const pdfCanvas = mediaContainer.querySelector('canvas:not(.anno-canvas)'); if (pdfCanvas) { annoCanvas.width = pdfCanvas.width; annoCanvas.height = pdfCanvas.height; } }, 100);
            }
            mediaContainer.appendChild(annoCanvas); rotationWrapper.appendChild(mediaContainer); pageWrapper.appendChild(rotationWrapper);
            initAnnotationCanvas(annoCanvas, file); return pageWrapper;
        }

        function prevFile() {
            if (setFiles.length === 0) return;
            currentIndex = (currentIndex - 1 + setFiles.length) % setFiles.length; renderViewer(); updateSidebar();
        }
        function nextFile() {
            if (setFiles.length === 0) return;
            currentIndex = (currentIndex + 1) % setFiles.length; renderViewer(); updateSidebar();
        }
        function updateSidebar() {
            document.querySelectorAll('#sidebar-items .sidebar-item').forEach((el, index) => { el.classList.toggle('active', index === currentIndex); });
            document.getElementById('page-info').innerText = (currentIndex + 1) + " / " + setFiles.length;
        }

        function toggleUI() {
            if (isDrawingMode) return;
            uiVisible = !uiVisible;
            document.getElementById('viewer-header').style.opacity = uiVisible ? '1' : '0';
            document.getElementById('viewer-nav').style.opacity = uiVisible ? '1' : '0';
        }

        function handleWheel(event) {
            if (isDrawingMode) { event.preventDefault(); return; }
            if (event.ctrlKey || event.metaKey) { event.preventDefault(); adjustZoom(event.deltaY > 0 ? -0.15 : 0.15); return; }
            if (isDualPage && Math.abs(event.deltaX) > Math.abs(event.deltaY)) { event.preventDefault(); document.getElementById('scroll-container').scrollLeft += event.deltaX; }
        }

        function setupTouchHandlers() {
            const container = document.getElementById('scroll-container');
            let touchStartX = 0, touchStartY = 0, isTouching = false;
            container.addEventListener('touchstart', (e) => {
                if (e.touches.length === 1) { touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY; isTouching = true; }
                else if (e.touches.length === 2) { startDist = getTouchDistance(e.touches[0], e.touches[1]); startZoom = currentZoom; e.preventDefault(); }
            }, { passive: false });
            container.addEventListener('touchmove', (e) => {
                if (isDrawingMode) { e.preventDefault(); return; }
                if (e.touches.length === 1 && isTouching) {
                    const touch = e.touches[0]; const deltaX = touchStartX - touch.clientX; const deltaY = touchStartY - touch.clientY;
                    if (Math.abs(deltaX) > 5 || Math.abs(deltaY) > 5) { container.scrollLeft += deltaX; container.scrollTop += deltaY; touchStartX = touch.clientX; touchStartY = touch.clientY; e.preventDefault(); }
                } else if (e.touches.length === 2) {
                    const currentDist = getTouchDistance(e.touches[0], e.touches[1]); const scale = currentDist / startDist;
                    currentZoom = Math.max(0.1, Math.min(5.0, startZoom * scale)); document.getElementById('zoom-level').textContent = Math.round(currentZoom * 100) + '%';
                    applyPageScales(); e.preventDefault();
                }
            }, { passive: false });
            container.addEventListener('touchend', () => { isTouching = false; });
        }

        function getTouchDistance(touch1, touch2) {
            const dx = touch1.clientX - touch2.clientX; const dy = touch1.clientY - touch2.clientY;
            return Math.sqrt(dx * dx + dy * dy);
        }

        function setupPinchZoom() {
            const container = document.getElementById('scroll-container');
            if (!container) return; container.addEventListener('wheel', handleWheel, { passive: false });
        }

        function toggleAutoScroll() {
            isScrolling = !isScrolling; document.getElementById('scroll-toggle-btn').classList.toggle('scroll-active', isScrolling);
            isScrolling ? startAutoScroll() : stopAutoScroll();
        }

        function adjustScrollSpeed(delta) {
            scrollSpeed = Math.max(0.1, Math.min(5.0, scrollSpeed + delta));
            document.getElementById('scroll-speed-label').textContent = scrollSpeed.toFixed(1);
        }

        function startAutoScroll() {
            if (scrollInterval) clearInterval(scrollInterval);
            scrollInterval = setInterval(() => {
                const container = document.getElementById('scroll-container');
                container.scrollTop += scrollDirection * scrollSpeed;
                if (container.scrollTop + container.clientHeight >= container.scrollHeight - 10) container.scrollTop = 0;
                else if (container.scrollTop <= 0) container.scrollTop = container.scrollHeight - container.clientHeight;
            }, 50);
        }

        function stopAutoScroll() { if (scrollInterval) { clearInterval(scrollInterval); scrollInterval = null; } }

        function toggleFX() {
            isFxMode = !isFxMode; document.getElementById('fx-toolbar').style.display = isFxMode ? 'flex' : 'none';
            document.getElementById('fx-toggle-btn').classList.toggle('active', isFxMode);
            if (!isFxMode) {
                document.documentElement.style.setProperty('--page-bright', '1');
                document.documentElement.style.setProperty('--page-contrast', '1');
                document.documentElement.style.setProperty('--page-sepia', '0');
                document.getElementById('val-bright').textContent = '100%';
                document.getElementById('val-contrast').textContent = '100%';
                document.getElementById('val-sepia').textContent = '0%';
            }
        }

        function updateFX(type, value) {
            const val = parseFloat(value);
            switch (type) {
                case 'bright': document.documentElement.style.setProperty('--page-bright', val); document.getElementById('val-bright').textContent = Math.round(val * 100) + '%'; break;
                case 'contrast': document.documentElement.style.setProperty('--page-contrast', val); document.getElementById('val-contrast').textContent = Math.round(val * 100) + '%'; break;
                case 'sepia': document.documentElement.style.setProperty('--page-sepia', val); document.getElementById('val-sepia').textContent = Math.round(val * 100) + '%'; break;
            }
        }

        function toggleSunMode() {
            isSepiaMode = !isSepiaMode; document.getElementById('sun-mode-btn').classList.toggle('sepia-active', isSepiaMode);
            if (isSepiaMode) { document.documentElement.style.setProperty('--page-sepia', '1'); document.documentElement.style.setProperty('--page-bright', '1.1'); document.getElementById('val-sepia').textContent = '100%'; }
            else { document.documentElement.style.setProperty('--page-sepia', '0'); document.documentElement.style.setProperty('--page-bright', '1'); document.getElementById('val-sepia').textContent = '0%'; }
        }

        function toggleDrawingMode() {
            isDrawingMode = !isDrawingMode;
            document.getElementById('draw-toggle').classList.toggle('btn-add-success', isDrawingMode);
            document.getElementById('scroll-container').classList.toggle('anno-active', isDrawingMode);
            document.getElementById('anno-toolbar').style.display = isDrawingMode ? 'flex' : 'none';
            document.body.style.cursor = isDrawingMode ? 'crosshair' : '';
            if (!isDrawingMode) saveAllAnnotations();
        }

        function initAnnotationCanvas(canvas, file) {
            const fileKey = getFileKey(file); const ctx = canvas.getContext('2d');
            const resizeCanvas = () => { const parent = canvas.parentElement; if (parent) { const rect = parent.getBoundingClientRect(); canvas.width = rect.width; canvas.height = rect.height; } };
            resizeCanvas();
            let isDrawing = false, lastX = 0, lastY = 0;
            canvas.onmousedown = startDrawing; canvas.onmousemove = draw; canvas.onmouseup = stopDrawing; canvas.onmouseout = stopDrawing;
            canvas.ontouchstart = (e) => { e.preventDefault(); const touch = e.touches[0]; const rect = canvas.getBoundingClientRect(); lastX = touch.clientX - rect.left; lastY = touch.clientY - rect.top; isDrawing = true; startPath(lastX, lastY); };
            canvas.ontouchmove = (e) => { e.preventDefault(); if (!isDrawing) return; const touch = e.touches[0]; const rect = canvas.getBoundingClientRect(); const currentX = touch.clientX - rect.left; const currentY = touch.clientY - rect.top; drawLine(lastX, lastY, currentX, currentY); lastX = currentX; lastY = currentY; };
            canvas.ontouchend = (e) => { e.preventDefault(); stopDrawing(); };
            function startDrawing(e) { if (!isDrawingMode) return; isDrawing = true; const rect = canvas.getBoundingClientRect(); lastX = e.clientX - rect.left; lastY = e.clientY - rect.top; startPath(lastX, lastY); }
            function draw(e) { if (!isDrawing || !isDrawingMode) return; const rect = canvas.getBoundingClientRect(); const currentX = e.clientX - rect.left; const currentY = e.clientY - rect.top; drawLine(lastX, lastY, currentX, currentY); lastX = currentX; lastY = currentY; }
            function stopDrawing() { isDrawing = false; saveAnnotationState(canvas, fileKey); }
            function startPath(x, y) { ctx.beginPath(); ctx.moveTo(x, y); saveToUndoStack(canvas, fileKey); }
            function drawLine(x1, y1, x2, y2) {
                ctx.lineJoin = 'round'; ctx.lineCap = 'round';
                ctx.strokeStyle = currentAnnoTool === 'eraser' ? '#020204' : annoColor;
                ctx.lineWidth = annoSize; ctx.globalAlpha = annoOpacity;
                ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
            }
            function setAnnoColor(color, element) { if (color === 'text' || color === 'eraser' || color === 'pen') { setAnnoTool(color, element); return; } annoColor = color; document.querySelectorAll('.color-dot').forEach(el => el.classList.remove('active')); element.classList.add('active'); }
            function setAnnoSize(size, element) { annoSize = size; document.querySelectorAll('.size-btn').forEach(el => el.classList.remove('active')); element.classList.add('active'); }
            function updateAnnoOpacity(value) { annoOpacity = parseFloat(value); }
            function setAnnoTool(tool, element) { currentAnnoTool = tool; document.querySelectorAll('[id^="btn-tool-"]').forEach(el => el.classList.remove('active-tool')); if (element) element.classList.add('active-tool'); }
            function saveToUndoStack(canvas, fileKey) { undoStack.push({ fileKey: fileKey, state: canvas.toDataURL(), timestamp: Date.now() }); if (undoStack.length > 50) undoStack.shift(); }
            function saveAnnotationState(canvas, fileKey) { if (!annotations[fileKey]) annotations[fileKey] = []; annotations[fileKey].push({ data: canvas.toDataURL(), timestamp: Date.now(), zoom: currentZoom, rotation: currentRotation }); localStorage.setItem('part_annos_v4', JSON.stringify(annotations)); }
            function saveAllAnnotations() { document.querySelectorAll('.anno-canvas').forEach(canvas => { const fileKey = canvas.dataset.fileKey; if (fileKey) saveAnnotationState(canvas, fileKey); }); }
            function undoLast() { if (undoStack.length === 0) return; const lastState = undoStack.pop(); const canvas = document.querySelector(`[data-file-key="${lastState.fileKey}"]`); if (canvas) { const img = new Image(); img.onload = () => canvas.getContext('2d').drawImage(img, 0, 0); img.src = lastState.state; } }
            function clearCurrentPage() { const container = document.getElementById('viewer-content'); const annoCanvas = container.querySelector('.anno-canvas'); if (annoCanvas) { const ctx = annoCanvas.getContext('2d'); ctx.clearRect(0, 0, annoCanvas.width, annoCanvas.height); saveAnnotationState(annoCanvas, annoCanvas.dataset.fileKey); } }
            if (annotations[fileKey] && annotations[fileKey].length > 0) { const lastAnnotation = annotations[fileKey][annotations[fileKey].length - 1]; const img = new Image(); img.onload = () => ctx.drawImage(img, 0, 0); img.src = lastAnnotation.data; }
            window.addEventListener('resize', resizeCanvas);
        }

        window.addEventListener('load', init);
    </script>
</body>
</html>
