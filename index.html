<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Partoches - Master Edition V5</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#efb810">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,900&family=Montserrat:wght@300;500;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --gold: #efb810; --bg: #050505; --page-bright: 1; --page-contrast: 1; }
        body { background: var(--bg); color: #f1e7d0; font-family: 'Montserrat', sans-serif; overflow: hidden; margin: 0; touch-action: none; }
        .jazz-title { font-family: 'Playfair Display', serif; background: linear-gradient(to bottom, #fff, var(--gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .glass { background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(239, 184, 16, 0.3); }
        .file-row { border-bottom: 1px solid #1a1a1a; transition: all 0.2s; cursor: pointer; }
        .file-row:hover { background: rgba(239, 184, 16, 0.15); padding-left: 10px; }

        #scroll-container {
            height: 100vh; width: 100vw; overflow-y: scroll; overflow-x: auto; 
            background: black; scroll-behavior: auto; touch-action: pan-x pan-y;
            display: grid; place-items: start center;
        }
        #viewer-content { 
            display: flex; flex-direction: column; align-items: center; 
            padding: 120px 0 500px 0; min-width: 100%; height: fit-content; 
            transition: transform 0.1s ease-out; transform-origin: center top; gap: 50px;
        }
        .page-wrapper { 
            position: relative; flex-shrink: 0; background: white; 
            box-shadow: 0 0 100px rgba(0,0,0,1);
            filter: brightness(var(--page-bright)) contrast(var(--page-contrast));
        }
        canvas, img { height: 95vh !important; width: auto !important; object-fit: contain; display: block; }
        .anno-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; background: transparent !important; }
        .anno-active .anno-canvas { pointer-events: auto; cursor: crosshair; }

        .tab-btn { font-weight: 800; letter-spacing: 1px; color: #444; transition: 0.3s; }
        .tab-active { color: var(--gold); text-shadow: 0 0 10px rgba(239, 184, 16, 0.3); }
        .btn-jazz { border: 1px solid var(--gold); color: var(--gold); font-size: 0.75rem; font-weight: bold; background: black; padding: 8px 16px; border-radius: 4px; }
        #anno-toolbar, #fx-toolbar {
            position: fixed; left: 50%; transform: translateX(-50%);
            display: none; gap: 15px; padding: 20px; border-radius: 50px;
            background: rgba(0,0,0,0.95); border: 1px solid var(--gold); z-index: 200;
        }
        #anno-toolbar { bottom: 120px; }
        #fx-toolbar { bottom: 30px; width: 360px; flex-direction: column; border-radius: 25px; }
        .color-dot { width: 36px; height: 36px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; transition: 0.2s; }
        .color-dot.active { border-color: white; transform: scale(1.15); }
        .copyright { position: fixed; bottom: 15px; left: 25px; font-size: 11px; color: #444; letter-spacing: 4px; z-index: 50; }
        input[type=range] { accent-color: var(--gold); cursor: pointer; width: 100%; }
    </style>
</head>
<body>

    <div class="copyright font-black uppercase">© CdeC</div>

    <nav class="glass fixed top-0 w-full flex justify-around p-5 z-[100] text-[10px] uppercase">
        <button onclick="switchTab('lib')" id="tab-lib" class="tab-btn tab-active font-black">Répertoire</button>
        <button onclick="switchTab('set')" id="tab-set" class="tab-btn font-black">Setlists</button>
        <button onclick="switchTab('view')" id="tab-view" class="tab-btn font-black opacity-20">Visionneuse</button>
    </nav>

    <section id="sec-lib" class="pt-24 h-screen overflow-y-auto px-6">
        <div class="flex justify-between items-center mb-8">
            <h1 class="jazz-title text-5xl font-black italic">Partoches</h1>
            <label class="btn-jazz uppercase tracking-widest cursor-pointer">
                + iCloud / Photos
                <input type="file" multiple onchange="handleVintageFiles(this.files)" class="hidden" accept="image/*,application/pdf">
            </label>
        </div>
        <div id="library-list" class="pb-48 mt-4"></div>
    </section>

    <section id="sec-set" class="hidden pt-24 h-screen overflow-y-auto px-6">
        <div class="max-w-2xl mx-auto text-center">
            <h2 class="jazz-title text-3xl mb-8 italic uppercase">Programmation</h2>
            <div id="set-list-current" class="bg-zinc-900/30 border-2 border-dashed border-zinc-800 rounded-2xl min-h-[220px] mb-8 p-6 text-left"></div>
            <div class="grid grid-cols-2 gap-6 mb-12">
                <button onclick="saveCurrentSet()" class="btn-jazz py-5 uppercase font-black">Enregistrer</button>
                <button onclick="clearCurrentSet()" class="text-zinc-500 font-black uppercase text-[11px]">Vider</button>
            </div>
            <div id="saved-sets-list" class="space-y-4 pb-48 text-left"></div>
        </div>
    </section>

    <section id="sec-view" class="fixed inset-0 bg-black hidden z-[110] overflow-hidden">
        <div id="viewer-header" class="glass absolute top-0 w-full p-4 flex justify-between items-center z-[120]">
            <button onclick="switchTab('lib')" class="text-[10px] text-zinc-500 font-black px-5 py-2">✕ Quitter</button>
            <div class="flex items-center gap-8">
                <button onclick="toggleFX()" class="btn-jazz px-4 py-2 rounded uppercase tracking-tighter">☼ Image</button>
                <button onclick="toggleDrawingMode()" id="draw-toggle" class="btn-jazz px-5 py-2 rounded uppercase tracking-tighter">✎ Annoter</button>
                <div class="flex items-center bg-black/60 border border-zinc-800 rounded-xl overflow-hidden shadow-inner">
                    <button onclick="adjustZoom(-0.1)" class="px-5 py-2 text-gold text-2xl">-</button>
                    <span id="zoom-level" class="text-[11px] w-14 text-center font-black">100%</span>
                    <button onclick="adjustZoom(0.1)" class="px-5 py-2 text-gold text-2xl">+</button>
                </div>
            </div>
            <div id="page-info" class="text-gold font-black italic text-base tracking-widest pr-4">1 / 1</div>
        </div>

        <div id="fx-toolbar">
            <div class="flex flex-col gap-4">
                <div class="flex justify-between items-center"><label class="text-[10px] uppercase font-black text-zinc-400">Luminosité</label><span id="val-bright" class="text-[10px] text-gold font-bold">100%</span></div>
                <input type="range" min="0.2" max="2.5" step="0.01" value="1" oninput="updateFX('bright', this.value)">
                <div class="flex justify-between items-center mt-2"><label class="text-[10px] uppercase font-black text-zinc-400">Contraste</label><span id="val-contrast" class="text-[10px] text-gold font-bold">100%</span></div>
                <input type="range" min="0.2" max="4" step="0.01" value="1" oninput="updateFX('contrast', this.value)">
            </div>
        </div>

        <div id="anno-toolbar">
            <div class="flex gap-3 border-r border-zinc-700 pr-5">
                <div onclick="setAnnoColor('red', this)" class="color-dot active" style="background: red;"></div>
                <div onclick="setAnnoColor('#3b82f6', this)" class="color-dot" style="background: #3b82f6;"></div>
                <div onclick="setAnnoColor('eraser', this)" class="color-dot flex items-center justify-center bg-white text-black text-[8px] font-black uppercase">Gomme</div>
            </div>
            <div class="flex items-center gap-6 pl-2">
                <div onclick="setAnnoSize(2, this)" class="w-2 h-2 bg-white rounded-full cursor-pointer"></div>
                <div onclick="setAnnoSize(6, this)" class="w-5 h-5 bg-white rounded-full cursor-pointer border-2 border-yellow-500"></div>
            </div>
        </div>

        <div id="scroll-container" onwheel="handleWheel(event)" ondblclick="resetZoom()" onclick="toggleUI()">
            <div id="viewer-content"></div>
        </div>

        <div id="viewer-nav" class="absolute bottom-10 w-full flex justify-between px-16 pointer-events-none z-[120]">
            <button onclick="event.stopPropagation(); prevFile()" class="pointer-events-auto w-20 h-20 rounded-full glass border-2 border-gold text-gold text-2xl flex items-center justify-center">◀</button>
            <button onclick="event.stopPropagation(); nextFile()" class="pointer-events-auto w-20 h-20 rounded-full glass border-2 border-gold text-gold text-2xl flex items-center justify-center">▶</button>
        </div>
    </section>

    <script>
        if ('serviceWorker' in navigator) { window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js'); }); }
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        let myFiles = [], setFiles = [], currentIndex = 0;
        let uiVisible = true, currentZoom = 1.0, isDrawingMode = false;
        let annoColor = 'red', annoSize = 6, initialPinchDist = null;
        let annotations = JSON.parse(localStorage.getItem('partoches_annotations') || '{}');

        // GESTION FICHIERS VINTAGE (IOS 10)
        function handleVintageFiles(fileList) {
            Array.from(fileList).forEach(file => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const fileObj = { name: file.name, data: e.target.result, type: file.type };
                    if (!myFiles.find(f => f.name === file.name)) {
                        myFiles.push(fileObj);
                        saveLibraryToLocal();
                        renderLibrary();
                    }
                };
                reader.readAsDataURL(file);
            });
        }

        function saveLibraryToLocal() {
            const compact = myFiles.map(f => ({ name: f.name, type: f.type, data: f.data }));
            try { localStorage.setItem('partoches_vintage_lib', JSON.stringify(compact)); } catch(e) { alert("Mémoire pleine (iPad ancien)"); }
        }

        function renderLibrary() {
            const l = document.getElementById('library-list'); l.innerHTML = '';
            myFiles.sort((a,b) => a.name.localeCompare(b.name)).forEach((file, idx) => {
                const row = document.createElement('div'); row.className = "file-row flex justify-between items-center p-5";
                row.innerHTML = `<div class="flex-grow font-bold text-zinc-300 text-lg" onclick="openFileByIdx(${idx})">${file.name}</div>
                                 <button onclick="addToSet('${file.name.replace(/'/g, "\\'")}')" class="text-gold border border-gold/30 px-5 py-2 rounded-xl uppercase">Ajouter</button>`;
                l.appendChild(row);
            });
        }

        async function openFileByIdx(idx) {
            switchTab('view'); const file = myFiles[idx];
            const container = document.getElementById('viewer-content'); container.innerHTML = ''; 
            currentIndex = idx;
            if(file.type === "application/pdf" || file.name.endsWith('.pdf')) {
                const pdf = await pdfjsLib.getDocument(file.data).promise;
                for(let i=1; i<=pdf.numPages; i++) {
                    const page = await pdf.getPage(i); const viewport = page.getViewport({scale: 2}); 
                    const wrapper = document.createElement('div'); wrapper.className = "page-wrapper";
                    const canvas = document.createElement('canvas'); canvas.width = viewport.width; canvas.height = viewport.height; wrapper.appendChild(canvas);
                    const anno = document.createElement('canvas'); anno.className = "anno-canvas"; anno.width = canvas.width; anno.height = canvas.height; wrapper.appendChild(anno);
                    container.appendChild(wrapper); await page.render({canvasContext: canvas.getContext('2d'), viewport}).promise; setupDrawing(anno, file.name, i);
                }
            } else {
                const wrapper = document.createElement('div'); wrapper.className = "page-wrapper";
                const img = document.createElement('img'); img.src = file.data; wrapper.appendChild(img);
                const anno = document.createElement('canvas'); anno.className = "anno-canvas"; container.appendChild(wrapper);
                img.onload = () => { anno.width = img.naturalWidth; anno.height = img.naturalHeight; wrapper.appendChild(anno); setupDrawing(anno, file.name, 0); };
            }
            applyVisuals(); document.getElementById('scroll-container').scrollTop = 0;
            document.getElementById('page-info').innerText = `${currentIndex + 1} / ${myFiles.length}`;
        }

        // FONCTIONS DESSIN & UI (IDENTIQUES V5)
        function setupDrawing(canvas, fileName, pIdx) {
            const ctx = canvas.getContext('2d'); const key = `${fileName}_${pIdx}`;
            if(annotations[key]) { const img = new Image(); img.src = annotations[key]; img.onload = () => ctx.drawImage(img,0,0); }
            let drawing = false;
            const getPos = (e) => {
                const r = canvas.getBoundingClientRect(); const sx = canvas.width/r.width, sy = canvas.height/r.height;
                const cx = (e.clientX || (e.touches ? e.touches[0].clientX : 0));
                const cy = (e.clientY || (e.touches ? e.touches[0].clientY : 0));
                return { x: (cx-r.left)*sx, y: (cy-r.top)*sy };
            };
            const start = (e) => { if(!isDrawingMode) return; drawing=true; ctx.beginPath(); const p=getPos(e); ctx.moveTo(p.x, p.y); e.preventDefault(); };
            const move = (e) => { if(!drawing) return; const p=getPos(e); ctx.lineTo(p.x, p.y); ctx.strokeStyle=(annoColor==='eraser'?'transparent':annoColor); ctx.lineWidth=annoSize; ctx.stroke(); e.preventDefault(); };
            const stop = () => { if(drawing) { drawing=false; annotations[key]=canvas.toDataURL(); localStorage.setItem('partoches_annotations', JSON.stringify(annotations)); }};
            canvas.addEventListener('touchstart', start, {passive:false}); canvas.addEventListener('touchmove', move, {passive:false}); window.addEventListener('touchend', stop);
        }

        function toggleDrawingMode() { isDrawingMode = !isDrawingMode; document.getElementById('scroll-container').classList.toggle('anno-active', isDrawingMode); document.getElementById('draw-toggle').style.background = isDrawingMode ? 'red' : 'black'; document.getElementById('anno-toolbar').style.display = isDrawingMode ? 'flex' : 'none'; }
        function switchTab(id) { ['lib','set','view'].forEach(t => { document.getElementById('sec-'+t).classList.add('hidden'); document.getElementById('tab-'+t).classList.remove('tab-active'); }); document.getElementById('sec-'+id).classList.remove('hidden'); document.getElementById('tab-'+id).classList.add('tab-active'); }
        function applyVisuals() { document.getElementById('viewer-content').style.transform = `scale(${currentZoom})`; document.getElementById('zoom-level').innerText = Math.round(currentZoom*100)+'%'; }
        function adjustZoom(d) { currentZoom = Math.max(0.1, currentZoom + d); applyVisuals(); }
        function resetZoom() { currentZoom = 1.0; applyVisuals(); }
        function toggleFX() { const f = document.getElementById('fx-toolbar'); f.style.display = f.style.display === 'flex' ? 'none' : 'flex'; }
        function updateFX(type, val) { const root = document.documentElement; if(type === 'bright') root.style.setProperty('--page-bright', val); if(type === 'contrast') root.style.setProperty('--page-contrast', val); }
        
        // PERSISTANCE SETLISTS
        function saveCurrentSet() { const name = prompt("Nom du Set :"); if(name) localStorage.setItem('part_set_'+name, JSON.stringify(setFiles)); renderSavedSets(); }
        function renderSavedSets() { 
            const list = document.getElementById('saved-sets-list'); list.innerHTML = '';
            Object.keys(localStorage).filter(k => k.startsWith('part_set_')).forEach(key => {
                const div = document.createElement('div'); div.className = "flex justify-between items-center bg-zinc-900 border border-zinc-800 p-4 rounded-xl";
                div.innerHTML = `<span class="font-black text-gold italic">${key.replace('part_set_','')}</span><button onclick="localStorage.removeItem('${key}'); renderSavedSets()" class="text-red-900 font-black">✕</button>`;
                list.appendChild(div);
            });
        }

        // INIT
        window.onload = function() {
            const saved = localStorage.getItem('partoches_vintage_lib');
            if(saved) { myFiles = JSON.parse(saved); renderLibrary(); }
            renderSavedSets();
        };
    </script>
</body>
</html>
